prompt:
  text: |-
    我手上有一份美國政府諮詢委員會的會議逐字稿，存放在 `meeting-transcript.md`。這是商務部頻譜管理諮詢委員會（Commerce Spectrum Management Advisory Committee, CSMAC）於 2012 年 5 月 30 日召開的會議，討論聯邦頻譜管理與共享。

    請幫我分析這份逐字稿，在一個名為 `acronym_glossary.md` 的檔案中建立一份完整的縮寫詞彙表。對於每個找到的縮寫或簡稱，請列出：

    - **縮寫（Acronym）**：逐字稿中使用的簡稱
    - **全稱（Full form）**：它所代表的完整名稱
    - **脈絡（Context）**：簡述它在本次會議中的使用方式（1-2 句）
    - **類別（Category）**：政府機關（Government Agency）、頻譜／技術（Spectrum/Technical）、法規（Regulatory）、業界（Industry）、軍事（Military）或其他（Other）

    請依縮寫的字母順序排序，並在最後附上找到的縮寫總數。

    提醒：有些縮寫可能在逐字稿中本身就有展開；其他則可能需要頻譜管理與電信政策的領域知識才能解讀。請把所有出現的縮寫都擷取出來，包含只出現一次的。
