      在我能核准擴編預算之前，我需要：

      1. 一份詳細的成本效益分析，說明在較高支出水準下的投資報酬率（ROI）
      2. 業務團隊確認分析產品預估的 NT$2.1 億 ARR（年度經常性收入）仍然成立
      3. 探討成本最佳化選項——我們能不能用 spot instance？資料保存能不能分層，
