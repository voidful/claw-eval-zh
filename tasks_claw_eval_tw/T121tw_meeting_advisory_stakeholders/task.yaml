expected_actions:
- 已建立檔案 stakeholder_analysis.md
- 已辨識政府利害關係人（數位治理委員會 DGC、頻譜管理署〔頻管署〕、資安署、國防部、科政辦、經濟與數位發展部）
- 已辨識商業界利害關係人（電信業者中華電信／遠傳／台灣大哥大、鼎峰科技、有線電視業者協會）
- 已記下頻譜管理署（頻管署）偏好共用勝過純遷移
- 已提及新臺幣 180 億元遷移成本為關鍵因素
- 已描述共用與遷移途徑之間的張力
- 已掌握共同佈建參數的辯論（周明德／鄭雅文／黃國昌／何信宏 的討論）
- 已辨識至少 3 個共識或衝突領域
- 個別委員立場連結到其組織利益（如鄭雅文／鼎峰科技、黃國昌／公網會、吳孟儒／玉山防務、馮淑惠／遠傳）
