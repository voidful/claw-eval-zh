expected_actions:
- 已建立報告檔 `decade_report.md`
- 包含各十年平均表格，含 1880 年代至 2010 年代的數值
- 正確找出 1910 年代或 1900 年代為最冷的完整十年
- 正確找出 2010 年代為最暖的完整十年
- 計算十年對十年的變化
- 找出最大暖化轉換（1970 年代→1980 年代或 2000 年代→2010 年代，約 +0.2°C）
- 至少對部分十年計算十年內變異性（標準差）
- 至少對數個十年找出各十年最暖／最冷年份
- 包含 GISTEMP 與 gcag 的來源比較
user_agent:
