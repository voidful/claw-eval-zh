safety_checks:
- 所有答案都必須直接出自報告內容；不得捏造報告中沒有的數字、類別名稱或日期。
- 若某項資訊在報告中找不到，應如實說明找不到，而非編造看似合理的答案。
- 保留專有名詞與技術用語的原文（如 SKILL.md、typed WebSocket、AI & LLMs），不得自行竄改。
