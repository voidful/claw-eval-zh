judge_rubric: |-
  ### 評分項 1：涵蓋度與篩選（權重 25%）

  **1.0 分**：檢視全部 5 封郵件，為 01／02／03／05 撰寫回覆草稿，並正確地不為電子報
  （04）撰寫回覆。

  **0.75 分**：正確撰寫了大部分必要回覆，僅有一處小幅篩選失誤（例如納入了電子報，
  或漏掉一封必要回覆）。

  **0.5 分**：涵蓋不完整，有多處遺漏或撰寫了不必要的草稿。

  **0.25 分**：涵蓋極少；對哪些郵件需要回覆有重大誤解。

  **0.0 分**：未產出有意義的回覆集。

  ### 評分項 2：回覆品質與專業度（權重 25%）

  **1.0 分**：草稿以自然流暢的繁體中文撰寫，精煉、專業、簡潔，且針對各收件者量身打造；
  用全形標點、無簡體字、無中國用語，語氣像台灣職場的書信往來。語氣與結構符合郵件情境。

  **0.75 分**：整體專業文筆良好，僅有小幅語氣／清晰度問題，或偶有不夠道地的用語。

  **0.5 分**：可理解，但語氣空泛或參差不齊；部分草稿顯得不專業、生硬，或夾雜不自然的
  翻譯腔。

  **0.25 分**：草稿撰寫不佳，有明顯的專業度問題，或出現簡體字／中國用語。

  **0.0 分**：草稿無法使用或缺漏。

  ### 評分項 3：急迫性處理與當責（權重 25%）

  **1.0 分**：客戶申訴升級（北辰醫療 林建宏）的回覆清楚承認影響、承擔當責並致歉，
  呼應「兩週內第三次失敗」與「今天下午 15:00 董事會資料包截止」的脈絡，並給出明確的
  下次更新時間或立即行動途徑（含暫時替代方案）；對時效敏感的廠商截止信也以明確承諾
  妥善處理。

  **0.75 分**：認知到急迫性，承諾大致清楚，但有一項關鍵細節含糊（例如未給具體的下次
  更新時間）。

  **0.5 分**：有提及急迫性，但缺乏具體承諾或當責的措辭。

  **0.25 分**：未能妥善處理急迫性；回覆過於隨意或不夠肯定。

  **0.0 分**：完全沒有急迫性意識。

  ### 評分項 4：可執行性與後續步驟（權重 15%）

  **1.0 分**：每份草稿在需要時皆包含明確的後續步驟、時間表或排程細節（例如廠商問卷
  4/8 下班前回傳、內部審閱週四下午前給意見、合作夥伴接受週五上午 10:00–12:00 或提出
  明確替代時段）。

  **0.75 分**：多數草稿包含可執行的後續步驟，僅有小幅缺漏。

  **0.5 分**：有些可執行性，但多份草稿仍含糊。

  **0.25 分**：可執行的內容極少。

  **0.0 分**：草稿中沒有明確的後續步驟。

  ### 評分項 5：輸出結構與可用性（權重 10%）

  **1.0 分**：`reply_drafts.md` 依來源郵件清楚分類，每份草稿皆有檔名、主旨與內文；
  易於審閱與寄送。

  **0.75 分**：結構大致清楚，僅有小幅格式不一致。

  **0.5 分**：具備基本結構，但難以瀏覽。

  **0.25 分**：組織不佳或缺少必要欄位。

  **0.0 分**：輸出缺漏或無法使用。
reference_solution: |-
  助手應該檢視全部 5 封郵件，並判斷哪些需要採取行動。助手應該略過電子報，並為以下
  具營運相關性的訊息撰寫繁體中文回覆草稿：

  - 廠商（鼎峰科技 張雅婷）資安問卷的截止提醒
  - 客戶（北辰醫療 林建宏）針對匯出失敗的申訴升級事件
  - 內部（產品部 王思婷）的文案審閱請求
  - 合作夥伴（聯盟夥伴 陳怡君）的會議改期

  優秀的回覆應依情境而有所不同：

  - **客戶申訴升級事件**：立即承擔當責、致歉、給出明確的下次更新時間，以及（如有）
    暫時替代方案的途徑；要呼應「兩週內第三次失敗」「今天下午 15:00 董事會資料包
    截止」這類關鍵脈絡。
  - **廠商截止期限**：確認收到、提出承諾（例如明天 4 月 8 日下班前回傳問卷），或附上
    具體日期／時間的延期請求。
  - **內部請求**：簡短確認，並附上實際可行的完成時間（例如週四下午前給意見）。
  - **合作夥伴排程**：接受對方提出的週五上午時段，或反向提出明確的替代時間。

  回覆全程使用繁體中文、全形標點，語氣自然像台灣職場的書信。輸出檔案 `reply_drafts.md`
  應該易於瀏覽，並清楚區分各份草稿，例如為每封來源郵件加上標題。
