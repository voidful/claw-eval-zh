prompt:
  text: |-
    我的 `inbox/` 資料夾裡有 5 封還沒回的信（`unread_01` 到 `unread_05`），想請你
    幫我把該回的信先擬個回覆草稿。請把結果存到 `reply_drafts.md`。

    這些信件內容都是繁體中文的台灣職場情境，請你也用「繁體中文」撰寫回覆草稿，語氣
    要自然、像台灣職場的書信往來。

    需求：

    1. 只針對需要回覆的信擬草稿（純粹宣傳性質的電子報那種沒什麼價值的就別回了）。
    2. 每一份回覆草稿都要包含：
       - 來源郵件的檔名
       - 主旨行（用 `Re:` 格式）
       - 專業、貼合情境的繁體中文內文
    3. 依各情境調整語氣與急迫程度（客戶的申訴升級事件要展現急迫與當責；內部請求可以
       簡潔處理）。
    4. 如果你手上的資訊還不足以把某件事完全解決，請坦白說明，並給出明確的後續步驟
       或時間表。
    5. 每份回覆都要簡潔但完整。
