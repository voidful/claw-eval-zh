expected_actions:
- 已建立檔案 reply_drafts.md
- 回覆草稿以繁體中文撰寫，語氣自然貼合台灣職場
- 全部 5 封未讀郵件皆已檢視
- 已為需要回覆的郵件（01、02、03、05）撰寫回覆草稿
- 未為電子報郵件（04）撰寫不必要的草稿
- '每份草稿皆包含來源檔名與 Re: 主旨'
- 語氣貼合情境與急迫性
- 客戶申訴升級事件的回覆展現當責與近期可行的後續步驟（含下次更新時間）
- 廠商／合作夥伴的回覆包含具體的排程或時間承諾（例如 4/8 下班前、週五上午時段）
- 草稿簡潔、專業且具可執行性
user_agent:
