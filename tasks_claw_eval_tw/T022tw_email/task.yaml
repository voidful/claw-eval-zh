  text: |-
    我這邊行程撞期，沒辦法參加一場會議，想請你幫我寫一封專業又得體的婉拒信，把它
    存到 email_draft.txt。

    請以**繁體中文**撰寫整封郵件，語氣維持台灣職場常見的禮貌與專業。
