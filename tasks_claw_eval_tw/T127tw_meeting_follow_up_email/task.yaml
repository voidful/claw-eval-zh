expected_actions:
- 已建立 `follow_up_email.md` 檔案
- 有主旨（主旨行）
- 包含決議或關鍵結論區段
- 列出至少 3 項具體決議（如活動分工 COSCUP／DevOpsDays Taipei／Kubernetes Day Taiwan、漏洞管理、只用綠色、主標語「更快交付，更低風險」）
- 包含行動項目且至少標出 2 位逐字稿中被指派工作的負責人姓名（戴立安／高敏哲／蔡思敏／王志明）
