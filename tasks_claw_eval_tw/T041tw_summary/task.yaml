  **0.75 分**：摘要掌握多數主要主題，僅有少數遺漏。某一關鍵面向可能著墨不足。
  沒有重大事實錯誤。

  **0.5 分**：摘要掌握部分主要主題，但漏掉重要面向。可能有輕微事實不準確，
  或過度強調較不重要的論點。

  **0.25 分**：摘要漏掉多個主要主題，或含有重大事實錯誤。對原文的呈現不佳。

  **0.0 分**：摘要完全不準確、離題或缺失。

