expected_actions:
- 已建立檔案 feature_priorities.md
- 至少列出 8 個不同的功能或功能組合
- 使用者體驗（UX）改善被辨識為整體前 5 名之一（興奮度 3）
- 漏洞管理（vulnerability management）被辨識為整體前 5 名之一
- GitOps 能力 / Kubernetes agent 被辨識為整體前 5 名之一
- 提及 CI/CD 的流水線編輯器（pipeline editor）
- 模糊測試（fuzzing）因先前媒體報導而被降低優先序
- 記下社群貢獻（VS Code 整合、Terraform 模組）
