prompt:
  text: |-
    工作區裡有一份會議逐字稿 meeting_transcript.md（虛構台灣軟體公司「鼎峰科技」的產品
    暨行銷週會，日期 2025-03-18，時區 Asia/Taipei）。會議有相當篇幅在討論：自家辦的
    「鼎峰匯流大會（DingFeng Connect）」keynote 上要重點主打哪些產品功能與改進。

    請閱讀這份逐字稿，建立一個名為 `feature_priorities.md` 的檔案，內含一份依優先順序排列
    的功能清單。針對每個功能，請包含：

    1. **功能名稱**
    2. **領域 / Stage**（例如：建立 Create、資安 Secure、監控 Monitor、規劃 Plan、CI/CD、
       設定 Configure / GitOps 等）
    3. **興奮度（excitement level）**（依會議討論以 1 至 3 表示，3 為最令人興奮）
    4. **描述**（該功能的作用或為何重要）
    5. **備註**（任何討論要點，例如是否為社群貢獻、是否已被媒體報導過、成熟度等）

    此外也請包含：
    - 團隊對匯流大會 keynote 的**整體前 5 名（top 5）**名選。
    - 他們議定用來評估功能的**方法論**（把多個小型 MVC 整合成主題、興奮度 1–3 當堆疊排名、
      重用 5.0 版發布內容等）。
    - 任何被**明確降低優先序（deprioritized）**的功能，以及降低的原因。

    請全程使用繁體中文撰寫報告。
