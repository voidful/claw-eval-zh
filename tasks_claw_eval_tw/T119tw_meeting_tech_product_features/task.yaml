judge_rubric: |-
  ### 評分項 1：功能擷取完整度（權重 30%）
  - 1.0：列出所有討論到的功能，含 UX 改善、漏洞管理、GitOps / Kubernetes agent、流水線
    編輯器、模糊測試、靜態掃描器替換、DAST 瀏覽器掃描器（狂戰士 Berserker）、VS Code
    整合、Terraform 模組、價值流分析、事件管理與史詩看板，且各有正確的領域 / stage 歸屬。
  - 0.75：掌握多數功能且 stage 歸屬正確，漏一兩個。
  - 0.5：掌握主要功能，但漏掉數個次要的。
  - 0.25：僅掌握最顯而易見的功能。
  - 0.0：未擷取出有意義的功能。
  ### 評分項 2：優先排序準確度（權重 30%）
  - 1.0：正確指出浮現的整體前 5 名（UX 改善、漏洞管理、GitOps 那包、CI/CD 流水線編輯器、
    Plan 待高敏哲補）。準確反映興奮度等級與團隊排序理由；記下被降低優先序者（模糊測試因
    先前媒體報導）以及需後續跟進（follow-up）者。
  - 0.75：top picks 大致正確，僅少許排序問題。
  - 0.5：有部分優先排序，但漏掉關鍵排名或理由。
  - 0.25：功能逐條列出但無有意義的優先排序。
  - 0.0：未嘗試優先排序。
  ### 評分項 3：方法論記載（權重 20%）
  - 1.0：清楚說明議定方法論——把 MVC 整合成主題、以 1–3 興奮度當堆疊排名、回顧過去一年
    找 beta→GA 功能、重用 5.0 版發布內容、目標整體前 5 名供 PR 使用；並記下從「每個 stage
    各挑 3 個」改為「整體前 5 名」的轉變。
  - 0.75：掌握多數方法論要素。
  - 0.5：提及部分方法論但不完整。
  - 0.25：方法論提及含糊。
  - 0.0：未記載方法論。
  ### 評分項 4：背景脈絡與細節品質（權重 20%）
  - 1.0：每個功能皆含相關背景脈絡：社群貢獻狀態、先前媒體報導、成熟度（beta/GA）、客戶
    需求訊號（如社群敲碗）；並記下與鼎峰匯流大會 keynote 的關聯。
  - 0.75：背景脈絡良好，僅少許缺口。
  - 0.5：有部分背景脈絡，但許多功能缺乏細節。
  - 0.25：背景脈絡極少。
  - 0.0：無背景脈絡或細節。
reference_solution: |-
  助手應解析逐字稿，找出第二節「鼎峰匯流大會：產品發布題材」所討論的功能，並整理成
  feature_priorities.md。

  **整體前 5 名 / 高優先序：**
  1. **使用者體驗（UX）改善**（跨 stage）— 興奮度 3。陳柏宇指出它跨多個 stage、不只在
     「建立 Create」，且 UX 改善是業界常見的「大型發表（big launch）」類別。
  2. **漏洞管理（vulnerability management）**（資安 Secure）— 興奮度高。林淑芬提議把過去
     一年十幾個小型 MVC 整合成單一敘事，本已是 5.0 版發布的一部分。
  3. **GitOps 能力**（設定 Configure / GitOps）— Kubernetes agent 與 Terraform 整合包在一起。
  4. **流水線編輯器（pipeline editor）**（CI/CD）— 被點名為 CI/CD stage 的明確選項。
  5. **規劃中、尚未定案的功能（Plan）** — 指派給高敏哲在星期二前提出方案；候選有史詩看板（epic
     boards，社群長期敲碗的功能）與里程碑燃盡圖（milestone burnup charts）。

  **其他值得注意的功能：**
  - **模糊測試（fuzzing）收購整合**（Secure）— 被降低優先序，因為已被媒體報導過兩次
    （收購公告 + 整合後續），已「用爛了 / worn out」。
  - **靜態掃描器替換（類 Semgrep 引擎）**（Secure）— 取代舊掃描器，可作為一個項目。
  - **DAST 瀏覽器掃描器**（Secure）— 給單頁應用（SPA）的專有 DAST，beta 階段，內部代號
    「狂戰士（Berserker）」。
  - **VS Code 整合**（Create）— 其中兩個是社群貢獻，原本是非官方擴充套件，現要轉官方。
  - **Terraform 模組**（Configure）— 原為社群模組，現獲官方支援。
  - **價值流分析（Value Stream Analytics）**（Plan）— 可能可講，但可自訂版本是 3.2 版，太舊。
  - **事件管理（Incident management）**（Monitor）— 一批改進整合，但核心更早就有。

  **方法論：**
  - 把多個小型 MVC 整合成較大主題敘事，而非逐條列個別功能。
  - 以興奮度 1–3 當堆疊排名（stack rank），各等級各取、不用原始分數。
  - 回顧過去一年，挑出當初是 beta、現已 GA-ready 的功能。
  - 重用 5.0 版發布內容並加上之後的新增項目。
  - 把原本「每個 stage 各挑 3 個」改成「整體前 5 名（top 5 overall）」交給公關（PR）團隊
    當 keynote 素材。
