judge_rubric: |-
  ### 評分項 1：內容品質與相關性（權重 30%）

  **1.0 分**：內容與軟體開發者高度相關，涵蓋 4 項以上不同的好處，並附有清楚的
  理由、範例或佐證。資訊正確且具洞見。

  **0.75 分**：內容相關，涵蓋 3～4 項好處，並提供良好的理由。在深度或範例上有
  小幅不足。

  **0.5 分**：內容切題，但僅涵蓋 2～3 項好處。雖有提供部分理由，但深度不足，或對
  軟體開發者的針對性不夠。

  **0.25 分**：內容空泛，或僅膚淺地涵蓋 1～2 項好處。對軟體開發者的相關性有限。

  **0.0 分**：內容離題、缺漏，或完全未談及遠端工作的好處。

  ### 評分項 2：結構與組織（權重 25%）

  **1.0 分**：結構優異，開頭清楚、主體段落組織良好、結尾有力。各論點之間銜接合乎
  邏輯。妥善運用標題與 markdown 排版。

  **0.75 分**：結構良好，具備開頭、主體與結尾。有些微組織上的問題。markdown 排版
  尚可。

  **0.5 分**：具備基本結構，但有明顯的組織問題。段落銜接薄弱或脈絡不清。markdown
  排版極少。

  **0.25 分**：結構不佳。缺少關鍵段落（開頭或結尾）。內容雜亂無章。

  **0.0 分**：無可辨識的結構。內容混亂或缺漏。

  ### 評分項 3：文筆品質（權重 20%）

  **1.0 分**：文筆優異，行文清楚、引人入勝。語氣專業。無明顯文法或拼字錯誤。句型
  富於變化。

  **0.75 分**：文筆品質良好，僅有小瑕疵。整體清楚且專業。文法錯誤甚少。

  **0.5 分**：文筆尚可，但在清晰度、語氣或文法上有明顯問題。有些用語生硬。

  **0.25 分**：文筆品質不佳。多處文法錯誤、用語不清，或語氣不夠專業。

  **0.0 分**：文筆無法理解或缺漏。

  ### 評分項 4：字數符合度（權重 15%）

  **1.0 分**：字數為 450～550 字（在目標的 10% 內）。

  **0.75 分**：字數為 400～600 字（在目標的 20% 內）。

  **0.5 分**：字數為 300～400 或 600～700 字（偏離目標 20～40%）。

  **0.25 分**：字數為 200～300 或 700～800 字（偏離目標 40～60%）。

  **0.0 分**：字數低於 200 或超過 800 字，或內容缺漏。

  ### 評分項 5：任務完成度（權重 10%）

  **1.0 分**：建立的檔案名稱正確（blog_post.md），內含完整的部落格文章，所有需求
  皆達成。

  **0.75 分**：已建立檔案，但檔名有小瑕疵，或漏掉一項小需求。

  **0.5 分**：已建立檔案，但漏掉多項需求或有重大問題。

  **0.25 分**：已建立檔案，但內容不完整或嚴重不足。

  **0.0 分**：未建立檔案，或檔案為空／無法使用。
reference_solution: |-
  助手應該：

  1. 撰寫一篇結構完整的部落格文章，包含開頭（introduction）、主體（body）與結尾
     （conclusion）
  2. 聚焦於對軟體開發者而言特別有意義的好處
  3. 目標字數約為 500 字（400～600 字皆可接受）
  4. 使用正確的 markdown 排版
  5. 將內容儲存到名為 `blog_post.md` 的檔案

  這篇文章應該引人入勝、具資訊性，且文筆專業。內容須涵蓋多項好處，並提供理由
  或範例。
