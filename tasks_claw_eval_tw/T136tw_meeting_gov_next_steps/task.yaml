prompt:
  text: |-
    假設你任職於台灣某科學政策研究單位，主管請你研讀一份國際公開會議的逐字稿，作為國內審議流程的參考案例。逐字稿檔案 `transcript.md` 來自 NASA 首場關於不明異常現象（UAPs/UFOs）的公開會議。這是一場審議會議，在小組提出最終報告前還有數個月的工作要做。

    請幫我讀過逐字稿，把所有提及的後續步驟、後續行動、時程與交付項目擷取到名為 `next_steps.md` 的檔案。對於每一項，請列出：

    - **行動項目（Action item）**：需要發生的事
    - **負責方（Responsible party）**：預期由誰負責——NASA、AARO、小組、FAA 等
    - **時程（Timeline）**：預期何時（若有提及）
    - **狀態（Status）**：被提及為計畫中、進行中或已完成
    - **來源（Source）**：誰在會議中提到的

    請組織成以下區段：Immediate Next Steps（數週）、Near-Term Actions（數月）、Longer-Term Goals（持續／數年）與 Open Questions（被提出但尚無明確後續指派的項目）。最後附上一份時間軸視覺化，呈現關鍵里程碑。請忠實依逐字稿原文擷取，姓名、機關、日期等事實一律保留原樣，不可改寫成台灣的人事物。
