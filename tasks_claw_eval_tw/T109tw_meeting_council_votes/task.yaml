expected_actions:
- 建立報告檔案 votes_report.md
- 正確彙整預算案表決（12 比 0 通過）
- 標出道路拓寬案有議員利益迴避
- 標出公園命名案為全體一致通過
- 標出清運費調整案為一讀
- 標出都市更新案延期
user_agent:
  enabled: false
judge_rubric: |-
  ### 評分項 1：表決結果正確度（權重 60%）
  - 1.0：各議案的票數、迴避、一致、一讀、延期等狀態皆正確
  - 0.5：多數正確但有少量錯誤
  - 0.0：嚴重錯誤
  ### 評分項 2：完整度（權重 25%）
  - 1.0：七個議案皆涵蓋
  - 0.5：遺漏一兩案
  - 0.0：多數遺漏
  ### 評分項 3：呈現（權重 15%）
  - 1.0：逐案清楚列出主題與結果
  - 0.0：雜亂
reference_solution: |-
  助手應彙整七個議案（皆為虛構）：
  1. 會議紀錄：全體無異議確認通過
  2. 年度總預算案：12 票贊成、0 反對，通過
  3. 道路拓寬案：林議員利益迴避，其餘 10 贊成 1 反對，通過
  4. 公園命名案：全體一致（unanimous）通過
  5. 清運費調整自治條例：完成一讀（first reading）
  6. 都市更新案：延期（continued）
  7. 社福補助加碼案：7 票贊成、5 反對，通過
