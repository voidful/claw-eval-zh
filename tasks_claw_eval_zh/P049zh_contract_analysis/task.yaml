prompt:
  text: |-
    請閱讀工作區裡的 `sample_contract.pdf`，這是兩家公司之間的軟體服務協議（Software Services Agreement）。請進行一份完整的法律分析，並把你的發現存到 `contract_analysis.md`。

    你的分析必須包含下列區段：

    1. **Key Dates and Deadlines（關鍵日期與期限）** —— 擷取合約中提及的所有重要日期、里程碑與期限，並依時間先後順序呈現。
    2. **Party Obligations（各方義務）** —— 摘要各方（Provider 與 Client）的主要義務，依當事方分類整理。
    3. **Risks and Concerns（風險與疑慮）** —— 找出對各方而言的潛在風險、不利條款或值得關注之處。請考量責任限制、終止條件、智慧財產權（IP）歸屬、資料保護要求，以及任何其他可能有問題的條款。
    4. **Financial Summary（財務摘要）** —— 摘要合約總價值、付款排程，以及任何財務條件（逾期費、保留款 retainage 等）。

    （提醒：本分析僅供資訊參考，旨在提示潛在風險，不構成法律意見，亦不取代合格律師的專業諮詢。）
