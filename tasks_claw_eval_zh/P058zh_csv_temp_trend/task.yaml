- 回報整體暖化速率約 0.07–0.09°C per decade
- 計算 1950 年前暖化速率（約 0.03–0.05°C/decade）
- 計算 1950 年後暖化速率（約 0.14–0.17°C/decade）
- 指出加速（1950 年後速率明顯快於 1950 年前）
- 找出首次超過 +0.5°C 的年份（1998 或相近）
- 找出首次超過 +1.0°C 的年份（2015 或 2016）
- 包含近期十年與最早十年的比較
- 提供總結或結論
