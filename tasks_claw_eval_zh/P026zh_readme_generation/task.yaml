  README。

  助手應該發掘並納入的關鍵細節：

  - 此專案名為「TaskFlow API」（來自 package.json 的 name/description 與 logger
    輸出）。
  - 技術堆疊：TypeScript、Express、Prisma（PostgreSQL）、Redis、JWT 驗證、bcrypt。
  - 路由：`/api/auth`（register、login）、`/api/tasks`（CRUD）、`/api/webhooks`
    （task-complete）、`/health`。
  - 環境變數：PORT、DATABASE_URL、JWT_SECRET、REDIS_URL、WEBHOOK_SECRET。
  - 腳本：dev、build、start、test、lint、db:migrate、db:seed。
  - 授權：MIT。

  這份 README 應結構完整，具有清楚的標題、指令的程式碼區塊，以及源自實際原始碼
  （而非憑空捏造功能）的正確資訊。
