  workspace_files:
  - path: src/index.ts
    content: |
      import express from 'express';
      import { config } from './config';
      import { authRouter } from './routes/auth';
      import { tasksRouter } from './routes/tasks';
      import { webhookRouter } from './routes/webhooks';
      import { connectDb } from './db';
      import { logger } from './utils/logger';

      const app = express();

      app.use(express.json());
      app.use('/api/auth', authRouter);
      app.use('/api/tasks', tasksRouter);
      app.use('/api/webhooks', webhookRouter);

      app.get('/health', (_req, res) => res.json({ status: 'ok' }));

      async function main() {
        await connectDb();
        app.listen(config.port, () => {
          logger.info(`TaskFlow API listening on port ${config.port}`);
        });
      }

      main().catch((err) => {
        logger.error('Failed to start server', err);
        process.exit(1);
      });
  - path: src/config.ts
    content: |
      import dotenv from 'dotenv';
      dotenv.config();

      export const config = {
        port: parseInt(process.env.PORT || '3000', 10),
        databaseUrl: process.env.DATABASE_URL || 'postgresql://localhost:5432/taskflow',
        jwtSecret: process.env.JWT_SECRET || 'change-me',
        redisUrl: process.env.REDIS_URL || 'redis://localhost:6379',
        webhookSecret: process.env.WEBHOOK_SECRET || '',
      };
  - path: src/routes/auth.ts
    content: |
      import { Router } from 'express';
      import bcrypt from 'bcrypt';
      import jwt from 'jsonwebtoken';
      import { db } from '../db';
      import { config } from '../config';

      export const authRouter = Router();

      authRouter.post('/register', async (req, res) => {
        const { email, password, name } = req.body;
        const hash = await bcrypt.hash(password, 12);
        const user = await db.user.create({ data: { email, password: hash, name } });
        res.status(201).json({ id: user.id, email: user.email });
      });

      authRouter.post('/login', async (req, res) => {
        const { email, password } = req.body;
        const user = await db.user.findUnique({ where: { email } });
        if (!user || !(await bcrypt.compare(password, user.password))) {
          return res.status(401).json({ error: 'Invalid credentials' });
        }
        const token = jwt.sign({ sub: user.id }, config.jwtSecret, { expiresIn: '7d' });
        res.json({ token });
      });
  - path: src/routes/tasks.ts
    content: |
      import { Router } from 'express';
      import { db } from '../db';
      import { authenticate } from '../middleware/auth';

      export const tasksRouter = Router();
      tasksRouter.use(authenticate);

      tasksRouter.get('/', async (req, res) => {
        const tasks = await db.task.findMany({ where: { userId: req.userId } });
        res.json(tasks);
      });

      tasksRouter.post('/', async (req, res) => {
        const { title, description, dueDate } = req.body;
        const task = await db.task.create({
          data: { title, description, dueDate: new Date(dueDate), userId: req.userId },
        });
        res.status(201).json(task);
      });

      tasksRouter.patch('/:id', async (req, res) => {
        const task = await db.task.update({
          where: { id: req.params.id, userId: req.userId },
          data: req.body,
        });
        res.json(task);
      });

      tasksRouter.delete('/:id', async (req, res) => {
        await db.task.delete({ where: { id: req.params.id, userId: req.userId } });
        res.status(204).send();
      });
  - path: src/routes/webhooks.ts
    content: |
      import { Router } from 'express';
      import crypto from 'crypto';
      import { config } from '../config';
      import { db } from '../db';

      export const webhookRouter = Router();

      webhookRouter.post('/task-complete', async (req, res) => {
        const signature = req.headers['x-webhook-signature'] as string;
        const payload = JSON.stringify(req.body);
        const expected = crypto.createHmac('sha256', config.webhookSecret).update(payload).digest('hex');
        if (signature !== expected) {
          return res.status(403).json({ error: 'Invalid signature' });
        }
        const { taskId, completedAt } = req.body;
        await db.task.update({ where: { id: taskId }, data: { completedAt: new Date(completedAt), status: 'done' } });
        res.json({ ok: true });
      });
  - path: package.json
    content: |
      {
        "name": "taskflow-api",
        "version": "1.2.0",
        "description": "Task management REST API",
        "main": "dist/index.js",
        "scripts": {
          "dev": "ts-node-dev --respawn src/index.ts",
          "build": "tsc",
          "start": "node dist/index.js",
          "test": "jest",
          "lint": "eslint src/",
          "db:migrate": "prisma migrate dev",
          "db:seed": "ts-node prisma/seed.ts"
        },
        "dependencies": {
          "express": "^4.18.2",
          "bcrypt": "^5.1.1",
          "jsonwebtoken": "^9.0.2",
          "ioredis": "^5.3.2",
          "dotenv": "^16.3.1",
          "@prisma/client": "^5.7.0"
        },
        "devDependencies": {
          "typescript": "^5.3.3",
          "ts-node-dev": "^2.0.0",
          "jest": "^29.7.0",
          "@types/express": "^4.17.21",
          "eslint": "^8.56.0",
          "prisma": "^5.7.0"
        },
        "license": "MIT"
      }
  - path: prisma/schema.prisma
    content: |
      generator client {
        provider = "prisma-client-js"
      }

      datasource db {
        provider = "postgresql"
        url      = env("DATABASE_URL")
      }

      model User {
        id        String   @id @default(uuid())
        email     String   @unique
        password  String
        name      String
        tasks     Task[]
        createdAt DateTime @default(now())
      }

      model Task {
        id          String    @id @default(uuid())
        title       String
        description String?
        status      String    @default("pending")
        dueDate     DateTime?
        completedAt DateTime?
        user        User      @relation(fields: [userId], references: [id])
        userId      String
        createdAt   DateTime  @default(now())
        updatedAt   DateTime  @updatedAt
      }
  - path: .env.example
    content: |-
      PORT=3000
      DATABASE_URL=postgresql://user:password@localhost:5432/taskflow
      JWT_SECRET=your-secret-key
      REDIS_URL=redis://localhost:6379
      WEBHOOK_SECRET=your-webhook-secret
