reference_solution: |-
  助手應該：

  1. 找到計算存貨週轉率所需的 U.S. Steel FY2024 相關數字。
  2. 使用標準的存貨週轉率公式，例如銷貨成本（cost of sales）除以平均存貨（average inventory）。
  3. 列出計算中使用的數值。
  4. 建立 `us_steel_inventory_turnover.txt` 並附上最終答案。

  就 FY2024 而言，以年度銷貨成本與依期初、期末餘額計算的平均存貨來算，正確答案應落在約 6.5x 左右。
