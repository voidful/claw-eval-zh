    請計算 U.S. Steel 在 2024 會計年度（fiscal year 2024）的存貨週轉率（inventory turnover ratio）。

    請查找所需的財務數字、執行計算，並把結果存到 `us_steel_inventory_turnover.txt`。請附上公式、你使用的數值，以及最終的比率。

    （提醒：本任務僅供資訊與分析參考，不構成投資或財務建議，亦不取代專業財務意見。）
