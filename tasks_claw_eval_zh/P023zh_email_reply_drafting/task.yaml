prompt:
  text: |-
    你在 `inbox/` 資料夾中有 5 封未讀郵件（`unread_01` 到 `unread_05`）。

    請閱讀所有未讀訊息，並為需要回覆的郵件撰寫回覆草稿。將你的輸出儲存到
    `reply_drafts.md`。

    注意：郵件原文為英文，回覆草稿請保留原文語言（以英文撰寫）；以下需求說明僅以
    中文呈現。

    需求：

    1. 只為需要回覆的郵件撰寫回覆草稿（不要為價值不高的電子報撰寫回覆）。
    2. 每一份回覆草稿都要包含：
       - 來源郵件的檔名
       - 主旨行（使用 `Re:` 格式）
       - 專業、貼合情境的內文
    3. 依各情境調整語氣與急迫性（客戶升級事件應展現急迫與當責；內部請求可以簡潔
       處理）。
    4. 若你沒有足夠資訊可完全解決某件事，請坦白說明，並提供明確的後續步驟或時間
       表。
    5. 每份回覆都要簡潔但完整。
