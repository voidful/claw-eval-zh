prompt:
  text: |-
    我有一個檔案 `meeting_transcript.md`，內含一場 2021 年 6 月 28 日的 GitLab Product Marketing 週會逐字稿。會議接近尾聲時，團隊進行一場協作式的訊息練習，為 GitLab 發展標語（taglines）與訊息支柱（messaging pillars）。

    請擷取並整理會議中討論到的所有訊息架構選項，並寫入一個名為 `messaging_framework.md` 的檔案。你的輸出應包含：

    1. **所有候選標語/語句**：所有被提出的標語/語句，依其所對應的訊息支柱分組
    2. **評估準則（evaluation criteria）**：團隊所使用的準則（例如語句之間調性的對等性、是否朗朗上口、名詞片語對比動詞片語）
    3. **每個選項所討論的優缺點**
    4. **最終選定（final selections）**（團隊決定採用的）
    5. **被否決的替代方案（rejected alternatives）及其被否決的原因**
