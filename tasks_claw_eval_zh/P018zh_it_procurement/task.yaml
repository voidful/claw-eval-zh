prompt:
  text: |-
    有一家成長中的新創公司（50 位工程師）需要為新進人員採購 **開發者筆電
    （developer laptops）**。請協助他們研究選項並提出建議。

    **要求：**
    - 至少 32 GB RAM
    - 至少 512 GB SSD
    - 現代 CPU（近兩代以內）
    - 良好的做工（供每日專業使用）
    - 預算：每台 $1,500–$2,500
    - 需兼顧 macOS 與 Linux 相容性（部分開發者各有偏好）

    請研究至少 5 款具體的筆電型號，並製作一份採購建議。針對每款型號，記錄：

    1. **確切的型號名稱與配置**（CPU、RAM、儲存、螢幕）
    2. **目前價格**（以及購買通路——原廠直購、CDW 等）
    3. **可維修性與保固**——標準保固期、延長保固選項、維修難易度
    4. **與開發者相關的規格**——鍵盤手感、連接埠配置、螢幕品質、電池續航
    5. **Linux 相容性**（非 Mac 選項）——WiFi、藍牙、休眠（suspend）等已知問題
    6. **大量採購選項**——量大折扣、商用／教育定價、車隊管理（fleet management）工具

    請將報告儲存至 `laptop_procurement.md`，內容須包含：
    - 一份比較表格
    - 分別針對 macOS 與 Linux 使用者的建議
    - 一份「車隊建議（fleet recommendation）」，為 50 人團隊建議理想的機型組合
    - 估算的總預算
