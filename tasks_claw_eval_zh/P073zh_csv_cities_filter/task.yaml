expected_actions:
- 已建立報告檔案 `cities_filter_report.md`
- California ≥ 200k 篩選回傳 21 個城市，清單正確
- 正確套用南部城市篩選（lat < 33.0、pop ≥ 100k）
- Texas 對 Florida 的比較含城市數、總計與平均
- 正確呈現 Texas 平均人口高於 Florida
