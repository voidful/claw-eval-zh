reference_solution: |-
  助手應檢視三張影像，並把它們對應到要求的類別。

  可接受的類別含義：

  - `phone`：智慧型手機／裝置照片
  - `food`：可食用的食物
  - `menu`：紙本菜單類的文件（收據式紙張亦可接受）

  最終輸出應為 `image_categories.json` 中的有效 JSON，每個類別各對應一個獨一無二的影像路徑。
