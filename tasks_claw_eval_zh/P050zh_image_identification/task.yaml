prompt:
  text: |-
    我在 `images/` 裡放了三張未標註的影像：

    - `images/item_a.jpg`
    - `images/item_b.jpg`
    - `images/item_c.jpg`

    請把每張影像分類到下列其中一個類別：

    - `phone`
    - `food`
    - `menu`

    然後在目前目錄建立一個名為 `image_categories.json` 的檔案，採用以下確切的 JSON 形狀：

    ```json
    {
      "phone": "images/<filename>",
      "food": "images/<filename>",
      "menu": "images/<filename>"
    }
    ```

    每張影像恰好使用一次。路徑必須包含 `images/` 前綴。
