prompt:
  text: |-
    有一個新創團隊正在尋找 **Notion 的開源替代方案**，用於其內部知識庫與專案文件。
    基於資料主權（data sovereignty）的考量，他們希望自架（self-host）。

    請研究並彙整一份報告，至少涵蓋 5 個開源替代方案。針對每個方案，記錄：

    1. **專案名稱與網址**（GitHub/GitLab 儲存庫連結）
    2. **授權條款**（MIT、AGPL、Apache 等）
    3. **技術棧（tech stack）**（以什麼技術建構）
    4. **部署選項**（Docker、Kubernetes、手動安裝）
    5. **關鍵功能**——具體說明它們與 Notion 的比較（區塊編輯器、資料庫、即時協作、
       API、整合）
    6. **社群健康度**——GitHub 星數、近期提交活躍度、貢獻者人數、發版節奏
    7. **限制**——相較 Notion 缺少什麼、已知的痛點
    8. **自架複雜度**——部署與維護的難度如何？

    請將報告儲存至 `oss_alternatives.md`，內容須包含：
    - 置於最上方的摘要比較表格
    - 各方案的詳細側寫
    - 一個建議章節，針對該新創團隊的使用情境為各方案排序
