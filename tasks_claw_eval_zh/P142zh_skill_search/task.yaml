reference_solution: |-
  助手應該：

  1. 讀取 `config/` 目錄中的設定檔
  2. 找出所有需要變更之處
  3. 在每個檔案中進行適當的取代
  4. 摘要所做的變更

  這項任務測試助手以下能力：

  - 讀取並理解設定檔格式（JSON、YAML）
  - 執行有針對性的搜尋與取代操作
  - 跨多個檔案作業
  - 清楚地傳達變更內容
