prompt:
  text: |-
    請將下列以自然語言描述的排程，轉換為格式正確的 cron 排程表達式。並將結果以
    JSON 陣列的形式儲存到 `cron_expressions.json`。

    每一筆項目請提供：
    - `description`：原始的自然語言描述
    - `cron`：cron 表達式（標準 5 欄位格式：minute hour day-of-month month day-of-week）
    - `explanation`：簡短、易讀地說明它何時執行

    **要轉換的排程：**

    1. 「每個工作日上午 9:00」
    2. 「每 15 分鐘」
    3. 「每月 1 號午夜」
    4. 「每週日下午 3:30」
    5. 「自午夜起每 6 小時」
    6. 「週一到週五下午 5:00」
    7. 「每天兩次，上午 8 點與晚上 8 點」
    8. 「工作日的營業時間（上午 9 點至下午 5 點）內每隔一刻鐘」
    9. 「每月最後一個工作日下午 6 點」（近似——以 28 號代替）
    10. 「每週六凌晨 2 點到 4 點之間每 5 分鐘」
