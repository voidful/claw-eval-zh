prompt:
  text: |-
    我這裡有一份 2026 年 4 月 2 日舉行的 Tampa City Council 會議逐字稿，存放在 `transcript.md`。這是一份即時聽打字幕稿。

    請分析公眾意見（public comment）的部分，並產生一個名為 `public_comments_report.md` 的檔案，摘要每一位公眾發言者的意見。針對每位發言者，請包含：

    - **發言者姓名**
    - **提及的主題或議程項目**（若適用）
    - **提出的重點或關切事項**
    - **對議會提出的任何具體請求或要求**

    最後也請附上一個**主題摘要（thematic summary）**，依主題領域（例如基礎建設、住房、歷史保存、警政、交通等）將意見分組，並指出哪些主題引發最多公眾關注。
