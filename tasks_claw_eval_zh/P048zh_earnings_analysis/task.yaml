reference_solution: |-
  助手應該：

  1. 辨識出 GitLab 所指的季度，以及管理層說明中相關的利潤率指標。
  2. 找出指引水準與實際回報結果。
  3. 把兩者差異換算成基點（basis points）。
  4. 把答案存到 `gitlab_margin_guidance.txt`。

  GitLab 的 Q3 FY2026 說明指出，非 GAAP 營業利潤率（non-GAAP operating margin）達到約 18%，比指引高出約 5 個百分點，因此優秀的答案會回報超出約 500 個基點。
