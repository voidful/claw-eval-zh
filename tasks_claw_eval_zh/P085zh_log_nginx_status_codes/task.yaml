reference_solution: |-
  助手應解析全部 1000 筆 JSON 日誌條目，並產生：

  **請求總數：** 1000

  **狀態碼分布：**
  - 200：35（3.5%）
  - 206：1（0.1%）
  - 304：274（27.4%）
  - 403：2（0.2%）
  - 404：688（68.8%）

  **狀態碼類別：**
  - 2xx：36（3.6%）
  - 3xx：274（27.4%）
  - 4xx：690（69.0%）

  **關鍵觀察：**
  - 此日誌涵蓋 2015 年 5 月 17 日，約 08:05–16:05 UTC
  - 404 錯誤居多——將近占全部請求的 69%
  - 路徑主要為 `/downloads/product_1` 與 `/downloads/product_2`
  - 大多數流量來自 Debian APT 套件管理工具用戶端
  - 80.91.33.133 是最活躍的 IP，約有 210 次請求

  可接受的變化：
  - 精確百分比可能因四捨五入而不同
  - 評估用語會有所不同
  - 歡迎額外分析
