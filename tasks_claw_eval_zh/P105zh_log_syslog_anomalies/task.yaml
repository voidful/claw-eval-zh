judge_rubric: |-
  依下列評分標準逐項評估（每項 0.0–1.0，最後取平均）：
  - 已在工作區建立 `syslog_anomalies.md`
  - 提供含日期範圍與服務分布的日誌總覽
  - 辨識出 rpc.statd 格式字串攻擊為安全異常
