prompt:
  text: |-
    請閱讀工作區裡的 `GPT4.pdf`，這是一篇關於 GPT-4 的技術論文。請為這篇論文寫一份「像在跟 5 歲小孩解釋」（ELI5，Explain Like I'm 5）的摘要，並儲存到 `eli5_summary.txt`。

    摘要應：
    - 讓沒有技術背景的小孩也能看懂
    - 使用簡單的字詞、短句，以及日常生活的比喻
    - 涵蓋論文的主要概念（GPT-4 是什麼、它能做什麼、為何重要）
    - 大約 200-400 字（英文 word 數）
