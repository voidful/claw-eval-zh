expected_actions:
- 助手成功讀取／解析 PDF 檔
- 已建立輸出檔 eli5_summary.txt
- 摘要以淺白方式說明 GPT-4 是什麼
- 摘要涵蓋 GPT-4 能做什麼（理解文字、圖片、回答問題、考試）
- 摘要提到有人努力讓它更安全／更友善
- 摘要承認它仍有限制（還是會犯錯）
- 語言真的很淺白——沒有技術術語
- 使用小孩能懂的比喻或對照
- 摘要長度恰當（大約 200-400 字）
- 行文清晰、連貫且生動
