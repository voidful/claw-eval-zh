judge_rubric: |-
  ### 評分項 1：淺白度與可理解性（權重 35%）

  **1.0 分**：摘要真的能讓小孩看懂。句子短而簡單。完全沒有技術術語。使用具體、日常的語言與貼近生活的比喻（例如把模型比作一位樂於助人的朋友、一個非常優秀的學生，或一個會學習的玩具）。一個 5 歲小孩跟得上。
  **0.75 分**：摘要大致淺白，僅有一兩個小孩可能無法完全掌握的略進階字詞或概念，但整體易懂。比喻用得好。
  **0.5 分**：摘要嘗試淺白，但夾雜數個會讓小孩困惑的技術名詞或抽象概念。比喻薄弱或缺失。
  **0.25 分**：摘要讀起來比較像簡化版的成人摘要，而非 ELI5。含有明顯術語或預設了背景知識。
  **0.0 分**：摘要完全技術化、通篇術語，或完全沒有為小讀者簡化。

  ### 評分項 2：準確性與涵蓋面（權重 30%）

  **1.0 分**：摘要準確掌握 GPT-4 論文的核心概念：GPT-4 是什麼（一個大型 AI 模型）、它能做什麼（理解文字與圖片、在考試／benchmark 上表現優異）、有人投入心力做安全工作，以及它仍有限制。沒有事實錯誤。
  **0.75 分**：摘要涵蓋多數關鍵概念，僅有小遺漏（例如漏掉圖片理解面向或安全工作）。沒有重大事實錯誤。
  **0.5 分**：摘要涵蓋部分關鍵概念，但漏掉論文的重要面向，或含有小錯誤。
  **0.25 分**：摘要只是浮面觸及論文內容，或含有明顯事實錯誤。
  **0.0 分**：摘要離題、事實錯誤或缺失。

  ### 評分項 3：吸引力與語氣（權重 20%）

  **1.0 分**：摘要溫暖、親切、引人入勝。讀起來像真的在跟小孩說話——語氣口語、比喻有趣、帶著驚奇感。讀者會喜歡讀。
  **0.75 分**：摘要整體語氣親切，帶有一些吸引人的元素，但可以更活潑、更口語。
  **0.5 分**：摘要堪用但乾澀。雖然簡化了內容，但讀起來像平淡的概述，而非 ELI5 解釋。
  **0.25 分**：摘要生硬、過於正式或無趣。沒有努力讓小讀者覺得有趣。
  **0.0 分**：語氣完全不適合小孩讀者，或內容缺失。

  ### 評分項 4：任務完成度（權重 15%）

  **1.0 分**：助手成功讀取 PDF，產出摘要並存到 `eli5_summary.txt`，且摘要落在目標字數範圍內（200-400 字）。
  **0.75 分**：助手完成任務但有小問題（例如檔名略有不同，或字數略超出範圍但仍合理）。
  **0.5 分**：助手完成任務但有明顯問題（例如摘要太短或太長，或讀取 PDF 顯然很吃力）。
  **0.25 分**：助手部分完成任務——建立了檔案但內容嚴重不足，或 PDF 未被正確讀取。
  **0.0 分**：未建立輸出檔，或助手完全無法讀取 PDF。
reference_solution: |-
  助手應該：

  1. 讀取並解析 PDF 檔 `GPT4.pdf`（OpenAI 的 GPT-4 技術報告）
  2. 找出論文的關鍵主題與發現，包括：
     - GPT-4 是一個大型多模態模型，能接受文字與圖片輸入並產生文字輸出
     - 它在各種專業與學術測驗（benchmark）上展現出與人類相當的表現
     - 它採用大規模、可預測的訓練流程進行訓練
     - 進行了安全與對齊（alignment）方面的工作（RLHF、紅隊測試等）
     - 仍存在限制（幻覺、推理錯誤等）
  3. 把這些技術概念以比喻與日常生活的對照，轉化成簡單、適合小孩的語言
  4. 把 ELI5 摘要寫入 `eli5_summary.txt`

  摘要應避免使用「多模態」、「transformer」、「RLHF」、「benchmark」、「參數」等術語。相對地，應使用小孩能懂的比喻（例如「就像一個很聰明的小幫手，會看書也會看圖片」）。
