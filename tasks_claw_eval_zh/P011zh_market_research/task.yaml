prompt:
  text: |-
    請為**企業級可觀測性與 APM（Application Performance Monitoring，應用程式效能
    監控）**市場區隔，撰寫一份競爭態勢分析。請根據你的知識，找出前 5 大業者、
    其關鍵差異化優勢、市場趨勢，以及常見的定價模式。

    **重要：你必須將報告儲存為一個檔名精確為 `market_research.md` 的檔案，且位於
    目前的工作目錄中。** 不要只把報告輸出在你的回應裡——檔案必須實際寫入磁碟。
    檔名必須精確一致（不可為 `market-research.md`，也不可放在子目錄中）。

    請依各競爭者分段組織報告，並附上一份摘要比較表格。

    若你能使用網路搜尋工具，請用它蒐集最新資訊。否則，請運用你對此市場的知識，
    產出一份詳盡的分析。
