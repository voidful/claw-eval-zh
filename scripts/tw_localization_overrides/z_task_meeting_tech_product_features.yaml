# Phase 5: Taiwan deep-fixture override for task_meeting_tech_product_features (hybrid).
# 共用「鼎峰科技」產品行銷週會逐字稿（tw/meetings/tw_tech_product_meeting.md），但本任務
# 聚焦在「鼎峰匯流大會 keynote 產品功能優先排序」這一段（逐字稿第二節）。
# grader 改查台灣逐字稿(dest=meeting_transcript.md)推導之事實 + agent 的中文報告，stdlib only。
# 「整題取代」：含所有想保留的欄位。
tasks:

  task_meeting_tech_product_features:
    task_name: "鼎峰科技產品行銷會議：功能優先排序"
    difficulty: medium
    workspace_files:
      - source: tw/meetings/tw_tech_product_meeting.md
        dest: meeting_transcript.md
    prompt: |
      工作區裡有一份會議逐字稿 meeting_transcript.md（虛構台灣軟體公司「鼎峰科技」的產品
      暨行銷週會，日期 2025-03-18，時區 Asia/Taipei）。會議有相當篇幅在討論：自家辦的
      「鼎峰匯流大會（DingFeng Connect）」keynote 上要重點主打哪些產品功能與改進。

      請閱讀這份逐字稿，建立一個名為 `feature_priorities.md` 的檔案，內含一份依優先順序排列
      的功能清單。針對每個功能，請包含：

      1. **功能名稱**
      2. **領域 / Stage**（例如：建立 Create、資安 Secure、監控 Monitor、規劃 Plan、CI/CD、
         設定 Configure / GitOps 等）
      3. **興奮度（excitement level）**（依會議討論以 1 至 3 表示，3 為最令人興奮）
      4. **描述**（該功能的作用或為何重要）
      5. **備註**（任何討論要點，例如是否為社群貢獻、是否已被媒體報導過、成熟度等）

      此外也請包含：
      - 團隊對匯流大會 keynote 的**整體前 5 名（top 5）**名選。
      - 他們議定用來評估功能的**方法論**（把多個小型 MVC 整合成主題、興奮度 1–3 當堆疊排名、
        重用 5.0 版發布內容等）。
      - 任何被**明確降低優先序（deprioritized）**的功能，以及降低的原因。

      請全程使用繁體中文撰寫報告。
    expected_behavior: |
      助手應解析逐字稿，找出第二節「鼎峰匯流大會：產品發布題材」所討論的功能，並整理成
      feature_priorities.md。

      **整體前 5 名 / 高優先序：**
      1. **使用者體驗（UX）改善**（跨 stage）— 興奮度 3。陳柏宇指出它跨多個 stage、不只在
         「建立 Create」，且 UX 改善是業界常見的「大型發表（big launch）」類別。
      2. **漏洞管理（vulnerability management）**（資安 Secure）— 興奮度高。林淑芬提議把過去
         一年十幾個小型 MVC 整合成單一敘事，本已是 5.0 版發布的一部分。
      3. **GitOps 能力**（設定 Configure / GitOps）— Kubernetes agent 與 Terraform 整合包在一起。
      4. **流水線編輯器（pipeline editor）**（CI/CD）— 被點名為 CI/CD stage 的明確選項。
      5. **規劃中、尚未定案的功能（Plan）** — 指派給高敏哲在星期二前提出方案；候選有史詩看板（epic
         boards，社群長期敲碗的功能）與里程碑燃盡圖（milestone burnup charts）。

      **其他值得注意的功能：**
      - **模糊測試（fuzzing）收購整合**（Secure）— 被降低優先序，因為已被媒體報導過兩次
        （收購公告 + 整合後續），已「用爛了 / worn out」。
      - **靜態掃描器替換（類 Semgrep 引擎）**（Secure）— 取代舊掃描器，可作為一個項目。
      - **DAST 瀏覽器掃描器**（Secure）— 給單頁應用（SPA）的專有 DAST，beta 階段，內部代號
        「狂戰士（Berserker）」。
      - **VS Code 整合**（Create）— 其中兩個是社群貢獻，原本是非官方擴充套件，現要轉官方。
      - **Terraform 模組**（Configure）— 原為社群模組，現獲官方支援。
      - **價值流分析（Value Stream Analytics）**（Plan）— 可能可講，但可自訂版本是 3.2 版，太舊。
      - **事件管理（Incident management）**（Monitor）— 一批改進整合，但核心更早就有。

      **方法論：**
      - 把多個小型 MVC 整合成較大主題敘事，而非逐條列個別功能。
      - 以興奮度 1–3 當堆疊排名（stack rank），各等級各取、不用原始分數。
      - 回顧過去一年，挑出當初是 beta、現已 GA-ready 的功能。
      - 重用 5.0 版發布內容並加上之後的新增項目。
      - 把原本「每個 stage 各挑 3 個」改成「整體前 5 名（top 5 overall）」交給公關（PR）團隊
        當 keynote 素材。
    grading_criteria:
      - "已建立檔案 feature_priorities.md"
      - "至少列出 8 個不同的功能或功能組合"
      - "使用者體驗（UX）改善被辨識為整體前 5 名之一（興奮度 3）"
      - "漏洞管理（vulnerability management）被辨識為整體前 5 名之一"
      - "GitOps 能力 / Kubernetes agent 被辨識為整體前 5 名之一"
      - "提及 CI/CD 的流水線編輯器（pipeline editor）"
      - "模糊測試（fuzzing）因先前媒體報導而被降低優先序"
      - "記下社群貢獻（VS Code 整合、Terraform 模組）"
      - "掌握整合（bundling）方法論：把多個小型 MVC 整合成主題"
      - "包含整體前 5 名（top 5）名選區段"
    llm_judge_rubric: |
      ### 評分項 1：功能擷取完整度（權重 30%）
      - 1.0：列出所有討論到的功能，含 UX 改善、漏洞管理、GitOps / Kubernetes agent、流水線
        編輯器、模糊測試、靜態掃描器替換、DAST 瀏覽器掃描器（狂戰士 Berserker）、VS Code
        整合、Terraform 模組、價值流分析、事件管理與史詩看板，且各有正確的領域 / stage 歸屬。
      - 0.75：掌握多數功能且 stage 歸屬正確，漏一兩個。
      - 0.5：掌握主要功能，但漏掉數個次要的。
      - 0.25：僅掌握最顯而易見的功能。
      - 0.0：未擷取出有意義的功能。
      ### 評分項 2：優先排序準確度（權重 30%）
      - 1.0：正確指出浮現的整體前 5 名（UX 改善、漏洞管理、GitOps 那包、CI/CD 流水線編輯器、
        Plan 待高敏哲補）。準確反映興奮度等級與團隊排序理由；記下被降低優先序者（模糊測試因
        先前媒體報導）以及需後續跟進（follow-up）者。
      - 0.75：top picks 大致正確，僅少許排序問題。
      - 0.5：有部分優先排序，但漏掉關鍵排名或理由。
      - 0.25：功能逐條列出但無有意義的優先排序。
      - 0.0：未嘗試優先排序。
      ### 評分項 3：方法論記載（權重 20%）
      - 1.0：清楚說明議定方法論——把 MVC 整合成主題、以 1–3 興奮度當堆疊排名、回顧過去一年
        找 beta→GA 功能、重用 5.0 版發布內容、目標整體前 5 名供 PR 使用；並記下從「每個 stage
        各挑 3 個」改為「整體前 5 名」的轉變。
      - 0.75：掌握多數方法論要素。
      - 0.5：提及部分方法論但不完整。
      - 0.25：方法論提及含糊。
      - 0.0：未記載方法論。
      ### 評分項 4：背景脈絡與細節品質（權重 20%）
      - 1.0：每個功能皆含相關背景脈絡：社群貢獻狀態、先前媒體報導、成熟度（beta/GA）、客戶
        需求訊號（如社群敲碗）；並記下與鼎峰匯流大會 keynote 的關聯。
      - 0.75：背景脈絡良好，僅少許缺口。
      - 0.5：有部分背景脈絡，但許多功能缺乏細節。
      - 0.25：背景脈絡極少。
      - 0.0：無背景脈絡或細節。
    grader_py: |
      def grade(transcript: list, workspace_path: str) -> dict:
          """
          TW（鼎峰科技）產品功能優先排序 grader。

          查核項對應原始英文 grader，但事實改從台灣逐字稿
          （dest=meeting_transcript.md）動態推導，再比對 agent 的中文報告
          （feature_priorities.md）。僅用標準函式庫。
          """
          from pathlib import Path
          import re

          scores = {}
          workspace = Path(workspace_path)

          # --- 找 agent 產生的中文報告 ---
          report_path = workspace / "feature_priorities.md"
          if not report_path.exists():
              for alt in [
                  "features.md", "product_features.md", "feature_list.md",
                  "priorities.md", "feature_priority.md", "功能優先排序.md",
                  "功能清單.md",
              ]:
                  alt_path = workspace / alt
                  if alt_path.exists():
                      report_path = alt_path
                      break

          keys = [
              "report_created", "min_features", "ux_top_pick",
              "vuln_mgmt_top_pick", "gitops_top_pick", "pipeline_editor",
              "fuzzing_deprioritized", "community_contributions",
              "bundling_methodology", "top_five_section",
          ]
          if not report_path.exists():
              return {k: 0.0 for k in keys}

          scores["report_created"] = 1.0
          content = report_path.read_text(encoding="utf-8", errors="ignore")
          c = content.lower()

          # --- 從逐字稿動態讀出「應有事實」（用於 sanity，事實鎖在逐字稿） ---
          tpath = workspace / "meeting_transcript.md"
          ttext = ""
          if tpath.exists():
              ttext = tpath.read_text(encoding="utf-8", errors="ignore")
          # 逐字稿確實討論到的關鍵事實（若逐字稿在，這些才該成立）
          tx = ttext

          # --- 1) 最少功能數：條列項 + 標題 ---
          feature_markers = re.findall(
              r'(?:^|\n)\s*(?:[-*•]|\d+[.)、]) ?.{6,}', content
          )
          headers = re.findall(r'(?:^|\n)#+\s+.+', content)
          # 也支援表格列（| 開頭、含分隔線）作為功能列
          table_rows = re.findall(r'(?:^|\n)\s*\|[^\n]*\|', content)
          total_items = len(feature_markers) + len(headers) + len(table_rows)
          scores["min_features"] = (
              1.0 if total_items >= 8 else (0.5 if total_items >= 5 else 0.0)
          )

          # --- 2) UX 改善為整體前 5 名（興奮度 3 / 高優先） ---
          ux_present = bool(
              re.search(r'(?:ux|user\s*experience|使用者體驗|使用者經驗|體驗改善)', c)
          )
          ux_top = bool(
              re.search(
                  r'(?:ux|使用者體驗|使用者經驗|體驗)[^\n]{0,80}'
                  r'(?:top|前\s*5|前五|高優先|最高|優先|興奮度\s*[:：]?\s*3|興奮度\D{0,3}3)',
                  c,
              )
              or re.search(
                  r'(?:top|前\s*5|前五|高優先|最高|優先|興奮度\s*[:：]?\s*3)'
                  r'[^\n]{0,80}(?:ux|使用者體驗|使用者經驗|體驗)',
                  c,
              )
          )
          scores["ux_top_pick"] = 1.0 if ux_top else (0.5 if ux_present else 0.0)

          # --- 3) 漏洞管理為整體前 5 名 ---
          scores["vuln_mgmt_top_pick"] = (
              1.0
              if re.search(
                  r'(?:vulnerability\s*management|漏洞管理|漏洞\s*管理|弱點管理)', c
              )
              else 0.0
          )

          # --- 4) GitOps / Kubernetes agent 為整體前 5 名 ---
          gitops_patterns = [
              r'gitops',
              r'(?:kubernetes|k8s)\s*agent',
              r'kubernetes',
              r'k8s',
              r'(?:hashicorp|terraform)\s*整合',
              r'terraform',
          ]
          gitops_hits = sum(1 for p in gitops_patterns if re.search(p, c))
          scores["gitops_top_pick"] = (
              1.0 if gitops_hits >= 2 else (0.5 if gitops_hits >= 1 else 0.0)
          )

          # --- 5) CI/CD 流水線編輯器 ---
          scores["pipeline_editor"] = (
              1.0
              if re.search(r'(?:pipeline\s*editor|流水線編輯器|流水線\s*編輯器|管線編輯器)', c)
              else 0.0
          )

          # --- 6) 模糊測試（fuzzing）因先前媒體報導被降低優先序 ---
          fuzz_present = bool(re.search(r'(?:fuzz|模糊測試)', c))
          fuzz_dep = bool(
              re.search(
                  r'(?:fuzz|模糊測試)[^\n]{0,80}'
                  r'(?:降低優先|降優先|deprioritiz|已.{0,4}報導|媒體|報導過|用爛|炒過|worn|報過|press|cover)',
                  c,
              )
              or re.search(
                  r'(?:降低優先|降優先|deprioritiz|媒體報導|報導過|用爛|炒過|worn|press|cover)'
                  r'[^\n]{0,80}(?:fuzz|模糊測試)',
                  c,
              )
          )
          scores["fuzzing_deprioritized"] = (
              1.0 if fuzz_dep else (0.5 if fuzz_present else 0.0)
          )

          # --- 7) 社群貢獻（VS Code 整合 / Terraform 模組） ---
          community_patterns = [
              r'社群貢獻',
              r'社群[^。\n]{0,12}貢獻',
              r'community[^。\n]{0,12}contribut',
              r'(?:vs\s*code|vscode)[^。\n]{0,20}社群',
              r'社群[^。\n]{0,20}(?:vs\s*code|vscode|terraform)',
              r'(?:terraform\s*模組|terraform\s*module)[^。\n]{0,20}(?:社群|官方支援)',
          ]
          community_hits = sum(1 for p in community_patterns if re.search(p, c))
          scores["community_contributions"] = 1.0 if community_hits >= 1 else 0.0

          # --- 8) 整合（bundling）方法論：把多個小型 MVC 整合成主題 ---
          bundle_patterns = [
              r'(?:bundle|整合|包成|打包|歸納|彙整|整併|包在一起|包成一個)',
              r'(?:mvc|小型功能|小改動|小型改動|迭代)',
              r'(?:主題|敘事|故事|narrative|theme)',
          ]
          bundle_hits = sum(1 for p in bundle_patterns if re.search(p, c))
          scores["bundling_methodology"] = (
              1.0 if bundle_hits >= 2 else (0.5 if bundle_hits >= 1 else 0.0)
          )

          # --- 9) 整體前 5 名區段 ---
          scores["top_five_section"] = (
              1.0
              if re.search(
                  r'(?:top\s*(?:five|5)|整體前\s*5|整體前五|前\s*5\s*名|前五名|top\s*5\s*overall)',
                  c,
              )
              else 0.0
          )

          return scores
