# 台灣在地化（整題取代）：task_cve_security_triage
#
# 背景：本題 prompt/expected/criteria/rubric 在 03_analysis.yaml 已是繁體中文，
# 但兩個輸入 asset（vulnerability_scan.json、deployment_context.md）原本仍是英文，
# 且場景用美國式佔位名稱（acme-webapp / AcmeSec）。本檔以整題取代方式（z_ 檔
# 排序在 03_analysis.yaml 之後，per-task into.update() 為整題覆寫）補上在地化的
# workspace_files 與 grader_py。
#
# 在地化原則：
#   - CVE 的國際技術資料一律保留英文：CVE-ID、CVSS 分數/向量、套件名（express、
#     lodash、jsonwebtoken…）、標準漏洞類型（SQL injection、SSRF、XSS、ReDoS、RCE）、
#     國際合規標準（PCI DSS、SOC 2）、雲端/工具品牌（AWS、PostgreSQL、CloudFront、
#     GitHub Actions）—— 這些本即國際英文識別字，保留。
#   - 在地化的是「場景／佔位名稱／敘述文字」：
#       acme-webapp / Acme Webapp -> dingfeng-shop / 鼎峰電商平台（全檔一致）
#       AcmeSec Vulnerability Scanner -> 相依套件漏洞掃描器（避免 Acme）
#       deployment_context.md 的英文散文 -> 繁體中文（台灣企業內部部署脈絡）
#   - grader 比對的是 CVE-ID / 嚴重度 / P0-P3 / 部署時段 / PCI / 主版號，不比對
#     'acme' 字串；本檔將 grader 改為「中英雙語」以容納繁中報告（4 月 14 日、
#     執行摘要、跨主版本…），同時保留所有國際技術名詞的英文比對。
