# 台灣在地化：task_todo_list_cleanup（hybrid / automated）
# 將「英文程式專案待辦」改為「繁中台灣職場待辦」。保留原本的結構：
#   - 15 筆項目、4 組重複配對（id 1&4、2&7、3&10、8&13）、各項目的 project 與 due_date、
#     reference_date 維持 2026-04-10。
#   - 每組重複配對為「同一件事、用不太一樣的說法描述」（中文同義改寫）。
# workspace_files 內嵌 dest=todos.json（繁中標題）。
# grader_py 改查中文標題／去重／排序邏輯，且重複組與逾期清單一律從 todos.json 動態推導
#   （不硬寫英文原版事實），再比對 agent 產生的 todos_cleaned.json。
