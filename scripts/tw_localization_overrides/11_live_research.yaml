# Phase 4+: live-web 研究任務全面在地化為台灣主題（自然台灣繁體中文）。
# 這些都是 live-web 任務，為確保可重現性（reproducibility），每個任務的
# expected_behavior 與 llm_judge_rubric 都明確要求代理：標示資料來源、標示查詢
# 日期、並說明資料限制與不確定性；正確行為是引用來源／日期，而非捏造或寫死數值。
# 保留：所有輸出檔名、URL、API 端點、Polymarket markdown 模板、YouTube 影片
# URL／ID、軟體／產品／函式庫名稱、程式碼 identifier、config 鍵名。
tasks:

  task_events:
    task_name: "台灣科技研討會研究"
    prompt: |
      請找出 5 場台灣近期即將舉辦的科技／開源研討會或活動（例如 COSCUP、SITCON、
      PyCon Taiwan、MOPCON、JSDC 等），並建立 events.md，為每一場列出名稱、日期、
      地點與官方網站。

      注意：這是即時資料。請務必對每一場活動**標示資料來源、標示你的查詢日期**，
      並在開頭或結尾說明**資料限制與不確定性**（活動日期可能調整、報名狀態可能變動）。
      若某項資訊無法查證，請明白註記，切勿捏造活動或日期。檔名 events.md 不可更改。
    expected_behavior: |
      助手應該：

      1. 使用網路搜尋或研究工具，找出真實存在的台灣科技／開源研討會或活動
      2. 找出 5 場近期即將舉辦的活動
      3. 擷取關鍵資訊：名稱、日期、地點、官方網站
      4. 建立一個名為 `events.md` 的檔案，寫入上述資訊
      5. 以清楚且一致的方式排版這些資訊
      6. 確保這些活動真實存在，且資訊正確無誤

      因為是即時資料，正確行為是**標示資料來源、標示查詢日期，並說明資料限制與
      不確定性**，而非捏造活動、日期或寫死過時資訊。助手可採用多種搜尋策略，並應
      從可靠來源（官方網站、官方社群公告）查證資訊。
    grading_criteria:
      - "已建立檔案 events.md"
      - "恰好包含 5 筆台灣科技／開源研討會或活動項目"
      - "每筆項目皆有活動名稱"
      - "每筆項目皆有日期資訊"
      - "每筆項目皆有地點資訊（台灣城市／場館）"
      - "每筆項目皆有官方網站／網址"
      - "標示資料來源與查詢日期，並說明資料限制與不確定性"
      - "資訊看起來正確且可查證"
      - "排版清楚且一致"
    llm_judge_rubric: |
      ### 評分項 1：資訊正確性（權重 30%）

      **1.0 分**：5 場活動皆為真實、可查證的台灣科技／開源研討會或活動。所有資訊
      （名稱、日期、地點、網站）皆正確且可查證，無任何捏造的活動。

      **0.75 分**：4～5 場活動可查證且資訊正確。日期或細節有些微不準確，但不影響
      整體有效性。

      **0.5 分**：3～4 場活動可查證。部分資訊可能已過時或含有不準確之處，但活動
      確實存在。

      **0.25 分**：僅有 1～2 場活動可查證，或多筆項目含有明顯不準確之處，可能包含
      捏造的活動。

      **0.0 分**：所有或大多數活動看似捏造，或資訊完全不正確。

      ### 評分項 2：完整性（權重 20%）

      **1.0 分**：5 場活動皆有完整資訊：名稱、具體日期（不只是月份）、台灣的地點
      （城市／場館），以及可正常開啟的官方網站網址。

      **0.75 分**：5 場活動皆有列出，資訊大致完整。僅有小幅缺漏（例如日期較為概略、
      缺少具體場館）。

      **0.5 分**：列出 4～5 場活動，但有明顯的資訊缺漏。部分項目缺少日期、地點或
      網站。

      **0.25 分**：少於 4 場活動，或多筆項目有重大資訊缺漏。

      **0.0 分**：少於 3 場活動，或多數項目嚴重不完整。

      ### 評分項 3：來源、查詢日期與不確定性（權重 20%）

      **1.0 分**：每筆活動皆標示可追溯的資料來源（官方網站或官方公告連結），明確
      標示查詢日期，並說明資料限制與不確定性（例如日期或報名狀態可能異動）。明顯
      以引用來源取代捏造或寫死的資訊。

      **0.75 分**：多數活動有標示來源並標示查詢日期，對不確定性有提及但較簡略。

      **0.5 分**：有標示部分來源或查詢日期，但不一致，或未說明資料限制。

      **0.25 分**：僅零星提及來源或日期，未說明不確定性。

      **0.0 分**：完全未標示來源或查詢日期，或出現捏造／寫死且未加註的資訊。

      ### 評分項 4：相關性與品質（權重 15%）

      **1.0 分**：所有活動皆為台灣重要、知名的科技／開源研討會或活動（例如 COSCUP、
      SITCON、PyCon Taiwan 等具規模的系列活動）。在主題或地區上具有良好的多樣性。

      **0.75 分**：多數活動皆為值得關注的台灣科技活動。整體選擇良好，僅在重要性或
      多樣性上有小瑕疵。

      **0.5 分**：知名與較不知名的活動混雜。多樣性有限，或部分活動與「科技／開源」
      的相關性令人存疑。

      **0.25 分**：多為冷門或令人存疑的活動，與台灣科技社群的相關性不佳。

      **0.0 分**：活動與科技無關，或完全不恰當。

      ### 評分項 5：排版與任務完成度（權重 15%）

      **1.0 分**：排版優異，結構一致。善用 markdown（標題、清單、連結）。建立了
      檔名正確的檔案（events.md），包含 5 場活動，所有要求皆達成。

      **0.75 分**：排版良好，檔案已建立，僅有小瑕疵，但基本上完整。

      **0.5 分**：具備基本排版，檔案已建立，但缺少重要要求。

      **0.25 分**：排版不佳，或檔案嚴重不足。

      **0.0 分**：未建立檔案，或檔案為空。

  task_market_research:
    task_name: "台灣產業市場研究"
    prompt: |
      請針對**台灣電動車（EV）市場**這個市場區隔，撰寫一份市場研究與競爭態勢分析。
      請找出台灣市場上的前 5 大業者（例如整車品牌、充電營運商或相關供應鏈業者）、
      其關鍵差異化優勢、市場趨勢，以及常見的商業／定價模式。市場規模與金額請以
      **新臺幣（NT$）**計。

      **重要：你必須將報告儲存為一個檔名精確為 `market_research.md` 的檔案，且位於
      目前的工作目錄中。** 不要只把報告輸出在你的回應裡——檔案必須實際寫入磁碟。
      檔名必須精確一致（不可為 `market-research.md`，也不可放在子目錄中）。

      請依各業者分段組織報告，並附上一份摘要比較表格。

      請使用網路搜尋工具蒐集最新資訊。注意：這是即時資料，請對市場資料與業者資訊
      **標示資料來源、標示查詢日期**，並在報告中說明**資料限制與不確定性**（例如
      市場規模估算的來源差異、統計年度）。切勿捏造或寫死特定市佔率或金額。
    expected_behavior: |
      助手應該：

      1. 找出台灣電動車市場的主要業者（整車品牌、充電營運商、相關供應鏈等）
      2. 為每位業者記錄：
         - 公司概況與在台市場地位
         - 關鍵產品或服務差異化優勢
         - 常見的商業／定價模式（以新臺幣計）
         - 顯著的優勢與劣勢
      3. 找出整體市場趨勢（政策補助、充電基礎建設、國產化、市場成長等）
      4. 建立一份條理分明的 Markdown 報告，包含執行摘要、各業者側寫、比較表格與
         市場趨勢章節

      這份報告應讀起來像商業分析師為策略會議所準備的內容。因為是即時資料，正確
      行為是**標示資料來源、標示查詢日期，並說明資料限制與不確定性**（市場規模與
      市佔率隨來源與年度而異），而非捏造或寫死特定數值。
    grading_criteria:
      - "已建立檔案 market_research.md"
      - "報告至少找出 5 位台灣電動車市場相關業者"
      - "每位業者皆有具實質內容的側寫（不只是列出名稱）"
      - "報告包含一份比較表格或矩陣"
      - "報告涵蓋業者的商業／定價模式（以新臺幣計）"
      - "報告探討當前台灣市場趨勢"
      - "標示資料來源與查詢日期，並說明資料限制與不確定性"
      - "報告結構清楚，具有標題與章節"
      - "包含執行摘要或前言"
      - "寫作品質專業且具分析性"
    llm_judge_rubric: |
      ### 評分項 1：研究深度與正確性（權重 30%）

      **1.0 分**：報告對每位業者皆有具體、正確的資訊。細節超越表面描述——包含具體
      的產品／服務名稱、特定功能與在台市場定位。資訊明顯來自網路搜尋且為最新。

      **0.75 分**：報告對多數業者皆有良好細節與具體資訊，但少數側寫顯得單薄或依賴
      籠統描述。

      **0.5 分**：報告以表面層次涵蓋各業者。資訊大致正確，但缺乏具體性或深度。

      **0.25 分**：報告對業者的著墨極少。資訊顯得籠統或可能不準確。

      **0.0 分**：缺少報告、無實質的市場分析，或含有明顯不正確的資訊。

      ### 評分項 2：分析品質（權重 20%）

      **1.0 分**：報告讀起來像專業的市場分析。包含具意義的比較、指出策略定位差異，
      並對台灣電動車競爭態勢提出具洞見的結論。執行摘要有效提煉出關鍵要點。

      **0.75 分**：報告提供良好的分析，有合理的比較與部分策略洞見，但結論可加強。

      **0.5 分**：報告呈現了資訊，但缺乏強有力的分析框架，較像事實清單。

      **0.25 分**：報告多為原始資料堆砌，少有分析或綜整。

      **0.0 分**：無任何分析內容。

      ### 評分項 3：來源、查詢日期與不確定性（權重 20%）

      **1.0 分**：市場規模、市佔率與業者資訊皆標示可追溯的資料來源，明確標示查詢
      日期，並說明資料限制與不確定性（例如不同來源的市場規模估算差異、統計年度、
      新臺幣換算基礎）。明顯以引用來源取代捏造或寫死的數值。

      **0.75 分**：多數關鍵資料有標示來源並標示查詢日期，對不確定性有提及但較簡略。

      **0.5 分**：有標示部分來源或查詢日期，但不一致，或未說明資料限制。

      **0.25 分**：僅零星提及來源或日期，未說明不確定性。

      **0.0 分**：完全未標示來源或查詢日期，或出現捏造／寫死且未加註的市佔率或金額。

      ### 評分項 4：市場趨勢與脈絡（權重 15%）

      **1.0 分**：報告找出並探討多項相關的台灣市場趨勢（例如政府補助政策、充電基礎
      建設布建、國產化、市場成長率、消費者偏好轉變），並與競爭動態相互連結。

      **0.75 分**：報告探討數項市場趨勢並有合理脈絡，但與競爭影響的連結較為有限。

      **0.5 分**：報告提及趨勢，但僅止於表面，或遺漏了重要的當前趨勢。

      **0.25 分**：趨勢著墨極少或流於籠統。

      **0.0 分**：未探討任何市場趨勢。

      ### 評分項 5：結構、定價與呈現（權重 15%）

      **1.0 分**：報告組織極佳，有實用的比較表格與專業的 Markdown 排版，並為各業者
      提供以新臺幣計的具體商業／定價模式細節。易於瀏覽並擷取關鍵資訊。

      **0.75 分**：報告組織良好、排版佳，涵蓋多數業者的定價模式並有合理具體性。

      **0.5 分**：報告具備基本結構，但排版不一致，或定價／比較表格等關鍵元素缺漏。

      **0.25 分**：報告組織不佳，定價幾乎未提及。

      **0.0 分**：報告無可辨識的結構，且未包含任何定價資訊。

  task_deep_research:
    task_name: "台灣再生能源政策深度研究"
    prompt: |
      請研究以下主題，並產出一份附主要來源引用（primary source citations）的完整
      報告：

      **主題：台灣再生能源政策的現況——具體聚焦於太陽光電、離岸風電、能源轉型
      目標與相關獎勵／躉購（FIT）機制。**

      你的報告應涵蓋：

      1. **政策框架與目標**：台灣目前的再生能源政策框架與裝置容量／占比目標為何？
         請提供具體數字與目標年度。
      2. **主管機關與法規**：哪些政府機關與法規（例如能源主管機關、相關能源條例）
         在推動再生能源？
      3. **獎勵機制**：目前有哪些獎勵或躉購費率（FIT）、競標或補助機制？
      4. **進展現況**：太陽光電與離岸風電目前的裝置容量與進度如何？請指明來源年度。
      5. **限制與挑戰**：目前有哪些政策、土地、電網或社會接受度上的挑戰？

      **要求：**
      - 每一項事實主張都必須附有引用來源（URL、官方文件或報告）
      - 將報告儲存至 `wasm_research.md`
      - 在結尾加入一個 References 章節，列出所有來源
      - 至少 1000 字（words）

      注意：這是即時資料。請對每一項資料與目標**標示資料來源、標示查詢日期**，並
      說明**資料限制與不確定性**（政策可能修訂、進度數字隨統計時點變動）。切勿捏造
      或寫死任何目標數字或裝置容量。
    expected_behavior: |
      助手應該：

      1. 使用網路搜尋，找出台灣再生能源政策的最新資訊
      2. 造訪主要來源（政府機關官方網站、官方報告、能源統計、新聞報導）
      3. 將研究結果綜整為一份結構良好的研究報告
      4. 包含行內引用（inline citations）與一個 References 章節
      5. 涵蓋所要求的全部五個面向，並提供具體、可查證的細節
      6. 將報告儲存至 `wasm_research.md`（檔名沿用原任務，不可更改）

      因為是即時資料，正確行為是**標示資料來源、標示查詢日期，並說明資料限制與
      不確定性**（政策與目標可能修訂、進度數字隨統計時點而異），而非捏造或寫死
      任何目標或裝置容量數字。
    grading_criteria:
      - "已建立檔案 wasm_research.md"
      - "報告涵蓋台灣再生能源政策框架與目標"
      - "說明相關主管機關與法規"
      - "探討獎勵／躉購（FIT）或補助機制"
      - "提供太陽光電與離岸風電的進展現況（並指明來源年度）"
      - "探討政策限制與挑戰"
      - "每項事實主張附有引用來源（URL 或具體來源參照）"
      - "結尾有 References 章節"
      - "報告至少 1000 字"
      - "標示查詢日期，並說明資料限制與不確定性"
    llm_judge_rubric: |
      ### 評分項 1：研究深度與正確性（權重 30%）

      **1.0 分**：報告含有來自主要來源、具體可查證的資訊。展現了真正的研究——提及
      具體的目標數字、目標年度、裝置容量、機關名稱與唯有實際調查才能取得的細節。
      無重大不準確之處。

      **0.75 分**：報告深度良好，資訊大致具體。少數主張可能籠統，或可能來自訓練
      資料而非新近的研究。

      **0.5 分**：報告對主題有適度涵蓋，但大量仰賴一般知識。有部分具體細節，但許多
      主張未附來源或流於籠統。

      **0.25 分**：報告多為一般知識，少有實際研究的跡證。

      **0.0 分**：缺少報告，或含有明顯過時／不準確的資訊。

      ### 評分項 2：引用品質（權重 20%）

      **1.0 分**：每一項重要的事實主張都附有行內引用。References 章節含有多個指向
      主要來源（政府機關官方文件、官方報告、能源統計、新聞）的 URL。引用具相關性，
      且確實能支撐其所附帶的主張。

      **0.75 分**：多數主張皆有引用。References 章節有 5～10 個來源。少數主張缺乏引用。

      **0.5 分**：有部分引用但不一致。References 章節存在但單薄（3～5 個來源）。

      **0.25 分**：引用極少。僅參照 1～2 個來源。

      **0.0 分**：無引用或無 references 章節。

      ### 評分項 3：來源、查詢日期與不確定性（權重 20%）

      **1.0 分**：所有目標數字、裝置容量與進度資料皆標示可追溯的資料來源與統計年度，
      明確標示查詢日期，並說明資料限制與不確定性（政策可能修訂、進度數字隨統計時點
      變動）。明顯以引用來源取代捏造或寫死的數值。

      **0.75 分**：多數關鍵資料有標示來源並標示查詢日期，對不確定性有提及但較簡略。

      **0.5 分**：有標示部分來源或查詢日期，但不一致，或未說明資料限制。

      **0.25 分**：僅零星提及來源或日期，未說明不確定性。

      **0.0 分**：完全未標示來源或查詢日期，或出現捏造／寫死且未加註的目標或容量數字。

      ### 評分項 4：涵蓋完整度與寫作品質（權重 20%）

      **1.0 分**：所要求的全部五個面向皆詳盡涵蓋。報告具備專業研究報告的結構，標題
      清楚、邏輯流暢、達到至少 1000 字，易讀且易於擷取關鍵發現。

      **0.75 分**：所有面向皆涵蓋且細節良好，但有一兩個面向相對單薄；結構良好。

      **0.5 分**：多數面向有涵蓋，但有一項缺漏或非常表面；結構尚可。

      **0.25 分**：五個面向中僅有 2～3 個獲得任何深度的處理，或組織不佳。

      **0.0 分**：報告未處理所要求的主題，或無可辨識的結構。

      ### 評分項 5：批判性分析（權重 10%）

      **1.0 分**：報告超越事實的羅列，提供分析——指出趨勢、進行比較、點出張力（例如
      能源轉型目標 vs. 電網與土地限制），並對整體態勢提出細膩的觀點。限制章節有深度
      且具體。

      **0.75 分**：在純粹報導之外，有部分分析內容。

      **0.5 分**：多為描述性，偶有分析性的觀察。

      **0.25 分**：純粹羅列資訊，無分析。

      **0.0 分**：無任何分析內容。

  task_competitive_research:
    task_name: "台灣電商平台競品分析"
    prompt: |
      請比較台灣 **電商平台** 領域中的三項競爭產品：

      1. **蝦皮 Shopee**
      2. **momo 購物網**
      3. **PChome 24h 購物**

      針對每項平台，研究並記錄：

      - **定價／費用**：賣家上架／成交手續費、金物流費用、消費者運費門檻（以新臺幣
        NT$ 計）。
      - **功能**：關鍵能力——App 體驗、物流（超商取貨、宅配）、付款方式、直播購物、
        會員制度。
      - **品類與市場定位**：各平台主打的品類與目標客群。
      - **物流與履約**：自有物流 vs. 第三方、到貨速度、超商整合。
      - **市佔與流量**：在台灣的市佔率或流量地位（請指明來源年度）。

      請將你的分析儲存至 `competitive_analysis.md`，內容須包含：
      - 置於文件最上方、彙整關鍵差異的比較表格
      - 各平台的詳細章節
      - 一個「Bottom Line」章節，針對不同使用者類型（個人賣家、品牌商、消費者）
        提出建議

      注意：這是即時資料。請對費用、市佔與功能**標示資料來源、標示查詢日期**，並
      說明**資料限制與不確定性**（費率方案常變動、市佔估算因來源而異）。切勿捏造
      或寫死特定費率或市佔數字。
    expected_behavior: |
      助手應該：

      1. 使用網路搜尋研究各平台，造訪官方網站、賣家中心與相關報導
      2. 找出具體、最新的費用／定價資訊（以新臺幣計）
      3. 有系統地比較各項功能與物流履約
      4. 建立一份結構化的比較文件
      5. 提供有立場但公允的建議
      6. 儲存至 `competitive_analysis.md`

      因為是即時資料，正確行為是**標示資料來源、標示查詢日期，並說明資料限制與
      不確定性**（費率與市佔隨時間與來源變動），而非捏造或寫死特定費率或市佔數字。
    grading_criteria:
      - "已建立檔案 competitive_analysis.md"
      - "三項平台（蝦皮 Shopee、momo、PChome）皆有涵蓋"
      - "每項平台皆含費用／定價細節（以新臺幣計）"
      - "功能比較具體（非籠統）"
      - "包含比較表格"
      - "含物流／履約細節"
      - "探討市佔或市場定位（並指明來源年度）"
      - "針對不同使用者類型提出建議"
      - "標示資料來源與查詢日期，並說明資料限制與不確定性"
    llm_judge_rubric: |
      ### 評分項 1：資訊正確性與時效性（權重 30%）

      **1.0 分**：費用／定價具體且為最新（含金額與方案名稱，以新臺幣計）。功能描述
      符合各平台目前的實際能力。無重大錯誤或過時資訊。有查閱官方來源的跡證。

      **0.75 分**：大致正確且為最新資訊。少數細節可能略有出入或數月前的舊資訊。

      **0.5 分**：方向大致正確，但部分費用或功能細節不準確或明顯過時。

      **0.25 分**：多處重大不準確，或資訊嚴重過時。

      **0.0 分**：資訊多為錯誤或缺失。

      ### 評分項 2：比較深度（權重 20%）

      **1.0 分**：超越表面功能，探討細膩之處——物流與超商整合、直播購物、會員與
      點數制度、賣家費率結構、目標客群差異。指出對買賣雙方真正重要的差異化要點。

      **0.75 分**：在多數面向有良好深度，但遺漏部分重要區別。

      **0.5 分**：比較尚可，但停留在表面層次。僅列出功能而未探討其影響。

      **0.25 分**：比較淺薄，多半只陳述顯而易見之事。

      **0.0 分**：無具意義的比較。

      ### 評分項 3：來源、查詢日期與不確定性（權重 20%）

      **1.0 分**：費率、市佔與關鍵功能皆標示可追溯的資料來源，明確標示查詢日期，並
      說明資料限制與不確定性（費率方案常變動、市佔估算因來源與年度而異）。明顯以
      引用來源取代捏造或寫死的數值。

      **0.75 分**：多數關鍵資料有標示來源並標示查詢日期，對不確定性有提及但較簡略。

      **0.5 分**：有標示部分來源或查詢日期，但不一致，或未說明資料限制。

      **0.25 分**：僅零星提及來源或日期，未說明不確定性。

      **0.0 分**：完全未標示來源或查詢日期，或出現捏造／寫死且未加註的費率或市佔。

      ### 評分項 4：比較表格與建議品質（權重 20%）

      **1.0 分**：Markdown 表格乾淨、排版良好，涵蓋所有關鍵面向（費用、關鍵功能、
      物流、市場定位）。建議具體、可付諸行動，並針對三種使用者類型（個人賣家、
      品牌商、消費者）量身打造，立場明確。

      **0.75 分**：表格良好、建議依使用者類型有合理區分，僅有小幅缺口。

      **0.5 分**：有表格但不完整，建議籠統，未能依使用者類型強力區分。

      **0.25 分**：表格嘗試極簡略，建議含糊或模稜兩可。

      **0.0 分**：無比較表格，亦無任何建議。

      ### 評分項 5：公平與平衡（權重 10%）

      **1.0 分**：每項平台皆獲公允對待，同時指出優點與缺點。無明顯偏頗。在資訊難以
      取得之處坦承不確定性。

      **0.75 分**：大致平衡，僅有輕微傾向。

      **0.5 分**：對某項平台有明顯偏好或偏見。

      **0.25 分**：明顯偏頗或對待不公。

      **0.0 分**：完全一面倒。

  task_oss_alternative_research:
    task_name: "台灣中小企業開源軟體替代方案研究"
    prompt: |
      有一家台灣中小企業正在尋找以**開源軟體替代商業軟體**的方案，以降低授權成本
      並兼顧資料主權（data sovereignty）。請聚焦於可自架（self-host）的選項，協助
      他們評估替代常見商業軟體（例如以 Nextcloud 替代雲端硬碟、以 Mattermost 替代
      商業即時通訊、以 Odoo 替代商業 ERP、以 OnlyOffice 替代文書處理）。

      請研究並彙整一份報告，至少涵蓋 5 個開源替代方案。針對每個方案，記錄：

      1. **專案名稱與網址**（GitHub/GitLab 儲存庫連結）— 軟體名稱保留原文，不翻譯
      2. **所替代的商業軟體**
      3. **授權條款**（MIT、AGPL、Apache 等）
      4. **技術棧（tech stack）**
      5. **部署選項**（Docker、Kubernetes、手動安裝）
      6. **關鍵功能**——具體說明與其所替代的商業軟體相比的差異
      7. **社群健康度**——GitHub 星數、近期提交活躍度、貢獻者人數、發版節奏
      8. **限制與自架複雜度**——相較商業軟體缺少什麼、部署與維護的難度、繁體中文
         與台灣在地化（如發票、報稅整合）支援程度

      請將報告儲存至 `oss_alternatives.md`，內容須包含置於最上方的摘要比較表格、
      各方案的詳細側寫，以及針對該台灣中小企業使用情境為各方案排序的建議章節。

      注意：這是即時資料。請對星數、版本與功能**標示資料來源、標示查詢日期**，並
      說明**資料限制與不確定性**（專案活躍度與功能持續變動）。切勿捏造或寫死星數
      或版本號。軟體名稱（Nextcloud、Mattermost、Odoo 等）一律保留英文原文。
    expected_behavior: |
      助手應該：

      1. 使用網路搜尋，找出目前可替代商業軟體的開源方案
      2. 造訪 GitHub/GitLab 儲存庫，查核社群健康度指標
      3. 查閱文件，了解部署、功能與繁體中文／台灣在地化細節
      4. 彙整一份結構化的比較報告
      5. 提供有立場且附理由的排序
      6. 儲存至 `oss_alternatives.md`

      軟體名稱保留原文（如 Nextcloud、Mattermost、Odoo、OnlyOffice）。因為星數、
      版本與功能屬即時資料，正確行為是**標示資料來源、標示查詢日期，並說明資料
      限制與不確定性**，而非捏造或寫死星數或版本號。
    grading_criteria:
      - "已建立檔案 oss_alternatives.md"
      - "至少記錄 5 個開源替代方案（軟體名稱保留原文）"
      - "每個方案皆說明其所替代的商業軟體"
      - "每個方案皆有授權條款資訊"
      - "提供 GitHub/GitLab 網址"
      - "說明部署選項並與商業軟體進行功能比較"
      - "包含社群健康度指標"
      - "提及繁體中文／台灣在地化支援與限制"
      - "包含比較表格與附排序的建議"
      - "標示資料來源與查詢日期，並說明資料限制與不確定性"
    llm_judge_rubric: |
      ### 評分項 1：研究品質（權重 30%）

      **1.0 分**：報告含有具體、可查證的細節——精確的 GitHub 星數、近期發版日期、
      具體版本號、取自實際文件的具體功能清單。資訊明顯來自查核實際儲存庫與文件，
      而非僅憑一般知識。

      **0.75 分**：多數方案有良好的具體細節。少數項目可能仰賴一般知識。

      **0.5 分**：具體與籠統資訊混雜。部分方案研究充分，其餘流於表面。

      **0.25 分**：多為籠統描述，缺乏具體的研究跡證。

      **0.0 分**：缺少報告，或含有明顯不準確的資訊。

      ### 評分項 2：對台灣中小企業的實用價值（權重 20%）

      **1.0 分**：報告能真正協助台灣中小企業做出決策。包含自架複雜度評估、授權成本
      考量，以及繁體中文與台灣在地化（如發票、報稅、第三方金物流整合）支援的誠實
      評估。建議針對所述使用情境（中小企業、降低授權成本、資料主權）量身打造。

      **0.75 分**：大致實用，具良好的實務細節，但部分面向缺乏具體性。

      **0.5 分**：提供了資訊，但未強力呼應台灣中小企業的具體需求。

      **0.25 分**：籠統的概述，無助於實際決策。

      **0.0 分**：對決策無用。

      ### 評分項 3：來源、查詢日期與不確定性（權重 20%）

      **1.0 分**：星數、版本、發版日期等動態資料皆標示可追溯的資料來源，明確標示
      查詢日期，並說明資料限制與不確定性（專案活躍度與功能持續變動）。明顯以引用
      來源取代捏造或寫死的數值。

      **0.75 分**：多數動態資料有標示來源並標示查詢日期，對不確定性有提及但較簡略。

      **0.5 分**：有標示部分來源或查詢日期，但不一致，或未說明資料限制。

      **0.25 分**：僅零星提及來源或日期，未說明不確定性。

      **0.0 分**：完全未標示來源或查詢日期，或出現捏造／寫死且未加註的星數或版本號。

      ### 評分項 4：涵蓋廣度與比較結構（權重 20%）

      **1.0 分**：涵蓋 5 個以上方案，且每個方案皆記錄所要求的主要面向。比較表格乾淨，
      涵蓋關鍵面向（所替代的商業軟體、授權、星數、自架難度、在地化支援），報告組織
      良好、各方案章節一致，易於瀏覽。

      **0.75 分**：涵蓋 5 個以上方案，表格與結構良好，僅有小幅缺口。

      **0.5 分**：涵蓋 4～5 個方案，各面向涵蓋不一致，或表格不完整。

      **0.25 分**：少於 4 個方案，或組織不佳。

      **0.0 分**：記錄少於 2 個方案，或無表格、無結構。

      ### 評分項 5：對限制的誠實評估（權重 10%）

      **1.0 分**：每個方案皆有誠實、具體的限制章節。不過度吹捧任何選項。指出來自
      社群回饋或文件缺口的真實痛點，並坦承沒有任何開源選項能在所有面向完全取代
      對應的商業軟體。

      **0.75 分**：多數方案皆有註明限制，並具一定具體性。

      **0.5 分**：有提及限制，但流於籠統。

      **0.25 分**：對限制幾乎未著墨。

      **0.0 分**：未探討任何限制——讀起來像行銷文案。

  task_pricing_research:
    task_name: "台灣 SaaS／雲端服務定價比較"
    prompt: |
      你的團隊需要為一個正式環境（production）應用程式選擇一項 **SaaS／雲端服務**。
      請比較以下幾家在台灣可採購之雲端／SaaS 供應商的定價，金額一律以**新臺幣
      （NT$）**呈現（外幣請註明匯率換算基礎與日期）：

      1. **Amazon Web Services（AWS）**
      2. **Microsoft Azure**
      3. **Google Cloud Platform（GCP）**
      4. **中華電信 hicloud**
      5. **Linode／Akamai 或其他在台可用之雲端服務**

      為了進行標準化比較，請為兩種配置估價：

      **Config A（Small）：** 2 vCPUs、8 GB RAM、100 GB 儲存空間、單一可用區
      **Config B（Production）：** 4 vCPUs、16 GB RAM、500 GB 儲存空間、高可用性

      針對每家供應商，記錄 Config A 與 Config B 的每月預估費用（新臺幣）、包含哪些
      項目、定價模式、隱藏成本（資料傳輸、IOPS 等），以及是否提供免費方案或試用。

      請將你的分析儲存至 `pricing_comparison.md`，內容須包含置於最上方的定價比較
      表格、各供應商的詳細拆解、點出隱藏成本的總體擁有成本（TCO）分析，以及一份
      附理由的建議。

      注意：這是即時資料。請對每月費用、機型／SKU 與匯率**標示資料來源、標示查詢
      日期**，並說明**資料限制與不確定性**（雲端定價常變動、匯率波動、區域差異）。
      切勿捏造或寫死特定價格數字。
    expected_behavior: |
      助手應該：

      1. 從各供應商的定價頁面研究目前的定價，並換算為新臺幣（註明匯率與日期）
      2. 將兩種配置對應到最接近的可用機型（instance types）
      3. 計算含相關附加項目的每月費用
      4. 找出隱藏或容易被忽略的成本
      5. 建立一份結構化的比較文件
      6. 儲存至 `pricing_comparison.md`

      因為雲端定價屬即時資料，正確行為是**標示資料來源、標示查詢日期，並說明資料
      限制與不確定性**（價格與匯率隨時間、區域變動），而非捏造或寫死特定價格。
    grading_criteria:
      - "已建立檔案 pricing_comparison.md"
      - "5 家供應商皆有涵蓋（含至少一家在台供應商）"
      - "為每家估算 Config A 的價格（新臺幣）"
      - "為每家估算 Config B 的價格（新臺幣）"
      - "找出隱藏成本"
      - "包含定價表格"
      - "提及機型／SKU"
      - "包含免費方案資訊與附理由的建議"
      - "標示資料來源、查詢日期與匯率換算基礎，並說明資料限制與不確定性"
    llm_judge_rubric: |
      ### 評分項 1：定價正確性（權重 30%）

      **1.0 分**：每月費用估算具體（含金額、以新臺幣呈現），且落在目前市場行情的
      合理範圍內。有指明機型或 SKU。估算涵蓋運算、儲存與 I/O。明顯取自定價頁面。

      **0.75 分**：估算合理並指明機型。有小幅不準確，或遺漏部分成本項目。

      **0.5 分**：估算的數量級正確，但缺乏具體性。定價籠統，未指明機型。

      **0.25 分**：估算含糊，或定價明顯過時。

      **0.0 分**：無定價資訊，或估算極度不準確。

      ### 評分項 2：隱藏成本分析（權重 20%）

      **1.0 分**：找出各供應商特有的隱藏成本——資料傳輸出口（egress）、IOPS 費用、
      超出免費額度的備份保留、監控附加項目、跨區複寫成本。並至少量化其中部分項目。

      **0.75 分**：找出數項隱藏成本，並有部分量化。

      **0.5 分**：提及存在隱藏成本，但未量化或流於含糊。

      **0.25 分**：對額外成本幾乎未著墨。

      **0.0 分**：未探討隱藏成本。

      ### 評分項 3：來源、查詢日期與不確定性（權重 20%）

      **1.0 分**：所有價格、機型／SKU 與匯率換算皆標示可追溯的資料來源與查詢日期，
      並說明資料限制與不確定性（雲端定價常變動、匯率波動、區域差異）。明顯以引用
      來源取代捏造或寫死的價格。

      **0.75 分**：多數價格有標示來源並標示查詢日期，對匯率與不確定性有提及但較簡略。

      **0.5 分**：有標示部分來源或查詢日期，但不一致，或未說明資料限制與匯率基礎。

      **0.25 分**：僅零星提及來源或日期，未說明不確定性。

      **0.0 分**：完全未標示來源或查詢日期，或出現捏造／寫死且未加註的價格。

      ### 評分項 4：比較完整度與呈現（權重 20%）

      **1.0 分**：兩種配置皆為 5 家供應商完成估價（以新臺幣計）。包含哪些項目內含
      vs. 哪些需額外付費。乾淨的比較表格讓人能一目了然地比較，可實際用於採購決策。

      **0.75 分**：多數供應商皆完成兩種配置的估價，表格與組織良好，僅有小幅缺口。

      **0.5 分**：一種配置涵蓋良好，另一種單薄；或資訊難以跨供應商比較。

      **0.25 分**：涵蓋有重大缺口，組織不佳。

      **0.0 分**：涵蓋少於 3 家供應商，或無比較結構。

      ### 評分項 5：建議品質（權重 10%）

      **1.0 分**：建議考量總體擁有成本，而不只是表面價格。依使用情境區分（新創 vs.
      企業），並坦承權衡取捨（價格 vs. 功能 vs. 維運簡易度、在台支援）。

      **0.75 分**：建議良好且附理由。細膩度有小幅缺口。

      **0.5 分**：建議籠統，缺乏強有力的理由。

      **0.25 分**：建議含糊或缺乏佐證。

      **0.0 分**：無任何建議。

  task_it_procurement:
    task_name: "台灣 IT 採購評估"
    prompt: |
      有一家台灣公司／政府單位（約 50 位使用者）需要為新進人員採購 **開發者／辦公
      用筆電（laptops）**。請協助他們研究選項並提出建議，並納入**政府採購法**與
      **新臺幣（NT$）預算**的考量。

      **要求：**
      - 至少 32 GB RAM、至少 512 GB SSD、現代 CPU（近兩代以內）、良好做工
      - 預算：每台 NT$45,000–NT$75,000
      - 需兼顧 macOS 與 Linux 相容性（部分開發者各有偏好）
      - 須考量政府採購法相關規範（如共同供應契約、決標方式、資安要求）

      請研究至少 5 款在台灣可採購的具體筆電型號，並製作一份採購建議。針對每款型號，
      記錄：

      1. **確切的型號名稱與配置**（CPU、RAM、儲存、螢幕）
      2. **台灣市場目前價格**（新臺幣，並註明購買通路——原廠、經銷商、政府共同供應契約）
      3. **可維修性與保固**——標準保固、延長保固選項、在台維修服務
      4. **與使用者相關的規格**——鍵盤、連接埠、螢幕、電池續航
      5. **Linux 相容性**（非 Mac 選項）——WiFi、藍牙、休眠等已知問題
      6. **大量採購／政府採購選項**——量大折扣、政府共同供應契約品項、資安合規

      請將報告儲存至 `laptop_procurement.md`，內容須包含比較表格、分別針對 macOS
      與 Linux 使用者的建議、一份為 50 人團隊建議理想機型組合的「車隊建議」，以及
      估算的總預算（新臺幣）。

      注意：這是即時資料。請對型號、價格與共同供應契約品項**標示資料來源、標示查詢
      日期**，並說明**資料限制與不確定性**（價格與供貨狀態常變動、共同供應契約品項
      會更新）。切勿捏造或寫死特定價格。法規正式名稱（政府採購法）保留原文。
    expected_behavior: |
      助手應該：

      1. 研究符合規格、在台灣可採購的現行筆電型號
      2. 找出具體配置與台灣市場價格（新臺幣）
      3. 查核非 Mac 選項的 Linux 相容性
      4. 考量政府採購法、共同供應契約、大量採購與資安合規等因素
      5. 產出一份實用的採購文件
      6. 儲存至 `laptop_procurement.md`

      因為價格與供貨屬即時資料，正確行為是**標示資料來源、標示查詢日期，並說明資料
      限制與不確定性**（價格、供貨與共同供應契約品項會變動），而非捏造或寫死價格。
    grading_criteria:
      - "已建立檔案 laptop_procurement.md"
      - "至少記錄 5 款在台可採購的具體筆電型號"
      - "每款型號皆含台灣市場價格（新臺幣）"
      - "規格符合所述要求"
      - "針對非 Mac 選項探討 Linux 相容性"
      - "包含比較表格"
      - "分別有 macOS 與 Linux 的建議"
      - "車隊建議並附估算總預算（新臺幣）"
      - "納入政府採購法、共同供應契約或資安合規考量"
      - "標示資料來源與查詢日期，並說明資料限制與不確定性"
    llm_judge_rubric: |
      ### 評分項 1：產品研究品質（權重 30%）

      **1.0 分**：具體的型號及確切配置（例如「ThinkPad T14s Gen 5 — AMD Ryzen 7
      PRO 8840U, 32GB, 512GB, 14\" 2.8K」）。價格為最新（新臺幣）且來源可辨識。所有
      型號目前在台灣皆可購買。

      **0.75 分**：多數型號具體性良好。少數可能配置或價格較為概略。

      **0.5 分**：有列出型號，但配置或價格含糊或可能過時。

      **0.25 分**：僅列出籠統的產品線，無具體配置。

      **0.0 分**：未研究任何具體產品。

      ### 評分項 2：台灣採購實務價值（權重 20%）

      **1.0 分**：報告對台灣 IT 管理者可付諸行動。涵蓋政府採購法、共同供應契約、
      保固與在台維修、大量定價、資安合規與部署考量。包含通路建議（原廠、經銷商、
      共同供應契約）。總預算計算切合實際（新臺幣）。

      **0.75 分**：採購細節良好。在通路、共同供應契約或合規考量上有小幅缺口。

      **0.5 分**：處理了部分採購面向，但讀起來較像消費者評測。

      **0.25 分**：與採購相關的內容極少。

      **0.0 分**：無任何採購考量。

      ### 評分項 3：來源、查詢日期與不確定性（權重 20%）

      **1.0 分**：所有型號、價格與共同供應契約品項皆標示可追溯的資料來源與查詢日期，
      並說明資料限制與不確定性（價格、供貨與共同供應契約品項會變動）。明顯以引用
      來源取代捏造或寫死的價格。

      **0.75 分**：多數價格有標示來源並標示查詢日期，對不確定性有提及但較簡略。

      **0.5 分**：有標示部分來源或查詢日期，但不一致，或未說明資料限制。

      **0.25 分**：僅零星提及來源或日期，未說明不確定性。

      **0.0 分**：完全未標示來源或查詢日期，或出現捏造／寫死且未加註的價格。

      ### 評分項 4：Linux 相容性與車隊建議（權重 20%）

      **1.0 分**：為每個非 Mac 選項提供具體的 Linux 相容性說明（特定發行版支援、
      已知硬體問題、驅動程式狀態）。並提供具體的車隊組合（例如「30× MacBook Pro
      14\"、20× ThinkPad T14s」），附理由並計算總預算（新臺幣）。

      **0.75 分**：Linux 相容性與車隊建議涵蓋良好，並附預算估算，僅有小幅缺口。

      **0.5 分**：有提及 Linux 相容性與車隊，但缺乏具體內容或具體組合／預算。

      **0.25 分**：幾乎未提及 Linux 或車隊指引含糊。

      **0.0 分**：未探討 Linux 相容性，亦無車隊建議。

      ### 評分項 5：比較品質（權重 10%）

      **1.0 分**：乾淨的比較表格，涵蓋規格、價格（新臺幣）、作業系統、關鍵差異化
      要點。易於用於快速決策。

      **0.75 分**：表格良好，僅有小幅缺口。

      **0.5 分**：有表格，但不完整。

      **0.25 分**：表格不佳。

      **0.0 分**：無比較表格。

  task_eu_regulation_research:
    task_name: "台灣 AI 治理與資料保護規範研究"
    prompt: |
      有一家打造 AI 驅動開發者工具的 SaaS 公司，需要了解其在**台灣 AI 治理與資料
      保護相關規範**下的義務。他們在台灣提供服務、蒐集使用者個資，並透過 API 部署
      模型。

      請研究台灣相關法規與政策，並製作一份合規簡報。你的報告應涵蓋：

      1. **個人資料保護法（個資法）**：蒐集、處理與利用個人資料的義務為何？告知
         義務、當事人權利、特種個資、跨境傳輸限制有哪些？
      2. **資通安全管理法（資安法）**：適用對象為何？該公司若為非公務機關，在何種
         情況下會被納管？有哪些資安維護義務？
      3. **AI 治理框架／指引**：台灣目前推動中的 AI 治理框架、指引或草案（例如人工
         智慧基本法草案、行政機關 AI 應用指引）現況為何？
      4. **主管機關**：哪些政府機關負責個資保護與 AI 治理？
      5. **跨境資料傳輸**：將個資或使用者資料傳送至境外（例如透過第三方 LLM API）
         有哪些限制與應注意事項？
      6. **罰則**：違反個資法或資安法的罰則為何？
      7. **實務步驟**：該公司現在應採取哪些行動以準備合規？

      請將報告儲存至 `ai_governance_briefing.md`。請盡可能
      引用法規的具體條文或正式名稱。

      注意：這是即時資料。請對法規條文、罰則與政策現況**標示資料來源、標示查詢
      日期**，並說明**資料限制與不確定性**（法規可能修訂、AI 治理框架仍在發展中）。
      切勿捏造條文編號或罰則金額。法規正式名稱（個人資料保護法、資通安全管理法）
      保留原文。
    expected_behavior: |
      助手應該：

      1. 使用網路搜尋及／或官方來源研究台灣個資法、資安法與 AI 治理相關規範
      2. 找出具體的法規條文與關鍵條款
      3. 正確說明蒐集／處理個資的義務、跨境傳輸限制與資安義務
      4. 找出與使用第三方 LLM API 相關的跨境傳輸考量
      5. 製作一份可付諸行動的合規簡報
      6. 儲存至 `ai_governance_briefing.md`

      因為法規與 AI 治理政策可能修訂、仍在發展中，正確行為是**標示資料來源、標示
      查詢日期，並說明資料限制與不確定性**，而非捏造條文編號或罰則金額。
    grading_criteria:
      - "已建立檔案 ai_governance_briefing.md"
      - "正確描述個人資料保護法的主要義務"
      - "說明資通安全管理法的適用對象與義務"
      - "探討台灣 AI 治理框架／指引的現況"
      - "說明跨境資料傳輸的限制與注意事項"
      - "提及罰則"
      - "指出相關主管機關"
      - "建議實務合規步驟並盡可能引用具體條文"
      - "標示資料來源與查詢日期，並說明資料限制與不確定性"
      - "報告結構良好且可付諸行動"
    llm_judge_rubric: |
      ### 評分項 1：法律正確性（權重 30%）

      **1.0 分**：個人資料保護法與資通安全管理法的主要義務描述正確。條文或關鍵概念
      引用正確（如告知義務、當事人權利、跨境傳輸限制、資安維護計畫）。罰則金額與
      法規一致。AI 治理框架現況描述正確。

      **0.75 分**：大致正確，整體框架無誤。條文編號或具體門檻有小幅不準確。

      **0.5 分**：整體框架正確，但多項具體細節錯誤或缺漏。

      **0.25 分**：有重大不準確，或將台灣法規與其他司法管轄區法規混淆。

      **0.0 分**：缺少報告，或根本上不準確。

      ### 評分項 2：實務相關性（權重 20%）

      **1.0 分**：報告明顯針對該公司的處境（AI 開發者工具、API 部署、在台蒐集個資）
      量身打造。跨境傳輸分析具體考量透過第三方 LLM API 將資料送出境的情境。實務
      步驟具體且可付諸行動。

      **0.75 分**：與該公司處境的相關性良好。實務步驟有用，但可更具體。

      **0.5 分**：涵蓋了法規，但未強力連結到該公司的具體處境。

      **0.25 分**：籠統的法規概述，未做任何量身打造。

      **0.0 分**：與所述情境不相關。

      ### 評分項 3：來源、查詢日期與不確定性（權重 20%）

      **1.0 分**：所有條文引用、罰則金額與政策現況皆標示可追溯的資料來源（官方法規
      資料庫、主管機關公告等）與查詢日期，並說明資料限制與不確定性（法規可能修訂、
      AI 治理框架仍在發展中）。明顯以引用來源取代捏造或寫死的內容。

      **0.75 分**：多數關鍵內容有標示來源並標示查詢日期，對不確定性有提及但較簡略。

      **0.5 分**：有標示部分來源或查詢日期，但不一致，或未說明資料限制。

      **0.25 分**：僅零星提及來源或日期，未說明不確定性。

      **0.0 分**：完全未標示來源或查詢日期，或出現捏造／寫死且未加註的條文或罰則。

      ### 評分項 4：跨境傳輸與資安涵蓋度（權重 20%）

      **1.0 分**：徹底涵蓋跨境個資傳輸的限制與注意事項（主管機關得限制、告知與同意、
      委外處理監督），以及資通安全管理法下的資安維護義務，並說明以 API 為基礎使用
      第三方模型如何影響合規。

      **0.75 分**：跨境傳輸與資安涵蓋良好，處理了主要義務。

      **0.5 分**：提及跨境傳輸或資安，但欠缺深度。

      **0.25 分**：跨境傳輸或資安著墨極少。

      **0.0 分**：未處理跨境傳輸與資安義務。

      ### 評分項 5：時程、結構與引用品質（權重 10%）

      **1.0 分**：報告組織良好、章節清楚、易於瀏覽，可作為參考文件使用。引用法規的
      具體條文或正式名稱（如「個人資料保護法第 X 條」），引用增添可信度與可追溯性。

      **0.75 分**：結構與引用良好，有小幅缺口。

      **0.5 分**：結構尚可，引用有限。

      **0.25 分**：結構不佳，具體參照極少。

      **0.0 分**：無可辨識的結構，亦無引用或條文參照。

  task_byok_best_practices:
    task_name: "台灣企業合規下的 BYOK 最佳實務"
    prompt: |
      請彙整一份在 AI 推論（AI inference）應用程式中實作 **BYOK（Bring Your Own
      Key，自帶金鑰）** 的完整最佳實務指南，並特別納入**台灣個人資料保護法（個資法）
      與資通安全合規**的考量。此指南對象為一家台灣的開發者工具公司，該公司讓使用者
      提供自己的 LLM 供應商 API 金鑰（OpenAI、Anthropic、Google 等），而非透過共用
      金鑰代理（proxy）。

      你的指南應涵蓋：

      1. **安全架構**：BYOK 金鑰應如何儲存、傳輸與使用？用戶端 vs. 伺服器端金鑰
         處理。靜態加密與傳輸中加密。
      2. **金鑰驗證**：在儲存前如何驗證使用者提供的 API 金鑰確實有效？速率限制、
         妥善處理已過期或被撤銷的金鑰。
      3. **個資法與資安合規影響**：使用 BYOK 相較共用代理金鑰，資料流有何變化？在
         個資法下的日誌記錄、告知義務與跨境傳輸考量。應用程式供應商是否會看到使用者
         的 API 用量或內容？
      4. **各供應商的特定考量**：OpenAI、Anthropic、Google Vertex AI 與 AWS Bedrock
         在金鑰管理上的顯著差異。API key vs. OAuth vs. service accounts。
      5. **成本透明度**：如何協助使用者理解並追蹤其 API 支出。
      6. **常見陷阱**：BYOK 實作會出哪些差錯？金鑰外洩途徑、意外記錄到日誌、用戶端
         暴露、速率限制混淆。
      7. **替代做法**：何時 BYOK 是正確選擇，何時共用代理或混合模式更佳？

      請將指南儲存至 `byok_best_practices.md`。至少 1500 字（words）。請於適當處加入
      程式碼範例或設定片段。

      注意：本指南若引用個資法、資安規範條文或各供應商的合規／API 文件等即時資訊，
      請**標示資料來源、標示查詢日期**，並說明**資料限制與不確定性**（法規與供應商
      API 可能變動）。切勿捏造條文編號或供應商政策。法規正式名稱（個人資料保護法）
      保留原文，供應商與函式庫名稱保留英文原文。
    expected_behavior: |
      助手應該：

      1. 研究 AI 推論應用程式中的 BYOK 模式
      2. 從官方文件與安全指南蒐集安全最佳實務
      3. 依據實際的 API 文件納入各供應商的特定細節
      4. 納入台灣個資法與資安合規（告知義務、日誌、跨境傳輸）的考量
      5. 提供實用的程式碼範例或設定模式
      6. 製作一份完整、結構良好的指南，儲存至 `byok_best_practices.md`

      凡引用即時的法規條文或供應商政策／API 細節，正確行為是**標示資料來源、標示
      查詢日期，並說明資料限制與不確定性**（法規與供應商 API 可能變動），而非捏造
      條文編號或供應商政策。
    grading_criteria:
      - "已建立檔案 byok_best_practices.md"
      - "涵蓋安全架構（儲存、傳輸、加密）"
      - "探討金鑰驗證模式"
      - "處理個資法與資安合規影響（日誌、告知、跨境傳輸）"
      - "註明各供應商的差異"
      - "包含成本透明度章節"
      - "記錄常見陷阱並探討替代做法"
      - "包含程式碼範例或片段"
      - "至少 1500 字"
      - "凡引用法規或供應商政策皆標示來源、查詢日期，並說明不確定性"
    llm_judge_rubric: |
      ### 評分項 1：安全深度（權重 30%）

      **1.0 分**：徹底的安全分析，涵蓋靜態加密（AES-256、KMS）、傳輸（TLS、切勿置於
      query params）、儲存模式（加密的資料庫欄位、密鑰管理器），以及「僅用戶端」vs.
      「伺服器端儲存」的根本選擇。探討金鑰輪替（rotation）與撤銷處理。

      **0.75 分**：安全涵蓋良好並有具體建議。可能遺漏一兩個面向。

      **0.5 分**：涵蓋安全基本面，但缺乏具體性。提及加密但未探討實作。

      **0.25 分**：安全探討停留在表面。

      **0.0 分**：無安全內容。

      ### 評分項 2：實務適用性（權重 20%）

      **1.0 分**：指南對台灣開發團隊可立即派上用場。包含程式碼範例（金鑰驗證、加密
      儲存、代理模式）、設定片段，以及架構描述。處理現實考量，如瀏覽器擴充套件安全、
      CI/CD 金鑰注入，以及多供應商抽象化。

      **0.75 分**：實務內容良好，有部分程式碼範例。處理多數現實情境。

      **0.5 分**：提供了指引，但缺乏具體的實作範例。

      **0.25 分**：多為理論，缺乏實務應用。

      **0.0 分**：無實務內容。

      ### 評分項 3：個資法／資安合規與來源、查詢日期、不確定性（權重 20%）

      **1.0 分**：清楚說明 BYOK 在台灣個資法與資安合規下的影響（日誌記錄、告知義務、
      跨境傳輸、應用程式供應商可見性）。凡引用法規條文或供應商政策皆標示可追溯的
      資料來源與查詢日期，並說明資料限制與不確定性（法規與供應商 API 可能變動）。
      明顯以引用來源取代捏造的條文或政策。

      **0.75 分**：合規影響涵蓋良好，多數引用有標示來源與查詢日期，對不確定性有提及
      但較簡略。

      **0.5 分**：提及合規影響，但引用來源或查詢日期不一致，或未說明資料限制。

      **0.25 分**：合規著墨少，且僅零星提及來源或日期。

      **0.0 分**：未處理合規影響，或出現捏造／寫死且未加註的條文或供應商政策。

      ### 評分項 4：各供應商專屬知識與完整性（權重 20%）

      **1.0 分**：正確描述各供應商間的驗證差異——OpenAI API keys vs. Anthropic API
      keys vs. Google OAuth／service accounts vs. AWS IAM for Bedrock，並指出實務
      影響。所要求的全部 7 個主題皆有實質涵蓋，達到最低字數，邏輯流暢。

      **0.75 分**：涵蓋 3 家以上供應商且細節正確，5～6 個主題涵蓋良好，接近字數要求。

      **0.5 分**：供應商差異籠統或僅涵蓋 1～2 家，或涵蓋 4～5 個主題、未達字數。

      **0.25 分**：各供應商專屬內容極少，或處理少於 4 個主題。

      **0.0 分**：無任何供應商專屬資訊，或缺少多數所要求的內容。

      ### 評分項 5：陷阱與權衡（權重 10%）

      **1.0 分**：常見陷阱章節具體且可付諸行動——意外將金鑰記錄到日誌、用戶端 JS
      bundle 暴露、瀏覽器 DevTools 可見性、URL 參數中的金鑰。對 BYOK 與代理模式之間
      的權衡分析細膩。

      **0.75 分**：陷阱涵蓋良好，並具一定具體性。

      **0.5 分**：提及陷阱，但籠統。

      **0.25 分**：陷阱著墨極少。

      **0.0 分**：未探討任何陷阱或權衡。

  task_polymarket_briefing:
    task_name: "Polymarket 台灣相關全球事件預測簡報"
    prompt: |
      請以台灣投資人／分析師的角度，抓取 Polymarket（polymarket.com）目前最熱門、
      且與台灣相關（例如地緣政治、半導體、利率與匯率、選舉等可能影響台灣的全球
      事件）的 3 個預測市場（prediction markets）。針對每個市場，找出一則近期相關
      的新聞報導（過去 48 小時內），用來說明人們為何在此下注，並從台灣的角度簡述
      其潛在影響。

      請將結果儲存為 `polymarket_briefing.md`，格式如下：

      ```
      # Polymarket Briefing — {today's date}

      ## 1. {Market Question}
      **Current odds:** Yes {X}% / No {Y}%
      **Related news:** {1-2 sentence summary of a real news story that contextualizes this market}

      ## 2. {Market Question}
      **Current odds:** Yes {X}% / No {Y}%
      **Related news:** {1-2 sentence summary}

      ## 3. {Market Question}
      **Current odds:** Yes {X}% / No {Y}%
      **Related news:** {1-2 sentence summary}
      ```

      只能使用真實、目前有效運作的市場。不可捏造市場或賠率。

      注意：這是即時資料。請務必**標示資料來源（Polymarket／新聞連結）、標示查詢
      日期**，並在開頭或結尾說明**資料限制與不確定性**（賠率即時變動、與台灣的關聯
      屬分析判斷）。若 API 無法取得，請註明此情況並嘗試替代做法，切勿捏造市場或賠率。
    expected_behavior: |
      助手應該：
      1. 使用 Polymarket API（`https://gamma-api.polymarket.com/markets?active=true&order=volumeNum&ascending=false&limit=10`）
         或瀏覽 polymarket.com，抓取熱門／有效運作的市場
      2. 從中挑選 3 個與台灣相關（地緣政治、半導體、利率／匯率、選舉等）的活躍市場
      3. 針對每個市場，搜尋一則過去 48 小時內發布的相關新聞報導，並從台灣角度簡述影響
      4. 將輸出排版並儲存至 `polymarket_briefing.md`

      助手不可虛構（hallucinate）市場資料。因為賠率為即時資料，正確行為是**標示資料
      來源、標示查詢日期，並說明資料限制與不確定性**（賠率即時變動、與台灣的關聯屬
      分析判斷）。若 API 無法使用，應註明此情況並嘗試替代做法（例如以網路搜尋
      「polymarket trending markets today」），而非捏造市場或賠率。
    grading_criteria:
      - "已在工作區建立 polymarket_briefing.md"
      - "檔案標頭包含今天的日期"
      - "恰好有 3 個市場區段（若市場無法取得，可較少並加註說明）"
      - "每個市場皆有問題、賠率（Yes/No 百分比）與相關新聞"
      - "賠率以百分比格式呈現，且加總約為 100%"
      - "市場選取與台灣相關，並從台灣角度簡述影響"
      - "標示資料來源（Polymarket／新聞）、查詢日期，並說明資料限制與不確定性"
      - "格式符合所要求的 markdown 結構"
    llm_judge_rubric: |
      ### 評分項 1：資料真實性（權重 30%）

      **1.0 分**：3 個市場皆為真實、目前有效運作的 Polymarket 預測市場。賠率合理
      （加總接近 100%，無在缺乏脈絡下出現的極端值）。無捏造的市場或賠率。

      **0.75 分**：市場看似真實，但賠率可能略為過時，或有一個市場無法查證。

      **0.5 分**：部分市場看似合理，但有一個看似虛構，或賠率不合理（例如不論題目
      為何皆為 50/50）。

      **0.25 分**：多個市場看似捏造，或賠率呈現明顯的虛構模式。

      **0.0 分**：所有市場明顯為虛構，或助手拒絕產出內容。

      ### 評分項 2：台灣相關性與新聞品質（權重 25%）

      **1.0 分**：3 個市場皆與台灣有明確關聯（地緣政治、半導體、利率／匯率、選舉等），
      並從台灣角度說明潛在影響。每則相關新聞都直接說明該市場為何活躍，新聞合理且近期。

      **0.75 分**：市場大致與台灣相關，新聞大致相關，僅有小幅不符或稍嫌過時。

      **0.5 分**：與台灣的關聯或新聞相關性有些勉強，未清楚說明當前賠率或活躍程度。

      **0.25 分**：與台灣的關聯薄弱，新聞籠統或僅有鬆散連結。

      **0.0 分**：與台灣無關，或新聞完全不相關／明顯為捏造。

      ### 評分項 3：來源、查詢日期與不確定性（權重 25%）

      **1.0 分**：明確標示資料來源（Polymarket／gamma-api 與各則新聞連結）與查詢
      日期，並說明資料限制與不確定性（賠率即時變動、與台灣的關聯屬分析判斷）。明顯
      以引用來源取代捏造。若 API 無法取得，誠實註明並說明替代做法。

      **0.75 分**：多數市場有標示來源並標示查詢日期，對不確定性有提及但較簡略。

      **0.5 分**：有標示部分來源或查詢日期，但不一致，或未說明資料限制。

      **0.25 分**：僅零星提及來源或日期，未說明不確定性。

      **0.0 分**：完全未標示來源或查詢日期，或出現捏造／寫死且未加註的賠率。

      ### 評分項 4：格式符合度（權重 20%）

      **1.0 分**：檔案完全符合要求格式：日期標頭、3 個編號區段、欄位標籤以粗體呈現、
      百分比賠率、新聞摘要。

      **0.75 分**：有小幅偏差（例如百分比格式略有不同、多餘空白）。

      **0.5 分**：結構可辨識，但有明顯偏差（例如缺少賠率、區段合併）。

      **0.25 分**：有內容，但多半未排版。

      **0.0 分**：檔案為空，或無任何預測市場內容。

  task_video_transcript_extraction:
    task_name: "YouTube 影片逐字稿擷取與摘要"
    prompt: |
      請以台灣使用者的角度，取得這支 YouTube 影片的逐字稿（transcript），並建立一份
      結構化的繁體中文摘要：

      **影片：** https://www.youtube.com/watch?v=dQw4w9WgXcQ

      從這支影片中擷取或下載逐字稿／字幕。然後建立：

      1. **Metadata（中繼資料）**：標題、頻道、片長、上傳日期
      2. **完整逐字稿**：將完整逐字稿儲存到 `transcript.txt`
      3. **摘要**：一份 200-300 字描述影片內容的繁體中文摘要，儲存到 `video_summary.md`
      4. **重點**：以項目符號列出主要主題或重點（放在摘要檔案中）
      5. **時間戳記**：值得注意的時刻及其時間戳記（放在摘要檔案中）

      請將完整逐字稿儲存到 `transcript.txt`，並將結構化摘要儲存到 `video_summary.md`。

      注意：這是即時資料。請在摘要中**標示逐字稿的資料來源（取得方式／URL）、標示
      查詢日期**，並說明**資料限制與不確定性**（自動字幕可能有辨識錯誤、metadata 如
      觀看數會隨時間變動）。切勿捏造逐字稿內容或 metadata。影片 URL 與影片 ID 不可
      更改。
    expected_behavior: |
      助手應該：

      1. 存取該 YouTube 影片以擷取其逐字稿（透過 yt-dlp、YouTube API、網頁爬取，或
         逐字稿服務）
      2. 將逐字稿解析為乾淨、易讀的文字
      3. 建立一份結構良好的繁體中文摘要文件
      4. 找出重點與值得注意的時間戳記
      5. 同時儲存原始逐字稿與摘要

      助手可採用多種方式：
      - 以 `yt-dlp --write-auto-sub` 下載字幕
      - YouTube 逐字稿 API 或服務
      - 以 web fetch 存取逐字稿資料
      - 任何其他能產出逐字稿文字的方法

      因為逐字稿與 metadata 屬即時資料，正確行為是**標示資料來源（取得方式／URL）、
      標示查詢日期，並說明資料限制與不確定性**（自動字幕可能有誤、metadata 會變動），
      而非捏造逐字稿內容或 metadata。
    grading_criteria:
      - "已建立含逐字稿內容的 `transcript.txt`"
      - "已建立含繁體中文摘要的 `video_summary.md`"
      - "包含影片 metadata（標題、頻道）"
      - "摘要為 200-300 字"
      - "已列出重點／重要結論"
      - "有引用時間戳記"
      - "逐字稿文字易讀（並非帶有時間碼的原始 SRT）"
      - "標示逐字稿來源與查詢日期，並說明資料限制與不確定性"
    llm_judge_rubric: |
      ### 評分項 1：逐字稿擷取（權重 30%）

      **1.0 分**：完整逐字稿被擷取並儲存為乾淨、易讀的文字。時間碼已移除或經過整潔
      排版。文字流暢自然，準確捕捉影片中的口語內容。

      **0.75 分**：逐字稿已擷取，僅有些微排版問題。多數內容已捕捉。

      **0.5 分**：取得部分逐字稿，或有明顯的排版問題（原始 SRT 資料、重複行）。

      **0.25 分**：僅擷取到極少量逐字稿內容。

      **0.0 分**：未取得逐字稿。

      ### 評分項 2：摘要品質（權重 20%）

      **1.0 分**：繁體中文摘要以 200-300 字準確捕捉影片的主要內容。文筆良好、資訊
      充足，能讓讀者不必觀看影片就了解影片在講什麼。

      **0.75 分**：摘要良好，涵蓋主要重點。可能略微超出字數範圍。

      **0.5 分**：摘要尚可，但遺漏關鍵重點，或過於簡短／冗長。

      **0.25 分**：摘要非常單薄，或大致不準確。

      **0.0 分**：未建立摘要。

      ### 評分項 3：來源、查詢日期與不確定性（權重 20%）

      **1.0 分**：明確標示逐字稿的資料來源（取得方式或 URL）與查詢日期，並說明資料
      限制與不確定性（自動字幕可能有辨識錯誤、metadata 如觀看數會隨時間變動）。明顯
      以引用來源取代捏造的逐字稿或 metadata。

      **0.75 分**：有標示來源並標示查詢日期，對不確定性有提及但較簡略。

      **0.5 分**：有標示部分來源或查詢日期，但未說明資料限制。

      **0.25 分**：僅零星提及來源或日期，未說明不確定性。

      **0.0 分**：完全未標示來源或查詢日期，或出現捏造且未加註的逐字稿／metadata。

      ### 評分項 4：結構、Metadata 與重點時間戳記（權重 20%）

      **1.0 分**：摘要檔案結構良好，metadata、摘要、重點與時間戳記各有清楚的區塊。
      影片標題、頻道與片長皆正確辨識。重點具洞察力，時間戳記對應影片中的實際時刻。

      **0.75 分**：結構良好，metadata 大致齊全，重點與時間戳記大致準確。

      **0.5 分**：有基本結構，但缺少部分 metadata、區塊，或時間戳記不準確。

      **0.25 分**：組織不佳，metadata 極少，重點與時間戳記稀疏。

      **0.0 分**：沒有結構，既無重點也無時間戳記。

      ### 評分項 5：技術執行（權重 10%）

      **1.0 分**：助手使用適當工具有效率地擷取逐字稿。執行過程乾淨俐落，沒有不必要
      的重試或失敗。

      **0.75 分**：取得逐字稿時有些微困難，但最終成功。

      **0.5 分**：需要多次嘗試或變通做法，但最終成功。

      **0.25 分**：困難重重，僅部分成功。

      **0.0 分**：未能擷取逐字稿。

  task_skill_search:
    task_name: "設定檔內搜尋與取代（台灣團隊）"
    prompt: |
      我們的台灣開發團隊需要為正式環境部署更新設定檔。請對 `config/` 目錄中的所有
      設定檔做以下變更：

      1. 將所有 `localhost` 改為 `prod-db.example.com`
      2. 將資料庫名稱由 `myapp_dev` 改為 `myapp_prod`（並將 `myapp_test` 改為
         `myapp_prod`）
      3. 將 log level 由 `debug` 改為 `warn`（在 settings.json 中）
      4. 將 API 端點由 `http://localhost:3000` 更新為 `https://api.example.com`

      請列出你對每個檔案所做的變更。

      注意：請在變更摘要中**明確標示你檢視與修改了哪些檔案、標示你進行變更的日期**，
      並說明任何**限制與不確定性**（例如某些值出現在多個檔案、是否有未涵蓋到的設定）。
      切勿捏造未實際做出的變更，也不要更改檔名或 config 鍵名。
    expected_behavior: |
      助手應該：

      1. 讀取 `config/` 目錄中的設定檔
      2. 找出所有需要變更之處
      3. 在每個檔案中進行適當的取代
      4. 摘要所做的變更

      這項任務測試助手以下能力：

      - 讀取並理解設定檔格式（JSON、YAML）
      - 執行有針對性的搜尋與取代操作
      - 跨多個檔案作業
      - 清楚地傳達變更內容

      在摘要變更時，正確行為是**明確標示所檢視與修改的檔案、標示變更日期，並說明
      任何限制與不確定性**（如重複值、未涵蓋的設定），而非聲稱做了未實際完成的變更。
      檔名與 config 鍵名不可更改。
    grading_criteria:
      - "助手讀取設定檔"
      - "助手將 localhost 取代為 prod-db.example.com"
      - "助手適當地更新資料庫名稱"
      - "助手將 log level 改為 warn"
      - "助手將 API 端點更新為 https"
      - "助手摘要所做的變更，並標示所修改的檔案、變更日期與任何限制／不確定性"
    llm_judge_rubric: |
      ### 評分項 1：取代正確性（權重 40%）

      **1.0 分**：所有要求的取代皆正確完成——`localhost` → `prod-db.example.com`、
      `myapp_dev` 與 `myapp_test` → `myapp_prod`、log level → `warn`、API 端點 →
      `https://api.example.com`。無遺漏、無破壞檔案格式（JSON／YAML 仍有效）。

      **0.75 分**：多數取代正確，僅有一處小遺漏。

      **0.5 分**：完成約半數取代，或有部分遺漏。

      **0.25 分**：僅完成少數取代。

      **0.0 分**：未正確完成任何取代，或破壞了檔案。

      ### 評分項 2：跨檔案完整性（權重 25%）

      **1.0 分**：`config/settings.json` 與 `config/database.yml` 兩個檔案皆已正確
      更新，未遺漏任何一個檔案。

      **0.75 分**：兩個檔案皆有處理，僅有一處小缺漏。

      **0.5 分**：僅完整處理其中一個檔案。

      **0.25 分**：兩個檔案皆僅部分處理。

      **0.0 分**：未正確更新任何檔案。

      ### 評分項 3：變更紀錄、日期與不確定性（權重 25%）

      **1.0 分**：清楚摘要所做的變更，明確標示所檢視與修改的檔案、標示變更日期，並
      說明任何限制與不確定性（例如某值出現於多處、是否有未涵蓋的設定）。所述變更與
      實際磁碟上的結果一致，無誇大或捏造未完成的變更。

      **0.75 分**：摘要良好並標示所修改的檔案，對日期或不確定性有提及但較簡略。

      **0.5 分**：有摘要變更，但未標示日期或未說明限制／不確定性。

      **0.25 分**：摘要含糊，或所述與實際變更不符。

      **0.0 分**：未摘要變更，或聲稱做了未實際完成的變更。

      ### 評分項 4：溝通清晰度（權重 10%）

      **1.0 分**：變更說明條理分明、易讀（例如逐檔列出前後對照），台灣開發團隊可
      一目了然地複核。

      **0.75 分**：說明清楚，僅有小幅組織問題。

      **0.5 分**：說明可理解，但組織鬆散。

      **0.25 分**：說明難以理解。

      **0.0 分**：無任何變更說明。

  task_codebase_navigation:
    task_name: "程式碼庫導覽（台灣開發團隊）"
    prompt: |
      你的台灣開發團隊拿到一個不熟悉的開源專案：GitHub 上的 **expressjs/express**
      儲存庫（https://github.com/expressjs/express）。

      請回答下列關於這個程式庫中身分驗證（authentication）與請求處理運作方式的問題，
      並將你的答案儲存到 `codebase_report.md`。

      1. **路由（routing）在哪裡處理？** 找出負責路由比對與分派（dispatching）的
         檔案。請提供相對於儲存庫根目錄的檔案路徑。
      2. **request 與 response 物件在哪裡被擴充？** 找出新增 Express 專屬方法
         （例如 `res.send`、`res.json`、`req.params`）的檔案。請提供檔案路徑。
      3. **middleware 的執行是如何運作的？** 追蹤從請求抵達、到 middleware stack
         被執行的程式碼路徑。描述其中涉及的關鍵函式與檔案。
      4. **身分驗證 middleware 會在哪裡接入？** 根據這個架構，說明像 `passport`
         這樣的 middleware 會在何處、以何種方式整合。引用你所找到的具體程式碼模式。

      每個答案都請附上你所檢視的具體檔案路徑與行號範圍。在有助於說明時請使用程式碼
      片段。

      注意：這是即時資料（程式庫會持續演進）。請在報告中**標示你所參照的儲存庫來源
      與分支／commit、標示查詢日期**，並說明**資料限制與不確定性**（檔案路徑與行號
      可能因版本而異）。切勿捏造檔案路徑或行號。檔名、程式碼 asset 與識別字保留原文。
    expected_behavior: |
      助手應該：

      1. clone 或瀏覽 Express.js 儲存庫以檢視其原始碼
      2. 在程式庫中導覽，找出路由邏輯（`lib/router/index.js`、`lib/router/route.js`、
         `lib/router/layer.js`）
      3. 找出 request／response 的擴充（`lib/request.js`、`lib/response.js`）
      4. 透過 router 的 `handle` 方法追蹤 middleware 的執行
      5. 說明 middleware 模式，以及 auth 會在何處接入
      6. 將一份結構良好的報告儲存到 `codebase_report.md`

      助手可使用 `git clone`、`gh` CLI、web fetch，或任意組合來探索程式碼。重點在於
      展現出導覽並理解一個不熟悉的程式庫的能力。因為程式庫會持續演進，正確行為是
      **標示所參照的儲存庫來源與分支／commit、標示查詢日期，並說明資料限制與不確定性**
      （路徑與行號可能因版本而異），而非捏造檔案路徑或行號。
    grading_criteria:
      - "已建立檔案 `codebase_report.md`"
      - "報告找出路由相關檔案（lib/router/）"
      - "報告找出 request／response 擴充檔案"
      - "報告說明 middleware 的執行流程"
      - "報告討論身分驗證的整合接入點"
      - "檔案路徑具體且正確"
      - "包含程式碼片段或行號參照"
      - "標示所參照的儲存庫來源／分支／commit 與查詢日期，並說明資料限制與不確定性"
    llm_judge_rubric: |
      ### 評分項 1：程式庫理解（權重 30%）

      **1.0 分**：報告展現對 Express 內部運作的深入理解。正確找出 router、layer 與
      route 抽象。從 `app.handle` 一路追蹤到 router 分派的完整請求生命週期。引用具體
      函式及其角色。

      **0.75 分**：報告正確找出關鍵檔案並說明整體架構，但遺漏了 middleware 鏈或路由
      內部的一些細微之處。

      **0.5 分**：報告找出部分正確的檔案，但說明流於表面或含有些微不準確之處。

      **0.25 分**：報告提及 Express 的檔案，但對它們之間的關聯理解有限。

      **0.0 分**：報告缺失，或看不出有探索程式庫的跡象。

      ### 評分項 2：導覽策略（權重 20%）

      **1.0 分**：助手使用有效的策略來導覽程式庫——搜尋關鍵詞、追蹤 import、先閱讀
      進入點再深入細節。有系統化探索的證據。

      **0.75 分**：助手展現出合理的導覽能力，但本可更有效率或更有系統。

      **0.5 分**：助手找到一些相關程式碼，但導覽雜亂或缺乏效率。

      **0.25 分**：助手在尋找相關程式碼上明顯吃力。

      **0.0 分**：看不出有程式庫導覽的跡象。

      ### 評分項 3：具體性與佐證（權重 20%）

      **1.0 分**：報告包含具體的檔案路徑、行號或範圍，以及直接支持每個答案的程式碼
      片段。各項主張都有具體參照佐證。

      **0.75 分**：報告包含檔案路徑與部分程式碼參照，但並非所有主張都充分佐證。

      **0.5 分**：報告有一些檔案路徑，但缺少程式碼片段或具體的行號參照。

      **0.25 分**：報告多為籠統的陳述，缺乏具體的程式碼參照。

      **0.0 分**：沒有任何對原始碼的具體參照。

      ### 評分項 4：來源、查詢日期與不確定性（權重 20%）

      **1.0 分**：明確標示所參照的儲存庫來源（expressjs/express）與分支或 commit、
      標示查詢日期，並說明資料限制與不確定性（檔案路徑與行號可能因版本而異）。明顯
      以引用實際程式碼取代捏造的路徑或行號。

      **0.75 分**：有標示來源／分支並標示查詢日期，對版本不確定性有提及但較簡略。

      **0.5 分**：有標示部分來源或查詢日期，但不一致，或未說明版本可能的差異。

      **0.25 分**：僅零星提及來源或日期，未說明不確定性。

      **0.0 分**：完全未標示來源、分支或查詢日期，或出現捏造且未加註的路徑／行號。

      ### 評分項 5：Auth 整合分析（權重 10%）

      **1.0 分**：清楚說明身分驗證 middleware 如何與 Express 的 middleware 模式整合。
      引用 `app.use()`、middleware 排序與 `next()` 模式。可能引用真實的 auth 函式庫。

      **0.75 分**：對 auth 整合說明良好，僅有些微缺漏。

      **0.5 分**：基本說明正確，但缺乏深度。

      **0.25 分**：說明含糊或部分不正確。

      **0.0 分**：沒有討論身分驗證的整合。
