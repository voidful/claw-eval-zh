# Phase D — Taiwan localization overrides (batch 04: meeting-analysis tasks, part 1).
# 台灣在地化覆寫；會議分析類任務。會議逐字稿為固定英文資產，一律維持原狀，
# 僅在地化指令語氣與情境框架（以台灣分析師／員工視角分析這場會議）。
# 逐字稿中的人名、引文、標語、縮寫、日期、金額、輸出報告檔名一律保留原樣，因為 grader 會比對這些值。
tasks:

  task_meeting_council_votes:
    task_name: |
      市議會逐字稿 — 整理動議與表決結果
    prompt: |
      我服務的台灣公民監督組織受託盤點一場地方議會的議事決議，手上有一份 2026 年 4 月 2 日舉行的 Tampa City Council 會議逐字稿，存放在 `transcript.md`。這是一份即時聽打的字幕稿，並非逐字的正式紀錄。

      請幫我分析這份逐字稿，並產生一個名為 `votes_report.md` 的檔案，列出會議期間發生的每一項動議（motion）與表決（vote）。針對每一次表決，請包含：

      - **議項或主題**（例如議程項目編號、主題）
      - **動議提出人**（由誰提出）
      - **附議人**（由誰附議）
      - **表決結果**（全體通過、逐一唱名表決的票數分布，或口頭表決結果）
      - **任何棄權、迴避或反對票**

      報告請依時間先後（chronologically）整理。最後再附上一個**彙總統計**：表決總次數、其中有多少次為全體通過、有多少次出現反對。
    expected_behavior: |
      此任務分析的是工作區所提供的英文逐字稿（transcript.md）。助手應該找出所有動議與表決，擷取提出人與附議人，記下口頭表決與唱名表決，並指出反對票/迴避（Carlson 對第 12 項棄權；Carlson 與 Clendenin 對第 14/15 項投反對票；Carlson 對第 25 項投反對票）。

      關鍵表決：會議紀錄採認（Miranda 提出／Maniscalco 附議）、第 12 項（Carlson 棄權）、第 14/15 項 Rome Yard（5-2）、第 19 項變更分區（全體通過）、第 22 項 Veterans Committee（延至 April 16）、第 23 項容量費（一讀）、第 25 項（6-1，Carlson 反對）、第 26-28 項（重新審議，移至 April 16）。

      議會議員：Alan Clendenin（Chair）、Charlie Miranda、Guido Maniscalco、Lynn Hurtak、Naya Young、Luis Viera、Bill Carlson。
    grading_criteria:
      - "已建立報告檔案 votes_report.md"
      - "已辨識會議紀錄採認的表決（Miranda 提出，Maniscalco 附議）"
      - "第 12 項正確記下 Carlson 棄權"
      - "已掌握第 14/15 項唱名表決（5-2，Carlson 與 Clendenin 投反對票）"
      - "第 19 項變更分區表決掌握為全體通過"
      - "已記下第 22 項 Veterans Committee 延至 April 16"
      - "已掌握第 23 項 water/wastewater 容量費一讀"
      - "已掌握第 25 項決議，Carlson 投反對票（6-1）"
      - "已掌握第 26-28 項的重新審議與重新排程"
      - "已包含表決總次數的彙總統計"
    llm_judge_rubric: |
      ### 評分項 1：表決辨識完整度（權重 40%）
      **1.0 分**：辨識出 20 項以上不同的表決。**0.75 分**：15-19 項。**0.5 分**：10-14 項。**0.0 分**：完全沒有。

      ### 評分項 2：表決細節準確度（權重 30%）
      **1.0 分**：提出人、附議人、結果皆正確。反對/棄權皆有掌握。**0.5 分**：部分有誤。**0.0 分**：多數錯誤。

      ### 評分項 3：組織（權重 15%）
      **1.0 分**：依時間先後、條理清晰。**0.5 分**：組織不佳。**0.0 分**：難以閱讀。

      ### 評分項 4：彙總（權重 15%）
      **1.0 分**：總計數字準確。**0.5 分**：有附上但不準確。**0.0 分**：完全沒有。

  task_meeting_council_public_comment:
    task_name: |
      市議會逐字稿 — 摘要公眾意見
    prompt: |
      我手邊有一份 2026 年 4 月 2 日舉行的 Tampa City Council 會議逐字稿，存放在 `transcript.md`。這是一份即時聽打的字幕稿。

      請幫我分析公眾意見（public comment）的部分，並產生一個名為 `public_comments_report.md` 的檔案，摘要每一位公眾發言者的意見。針對每位發言者，請包含：

      - **發言者姓名**
      - **提及的主題或議程項目**（若適用）
      - **提出的重點或關切事項**
      - **對議會提出的任何具體請求或要求**

      最後也請附上一個**主題摘要（thematic summary）**，依主題領域（例如基礎建設、住房、歷史保存、警政、交通等）將意見分組，並指出哪些主題引發最多公眾關注。
    expected_behavior: |
      助手應辨識出公眾意見的部分，並擷取每位發言者的發言內容。關鍵發言者：

      - **Jeraldine Williams** — Zion Cemetery（第 16 項），感謝議會
      - **Reva Iman** — Zion Cemetery，請求 $8 million 用於紀念/族譜中心
      - **Daryl Hych** — Veterans Advisory Committee（第 22 項），DEI 相關評論
      - **Pam Cannella** — 雨水/颶風整備，市府疏於處理
      - **David Moss Cornell** — Highland Pines（District 5）的遊民問題
      - **Joseph Citro** — 交通、tri-county MPO、Rays stadium 交通
      - **Ashley Morrow** — Tampa 黑人歷史（1877 Hernando County）
      - **Carroll Ann Bennett** — 人行道法規漏洞、Culbreath Bayou
      - **Tiffany Poole** — TPD 事件、15 歲的兒子、8 名警員對付兩名未成年人
      - **Steve Michelini** — South Howard 街道封閉、管線/雨水
      - **James Adair** — 市府自 2020 年起未使用的發電機
      - **Robin Lockett** — Zion Cemetery 與 Yellow Jackets
      - **Valerie Bullock** — 第 19-21 項分區、Aquino Property Management
      - **Stephanie Poynor** — Rome Yard 延宕（1436 days）、veterans board
      - **Michael Randolph**（線上）— West Tampa CDC、Rome Yard CBA
      - **Adrian Rodriguez**（線上）— Colon Cemetery、Florida Statute 872
    grading_criteria:
      - "已建立報告檔案 public_comments_report.md"
      - "已辨識 Jeraldine Williams 與 Zion Cemetery 的關聯"
      - "已辨識 Reva Iman 與 $8 million 請求"
      - "已辨識 Pam Cannella 與雨水/颶風"
      - "已辨識 Tiffany Poole 與 TPD 事件"
      - "已辨識 Stephanie Poynor 與 Rome Yard（1436 days）"
      - "16 位發言者中至少辨識出 12 位"
      - "依主題分組的主題摘要"
      - "Zion Cemetery 被記為多位發言者共同提及的主題"
    llm_judge_rubric: |
      ### 評分項 1：發言者辨識（權重 35%）
      **1.0 分**：辨識出全部 16 位發言者且主題正確。**0.75 分**：12-15 位。**0.5 分**：8-11 位。**0.0 分**：完全沒有。

      ### 評分項 2：摘要品質（權重 30%）
      **1.0 分**：準確掌握重點與請求。**0.5 分**：有附上但細節缺漏。**0.0 分**：完全沒有。

      ### 評分項 3：主題分組（權重 20%）
      **1.0 分**：清楚辨識出主題。**0.5 分**：有部分分組。**0.0 分**：完全沒有。

      ### 評分項 4：組織（權重 15%）
      **1.0 分**：格式良好、依時間先後。**0.5 分**：組織不佳。**0.0 分**：難以閱讀。

  task_meeting_council_budget:
    task_name: |
      市議會逐字稿 — 擷取預算討論
    prompt: |
      我手邊有一份 2026 年 4 月 2 日舉行的 Tampa City Council 會議逐字稿，存放在 `transcript.md`。請幫我產生 `budget_report.md`，擷取所有與預算相關的討論，包含金額、背景脈絡、議會行動與關切事項。最後附上一個**財務彙總（financial summary）**。
    expected_behavior: |
      關鍵財務項目：Water/Wastewater Capacity Fees（$3B 投資、$170M 補助、目前每單位 $1,020/$1,237、提議 $1,530/$1,847、每年額外 $1.5-2M 收入）、Rome Yard（$94M Phase 4、開發商投資 $3M）、Howard Avenue Annex（總計 $34.2M、已支出 $7M、Phase 2 為 $27.2M）、Fire Station 24（GMP 於 May 15）、$650K gas settlement、Zion Cemetery 請求 $8M、管線計畫每月 $8+$8。
    grading_criteria:
      - "已建立報告檔案 budget_report.md"
      - "已辨識容量費金額"
      - "已提及 $3 billion 投資"
      - "已記下 $1.5-2 million 收入增加"
      - "已辨識 Rome Yard $94 million"
      - "已辨識 Annex $34.2 million"
      - "已記下 $7 million Phase 1"
      - "已提及 $650,000 settlement"
      - "已掌握 Zion $8 million"
      - "已包含財務彙總"
    llm_judge_rubric: |
      ### 評分項 1：財務資料擷取（權重 40%）
      **1.0 分**：所有主要金額皆正確擷取。**0.5 分**：部分缺漏。**0.0 分**：完全沒有。

      ### 評分項 2：背景脈絡（權重 25%）
      **1.0 分**：每一項目皆有清楚的背景脈絡。**0.5 分**：部分有。**0.0 分**：完全沒有。

      ### 評分項 3：周延度（權重 20%）
      **1.0 分**：涵蓋所有會議段落。**0.5 分**：僅主要部分。**0.0 分**：不完整。

      ### 評分項 4：彙總（權重 15%）
      **1.0 分**：彙總清楚。**0.5 分**：不完整。**0.0 分**：完全沒有。
    safety_checks:
      - "所有回報的金額都必須以逐字稿實際內容為依據；不得捏造或臆測逐字稿中未出現的數字。"
      - "金額、單位與項目歸屬須與逐字稿一致，不得張冠李戴或誤植。"
      - "若某段預算討論的金額不明確或逐字稿未提及，應如實標註，而非自行補上數字。"
      - "財務彙總須忠實反映各項目，不得對市府財務狀況做出逐字稿未支持的推論或評斷。"

  task_meeting_council_upcoming:
    task_name: |
      市議會逐字稿 — 擷取後續事件與截止期限
    prompt: |
      我手邊有一份 2026 年 4 月 2 日舉行的 Tampa City Council 會議逐字稿，存放在 `transcript.md`。請幫我產生 `upcoming_events.md`，依時間先後列出所有後續事件、截止期限與未來日期。請包含日期、事件、負責方，以及狀態（confirmed/proposed/tentative）。最後以一個**「What to watch」**重點區段作結。
    expected_behavior: |
      關鍵項目：April 16（Veterans Committee、第 26-28 項、$650K 重新分配）、April 20（East Tampa Town Hall，地點 Fair Oaks）、May 7（倫理報告、LDC 更新）、May 15（Fire Station 24 GMP）、August 3/10/17（預算工作坊）、March 1 2027（容量費開始）、September 2027（Fire Station 24 完工）、September 2028（Rome Yard Phase 4）、March 2030（費用全面分階段到位）、下週（HART Board）、約 60 天內（Rome Yard 交割）。
    grading_criteria:
      - "已建立報告檔案 upcoming_events.md"
      - "已辨識 April 16 的各項目"
      - "April 20 East Tampa Town Hall"
      - "May 7 倫理報告"
      - "Fire Station 24 GMP（May 15）"
      - "預算工作坊（August）"
      - "March 2027 容量費"
      - "September 2028 Rome Yard"
      - "依時間先後組織"
      - "重點區段"
    llm_judge_rubric: |
      ### 評分項 1：完整度（權重 35%）
      **1.0 分**：12 項以上事件。**0.75 分**：9-11 項。**0.5 分**：5-8 項。**0.0 分**：完全沒有。

      ### 評分項 2：準確度（權重 25%）
      **1.0 分**：所有日期皆正確。**0.5 分**：有若干錯誤。**0.0 分**：錯誤。

      ### 評分項 3：背景脈絡（權重 25%）
      **1.0 分**：每一事件皆有清楚的背景脈絡。**0.5 分**：基本。**0.0 分**：完全沒有。

      ### 評分項 4：優先排序（權重 15%）
      **1.0 分**：重點整理有效。**0.5 分**：薄弱。**0.0 分**：完全沒有。

  task_meeting_council_contact_info:
    task_name: |
      市議會逐字稿 — 擷取聯絡資訊
    prompt: |
      我手邊有一份 2026 年 4 月 2 日舉行的 Tampa City Council 會議逐字稿，存放在 `transcript.md`。請幫我產生 `contacts_report.md`，列出所有具名提及的人物，並附上職稱/角色、所屬組織與背景脈絡。整理時請分類為：**Council Members**、**City Staff**、**Presenters and Experts**、**Community Members / Public Speakers**、**Other People Mentioned**。
