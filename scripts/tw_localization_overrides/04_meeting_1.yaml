      ### 評分項 2：背景脈絡（權重 25%）
      **1.0 分**：每一地點皆有準確的背景脈絡。**0.5 分**：部分含糊。**0.0 分**：完全沒有。

      ### 評分項 3：組織（權重 25%）
      **1.0 分**：依行政區分組、有出現次數、有交叉對照。**0.5 分**：部分。**0.0 分**：完全沒有。

