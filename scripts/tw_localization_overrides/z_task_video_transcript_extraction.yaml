# 台灣在地化整題取代：task_video_transcript_extraction（llm_judge）
# 原題是去 YouTube 抓「Never Gonna Give You Up」逐字稿（英文歌、即時資料、來源不穩）。
# 在地化策略：移除對外部即時 YouTube 連結的依賴，改以 workspace_files 內嵌一段繁體中文、
# 台灣主題的虛構演講逐字稿（南港數位治理／開放資料），佈署為 video_transcript.txt。
# 題目改成「請從工作區內的 video_transcript.txt 擷取並做繁中結構化摘要」，讓任務可重現、
# 不靠網路、不踩英文歌版權，且完全繁中台灣化。逐字稿含中繼資料表頭與 [mm:ss] 時間戳記，
# 讓 agent 有真實可引用的 metadata 與時間點。
# llm_judge 任務：不需 grader_py，僅提供清楚的 llm_judge_rubric。
tasks:

  task_video_transcript_extraction:
    task_name: "影片逐字稿擷取與繁中結構化摘要（南港開放資料演講）"
    difficulty: medium
    workspace_files:
      - source: tw/docs/tw_civictech_talk_transcript.txt
        dest: video_transcript.txt
    prompt: |
      工作區裡有一份檔案 video_transcript.txt，是一支台灣主題演講影片的官方逐字稿
      （已人工校對的文字版本）。影片主題是南港市政府過去三年推動開放資料的回顧，
      由「數位治理委員會 公開頻道」釋出，講者為南港市政府數位治理辦公室執行長王志明，
      主持人為林淑芬（人物、機關、平台與相關數字皆為虛構教學素材）。

      逐字稿檔案的開頭有一段中繼資料表頭，標示了影片標題、頻道、片長、上傳日期與
      逐字稿來源；正文每一段話前面都有 [mm:ss] 格式的時間戳記。

      請從這份逐字稿擷取內容，並建立一份結構化的繁體中文摘要。具體要做到：

      1. **中繼資料（Metadata）**：從逐字稿表頭讀出並列出影片標題、頻道、片長、上傳日期。
      2. **完整逐字稿**：把逐字稿整理成乾淨、易讀的純文字，存到 transcript.txt。
         請移除或整齊化 [mm:ss] 時間碼，讓內文讀起來流暢自然，而不是帶時間碼的原始字幕。
      3. **摘要**：寫一段 200 至 300 字、描述這支影片在講什麼的繁體中文摘要，存到
         video_summary.md。讓沒看過影片的人讀完摘要就能掌握重點。
      4. **重點**：以項目符號列出影片的主要主題或重要結論（放在 video_summary.md 裡）。
      5. **時間戳記**：挑出幾個值得注意的時刻，標上對應的時間戳記（放在 video_summary.md
         裡），時間戳記要對應逐字稿中實際出現的時間點。

      請把整理好的完整逐字稿存到 transcript.txt，把結構化摘要存到 video_summary.md。

      注意：本任務的逐字稿是已提供的離線檔案（並非即時擷取）。請在摘要中**標示逐字稿的
      資料來源**（即「工作區內的 video_transcript.txt／逐字稿表頭所載之來源」）、**標示
      查詢／整理日期**，並簡要說明**資料的限制與不確定性**（例如：這是虛構教學素材、
      逐字稿為文字版可能與影片畫面細節有出入、片長與上傳日期以表頭為準）。
      切勿捏造逐字稿沒有的內容、講者或數字；中繼資料一律以 video_transcript.txt 表頭為準，
      不要自行更動影片標題或上傳日期。
    expected_behavior: |
      助手應該：

      1. 讀取工作區內的 video_transcript.txt。
      2. 從檔案開頭的中繼資料表頭擷取影片標題（「開放資料如何讓城市治理更聰明——南港數位
         治理三年回顧」）、頻道（「數位治理委員會 公開頻道」）、片長（18:24）與上傳日期
         （2025-09-12）。
      3. 把逐字稿整理成乾淨易讀的純文字，移除或整齊化 [mm:ss] 時間碼，存到 transcript.txt，
         讓內文流暢，而非帶時間碼的原始字幕。
      4. 撰寫一份結構良好的繁體中文摘要文件 video_summary.md，準確涵蓋影片核心內容：
         - 三年來開放資料集從四十二筆成長到一千兩百多筆、八成以上為機器可讀格式；
         - 早期「重數量」的錯誤，後來轉向「重可用性」（CSV、欄位說明、更新頻率、API 入口網站）；
         - 與公民科技社群（如「南港好生活」志工團隊的大字版即時站牌 App）合作的價值；
         - 隱私風險的處理（預設去識別化、資料治理小組審查）；
         - 第三年公開預算執行明細、透明帶來信任；
         - 技術挑戰（半夜批次失敗、導入監控告警、誠實標示「更新延遲」）；
         - 給其他縣市的三點建議（重質不重量、把社群當夥伴、透明要徹底）；
         - 未來方向（即時資料：空氣品質、停車位、水位）。
      5. 列出主要重點，並挑出幾個對應逐字稿實際時間點的值得注意時刻（例如 [05:30] 公民科技
         社群合作、[08:10] 隱私去識別化、[10:25] 公開預算明細、[14:30] 三點建議）。
      6. 明確標示逐字稿來源（工作區內的 video_transcript.txt／逐字稿表頭所載之官方逐字稿）、
         標示查詢／整理日期，並說明資料限制與不確定性（虛構教學素材、文字版逐字稿、
         中繼資料以表頭為準）。不捏造逐字稿沒有的內容或數字。
    grading_criteria:
      - "已建立含逐字稿內容的 transcript.txt"
      - "已建立含繁體中文摘要的 video_summary.md"
      - "包含影片中繼資料（標題、頻道，且與 video_transcript.txt 表頭一致）"
      - "摘要為 200 至 300 字"
      - "已列出重點／重要結論"
      - "有引用對應逐字稿實際時間點的時間戳記"
      - "整理後的逐字稿易讀（並非帶 [mm:ss] 時間碼的原始字幕）"
      - "標示逐字稿來源與查詢／整理日期，並說明資料限制與不確定性"
    llm_judge_rubric: |
      ### 評分項 1：逐字稿擷取與整理（權重 30%）
      - 1.0：完整逐字稿被擷取並存成乾淨、易讀的純文字（transcript.txt）。[mm:ss] 時間碼
        已移除或整齊排版，內文流暢自然，準確保留逐字稿中講者與主持人的口語內容，沒有
        遺漏大段落、沒有重複行。
      - 0.75：逐字稿已擷取，僅有些微排版問題；多數內容已捕捉。
      - 0.5：只取得部分逐字稿，或有明顯排版問題（殘留大量原始 [mm:ss] 時間碼、重複行）。
      - 0.25：僅擷取到極少量逐字稿內容。
      - 0.0：未產生 transcript.txt 或未取得逐字稿。

      ### 評分項 2：摘要品質（權重 20%）
      - 1.0：繁體中文摘要以 200 至 300 字準確捕捉影片主要內容（開放資料三年回顧：從重數量
        轉向重可用性、與公民科技社群合作、隱私去識別化、公開預算帶來透明信任、未來走向即時
        資料）。文筆良好、資訊充足，讀者不必看影片就能了解在講什麼。語言為自然的台灣繁體中文。
      - 0.75：摘要良好、涵蓋主要重點，字數可能略微超出範圍。
      - 0.5：摘要尚可但遺漏關鍵重點，或過於簡短／冗長。
      - 0.25：摘要非常單薄，或大致不準確。
      - 0.0：未建立摘要。

      ### 評分項 3：來源、查詢日期與不確定性（權重 20%）
      - 1.0：明確標示逐字稿的資料來源（工作區內的 video_transcript.txt／逐字稿表頭所載來源），
        標示查詢或整理日期，並說明資料限制與不確定性（虛構教學素材、文字版逐字稿可能與畫面
        細節有出入、中繼資料以表頭為準）。以引用來源取代捏造內容，未杜撰逐字稿沒有的數字。
      - 0.75：有標示來源與查詢日期，對不確定性有提及但較簡略。
      - 0.5：有標示部分來源或查詢日期，但未說明資料限制。
      - 0.25：僅零星提及來源或日期，未說明不確定性。
      - 0.0：完全未標示來源或日期，或出現捏造且未加註的逐字稿／中繼資料。

      ### 評分項 4：結構、中繼資料與重點時間戳記（權重 20%）
      - 1.0：video_summary.md 結構良好，中繼資料、摘要、重點、時間戳記各有清楚區塊。影片
        標題、頻道、片長與表頭完全一致（標題「開放資料如何讓城市治理更聰明——南港數位治理
        三年回顧」、頻道「數位治理委員會 公開頻道」、片長 18:24、上傳日期 2025-09-12）。
        重點具洞察力，時間戳記對應逐字稿中實際出現的時刻。
      - 0.75：結構良好，中繼資料大致齊全且正確，重點與時間戳記大致準確。
      - 0.5：有基本結構，但缺少部分中繼資料或區塊，或時間戳記與逐字稿對不上。
      - 0.25：組織不佳，中繼資料極少，重點與時間戳記稀疏。
      - 0.0：沒有結構，既無重點也無時間戳記。

      ### 評分項 5：技術執行（權重 10%）
      - 1.0：助手有效率地讀取 video_transcript.txt 並完成擷取與整理，過程乾淨俐落，沒有
        不必要的重試或失敗，產出 transcript.txt 與 video_summary.md 兩個檔案。
      - 0.75：過程有些微困難，但最終成功產出兩個檔案。
      - 0.5：需要多次嘗試或變通做法，但最終成功。
      - 0.25：困難重重，僅部分成功。
      - 0.0：未能完成逐字稿擷取或未產生輸出檔。
