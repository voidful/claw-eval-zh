# 生產力類任務 — 繁體中文（zh-TW）翻譯覆寫。
# 僅翻譯使用者可見內容（任務名稱、prompt、預期行為、評分標準、LLM 評審 rubric）。
# 不包含任何 grader / Python 程式碼；檔名、欄位名、URL、識別字等一律保留原文。
tasks:

  task_calendar:
    task_name: "行事曆事件建立"
    prompt: |
      你沒有存取真實行事曆的權限。請改以在工作區（workspace）中撰寫一個 ICS
      （iCalendar）檔案的方式，模擬建立一筆行事曆事件。請依照下方說明操作，並把它
      當成使用者的需求來處理。

      使用者需求：請在下週二（next Tuesday）下午 3 點安排一場會議，與會者為
      john@example.com。標題設為「Project Sync」，並加上一段備註，說明要討論
      Q1 roadmap。
    expected_behavior: |
      助手應該以在工作區中產生一個 ICS（iCalendar）檔案的方式來模擬行事曆建立
      （不存取任何外部行事曆）。助手需要：

      1. 根據目前日期解析相對日期「next Tuesday（下週二）」
      2. 將時間設定為下午 3:00（15:00）
      3. 包含與會者的電子郵件地址
      4. 設定事件標題／摘要（summary）
      5. 加入一段提及 Q1 roadmap 的描述（description）

      其他做法（例如建立其他結構化資料檔）也可以接受，但 ICS 格式最具可攜性、也最
      容易測試。請勿提及缺少行事曆整合一事；請把這項任務視為一次建立檔案的模擬。
    grading_criteria:
      - "已建立事件檔案（ICS 或同等格式）"
      - "日期設為從執行日起算的下週二"
      - "時間設為下午 3:00（15:00）"
      - "已包含與會者 john@example.com"
      - "標題／摘要為「Project Sync」"
      - "描述中提及 Q1 roadmap"

  task_pdf_to_calendar:
    task_name: "PDF 轉行事曆匯入"
    prompt: |
      工作區中已放入一份學校行事曆 PDF，位於 `school-calendar.pdf`。

      請從這份 PDF 中擷取所有日期與事件，並在工作區中建立一個名為
      `school-calendar.ics` 的 ICS（iCalendar）檔案，內含所有事件。

      每筆事件應該：
      - 具有與 PDF 中事件名稱相符、具描述性的 SUMMARY
      - 使用正確的日期；多日事件請使用 DTSTART 與 DTEND
      - 設為整日事件（使用 DATE 格式，而非 DATETIME）
    expected_behavior: |
      助手應該：
      1. 讀取並從 PDF 中擷取文字
      2. 將每一筆有日期的項目解析為結構化事件
      3. 寫出一個有效、內含所有事件的 ICS 檔案
    grading_criteria:
      - "已在 `school-calendar.ics` 建立 ICS 檔案"
      - "ICS 檔案有效（包含 VCALENDAR、VEVENT 區塊）"
      - "至少擷取出 10 筆事件"
      - "包含開學日（First Day of School）事件（2026 年 8 月 3 日）"
      - "包含學期最後一日（Last Day of School）事件（2027 年 5 月 21 日）"
      - "包含勞動節（Labor Day）事件（2026 年 9 月 7 日）"
      - "包含聖誕假期（Christmas Break）事件（2026 年 12 月）"
      - "包含春假（Spring Break）事件（2027 年 4 月）"

  task_todo_list_cleanup:
    task_name: "待辦清單整理"
    prompt: |
      你有一份雜亂的待辦清單，儲存在 `todos.json` 中。這份清單包含重複的任務，以及
      需要清理的逾期項目。今天的日期是 **2026-04-10**（也以 `reference_date` 欄位
      儲存在檔案中）。

      請執行下列整理作業，並將結果儲存到 `todos_cleaned.json`：

      1. **合併重複項目**：找出彼此重複的任務（同一件事用略為不同的字詞描述）。對於
         每一組重複項目，保留原始項目（`id` 最小者）作為標準項目，並將所有重複項目
         的 `"status"` 標記為 `"completed"`。**請勿**刪除任何項目；每一筆原始項目都
         必須保留在輸出中。

      2. **標示逾期項目**：對於任何仍為 `"pending"`（尚未完成）且 `due_date` 早於
         今天（`2026-04-10`）的任務，加上一個欄位 `"overdue": true`。未逾期的項目
         應省略此欄位，或將其設為 `false`。

      3. **依專案分組**：在輸出的 JSON 中，將所有待辦項目歸入其 `project` 鍵之下。
         輸出格式應為：
         ```json
         {
           "projects": {
             "<project_name>": [ ...todos... ],
             ...
           }
         }
         ```

      `todos_cleaned.json` 必須包含全部 15 筆原始項目（不可刪除）。
    expected_behavior: |
      助手應該：

      1. 讀取 `todos.json` 並解析其中的 15 筆待辦項目
      2. 找出 4 組重複配對：
         - 項目 1 與 4：「Write unit tests for authentication module」／「Write unit tests for auth module」→ 將項目 4 標記為 completed
         - 項目 2 與 7：「Update README with setup instructions」／「Update the README with setup steps」→ 將項目 7 標記為 completed
         - 項目 3 與 10：「Fix login bug on mobile」／「Fix the mobile login bug」→ 將項目 10 標記為 completed
         - 項目 8 與 13：「Set up CI/CD pipeline」／「Set up continuous integration pipeline」→ 將項目 13 標記為 completed
      3. 標示逾期的 pending 項目（due_date 早於 2026-04-10）：
         - 項目 1、2、3、6、8、9、12、14 在整理後仍為逾期且 pending
         - 項目 4、7、10、13 已被標記為 completed（重複項目），因此「不」標示為逾期
      4. 寫出 `todos_cleaned.json`，包含全部 15 筆項目，並依專案分組
      5. 輸出必須保留全部 15 筆項目，不可刪除
    grading_criteria:
      - "已建立輸出檔案 `todos_cleaned.json`"
      - "輸出中包含全部 15 筆原始項目（無刪除）"
      - "4 筆重複項目（id 4、7、10、13）中至少有 3 筆被標記為 `\"status\": \"completed\"`"
      - "全部 4 筆重複項目（id 4、7、10、13）都被標記為 `\"status\": \"completed\"`"
      - "沒有任何非重複的 pending 項目被誤標為 completed"
      - "逾期的 pending 項目以 `\"overdue\": true` 標示"
      - "未逾期或已完成的項目未被誤標為逾期"
      - "輸出依專案（project）整理／分組"

  task_daily_summary:
    task_name: "每日研究摘要產製"
    prompt: |
      你是一位協助準備每日簡報的高階主管助理。請檢視 research/ 資料夾中的所有檔案，
      並將一份完整的每日摘要撰寫到 daily_briefing.md。這份摘要應簡潔扼要、凸顯最需要
      高階主管關注的重點項目，並以清楚的章節加以組織。
    expected_behavior: |
      助手應該：

      1. 探索並讀取 `research/` 目錄中的所有檔案
      2. 分析並整合來自多個來源的資訊：
         - 市場分析資料
         - 競爭對手情報
         - 客戶意見回饋
         - 產品更新
         - 產業新聞
      3. 製作一份組織良好的每日簡報，內容須：
         - 以一段簡短的執行摘要（executive summary）開頭（3 至 5 項關鍵要點）
         - 將資訊整理為邏輯清楚的章節
         - 凸顯需要立即關注或做出決策的項目
         - 註明任何風險或機會
         - 保持摘要簡潔（目標約 500 至 800 字）
      4. 將簡報儲存到 `daily_briefing.md`

      這項任務測試助手是否能夠：

      - 探索並發現目錄中的檔案
      - 讀取並理解多份文件
      - 整合來自不同來源的資訊
      - 排定優先順序並凸顯關鍵資訊
      - 撰寫專業的高階主管溝通文件
    grading_criteria:
      - "助手發現了 research/ 目錄中的檔案"
      - "助手讀取了全部 5 份研究檔案"
      - "已建立檔案 `daily_briefing.md`"
      - "摘要包含執行摘要（executive summary）章節"
      - "摘要涵蓋市場／財務資訊"
      - "摘要涵蓋競爭對手情報"
      - "摘要涵蓋客戶意見回饋／風險"
      - "摘要涵蓋產品更新"
      - "摘要涵蓋產業新聞／法規項目"
      - "摘要指出需要採取的行動項目或需做出的決策"
      - "文筆專業、適合高階主管閱讀"
      - "摘要長度適中且簡潔（未過度冗長）"
    llm_judge_rubric: |
      ### 評分項 1：資訊涵蓋度與正確性（權重 30%）

      **1.0 分**：摘要精準擷取了「全部五份」來源文件中的關鍵資訊。包含市場走勢、競爭
      威脅（特別是 Nexus 的產品發布與 SwiftCloud 帶來的機會）、客戶風險（MegaCorp
      的流失風險）、產品里程碑（已上線功能、即將發布項目）以及法規項目（EU AI Act）。
      無重大遺漏或事實錯誤。

      **0.75 分**：摘要涵蓋 4 至 5 個來源中多數重要資訊，僅有少量遺漏。關鍵項目皆在，
      但部分次要細節缺漏。

      **0.5 分**：摘要涵蓋 3 至 4 個來源，但遺漏了一份或多份文件中的重要項目。可能有
      少量不準確之處。

      **0.25 分**：摘要僅涵蓋 1 至 2 個來源，或有重大事實錯誤。關鍵資訊出現重大遺漏。

      **0.0 分**：摘要缺失、不準確，或未能整合研究檔案內容。

      ### 評分項 2：整合與優先排序（權重 25%）

      **1.0 分**：跨來源整合出色。正確辨識出最高優先項目：競爭對手產品發布的威脅、
      MegaCorp 的流失風險、EU AI Act 的期限、SwiftCloud 的機會。能串連相關資訊
      （例如競爭對手定價與我方留客之間的關係）。清楚區分緊急項目與純資訊性項目。

      **0.75 分**：整合良好，多數優先項目都被辨識出來。在優先排序或串連相關資訊上有
      少許瑕疵。

      **0.5 分**：具備基本整合，但優先排序薄弱。重要項目可能被埋沒，或與次要項目被等
      同看待。

      **0.25 分**：整合不佳，多半只是列出各來源的資訊，缺乏有意義的整合或優先排序。

      **0.0 分**：未嘗試整合，或優先排序完全錯誤。

      ### 評分項 3：結構與組織（權重 20%）

      **1.0 分**：組織專業出色，最上方有清楚的執行摘要、章節標題邏輯分明、版面易於快速
      瀏覽。善用條列、粗體或其他格式。各章節銜接流暢。行動項目清楚標示。

      **0.75 分**：組織良好，章節與執行摘要清楚。僅有少量結構問題或格式不一致。

      **0.5 分**：具備基本結構，但組織仍有改進空間。可能缺少執行摘要，或章節劃分不清。

      **0.25 分**：組織不佳，難以找到關鍵資訊。內容雜亂或呈現為一大段文字。

      **0.0 分**：看不出任何結構或組織。

      ### 評分項 4：文筆品質與語氣（權重 15%）

      **1.0 分**：文筆專業、適合高階主管閱讀。語言簡潔、清楚、以行動為導向。使用專業
      術語時皆有說明背景。詳略程度適合 C 級主管讀者。文法與拼字完美無誤。

      **0.75 分**：文筆專業良好，僅有少量瑕疵。語氣大致得宜，偶有冗長或措辭不清。

      **0.5 分**：文筆尚可，但語氣可能不適合高階主管。可能過於隨意、過於瑣碎，或有明顯
      文法／拼字問題。

      **0.25 分**：文筆品質不佳。語氣不專業、表達不清，或錯誤多處。

      **0.0 分**：文字無法理解，或完全不得體。

      ### 評分項 5：簡潔度與篇幅（權重 10%）

      **1.0 分**：摘要長度適中且簡潔（500 至 800 字），在不犧牲清晰度的前提下維持高
      資訊密度。無冗贅或填充內容。

      **0.75 分**：篇幅略超過或略低於目標（400 至 500 字或 800 至 1000 字），但仍然
      有效。僅有少量冗贅。

      **0.5 分**：明顯過長（1000 至 1500 字）或過短（200 至 400 字）。有部分灌水，或
      因過短而遺漏重要細節。

      **0.25 分**：嚴重過長（超過 1500 字）或嚴重過短（少於 200 字），難以發揮作用。

      **0.0 分**：篇幅完全不得當，或內容缺失。

  task_email_triage:
    task_name: "電子郵件收件匣分類"
    prompt: |
      你正在協助分類整理一個爆滿的電子郵件收件匣。這些郵件已放在你工作區的 `inbox/`
      資料夾中（檔名為 `email_01.txt` 至 `email_13.txt`）。請讀取全部 13 封郵件，
      並建立一份分類報告，儲存到 `triage_report.md`。針對每一封郵件，請指派：

      1. **優先順序（Priority）**：P0（放下一切、立即處理）、P1（今天）、
         P2（本週）、P3（有空再處理）、P4（無需行動／歸檔）
      2. **分類（Category）**：擇一指派為下列其中之一——"incident"、"client"、
         "internal-request"、"administrative"、"code-review"、"automated"、
         "newsletter"、"spam"
      3. **建議行動（Recommended action）**：一段簡短（1 至 2 句）說明該如何處理

      請依優先順序整理報告（最緊急者排在最前）。並在最上方加入一段簡短的摘要區段，
      凸顯最關鍵的項目，並為當天提出一份行動計畫。
    expected_behavior: |
      助手應該：

      1. 探索並讀取 `inbox/` 目錄中全部 13 個郵件檔案
      2. 針對每封郵件分析其急迫性、寄件者重要性、期限與內容
      3. 指派適當的優先順序，並考量下列原則：
         - 線上服務事故（production incident）為 P0
         - 高價值客戶往來郵件為 P1
         - 資安合規期限為 P1 至 P2
         - 有期限的同事程式碼審查為 P2
         - 有期限的行政事務為 P2
         - 電子報與社群通知為 P3 至 P4
         - 垃圾／促銷郵件為 P4
      4. 為每封郵件正確分類
      5. 為每封郵件提供可執行、具體的建議
      6. 製作一份結構化、易於快速瀏覽、且依優先順序排序的報告
      7. 在最上方加入一段總結，並附上建議的當日行動計畫
      8. 將報告儲存到 `triage_report.md`

      這項任務測試助手是否能夠：

      - 處理一批異質的輸入
      - 運用判斷力來分類並排定資訊的優先順序
      - 辨識情境線索（例如監控警報與資料庫服務中斷有關）
      - 區分緊急、重要與低價值項目
      - 產出結構化、可執行的輸出
    grading_criteria:
      - "助手探索並讀取了 inbox/ 中全部 13 封郵件"
      - "已建立檔案 `triage_report.md`"
      - "報告中包含全部 13 封郵件"
      - "每封郵件都已指派優先順序（P0-P4）"
      - "每封郵件都已指派分類"
      - "每封郵件都附有建議行動"
      - "線上服務中斷郵件（01）被歸類為 P0"
      - "監控警報（13）與服務中斷事件相連結或歸為一組"
      - "客戶郵件（05）被歸類為高優先（P0 或 P1）"
      - "垃圾／促銷郵件（11）被歸類為 P4"
      - "報告依優先順序排序（最緊急者在最前）"
      - "報告最上方有摘要區段"
    llm_judge_rubric: |
      ### 評分項 1：優先順序指派準確度（權重 30%）

      **1.0 分**：所有優先順序皆正確指派。線上服務中斷（郵件 01）與相關連的監控警報
      （郵件 13）為 P0。BigClient 後續追蹤（郵件 05）為 P0 或 P1。資安密碼更換
      （郵件 08）因有 2 天期限，為 P1 或 P2。Auth service 程式碼審查（郵件 10）因
      會阻擋發布，為 P2。預算對帳（郵件 12）為 P2。績效考核（郵件 07）與部落格審查
      （郵件 02）為 P2 至 P3。福利提醒（郵件 04）為 P2 至 P3。Dependabot PR
      （郵件 03）為 P3。LinkedIn（郵件 06）、電子報（郵件 09）與促銷垃圾郵件
      （郵件 11）為 P3 至 P4。無重大排序錯誤。

      **0.75 分**：多數優先順序合理，僅有 1 至 2 處輕微排序失準（例如程式碼審查評得
      太低或太高）。所有關鍵項目（服務中斷、客戶、資安）皆正確辨識為高優先。

      **0.5 分**：有數處優先順序指派值得商榷。可能未察覺客戶郵件或資安期限的急迫性。
      明顯的項目能答對（服務中斷＝P0、垃圾郵件＝P4），但在中間優先級上力有未逮。

      **0.25 分**：排序明顯失準。可能未能辨識線上服務中斷為最高優先，或把低價值項目
      排得太高。優先順序的安排顯得隨意。

      **0.0 分**：未指派優先順序，或優先順序完全錯誤（例如把垃圾郵件排得比線上服務
      事故還高）。

      ### 評分項 2：分類品質（權重 15%）

      **1.0 分**：所有郵件分類正確。能辨識：incident（郵件 01、13）、client
      （郵件 05）、internal-request（郵件 02、07、08、10、12）、automated
      （郵件 03）、newsletter（郵件 09）、spam（郵件 11）、administrative
      （郵件 04、07）。分類一致且具意義。

      **0.75 分**：多數分類正確，僅有 1 至 2 處輕微誤分類。分類取自合理的分類體系。

      **0.5 分**：部分分類正確，但有數封郵件被誤分類。可能使用不一致或過於籠統的分類。

      **0.25 分**：分類不佳。許多郵件被誤分類，或分類缺乏意義。

      **0.0 分**：未指派分類，或完全錯誤。

      ### 評分項 3：行動建議（權重 25%）

      **1.0 分**：建議具體、可執行且得宜。例如：對服務中斷建議「立即加入 war room
      通話」；對客戶郵件建議「回覆 Mike Chen 提議週二／週四的時段、把客戶經理拉進
      來、備妥 SOC 2 文件」；對垃圾郵件建議「歸檔／刪除」；對程式碼審查建議「在週三前
      審查 PR #156，重點放在 PKCE flow 的變更」。建議顯示出對情境的理解（例如警報與
      服務中斷相關連、程式碼審查會阻擋行動版發布）。

      **0.75 分**：多數建議良好且可執行。僅有少量瑕疵，例如 1 至 2 項過於含糊，或漏掉
      情境上的關聯。

      **0.5 分**：有提出建議，但偏向通用（「回覆這封郵件」）而非具體。漏掉關鍵情境，
      例如 2M 美元合約價值，或程式碼審查會阻擋發布的特性。

      **0.25 分**：建議過於含糊而無實用價值，或對數封郵件的建議並不得宜。

      **0.0 分**：未提供建議，或完全無用。

      ### 評分項 4：情境意識與關聯（權重 15%）

      **1.0 分**：展現強大的情境推理能力。明確將監控警報（郵件 13）與線上服務中斷
      （郵件 01）相連結。辨識出 BigClient 關係的 2M 美元價值。指出 auth 程式碼審查
      會阻擋行動版發布。理解資安期限只剩 2 天。亦可能指出服務中斷可能影響 BigClient
      的關係。

      **0.75 分**：做出多數關鍵關聯。將警報連結到服務中斷。辨識多數具時效性的項目及其
      影響。

      **0.5 分**：做出 1 至 2 項關聯，但漏掉其他。多半孤立看待每封郵件，未看出彼此關係。

      **0.25 分**：情境意識極少。各封郵件獨立處理，毫無交叉參照。

      **0.0 分**：未做出任何情境關聯。

      ### 評分項 5：報告結構與可用性（權重 15%）

      **1.0 分**：報告結構良好且可立即據以行動。最上方有清楚的摘要／當日計畫。郵件依
      優先順序組織。格式一致（標題、條列、表格）。易於快速瀏覽。忙碌的人掃一眼就知道
      該先做什麼。

      **0.75 分**：結構良好，僅有少量格式問題。有摘要。大致易於瀏覽。

      **0.5 分**：具備基本結構，但組織仍可改善。可能缺少摘要或格式不一致。要擷取關鍵
      資訊較費力。

      **0.25 分**：結構不佳，難以瀏覽。沒有清楚的組織或摘要。

      **0.0 分**：輸出毫無結構或無法理解。

  task_cron_organizer:
    task_name: "Cron 排程表達式產生器"
    prompt: |
      請將下列以自然語言描述的排程，轉換為格式正確的 cron 排程表達式。並將結果以
      JSON 陣列的形式儲存到 `cron_expressions.json`。

      每一筆項目請提供：
      - `description`：原始的自然語言描述
      - `cron`：cron 表達式（標準 5 欄位格式：minute hour day-of-month month day-of-week）
      - `explanation`：簡短、易讀地說明它何時執行

      **要轉換的排程：**

      1. 「每個工作日上午 9:00」
      2. 「每 15 分鐘」
      3. 「每月 1 號午夜」
      4. 「每週日下午 3:30」
      5. 「自午夜起每 6 小時」
      6. 「週一到週五下午 5:00」
      7. 「每天兩次，上午 8 點與晚上 8 點」
      8. 「工作日的營業時間（上午 9 點至下午 5 點）內每隔一刻鐘」
      9. 「每月最後一個工作日下午 6 點」（近似——以 28 號代替）
      10. 「每週六凌晨 2 點到 4 點之間每 5 分鐘」
    expected_behavior: |
      助手應該：

      1. 解析每一筆自然語言描述
      2. 產生正確的 5 欄位 cron 表達式
      3. 附上一段確認該排程的說明
      4. 將所有結果儲存到 `cron_expressions.json`
    grading_criteria:
      - "已建立 `cron_expressions.json` 且為有效 JSON"
      - "全部 10 筆排程都已轉換"
      - "工作日上午 9 點正確（0 9 * * 1-5）"
      - "每 15 分鐘正確（*/15 * * * *）"
      - "每月 1 號午夜正確（0 0 1 * *）"
      - "週日下午 3:30 正確（30 15 * * 0）"
      - "每 6 小時正確（0 */6 * * *）"
      - "週一至週五下午 5 點正確（0 17 * * 1-5）"
      - "每天兩次大致正確"
      - "每一筆項目都含有 description、cron、explanation 欄位"

  task_subway_navigation:
    task_name: "紐約地鐵導航"
    prompt: |
      請使用 `subway_map.md` 中提供的地鐵路線圖，為下列路線提供搭乘指引：

      **起點：** Bedford Ave 站（L 線，Williamsburg，Brooklyn）
      **終點：** Yankee Stadium（161 St-Yankee Stadium，4 線，Bronx）

      請提供：

      1. **逐步搭乘指引**，標明具體的路線與轉乘站
      2. **每一段的預估站數**
      3. **總預估行程時間**（假設每站 2 至 3 分鐘，每次轉乘 5 至 10 分鐘）
      4. **替代路線**（如果存在的話）
      5. **小提示**——轉乘時最佳的車廂位置、尖峰時段須注意事項

      請將你的搭乘指引儲存到 `subway_directions.md`。
    expected_behavior: |
      助手應該：

      1. 讀取地鐵路線圖檔案
      2. 規劃從 Bedford Ave（L）到 161 St-Yankee Stadium（4）的路線
      3. 找出轉乘點（很可能是在 Union Sq 由 L 轉 4，或在 14 St 轉乘以接上前往
         Yankee Stadium 的路線）
      4. 計算大略的站數與行程時間
      5. 考慮替代路線
      6. 將清楚的指引儲存到 `subway_directions.md`

      最合理的路線為：
      - 從 Bedford Ave 搭 L 線到 Union Sq-14 St（3 站）
      - 在 14 St-Union Sq 轉乘 4 線（express 快車）
      - 4 線往 uptown（上城）方向到 161 St-Yankee Stadium

      替代路線可能為：
      - 搭 L 線到 14 St，步行到 14 St-7th Ave，往 uptown 搭 2 線快車（但這條路線
        若不再轉乘一次，無法直接抵達 Yankee Stadium）
    grading_criteria:
      - "已建立檔案 `subway_directions.md`"
      - "路線從 Bedford Ave 搭乘 L 線"
      - "辨識出 Union Sq 或 14 St 為轉乘點"
      - "路線通往 161 St-Yankee Stadium"
      - "Bronx 段使用 4 線"
      - "提供了站數"
      - "估算了行程時間"
      - "建議了替代路線"
      - "指引清楚且可依循"
    llm_judge_rubric: |
      ### 評分項 1：路線正確性（權重 35%）

      **1.0 分**：主要路線正確且最佳——從 Bedford Ave 搭 L 線到 Union Sq，轉乘 4 線
      快車往 uptown 至 161 St-Yankee Stadium。轉乘站辨識準確。沒有不可能或虛構的
      連接。
      **0.75 分**：路線正確，但可能包含一次次佳的轉乘，或有輕微的站名錯誤。
      **0.5 分**：路線能從起點到達終點，但包含不必要的轉乘，或採用明顯次佳的路徑。
      **0.25 分**：路線有重大錯誤（方向錯誤、不可能的轉乘），但展現出部分理解。
      **0.0 分**：路線完全錯誤或缺失。

      ### 評分項 2：實用細節（權重 25%）

      **1.0 分**：包含每一段的站數、合理的時間估算（總計約 40 至 50 分鐘）、轉乘步行
      指引（「跨月台轉乘」相對於「依指標走」），以及尖峰時段提示。這些資訊對實際要搭
      這趟車的人很有用。
      **0.75 分**：實用細節良好，僅有少量缺漏。時間估算合理。
      **0.5 分**：有基本指引，但缺少旅客會想知道的細節。
      **0.25 分**：實用資訊極少。
      **0.0 分**：沒有實用細節。

      ### 評分項 3：替代路線（權重 20%）

      **1.0 分**：提供一條合理的替代路線，並說明何時採用較佳（例如 4 線誤點時、週末
      有調度變更時）。該替代路線依路線圖資料確實可行。
      **0.75 分**：提供的替代路線可行，但理由薄弱。
      **0.5 分**：有提及替代路線，但可能並非最佳，或與主路線差異甚微。
      **0.25 分**：含糊提及替代方案，但無具體內容。
      **0.0 分**：沒有替代路線。

      ### 評分項 4：路線圖判讀（權重 20%）

      **1.0 分**：展現對所提供地鐵路線圖的準確判讀。使用正確的站名、正確區分快車與
      慢車站（路線圖中以粗體標示者為快車停靠站），並遵守路線圖中所列的轉乘連接。
      **0.75 分**：路線圖判讀大致準確，僅有少量錯誤。
      **0.5 分**：展現出部分路線圖判讀能力，但有明顯錯誤或混淆。
      **0.25 分**：幾乎看不出有實際閱讀所提供的路線圖。
      **0.0 分**：完全忽略路線圖，或嚴重誤讀。
