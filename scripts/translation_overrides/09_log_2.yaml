    expected_behavior: |
      助手應辨識出：

      **系統開機（偵測到 3 次）：**
      1. 6 月 9 日 約 06:06 — 完整開機（syslogd、klogd、kernel、irqbalance、portmap 等）
      2. 6 月 10 日 約 11:32 — 完整開機（相同的服務順序）
      3. 7 月 27 日 約 14:42 — 另一次開機事件

      **服務清單（20+ 個帶啟動事件的服務）：**
      - 核心：syslogd、klogd、irqbalance、portmap
      - 網路：rpc.statd、rpc.idmapd、sendmail、sm-client、named
      - 安全：spamd、privoxy
      - 硬體：bluetooth（hcid、sdpd）、smartd、apmd、gpm
      - 列印：cupsd（17 次啟動！）
      - 排程：crond、anacron、xinetd
      - 網頁：htt

      **CUPS 型態：**
      - cupsd 有 17 次啟動事件與 15 次關閉事件
      - 規律的每週型態：清晨（04:0x）關閉後接著啟動
      - 這與 logrotate 觸發 CUPS 重啟的情況相符

      **服務相依性（開機順序）：**
      1. syslogd、klogd（先記錄日誌）
      2. kernel 訊息
      3. irqbalance、portmap（系統服務）
      4. 網路服務（rpc、named）
      5. 應用程式服務（cups、cron、sendmail）

      可接受的差異：
      - 開機偵測的做法可能不同
      - 服務分類帶有主觀性
      - 運作時間計算為概略值
    grading_criteria:
      - "已在工作區建立 `service_status_report.md`"
      - "辨識出系統開機事件（至少找到 2 次開機）"
      - "列出服務及其啟動/停止事件"
      - "記下 CUPS 的頻繁重啟（17 次啟動）"
      - "分析服務啟動順序"

  task_log_syslog_cron:
    task_name: "Linux Syslog — Cron 排程任務執行分析"
    prompt: |
      請分析位於 `syslog.log` 的 Linux syslog，產出一份關於 cron 排程任務活動的報告。尋找
      crond、anacron、logrotate，以及任何其他排程執行的證據。

      你的報告應包含：

      1. **Cron 服務狀態（Cron Service Status）**：crond 在何時啟動？共有幾次啟動事件？
      2. **Anacron 活動（Anacron Activity）**：記錄所有 anacron 啟動事件及其時點
      3. **Logrotate 活動（Logrotate Activity）**：找出 logrotate 的執行，以及它們影響哪些服務
      4. **su 工作階段型態（su Session Patterns）**：`su(pam_unix)` 條目常代表 cron 以不同
         使用者身分執行任務 — 分析這些型態
      5. **排程任務時間軸（Scheduled Task Timeline）**：建立一條涵蓋所有排程/週期性活動的時間軸
      6. **重複型態（Recurring Patterns）**：找出排程執行中的任何規律型態（每日、每週）

      請將報告寫入 `cron_analysis.md`，以結構良好的 markdown 文件呈現。
    expected_behavior: |
      助手應辨識出：

      **Cron/Anacron 啟動：**
      - crond 啟動：6 月 9 日 06:06:49、6 月 10 日 11:32:10、7 月 27 日 14:42:23（3 次事件，與系統開機對齊）
      - anacron 啟動：6 月 9 日 06:06:51、6 月 10 日 11:32:12、7 月 27 日 14:42:25（緊接 crond 之後）

      **Logrotate 活動：**
      - 日誌中有 97 筆 logrotate 條目
      - logrotate 觸發服務重啟（尤其是 CUPS）
      - 週期性執行 — 可能透過 anacron/cron 每日執行

      **su(pam_unix) 型態：**
      - 394 筆 su 工作階段條目
      - 為下列使用者開啟工作階段：htt、cyrus、news
      - 型態：「session opened for user X by (uid=0)」→「session closed for user X」
      - 這些是以特定服務使用者身分執行的 cron 任務

      **主要的排程使用者：**
      - htt（網頁伺服器）— 規律的 su 工作階段
      - cyrus（郵件）— 規律的 su 工作階段
      - news — 週期性工作階段

      **重複型態：**
      - 每日：logrotate 執行、服務使用者的 su 工作階段
      - 開機時：crond → anacron 啟動序列
      - 每週：CUPS 重啟型態（關閉 + 啟動）

      可接受的差異：
      - 型態偵測的做法可能不同
      - 時間軸的粒度可能不同
      - 部分排程型態需從 su 工作階段資料推論
    grading_criteria:
      - "已在工作區建立 `cron_analysis.md`"
      - "記錄 crond 與 anacron 的啟動事件"
      - "辨識出 logrotate 活動（97 筆條目）"
      - "將 su(pam_unix) 工作階段連結至排程任務"
      - "辨識出重複型態（每日、開機時等）"

  task_log_syslog_auth_failures:
    task_name: "Linux Syslog — 驗證失敗摘要"
    prompt: |
      請分析位於 `syslog.log` 的 Linux syslog，產出一份所有驗證失敗的完整摘要。此日誌
      含有來自多個服務的 PAM 驗證事件。

      你的報告應包含：

      1. **驗證失敗總數（Total Auth Failures）**：統計跨所有服務的所有驗證失敗條目
      2. **依服務分類的失敗（Failures by Service）**：依服務（sshd、ftpd、login、su 等）拆解失敗
      3. **依來源分類的失敗（Failures by Source）**：產生最多失敗的前 10 個來源主機/IP
      4. **被鎖定的使用者（Targeted Users）**：哪些使用者帳號在失敗的驗證嘗試中被鎖定？
      5. **時間性分布（Temporal Distribution）**：多數驗證失敗發生在何時？是否有突增（spike）？
      6. **FTP 與 SSH 分析（FTP vs SSH Analysis）**：比較 FTP 與 SSH 的驗證攻擊型態 — 是否為
         相同來源同時攻擊兩者？
      7. **建議（Recommendations）**：依失敗型態，提出具體的安全改進建議

      請將報告寫入 `auth_failures_report.md`，以結構良好的 markdown 文件呈現。
    expected_behavior: |
      助手應解析約 2000+ 筆與 PAM 相關的條目並產出：

      **驗證失敗總數：**
      - 超過 2000 筆與驗證相關的 PAM 條目
      - 主要來源：sshd(pam_unix)（約 1610 筆）、ftpd 連線（約 1655 筆）

      **依服務分類的失敗：**
      - sshd(pam_unix) — 驗證失敗訊息的主要來源
      - ftpd — 大量連線（ftpd 記錄連線，不一定都是明確的失敗）
      - su(pam_unix) — 394 筆（多為合法 — cron 的工作階段開啟/關閉）
      - login(pam_unix) — 14 筆
      - klogind — 46 筆（Kerberos login daemon）

      **依來源分類的失敗：**
      - SSH 攻擊來自各種遠端主機（pam 條目中的 rhost=）
      - FTP 連線集中於特定 IP（例如 209.184.7.130）
      - 部分主機同時出現在 SSH 與 FTP 的失敗日誌中

      **被鎖定的使用者：**
      - root — SSH 暴力破解的主要目標
      - 透過 SSH 嘗試各種無效使用者名稱

      **時間性分布：**
      - 日誌涵蓋 6 月 9 日到 9 月 14 日
      - 特定日期可見攻擊突增
      - SSH 暴力破解傾向在時間上集中

      可接受的差異：
      - 確切計數取決於如何定義「驗證失敗」
      - FTP 條目可能被歸類為驗證失敗，也可能不被歸類
      - 時間性分析的粒度可能不同
    grading_criteria:
      - "已在工作區建立 `auth_failures_report.md`"
      - "統計驗證失敗（2000+ 筆與 pam 相關的條目）"
      - "依服務拆解失敗（sshd、ftpd、su 等）"
      - "列出主要的來源主機"
      - "提供安全改進建議"
