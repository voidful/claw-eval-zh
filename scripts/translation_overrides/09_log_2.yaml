# 日誌分析類任務（第二批）— 繁體中文（zh-TW）翻譯覆寫。
# 僅翻譯使用者可見內容（任務名稱、prompt、預期行為、評分標準）。
# 本批 15 個任務皆為 hybrid 評分，但原始 .md 僅含 ## Automated Checks（Python），
# 並無 ## LLM Judge Rubric 區段，故均不含 llm_judge_rubric。
# 不包含任何 grader / Python 程式碼；日誌檔名、輸出報告檔名、IP、區塊 ID、工作 ID、
# 主機名、服務名（sshd、cron、systemd…）、使用者名、時間戳、識別字、shell 指令、
# 環境變數、HDFS/MapReduce 技術詞彙、確切的必填輸出字串一律保留原文。
# 所有數字、計數、ID、日期一律與原文完全相同，不更動。
tasks:

  task_log_ssh_unusual_times:
    task_name: "SSH 驗證日誌 — 異常時段登入偵測"
    prompt: |
      請分析位於 `auth.log` 的 OpenSSH 驗證日誌，找出發生在異常時段的登入活動。
      假設正常上班時間為伺服器本地時間 08:00–18:00。

      你的報告應包含：

      1. **每小時分布（Hourly Distribution）**：每個小時的驗證事件計數
      2. **非上班時段活動（Off-Hours Activity）**：所有發生在 08:00 之前或 18:00 之後的驗證事件
      3. **清晨分析（Early Morning Analysis）**：詳細拆解 06:00–08:00 之間的事件（日誌中最早的時段）
      4. **成功登入時點（Successful Logins Timing）**：成功登入發生在什麼時候？是否在上班時間內？
      5. **攻擊時點型態（Attack Timing Patterns）**：攻擊者是否偏好特定時段？是否有規律？
      6. **時間性風險評估（Temporal Risk Assessment）**：依時點型態判斷，哪些時段應最密切監控？

      請將報告寫入 `unusual_hours_report.md`，以結構良好的 markdown 文件呈現。
    expected_behavior: |
      助手應解析日誌並產出：

      **每小時分布：**
      - 06:xx — 7 筆（日誌從 06:55 開始）
      - 07:xx — 169 筆
      - 08:xx — 118 筆
      - 09:xx — 676 筆（尖峰小時）
      - 10:xx — 530 筆（日誌於 10:59 結束）

      **非上班時段活動：**
      - 08:00 之前有 7 筆（在 06:55–06:56）
      - 所有 08:00 之前的條目皆為攻擊流量（登入失敗、BREAK-IN 警告）

      **成功登入時點：**
      - 使用者 fztu 於 09:32:20 登入 — 在上班時間內

      **攻擊時點型態：**
      - 攻擊量從 07:xx 到 09:xx 急遽升高
      - 尖峰攻擊量出現在 09:xx，共 676 筆
      - 這可能代表攻擊者位於另一個時區，當地 09:00（LabSZ 時間）正是其工作時段
      - 清晨的條目（06:55）代表一波攻擊行動的尾聲或起點

      可接受的差異：
      - 「異常時段」的定義可能不同
      - 時區假設可能不同
      - 評估用語會有所不同
    grading_criteria:
      - "已在工作區建立 `unusual_hours_report.md`"
      - "提供事件的每小時分布"
      - "另行標示出非上班時段（08:00 之前）的事件"
      - "記下成功登入的時點（09:32:20，在上班時間內）"
      - "分析攻擊時點型態"

  task_log_hdfs_failures:
    task_name: "HDFS DataNode 日誌 — 區塊與複製失敗分析"
    prompt: |
      請分析位於 `hdfs_datanode.log` 的 HDFS DataNode 日誌，找出任何區塊（block）操作
      失敗、複製（replication）問題或錯誤狀況。此日誌來自一個 HDFS 叢集，內含 DataNode、
      FSNamesystem 與 PacketResponder 的條目。

      你的報告應包含：

      1. **日誌總覽（Log Overview）**：總條目數、日期/時間範圍、日誌級別分布（INFO、WARN、ERROR）
      2. **區塊操作摘要（Block Operation Summary）**：區塊接收、配置、已儲存區塊確認與複製的計數
      3. **錯誤與警告分析（Error and Warning Analysis）**：列出任何 WARN 或 ERROR 級別的條目及其細節
      4. **複製活動（Replication Activity）**：詳列所有複製請求 — 哪些區塊正在被複製，從何處複製到何處？
      5. **失敗或未完成的操作（Failed or Incomplete Operations）**：是否有區塊開始接收但從未記錄確認？
      6. **健康狀態評估（Health Assessment）**：依日誌判斷，此 HDFS 叢集是否運作正常？

      請將報告寫入 `hdfs_failure_report.md`，以結構良好的 markdown 文件呈現。
    expected_behavior: |
      助手應解析 2000 筆日誌條目並產出：

      **日誌總覽：**
      - 2000 筆條目，全部來自 2008 年 11 月 9 日（081109），涵蓋約 28 秒（203518–203546）
      - 所有條目皆為 INFO 級別 — 無 WARN 或 ERROR 條目

      **區塊操作：**
      - Receiving block：約 1149 筆
      - Allocate block：約 385 筆
      - Received block（已確認）：約 19 筆
      - addStoredBlock：約 19 筆
      - PacketResponder：約 12 筆
      - 複製請求：4 筆

      **複製細節：**
      - 區塊 blk_-1608999687919862906 有 4 筆複製請求：
        - 10.250.14.224 → 10.251.215.16
        - 10.251.215.16 → 10.251.74.79
        - 10.251.107.19 → 10.251.31.5
        - 10.251.31.5 → 10.251.90.64

      **健康狀態評估：**
      - 無任何錯誤或警告 — 叢集看似健康
      - 大量「Receiving block」條目（1149）卻只有相對少量的確認（19），顯示高度併發（concurrency）
      - 單一區塊跨多個節點的複製活動是正常的 HDFS 行為

      可接受的差異：
      - 確切計數可能因解析方式而略有不同
      - 評估用語會有所不同
      - 將狀況描述為「無失敗」或「可能有未完成操作」皆屬有效
    grading_criteria:
      - "已在工作區建立 `hdfs_failure_report.md`"
      - "提供含條目數與時間範圍的日誌總覽"
      - "將區塊操作分類並計數（接收、配置、複製）"
      - "記下沒有 WARN/ERROR 條目（或詳述任何發現的條目）"
      - "提供健康狀態評估"

  task_log_hdfs_connections:
    task_name: "HDFS DataNode 日誌 — 連線型態分析"
    prompt: |
      請分析位於 `hdfs_datanode.log` 的 HDFS DataNode 日誌，產出一份關於節點之間連線與
      通訊型態的報告。此日誌包含 DataNode、FSNamesystem 與 PacketResponder 元件的條目。

      你的報告應包含：

      1. **網路拓撲（Network Topology）**：列出日誌中出現的所有不重複 IP 位址，並依其角色
         分類（來源、目的地，或兩者皆是）
      2. **子網分析（Subnet Analysis）**：依子網（subnet）將 IP 分組（例如 10.250.x.x 與
         10.251.x.x）。每個子網有多少節點？
      3. **最活躍的節點（Most Active Nodes）**：依出現頻率（作為來源或目的地）排名前 10 的 IP
      4. **通訊型態（Communication Patterns）**：哪些節點對之間通訊最頻繁？
      5. **DataNode 與 NameSystem**：將活動拆分 — 哪些來自 DataNode 操作、哪些來自
         FSNamesystem 操作？
      6. **叢集規模推估（Cluster Size Estimate）**：依觀察到的 IP，推估叢集規模

      請將報告寫入 `hdfs_connections_report.md`，以結構良好的 markdown 文件呈現。
    expected_behavior: |
      助手應解析 2000 筆日誌條目並產出：

      **網路拓撲：**
      - 觀察到 202 個不重複 IP 位址
      - IP 落在 10.250.x.x 與 10.251.x.x 範圍（私有網路）
      - 所有節點皆使用通訊埠 50010（HDFS DataNode 資料傳輸埠）

      **子網分析：**
      - 10.250.x.x 子網 — 包含部分最活躍的節點
      - 10.251.x.x 子網 — 包含其他 DataNode 叢集成員
      - 此分割顯示這是多機架（multi-rack）的 HDFS 佈署

      **最活躍的節點：**
      - 10.250.19.102 — 極為活躍（在許多區塊傳輸中作為來源出現）
      - 10.250.10.6、10.251.215.16、10.250.14.224 — 也相當活躍

      **元件活動：**
      - DataNode$DataXceiver：區塊接收操作（約 1149 筆）
      - FSNamesystem：區塊配置與儲存追蹤（約 400+ 筆）
      - DataNode$PacketResponder：附帶大小的區塊接收確認

      可接受的差異：
      - 確切的 IP 計數與排名可能因解析方式而異
      - 子網分組的粒度可能不同
      - 叢集規模推估將為概略值
    grading_criteria:
      - "已在工作區建立 `hdfs_connections_report.md`"
      - "列出或計數不重複 IP（約 202）"
      - "依子網將 IP 分組（10.250.x.x 與 10.251.x.x）"
      - "辨識出最活躍的節點"
      - "區分 DataNode 與 FSNamesystem 的活動"

  task_log_hdfs_slow_ops:
    task_name: "HDFS DataNode 日誌 — 慢速操作偵測"
    prompt: |
      請分析位於 `hdfs_datanode.log` 的 HDFS DataNode 日誌，找出耗時超出預期的操作。此
      日誌記錄了帶有時間戳的區塊接收、配置與複製。

      你的報告應包含：

      1. **區塊生命週期時序（Block Lifecycle Timing）**：對於同時有「Receiving block」與
         「Received block」條目的區塊，計算經過時間
      2. **配置到接收時序（Allocation-to-Receive Timing）**：對於同時有「allocateBlock」與
         第一筆「Receiving block」條目的區塊，計算延遲
      3. **複製時序（Replication Timing）**：複製請求在區塊配置後多快發出？
      4. **最慢的操作（Slowest Operations）**：依經過時間排名前 5 慢的區塊操作
      5. **區塊大小與時間的相關性（Block Size vs Time Correlation）**：較大的區塊是否耗時較長？
         在兩者皆可取得時，將區塊大小與傳輸時間相關聯
      6. **效能總結（Performance Summary）**：對此期間叢集效能的整體評估

      請將報告寫入 `hdfs_slow_ops_report.md`，以結構良好的 markdown 文件呈現。
    expected_behavior: |
      助手應從 `YYMMDD HHMMSS` 日誌格式解析時間戳並計算：

      **區塊生命週期：**
      - 此日誌僅涵蓋約 28 秒（203518 到 203546）
      - 多數區塊操作在 1-3 秒內完成
      - 已確認且附大小的區塊接收：91178 bytes、233217 bytes、11971 bytes、11977 bytes

      **重點觀察：**
      - blk_-1608999687919862906（91178 bytes）：於 203518 配置、203518 首次接收、203519 確認（約 1 秒）
      - blk_7503483334202473044（233217 bytes）：於 203520 配置、203521 確認（約 1 秒）
      - blk_-3544583377289625738（11971 bytes）：於 203522-203523 確認
      - 區塊操作非常快速 — 與健康叢集在正常負載下的表現相符

      **複製：**
      - blk_-1608999687919862906 有 4 筆複製請求，分別於 203521、203524、203527、203530 發出
      - 各複製躍程（hop）之間約間隔 3 秒

      **效能：**
      - 所有操作皆在 1-3 秒內完成 — 未偵測到慢速操作
      - 此快照期間叢集表現良好

      可接受的差異：
      - 時間戳解析度為 1 秒，故部分時序分析將為概略值
      - 配對開始/結束事件的不同做法皆屬有效
      - 區塊大小相關性分析可能因資料不足而無法得出有意義結論
    grading_criteria:
      - "已在工作區建立 `hdfs_slow_ops_report.md`"
      - "至少為一個區塊計算其生命週期時序"
      - "在有資料時將區塊大小與操作時間相關聯"
      - "正確辨識日誌的時間範圍（約 28 秒）"
      - "提供效能評估"

  task_log_hdfs_block_ops:
    task_name: "HDFS DataNode 日誌 — 區塊操作摘要"
    prompt: |
      請分析位於 `hdfs_datanode.log` 的 HDFS DataNode 日誌，產出一份所有區塊操作的完整
      摘要。此日誌來自一個 HDFS 叢集，追蹤區塊生命週期事件。

      你的報告應包含：

      1. **區塊清單（Block Inventory）**：日誌中不重複區塊 ID 的總數，並附完整清單
      2. **操作類型（Operation Types）**：針對每種操作類型（allocateBlock、Receiving、
         Received、addStoredBlock、replicate、PacketResponder）計算總出現次數
      3. **區塊生命週期追蹤（Block Lifecycle Tracking）**：對於每個具有完整生命週期
         （allocate → receive → stored）的區塊，記錄完整的事件鏈
      4. **複製鏈（Replication Chain）**：對於有複製事件的區塊，追蹤其跨節點的複製路徑
      5. **相關工作（Associated Jobs）**：辨識觸發這些區塊操作的 MapReduce 工作（可從檔案路徑看出）
      6. **逐區塊明細表（Per-Block Detail Table）**：建立一張表格，欄位包含：Block ID、
         Size（如已知）、Allocated Path、Nodes Involved、Replication Count

      請將報告寫入 `hdfs_block_ops_report.md`，以結構良好的 markdown 文件呈現。
    expected_behavior: |
      助手應解析 2000 筆日誌條目並產出：

      **區塊清單：**
      - 約 390 個不重複區塊 ID

      **操作計數：**
      - Receiving block：約 1149
      - allocateBlock：約 385
      - Received block：約 19
      - addStoredBlock：約 19
      - PacketResponder：約 12
      - Replicate：4

      **完整區塊生命週期（資料完整的區塊）：**
      - blk_-1608999687919862906：91178 bytes，為 job_200811092030_0001/job.jar 配置
      - blk_7503483334202473044：233217 bytes，為 job_200811092030_0001/job.split 配置
      - blk_-3544583377289625738：11971 bytes
      - blk_-9073992586687739851：11977 bytes

      **複製鏈：**
      - blk_-1608999687919862906 在叢集中被複製 4 次：
        10.250.14.224 → 10.251.215.16 → 10.251.74.79 → 10.251.31.5 → 10.251.90.64

      **相關工作：**
      - job_200811092030_0001 — MapReduce 工作，檔案：job.jar、job.split

      可接受的差異：
      - 區塊 ID 清單可能被截斷
      - 不需要對全部 390 個區塊提供完整明細 — 僅需具完整生命週期資料者
      - 表格格式可能不同
    grading_criteria:
      - "已在工作區建立 `hdfs_block_ops_report.md`"
      - "提供不重複區塊計數（約 390）"
      - "計數各操作類型（receiving、allocate、replicate 等）"
      - "至少完整追蹤一個區塊的生命週期（allocate → receive → stored）"
      - "辨識出相關的 MapReduce 工作（job_200811092030_0001）"

  task_log_hdfs_storage:
    task_name: "HDFS DataNode 日誌 — 儲存與容量分析"
    prompt: |
      請分析位於 `hdfs_datanode.log` 的 HDFS DataNode 日誌，產出一份以儲存（storage）為
      重點的分析。檢視區塊大小、跨節點的資料分布，以及儲存型態。

      你的報告應包含：

      1. **資料量（Data Volume）**：所有已確認區塊接收（大小已知者）所儲存的總位元組數
      2. **區塊大小分布（Block Size Distribution）**：列出所有已知區塊大小，計算最小/最大/平均/中位數
      3. **依節點的資料分布（Data Distribution by Node）**：對每個確認接收區塊的節點
         （PacketResponder「Received」條目），統計其儲存的位元組總數
      4. **儲存路徑分析（Storage Path Analysis）**：使用了哪些儲存路徑？（從 allocateBlock 的檔案路徑擷取）
      5. **複製係數（Replication Factor）**：依同一區塊被多少節點接收，推算有效複製係數為何？
      6. **容量規劃（Capacity Planning）**：依觀察到的資料寫入速率，推估 1 小時類似活動所需的儲存空間

      請將報告寫入 `hdfs_storage_report.md`，以結構良好的 markdown 文件呈現。
    expected_behavior: |
      助手應解析日誌並計算：

      **已確認的區塊大小：**
      - blk_-1608999687919862906：91,178 bytes（被 3+ 個節點接收）
      - blk_7503483334202473044：233,217 bytes（被 3 個節點接收）
      - blk_-3544583377289625738：11,971 bytes（被 3 個節點接收）
      - blk_-9073992586687739851：11,977 bytes（被 3 個節點接收）

      **區塊大小統計：**
      - 最小：11,971 bytes（約 12 KB）
      - 最大：233,217 bytes（約 228 KB）
      - 平均：約 87,086 bytes（約 85 KB）
      - 已確認資料總量：每個副本約 348,343 bytes

      **複製係數：**
      - 每個已確認區塊皆被 3 個節點接收 → 複製係數為 3
      - 這是標準的 HDFS 預設複製設定

      **儲存路徑：**
      - `/mnt/hadoop/mapred/system/job_200811092030_0001/` — MapReduce 工作的暫存目錄
      - 檔案：job.jar、job.split

      **容量規劃：**
      - 約 28 秒的活動產生了約 390 筆區塊配置
      - 若每個區塊平均約 85 KB、複製係數為 3，則約為每分鐘 100 MB 的原始儲存
      - 1 小時推估：約 6 GB（概略）

      可接受的差異：
      - 在已確認大小有限的情況下，容量推估將相當粗略
      - 外推（extrapolation）的做法會有所不同
      - 統計應僅以已確認大小為基礎
    grading_criteria:
      - "已在工作區建立 `hdfs_storage_report.md`"
      - "列出已知的區塊大小（91178、233217、11971、11977）"
      - "計算區塊大小統計（最小、最大、平均）"
      - "辨識出複製係數（3）"
      - "從日誌擷取儲存路徑"

  task_log_mapreduce_jobs:
    task_name: "MapReduce 日誌 — 工作完成摘要"
    prompt: |
      請分析位於 `mapreduce.log` 的 Hadoop MapReduce 應用程式日誌，產出一份完整的工作
