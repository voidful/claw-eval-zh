  task_log_mapreduce_failures:
    task_name: "MapReduce 日誌 — 失敗任務分析"
    prompt: |
      請分析位於 `mapreduce.log` 的 Hadoop MapReduce 應用程式日誌，找出任何任務失敗、
      錯誤或異常。聚焦於執行期間出錯的任何狀況。

      你的報告應包含：

      1. **錯誤與警告條目（Error and Warning Entries）**：列出所有 WARN 與 ERROR 級別的日誌條目及完整脈絡
      2. **任務重試（Task Retries）**：找出任何需要多次嘗試的任務（尋找嘗試編號 > 0 者）
      3. **根因分析（Root Cause Analysis）**：針對每個錯誤，說明可能的成因
      4. **I/O 錯誤（I/O Errors）**：詳述任何 IOException 或網路相關的失敗
      5. **影響評估（Impact Assessment）**：是否有任何失敗影響了整體工作結果？
      6. **失敗預防（Failure Prevention）**：建議可避免這些失敗在未來重現的變更

      請將報告寫入 `mapreduce_failures.md`，以結構良好的 markdown 文件呈現。
    expected_behavior: |
      助手應辨識出：

      **WARN 條目（共 4 筆）：**
      1. ResponseProcessor，針對區塊 BP-1347369012-10.190.173.170-1444972147527:blk_1073742514_1708 — 與 I/O 問題相關
      2. DataStreamer，針對檔案 /tmp/hadoop-yarn/staging/msrabi/.staging/job_1445062781478_0011/job — 寫入管線（pipeline）問題
      3. CommitterEvent Processor — FileOutputCommitter 復原任務計數問題

      **ERROR 條目（共 1 筆）：**
      1. java.io.IOException: Bad response ERROR for block BP-1347369012-10.190.173.170-1444972147527:blk_1073742514_1708 from datanode — 區塊寫入期間的 I/O 錯誤

      **任務重試：**
      - attempt_1445062781478_0011_m_000006_1（m_000006_0 的重試）
      - attempt_1445062781478_0011_m_000007_1（m_000007_0 的重試）
      - 兩個 map 任務需要第二次嘗試，顯示為暫時性（transient）失敗

      **根因：**
      - IOException 與 WARN 條目皆與 HDFS 區塊寫入失敗有關
      - 某個 DataNode 對區塊 blk_1073742514_1708 回傳「Bad response ERROR」
      - 這是暫時性的 HDFS I/O 錯誤，可能由 DataNode 暫時無法使用或過載所致

      **影響：**
      - 儘管出現錯誤，整體工作仍 SUCCEEDED
      - YARN 的重試機制透明地處理了這些暫時性失敗
      - 10 個 map 任務中有 2 個需要重試 — 重試率 20%

      可接受的差異：
      - 根因分析的深度可能不同
      - 預防建議會有所不同
      - 部分助手可能找出錯誤周邊的額外脈絡
    grading_criteria:
      - "已在工作區建立 `mapreduce_failures.md`"
      - "列出 WARN 與 ERROR 條目（4 筆 WARN、1 筆 ERROR）"
      - "辨識出任務重試（m_000006 與 m_000007 重試）"
      - "分析 IOException / bad response 錯誤"
      - "影響評估中記下工作仍然成功"

  task_log_mapreduce_slow_tasks:
    task_name: "MapReduce 日誌 — 慢速任務辨識"
    prompt: |
      請分析位於 `mapreduce.log` 的 Hadoop MapReduce 應用程式日誌，找出最慢的 map 與
      reduce 任務。比較各任務的完成時間以找出落後者（straggler）。

      你的報告應包含：

      1. **任務完成時間（Task Completion Times）**：對每個已完成的任務，計算從容器（container）
         指派到任務完成的時間
      2. **最快與最慢（Fastest vs Slowest）**：辨識最快與最慢的 map 任務，以及 reduce 任務的時序
      3. **落後者分析（Straggler Analysis）**：是否有任務明顯比平均耗時更長？量化其偏差
      4. **重試影響（Retry Impact）**：對於被重試的任務（attempt > 0），重試時間與原始嘗試相比如何？
      5. **Reduce 階段時序（Reduce Phase Timing）**：reduce 任務相對於各 map 完成是在何時開始？耗時多久？
      6. **瓶頸辨識（Bottleneck Identification）**：關鍵路徑（critical path）為何？哪些任務決定了整體工作時長？

      請將報告寫入 `slow_tasks_report.md`，以結構良好的 markdown 文件呈現。
    expected_behavior: |
      助手應擷取任務完成時間戳並計算：

      **Map 任務完成（依順序）：**
      1. m_000009：完成於 15:39:24（最先）
      2. m_000005：完成於 15:40:28
      3. m_000003：完成於 15:40:32
      4. m_000000：完成於 15:40:34
      5. m_000001：完成於 15:40:50
      6. m_000002：完成於 15:40:50
      7. m_000004：完成於 15:40:50
      8. m_000008：完成於 15:40:52
      9. m_000007：完成於 15:41:12（重試 — _1 次嘗試）
      10. m_000006：完成於 15:41:25（重試 — _1 次嘗試，最慢/最後）

      **Reduce 任務：**
      - r_000000：完成於 15:42:46

      **重點發現：**
      - m_000009 最先完成於 15:39:24 — 工作開始後約 1.5 分鐘
      - m_000006 最後完成於 15:41:25 — 工作開始後約 3.5 分鐘（它是重試）
      - 被重試的任務（m_000006、m_000007）最慢，因為必須重新啟動
      - 首個與最後 map 之間的時間跨度：約 2 分鐘
      - reduce 在足夠多的 map 完成後才開始，約 1.3 分鐘後結束

      可接受的差異：
      - 確切時長取決於以哪個時間戳作為開始基準
