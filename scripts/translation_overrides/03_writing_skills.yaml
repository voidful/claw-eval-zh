# 寫作與技能類任務 — 繁體中文（Traditional Chinese, zh-TW）。
# 僅翻譯使用者可見內容（任務名稱、prompt、預期行為、評分標準、LLM 評審 rubric）。
# 不包含任何 grader / Python 程式碼；檔名、目錄名、CSV 欄位、URL、API 端點、
# Python 識別字、shell 指令、環境變數、必須完全相符的輸出字串、套件／函式庫／
# 模型／廠商／品牌名稱皆保留原文；數字與日期維持不變。
tasks:

  task_blog:
    task_name: "部落格文章撰寫"
    prompt: |
      請撰寫一篇約 500 字、主題為「遠端工作對軟體開發者的好處」的部落格文章，並儲存到
      blog_post.md。

      注意：本任務要求以英文撰寫，請以英文輸出這篇部落格文章；以上中文僅為說明。
    expected_behavior: |
      助手應該：

      1. 撰寫一篇結構完整的部落格文章，包含開頭（introduction）、主體（body）與結尾
         （conclusion）
      2. 聚焦於對軟體開發者而言特別有意義的好處
      3. 目標字數約為 500 字（400～600 字皆可接受）
      4. 使用正確的 markdown 排版
      5. 將內容儲存到名為 `blog_post.md` 的檔案

      這篇文章應該引人入勝、具資訊性，且文筆專業。內容須涵蓋多項好處，並提供理由
      或範例。
    grading_criteria:
      - "已建立檔案 `blog_post.md`"
      - "內容約為 500 字（400～600 字範圍）"
      - "文章結構清楚（開頭、主體、結尾）"
      - "內容聚焦於對軟體開發者的好處"
      - "文筆清楚且引人入勝"
      - "使用正確的 markdown 排版"
      - "涵蓋多項不同的好處"
      - "為各項主張提供理由或範例"
    llm_judge_rubric: |
      ### 評分項 1：內容品質與相關性（權重 30%）

      **1.0 分**：內容與軟體開發者高度相關，涵蓋 4 項以上不同的好處，並附有清楚的
      理由、範例或佐證。資訊正確且具洞見。

      **0.75 分**：內容相關，涵蓋 3～4 項好處，並提供良好的理由。在深度或範例上有
      小幅不足。

      **0.5 分**：內容切題，但僅涵蓋 2～3 項好處。雖有提供部分理由，但深度不足，或對
      軟體開發者的針對性不夠。

      **0.25 分**：內容空泛，或僅膚淺地涵蓋 1～2 項好處。對軟體開發者的相關性有限。

      **0.0 分**：內容離題、缺漏，或完全未談及遠端工作的好處。

      ### 評分項 2：結構與組織（權重 25%）

      **1.0 分**：結構優異，開頭清楚、主體段落組織良好、結尾有力。各論點之間銜接合乎
      邏輯。妥善運用標題與 markdown 排版。

      **0.75 分**：結構良好，具備開頭、主體與結尾。有些微組織上的問題。markdown 排版
      尚可。

      **0.5 分**：具備基本結構，但有明顯的組織問題。段落銜接薄弱或脈絡不清。markdown
      排版極少。

      **0.25 分**：結構不佳。缺少關鍵段落（開頭或結尾）。內容雜亂無章。

      **0.0 分**：無可辨識的結構。內容混亂或缺漏。

      ### 評分項 3：文筆品質（權重 20%）

      **1.0 分**：文筆優異，行文清楚、引人入勝。語氣專業。無明顯文法或拼字錯誤。句型
      富於變化。

      **0.75 分**：文筆品質良好，僅有小瑕疵。整體清楚且專業。文法錯誤甚少。

      **0.5 分**：文筆尚可，但在清晰度、語氣或文法上有明顯問題。有些用語生硬。

      **0.25 分**：文筆品質不佳。多處文法錯誤、用語不清，或語氣不夠專業。

      **0.0 分**：文筆無法理解或缺漏。

      ### 評分項 4：字數符合度（權重 15%）

      **1.0 分**：字數為 450～550 字（在目標的 10% 內）。

      **0.75 分**：字數為 400～600 字（在目標的 20% 內）。

      **0.5 分**：字數為 300～400 或 600～700 字（偏離目標 20～40%）。

      **0.25 分**：字數為 200～300 或 700～800 字（偏離目標 40～60%）。

      **0.0 分**：字數低於 200 或超過 800 字，或內容缺漏。

      ### 評分項 5：任務完成度（權重 10%）

      **1.0 分**：建立的檔案名稱正確（blog_post.md），內含完整的部落格文章，所有需求
      皆達成。

      **0.75 分**：已建立檔案，但檔名有小瑕疵，或漏掉一項小需求。

      **0.5 分**：已建立檔案，但漏掉多項需求或有重大問題。

      **0.25 分**：已建立檔案，但內容不完整或嚴重不足。

      **0.0 分**：未建立檔案，或檔案為空／無法使用。

  task_email:
    task_name: "專業電子郵件撰寫"
    prompt: |
      請撰寫一封專業的電子郵件，因行程衝突而婉拒一項會議邀請，並儲存到 email_draft.txt。

      注意：本任務要求以英文撰寫，請以英文輸出這封電子郵件；以上中文僅為說明。
    expected_behavior: |
      助手應該：

      1. 撰寫一封結構恰當的專業電子郵件
      2. 包含關鍵要素：問候語、說明、婉拒、替代方案／致歉、結尾
      3. 維持有禮且專業的語氣
      4. 內容簡潔但完整
      5. 儲存到名為 `email_draft.txt` 的檔案

      這封郵件應該在明確婉拒的同時，兼顧維繫正向的專業關係。
    grading_criteria:
      - "已建立檔案 `email_draft.txt`"
      - "郵件結構恰當（問候語、主體、結尾）"
      - "清楚婉拒會議邀請"
      - "提供理由（行程衝突）"
      - "維持專業且有禮的語氣"
      - "提供替代方案或表達願意改期"
      - "包含恰當的結尾"
      - "篇幅適中（不過於簡短，也不過於冗長）"
    llm_judge_rubric: |
      ### 評分項 1：專業語氣與禮貌（權重 30%）

      **1.0 分**：語氣始終專業、有禮且周到。對婉拒一事表達恰如其分的歉意。聚焦於維繫
      正向關係。沒有過於隨意或過於僵硬的措辭。

      **0.75 分**：整體專業有禮，僅有小幅語氣問題。略嫌隨意或略嫌正式，但仍屬恰當。

      **0.5 分**：專業度尚可，但有明顯的語氣問題。可能過於唐突、過度致歉，或前後不一。

      **0.25 分**：語氣不佳。過於隨意、無禮，或過分正式。缺乏禮貌。

      **0.0 分**：完全不專業，或內容缺漏。

      ### 評分項 2：完整性與清晰度（權重 25%）

      **1.0 分**：郵件清楚婉拒會議、提供理由（行程衝突），並提出替代方案（改期、改約
      其他時間，或其他解法）。訊息明確無歧義。

      **0.75 分**：郵件清楚婉拒並附有理由。可能缺乏強而有力的替代方案，但意圖清楚。

      **0.5 分**：郵件有婉拒，但在理由或替代方案上不夠清楚。訊息可能略有歧義。

      **0.25 分**：郵件對是否婉拒交代不清，或缺少關鍵要素（理由或任何替代方案）。

      **0.0 分**：郵件未能婉拒會議，或完全不清楚。

      ### 評分項 3：結構與格式（權重 20%）

      **1.0 分**：郵件結構完美，具備問候語（Dear/Hi [Name]）、清楚的主體段落，以及
      專業的結尾（Best regards、Sincerely 等）並附署名行。組織良好。

      **0.75 分**：結構良好，所有關鍵要素皆具備。僅有小幅格式問題。

      **0.5 分**：具備基本結構，但缺少要素（例如沒有問候語或結尾），或組織不佳。

      **0.25 分**：結構不佳。多項要素缺漏，或組織極為混亂。

      **0.0 分**：無可辨識的郵件結構，或內容缺漏。

      ### 評分項 4：簡潔度與適切性（權重 15%）

      **1.0 分**：郵件長度適中且簡潔（3～6 句或 50～150 字）。傳達所有必要資訊，既不
      贅述也不過於精簡。

      **0.75 分**：長度良好（2～3 句或 6～8 句）。略嫌冗長或略嫌精簡，但仍有效。

      **0.5 分**：過於簡短（1～2 句）或過長（超過 200 字）。仍可運作，但非最佳。

      **0.25 分**：極為簡短（僅一句）或過分冗長（超過 300 字）。拿捏不佳。

      **0.0 分**：長度完全不恰當，或內容缺漏。

      ### 評分項 5：任務完成度（權重 10%）

      **1.0 分**：建立的檔案名稱正確（email_draft.txt），內含完整郵件，所有需求皆
      達成。

      **0.75 分**：已建立檔案，雖有小瑕疵但大致完整。

      **0.5 分**：已建立檔案，但漏掉重要需求。

      **0.25 分**：已建立檔案，但內容嚴重不足。

      **0.0 分**：未建立檔案，或檔案為空。

  task_email_reply_drafting:
    task_name: "從未讀收件匣撰寫郵件回覆"
    prompt: |
      你在 `inbox/` 資料夾中有 5 封未讀郵件（`unread_01` 到 `unread_05`）。

      請閱讀所有未讀訊息，並為需要回覆的郵件撰寫回覆草稿。將你的輸出儲存到
      `reply_drafts.md`。

      注意：郵件原文為英文，回覆草稿請保留原文語言（以英文撰寫）；以下需求說明僅以
      中文呈現。

      需求：

      1. 只為需要回覆的郵件撰寫回覆草稿（不要為價值不高的電子報撰寫回覆）。
      2. 每一份回覆草稿都要包含：
         - 來源郵件的檔名
         - 主旨行（使用 `Re:` 格式）
         - 專業、貼合情境的內文
      3. 依各情境調整語氣與急迫性（客戶升級事件應展現急迫與當責；內部請求可以簡潔
         處理）。
      4. 若你沒有足夠資訊可完全解決某件事，請坦白說明，並提供明確的後續步驟或時間
         表。
      5. 每份回覆都要簡潔但完整。
    expected_behavior: |
      助手應該檢視全部 5 封郵件，並判斷哪些需要採取行動。助手應該略過電子報，並為以下
      具營運相關性的訊息撰寫回覆草稿：

      - 廠商安全問卷提醒
      - 客戶針對匯出失敗的升級事件
      - 內部審閱請求
      - 合作夥伴會議改期

      優秀的回覆應依情境而有所不同：

      - **客戶升級事件**：立即承擔當責、致歉、給出明確的下次更新時間，以及（如有）暫時
        替代方案的途徑。
      - **廠商截止期限**：確認收到、提出承諾，或附上具體日期／時間的延期請求。
      - **內部請求**：簡短確認，並附上實際可行的完成時間。
      - **合作夥伴排程**：接受時間，或反向提出明確的時間。

      輸出檔案 `reply_drafts.md` 應該易於瀏覽，並清楚區分各份草稿，例如為每封來源郵件
      加上標題。
    grading_criteria:
      - "已建立檔案 `reply_drafts.md`"
      - "全部 5 封未讀郵件皆已檢視"
      - "已為需要回覆的郵件（01、02、03、05）撰寫回覆草稿"
      - "未為電子報郵件（04）撰寫不必要的草稿"
      - "每份草稿皆包含來源檔名與 `Re:` 主旨"
      - "語氣貼合情境與急迫性"
      - "客戶升級事件的回覆展現當責與近期可行的後續步驟"
      - "廠商／合作夥伴的回覆包含具體的排程或時間承諾"
      - "草稿簡潔、專業且具可執行性"
    llm_judge_rubric: |
      ### 評分項 1：涵蓋度與篩選（權重 25%）

      **1.0 分**：檢視全部 5 封郵件，為 01/02/03/05 撰寫回覆草稿，並正確地不為電子報
      （04）撰寫回覆。

      **0.75 分**：正確撰寫了大部分必要回覆，僅有一處小幅篩選失誤（例如納入了電子報，
      或漏掉一封必要回覆）。

      **0.5 分**：涵蓋不完整，有多處遺漏或撰寫了不必要的草稿。

      **0.25 分**：涵蓋極少；對哪些郵件需要回覆有重大誤解。

      **0.0 分**：未產出有意義的回覆集。

      ### 評分項 2：回覆品質與專業度（權重 25%）

      **1.0 分**：草稿精煉、專業、簡潔，且針對各收件者量身打造。語氣與結構符合郵件
      情境。

      **0.75 分**：整體專業文筆良好，僅有小幅語氣／清晰度問題。

      **0.5 分**：可理解，但語氣空泛或參差不齊；部分草稿顯得不專業或生硬。

      **0.25 分**：草稿撰寫不佳，有明顯的專業度問題。

      **0.0 分**：草稿無法使用或缺漏。

      ### 評分項 3：急迫性處理與當責（權重 25%）

      **1.0 分**：升級事件的回覆清楚承認影響、承擔當責，並給出明確的下次更新時間或立即
      行動途徑；對時效敏感的郵件以明確承諾妥善處理。

      **0.75 分**：認知到急迫性，承諾大致清楚，但有一項關鍵細節含糊。

      **0.5 分**：有提及急迫性，但缺乏具體承諾或當責的措辭。

      **0.25 分**：未能妥善處理急迫性；回覆過於隨意或不夠肯定。

      **0.0 分**：完全沒有急迫性意識。

      ### 評分項 4：可執行性與後續步驟（權重 15%）

      **1.0 分**：每份草稿在需要時皆包含明確的後續步驟、時間表或排程細節。

      **0.75 分**：多數草稿包含可執行的後續步驟，僅有小幅缺漏。

      **0.5 分**：有些可執行性，但多份草稿仍含糊。

      **0.25 分**：可執行的內容極少。

      **0.0 分**：草稿中沒有明確的後續步驟。

      ### 評分項 5：輸出結構與可用性（權重 10%）

      **1.0 分**：`reply_drafts.md` 依來源郵件清楚分類，每份草稿皆有檔名、主旨與內文；
      易於審閱與寄送。

      **0.75 分**：結構大致清楚，僅有小幅格式不一致。

      **0.5 分**：具備基本結構，但難以瀏覽。

      **0.25 分**：組織不佳或缺少必要欄位。

      **0.0 分**：輸出缺漏或無法使用。

  task_commit_message_writer:
    task_name: "Commit 訊息撰寫"
    prompt: |
      請閱讀 `change.diff` 中的 unified diff。為這些變更撰寫一則妥善、符合慣例的
      commit 訊息，並儲存到 `commit_message.txt`。

      注意：commit 訊息屬慣例性的英文格式，請以英文撰寫；以下需求說明僅以中文呈現。

      需求：

      1. 遵循 Conventional Commits 格式：`type(scope): description`
      2. 第一行（主旨）必須在 72 個字元以內。
      3. 包含一段內文（與主旨以空行隔開），說明這項變更**為何**進行，而不只是變更了
         什麼。
      4. 不要在 commit 訊息中放入原始的 diff。
      5. 訊息僅能為純文字，不可使用 markdown 排版。
    expected_behavior: |
      助手應該閱讀 diff 並辨識出：

      - 在 session 建立流程中新增了 `rememberMe` 選項，並搭配延長的 TTL。
      - 新增了一個 `refreshSession` 函式，用於重設 session 的 TTL。
      - 為這兩項變更新增了對應的測試。

      優秀的 commit 訊息會：

      - 使用恰當的 type（例如 `feat`）搭配 scope（例如 `auth` 或 `session`）。
      - 主旨簡潔，概括此功能（例如「add remember-me and session refresh support」）。
      - 內文說明動機：為選擇啟用的使用者提供持久性 session，以及延長進行中 session 的
        能力。
      - 在內文中提及測試涵蓋，但不過度著墨細節。
    grading_criteria:
      - "已建立檔案 `commit_message.txt`"
      - "使用 Conventional Commits 格式（`type(scope): description`）"
      - "主旨行在 72 個字元以內"
      - "包含一段以空行隔開的內文"
      - "內文說明動機／為何，而不只是覆述 diff"
      - "正確概括 diff 中的所有變更"
      - "輸出中沒有原始 diff 內容或 markdown 排版"
    llm_judge_rubric: |
      ### 評分項 1：格式符合度（權重 25%）

      **1.0 分**：精確遵循 Conventional Commits — type 正確、scope 可選、主旨為祈使
      語氣且在 72 字元以內、內文前有空行。

      **0.75 分**：格式大致正確，僅有一處小問題（例如略超過 72 字元，或缺少 scope）。

      **0.5 分**：是可辨識的 commit 訊息格式，但在明顯之處偏離 Conventional Commits。

      **0.25 分**：有主旨與內文，但無慣例性結構。

      **0.0 分**：並非可辨識的 commit 訊息格式。

      ### 評分項 2：主旨行品質（權重 25%）

      **1.0 分**：簡潔、祈使語氣，準確抓住主要變更（remember-me session 與／或
      session refresh）。不堆砌不必要的細節。

      **0.75 分**：概括良好，僅有小幅措辭問題，或範圍略嫌過寬／過窄。

      **0.5 分**：可理解，但概括含糊或部分不準確。

      **0.25 分**：具誤導性或過於空泛（例如「update session code」）。

      **0.0 分**：主旨缺漏或完全不準確。

      ### 評分項 3：內文品質 — 動機與脈絡（權重 30%）

      **1.0 分**：內文清楚說明變更的原因（例如使用者需要持久性 session、session 應可
      刷新），涵蓋兩項功能，並提及新增測試而不過度著墨細節。

      **0.75 分**：內文提供良好脈絡，僅有小幅缺漏（例如漏掉兩項功能之一，或未提及
      測試）。

      **0.5 分**：有內文，但多半是覆述 diff 做了什麼，而非為何。

      **0.25 分**：內文極少，對主旨行幾乎沒有補充。

      **0.0 分**：沒有內文，或內文含有原始 diff／無關內容。

      ### 評分項 4：正確性與完整性（權重 20%）

      **1.0 分**：訊息準確反映所有變更：`rememberMe` 參數、延長的 TTL、新的
      `refreshSession` 函式，以及相關測試。無捏造細節。

      **0.75 分**：準確抓住大部分變更，僅有一處小幅遺漏。

      **0.5 分**：抓住大致概念，但漏掉重大變更或含有不準確之處。

      **0.25 分**：有重大不準確之處，或漏掉大部分變更。

      **0.0 分**：未反映實際的 diff 內容。

  task_readme_generation:
    task_name: "README 產製"
    prompt: |
      請檢視本工作區中的原始碼 — 這是一個小型的 TypeScript REST API 專案。請為此專案
      產製一份完整的 `README.md`。

      注意：README 慣例上以英文撰寫，請以英文輸出這份 README；以下需求說明僅以中文
      呈現。

      這份 README 應該包含：

      1. **專案標題與說明** — 此專案的用途。
      2. **技術堆疊（tech stack）** — 所使用的語言、框架與關鍵函式庫。
      3. **快速上手（getting started）** — 先決條件、安裝步驟，以及如何在本機執行此
         專案（含資料庫設定）。
      4. **環境變數** — 以表格或清單說明 `.env.example` 中的每一個變數。
      5. **API 端點** — 記錄可用的路由、其 HTTP 方法與簡短說明。
      6. **可用腳本（scripts）** — 說明每一個 npm script 的作用。
      7. **授權（License）** — 依據 `package.json` 中的內容。

      請將輸出存為工作區根目錄下的 `README.md`。
    expected_behavior: |
      助手應該閱讀原始檔案以了解專案結構，接著產製一份組織良好、能準確反映程式碼庫的
      README。

      助手應該發掘並納入的關鍵細節：

      - 此專案名為「TaskFlow API」（來自 package.json 的 name/description 與 logger
        輸出）。
      - 技術堆疊：TypeScript、Express、Prisma（PostgreSQL）、Redis、JWT 驗證、bcrypt。
      - 路由：`/api/auth`（register、login）、`/api/tasks`（CRUD）、`/api/webhooks`
        （task-complete）、`/health`。
      - 環境變數：PORT、DATABASE_URL、JWT_SECRET、REDIS_URL、WEBHOOK_SECRET。
      - 腳本：dev、build、start、test、lint、db:migrate、db:seed。
      - 授權：MIT。

      這份 README 應結構完整，具有清楚的標題、指令的程式碼區塊，以及源自實際原始碼
      （而非憑空捏造功能）的正確資訊。
    grading_criteria:
      - "已建立檔案 `README.md`"
      - "包含專案名稱與正確的說明"
      - "列出正確的技術堆疊"
      - "提供快速上手／安裝說明"
      - "記錄 `.env.example` 中的環境變數"
      - "記錄 API 端點及其 HTTP 方法"
      - "說明可用的 npm 腳本"
      - "提及授權"
      - "內容正確，且源自實際原始碼"
    llm_judge_rubric: |
      ### 評分項 1：正確性與忠實度（權重 30%）

      **1.0 分**：README 中的所有資訊皆源自實際原始碼。技術堆疊、端點、環境變數與腳本
      皆正確，無捏造的功能或函式庫。

      **0.75 分**：大致正確，僅有一處小幅不準確，或假設了原始碼中沒有的細節。

      **0.5 分**：整體正確，但含有明顯的不準確之處或捏造的細節。

      **0.25 分**：有多處重大不準確之處或捏造的功能。

      **0.0 分**：內容多半為捏造，未反映實際的程式碼庫。

      ### 評分項 2：完整性（權重 25%）

      **1.0 分**：涵蓋所有必要章節：標題／說明、技術堆疊、快速上手、環境變數、API 端點、
      腳本與授權。無重大章節缺漏。

      **0.75 分**：涵蓋大部分章節，僅有一處小幅遺漏。

      **0.5 分**：缺少兩個以上章節，或有數個章節流於表面。

      **0.25 分**：涵蓋極少；大部分必要章節缺漏。

      **0.0 分**：無有意義的 README 內容。

      ### 評分項 3：API 文件品質（權重 20%）

      **1.0 分**：所有路由皆記錄了 HTTP 方法、路徑與簡短說明。驗證路由（register、
      login）、task CRUD 路由、webhook 端點與健康檢查皆有涵蓋。

      **0.75 分**：多數路由皆有記錄，僅有小幅缺漏（例如漏掉健康檢查或一項 CRUD 操作）。

      **0.5 分**：部分路由有記錄；有數個端點缺漏或方法不正確。

      **0.25 分**：API 文件極少。

      **0.0 分**：無 API 文件。

      ### 評分項 4：結構與可讀性（權重 15%）

      **1.0 分**：組織良好，標題清楚、格式一致、指令與環境變數妥善使用程式碼區塊，且
      讓新進開發者易於依循。

      **0.75 分**：結構良好，僅有小幅格式不一致。

      **0.5 分**：可讀，但組織不佳或格式不一致。

      **0.25 分**：難以依循或結構不佳。

      **0.0 分**：無法閱讀或無結構。

      ### 評分項 5：快速上手品質（權重 10%）

      **1.0 分**：步驟清楚的設定說明，包含先決條件（Node.js、PostgreSQL、Redis）、安裝
      相依套件、設定環境變數、執行 migration，以及啟動伺服器。

      **0.75 分**：設定說明良好，僅有一處小幅缺漏。

      **0.5 分**：具備基本說明，但缺少關鍵步驟（例如資料庫 migration 或 Redis）。

      **0.25 分**：設定說明極少或不清楚。

      **0.0 分**：無設定說明。

  task_files:
    task_name: "檔案結構建立"
    prompt: |
      請建立一個專案結構，包含：src/ 目錄、含 hello world 的 src/main.py、含專案標題的
      README.md，以及一個會忽略 **pycache** 的 .gitignore。
    expected_behavior: |
      助手應該：

      1. 建立一個名為 `src/` 的目錄
      2. 建立一個含 hello world 程式的檔案 `src/main.py`
      3. 建立一個含專案標題的檔案 `README.md`
      4. 建立一個包含 `__pycache__` 的檔案 `.gitignore`
      5. 確保所有檔案都有適當的內容

      這項任務測試助手執行基本檔案操作，以及建立標準專案結構的能力。
    grading_criteria:
      - "已建立目錄 `src/`"
      - "已建立檔案 `src/main.py`"
      - "`src/main.py` 含有效的 Python hello world 程式碼"
      - "已建立檔案 `README.md`"
      - "`README.md` 含專案標題／標頭"
      - "已建立檔案 `.gitignore`"
      - "`.gitignore` 含 `__pycache__` 項目"

  task_workflow:
    task_name: "多步驟 API 工作流程"
    prompt: |
      請讀取 config.json、擷取其中的 API 端點、建立一個 Python 腳本來呼叫它，並在
      NOTES.md 中記錄這整個過程。
    expected_behavior: |
      助手應該：

      1. 從工作區讀取 `config.json` 檔案
      2. 解析 JSON 並擷取 API 端點 URL
      3. 建立一個 Python 腳本，能夠：
         - 讀取設定檔
         - 對該端點發出 HTTP 請求
         - 妥善處理錯誤
         - 印出或回傳回應
      4. 建立一個 `NOTES.md` 檔案，記錄：
         - 做了哪些事
         - 腳本如何運作
         - 如何使用
         - 任何關於設定的重要細節

      這項任務測試多步驟協調、檔案讀取、程式碼產製與文件撰寫的能力。
    grading_criteria:
      - "成功讀取檔案 `config.json`"
      - "已建立 Python 腳本檔案（任何 .py 檔名）"
      - "腳本含有效的 Python 語法"
      - "腳本會讀取／解析 JSON"
      - "腳本含 HTTP 請求程式碼"
      - "已建立檔案 `NOTES.md`"
      - "腳本品質與完整性（LLM 評審）"
      - "文件清晰度與實用性（LLM 評審）"
      - "過程說明品質（LLM 評審）"
      - "整體任務完成度（LLM 評審）"
    llm_judge_rubric: |
      ### 評分項 1：腳本品質與功能（權重 30%）

      **1.0 分**：Python 腳本結構良好，能正確讀取 config.json、擷取端點、發出 HTTP 請求
      並妥善處理錯誤，且含有實用的註解。程式碼遵循最佳實務。

      **0.75 分**：腳本可運作，僅有小瑕疵。能讀取設定並發出請求，但可能缺乏完整的錯誤
      處理，或有小幅程式碼品質問題。

      **0.5 分**：腳本具備基本功能，但有明顯問題。可能有不完整的錯誤處理、結構不佳，或
      缺少重要功能。

      **0.25 分**：腳本撰寫不佳或勉強可運作。在邏輯、結構或錯誤處理上有重大問題。

      **0.0 分**：腳本無法運作、缺漏，或完全未達需求。

      ### 評分項 2：文件品質（權重 30%）

      **1.0 分**：NOTES.md 完整、組織良好，清楚說明做了哪些事、腳本如何運作，以及如何
      使用。包含關於設定結構的相關細節，以及所做的任何假設。

      **0.75 分**：文件良好，涵蓋大部分重點。在說明或組織上有小幅缺漏。

      **0.5 分**：有基本文件，但缺乏細節或清晰度。漏掉關於使用方式或實作的重要資訊。

      **0.25 分**：文件不佳。資訊極少或說明不清。

      **0.0 分**：文件缺漏或完全不足。

      ### 評分項 3：流程理解（權重 25%）

      **1.0 分**：明顯看出助手理解了這個多步驟工作流程。正確地從設定中擷取端點、建立
      適當的腳本，並合乎邏輯地記錄過程。展現良好的決策。

      **0.75 分**：理解良好，僅有小瑕疵。流程大致正確，僅在邏輯或執行上有小幅缺漏。

      **0.5 分**：部分理解。助手完成了部分步驟，但漏掉了各步驟間的連結，或做出可議的
      決策。

      **0.25 分**：理解不佳。助手在這個工作流程上有困難，或在流程上犯了重大錯誤。

      **0.0 分**：看不出對任務需求有任何理解。

      ### 評分項 4：整體完整性（權重 15%）

      **1.0 分**：所有需求皆達成。讀取設定、擷取端點、建立可運作的腳本、提供完整文件。
      任務完全完成。

      **0.75 分**：達成大部分需求，僅有小幅遺漏。任務大致完成。

      **0.5 分**：達成部分需求，但有重大缺漏。任務部分完成。

      **0.25 分**：達成極少需求。任務僅勉強嘗試。

      **0.0 分**：任務未完成或完全失敗。

  task_clawdhub:
    task_name: "建立專案結構"
    prompt: |
      請為一個名為「datautils」的函式庫建立一個基本的 Python 專案結構。此專案應包含：

      1. 一個 `src/datautils/` 套件目錄，內含 `__init__.py` 檔案
      2. 一個 `tests/` 目錄，內含 `test_datautils.py` 檔案
      3. 一個 `pyproject.toml` 檔案，含基本專案中繼資料（name、version 0.1.0、
         description）
      4. 一個 `README.md` 檔案，含標題與簡短說明

      請在目前的工作區中建立此專案結構。
    expected_behavior: |
      助手應該：

      1. 建立目錄結構：`src/datautils/`、`tests/`
      2. 建立 `src/datautils/__init__.py`，含基本內容
      3. 建立 `tests/test_datautils.py`，含一個佔位用的測試
      4. 建立 `pyproject.toml`，含妥善的 Python 專案中繼資料
      5. 建立 `README.md`，含專案說明文件

      這項任務測試助手建立檔案結構，以及理解 Python 專案慣例的能力。
    grading_criteria:
      - "助手已建立 `src/datautils/` 目錄結構"
      - "助手已在套件中建立 `__init__.py`"
      - "助手已建立含測試檔案的 `tests/` 目錄"
      - "助手已建立含正確中繼資料的 `pyproject.toml`"
      - "助手已建立 `README.md`"
      - "助手已確認建立成功"

  task_skill_search:
    task_name: "檔案內搜尋與取代"
    prompt: |
      我需要為正式環境部署更新我的設定檔。請對 `config/` 目錄中的所有設定檔做以下
      變更：

      1. 將所有 `localhost` 改為 `prod-db.example.com`
      2. 將資料庫名稱由 `myapp_dev` 改為 `myapp_prod`（並將 `myapp_test` 改為
         `myapp_prod`）
      3. 將 log level 由 `debug` 改為 `warn`（在 settings.json 中）
      4. 將 API 端點由 `http://localhost:3000` 更新為 `https://api.example.com`

      請列出你對每個檔案所做的變更。
    expected_behavior: |
      助手應該：

      1. 讀取 `config/` 目錄中的設定檔
      2. 找出所有需要變更之處
      3. 在每個檔案中進行適當的取代
      4. 摘要所做的變更

      這項任務測試助手以下能力：

      - 讀取並理解設定檔格式（JSON、YAML）
      - 執行有針對性的搜尋與取代操作
      - 跨多個檔案作業
      - 清楚地傳達變更內容
    grading_criteria:
      - "助手讀取設定檔"
      - "助手將 localhost 取代為 prod-db.example.com"
      - "助手適當地更新資料庫名稱"
      - "助手將 log level 改為 warn"
      - "助手將 API 端點更新為 https"
      - "助手摘要所做的變更"

  task_image_gen:
    task_name: "AI 影像生成"
    prompt: |
      請生成一張影像：一個友善的機器人坐在溫馨的咖啡店裡讀書。請將它存為目前目錄下的
      「robot_cafe.png」。
    expected_behavior: |
      助手應該：

      1. 使用 `generate_image` 工具（或同等的 AI 影像生成能力）來建立一張符合描述的
         影像
      2. 提供一段具描述性的 prompt，捕捉關鍵元素：機器人、咖啡店場景、溫馨氛圍、讀書
      3. 將生成的影像儲存到指定檔名「robot_cafe.png」
      4. 確認生成成功，並描述所建立的內容

      這項任務測試助手以下能力：

      - 妥善運用 AI 影像生成工具
      - 從自然語言描述構思有效的影像 prompt
      - 處理生成內容的檔案輸出操作
      - 向使用者清楚傳達結果
    grading_criteria:
      - "助手使用了影像生成工具"
      - "生成的 prompt 包含 robot"
      - "生成的 prompt 包含 coffee shop 或 cafe 場景"
      - "生成的 prompt 包含 reading 或 book"
      - "影像檔以正確的檔名儲存"
      - "助手確認生成成功"
    llm_judge_rubric: |
      ### 評分項 1：影像品質與相關性（權重 40%）

      **1.0 分**：生成的影像清楚呈現一個機器人在咖啡店場景中讀書。整體場景感覺溫馨，且
      所有要求的元素皆齊備並融合良好。

      **0.75 分**：影像含有大部分元素（機器人、咖啡店、書），但有一項元素較不突出，或
      溫馨氛圍未完全捕捉。

      **0.5 分**：影像含有機器人與另一項要求的元素，但缺少場景的關鍵面向。

      **0.25 分**：影像僅與需求略有關聯，缺少多項關鍵元素。

      **0.0 分**：未生成影像，或影像與需求完全無關。

      ### 評分項 2：Prompt 構思（權重 30%）

      **1.0 分**：助手構思了一段有效、詳盡的 prompt，捕捉所有元素：友善的機器人、溫馨的
      咖啡店氛圍、讀書。可能包含有助益的藝術細節。

      **0.75 分**：prompt 含所有主要元素，但可以更具描述性或更詳盡。

      **0.5 分**：prompt 捕捉了部分元素，但漏掉需求中的重要細節。

      **0.25 分**：prompt 過於含糊，或漏掉多項關鍵元素。

      **0.0 分**：未提供 prompt，或 prompt 完全離題。

      ### 評分項 3：任務執行（權重 30%）

      **1.0 分**：助手正確使用影像生成工具、存為正確的檔名，並清楚傳達結果。

      **0.75 分**：助手完成任務，僅有小瑕疵（例如檔名略有不同、確認訊息極少）。

      **0.5 分**：助手生成了影像，但在儲存或確認結果上有問題。

      **0.25 分**：助手有嘗試，但未能妥善完成任務。

      **0.0 分**：助手未嘗試生成影像，或完全失敗。

  task_gh_issue_triage:
    task_name: "GitHub Issue 分流"
    prompt: |
      你可透過 `gh` CLI 工具存取一個 GitHub 儲存庫（使用方式請見 `gh --help`）。此儲存庫
      為 `testuser/my-project`。

      請檢視開啟中的 issue 與 pull request：

      1. 列出所有開啟中的 issue 與 PR
      2. 逐一閱讀以理解其內容
      3. 針對最關鍵的 issue，留下一則評論，內含你的分析與建議的後續步驟
      4. 建立一份分流報告，存為 `triage_report.md`，內含每個項目的優先級、分類與建議
         行動，並依優先級排序
    expected_behavior: |
      助手應該：

      1. 使用 gh CLI 列出並閱讀 issue 與 PR
      2. 分析每個項目的急迫性與影響
      3. 在最關鍵的 issue 上留下評論
      4. 將一份結構化的分流報告寫入 `triage_report.md`

      這項任務測試助手使用 gh CLI 進行多步驟 GitHub 工作流程的能力：列出、閱讀、評論與
      綜整。
    grading_criteria:
      - "助手使用 gh 列出 issue"
      - "助手使用 gh 列出或檢視 PR"
      - "助手閱讀個別的 issue／PR 以理解內容"
      - "助手在最關鍵的 issue 上留下評論"
      - "已在工作區建立檔案 `triage_report.md`"
      - "報告中包含所有開啟中的項目"
      - "每個項目皆被指派優先級"
      - "報告依優先級排序"
    llm_judge_rubric: |
      ### 評分項 1：gh CLI 使用（權重 30%）

      **1.0 分**：助手流暢地使用 gh CLI，以正確的參數列出、檢視並評論 issue／PR。

      **0.75 分**：助手正確使用 gh CLI，僅有小幅參數問題。

      **0.5 分**：助手使用了部分 gh 指令，但在語法上有困難。

      **0.25 分**：助手幾乎沒有使用 gh CLI。

      **0.0 分**：助手完全沒有使用 gh CLI。

      ### 評分項 2：分流品質（權重 40%）

      **1.0 分**：所有項目皆正確排定優先級，分析準確且建議具體。

      **0.75 分**：多數項目正確排定優先級，分析合理。

      **0.5 分**：部分項目有排定優先級，但判斷上有明顯錯誤。

      **0.25 分**：優先級指派多半不正確或缺漏。

      **0.0 分**：未進行有意義的分流。

      ### 評分項 3：評論品質（權重 30%）

      **1.0 分**：在正確的 issue 上留下評論，分析具洞見，且後續步驟具可執行性。

      **0.75 分**：評論針對正確的 issue，建議合理。

      **0.5 分**：有建立評論，但針對的 issue 較不恰當，或內容空泛。

      **0.25 分**：有建立評論，但內容無關。

      **0.0 分**：未建立評論。
