# Meeting analysis tasks (batch 2) — Traditional Chinese (繁體中文 / zh-TW).
# User-facing translation overrides for 14 PinchBench meeting-analysis tasks.
# Grader / Python code, exact required output strings, transcript/asset/output
# file names, proper nouns (people/company/place/committee names), acronyms,
# URLs, emails, dates, dollar amounts, and identifiers are kept verbatim.
# Source meeting transcripts are English and unchanged.
tasks:

  task_meeting_advisory_timeline:
    task_name: "NTIA 諮詢委員會時間軸與期限"
    prompt: |
      我有一份政府諮詢委員會的會議逐字稿，存放在 `meeting-transcript.md`。這是商務部頻譜管理諮詢委員會（Commerce Spectrum Management Advisory Committee, CSMAC）於 2012 年 5 月 30 日召開的會議。

      請分析這份逐字稿，並把所有關於時間軸、期限、時程與里程碑的內容，整理成一份結構化報告，存成 `timeline.md`。你的報告應包含：

      - **依時間順序排列的時間軸**：列出所有提及的日期、期限與里程碑（包含過去與未來）
      - **工作小組（working group）期限**：各工作小組預計何時交付成果
      - **下次會議資訊**：日期、地點、形式
      - **歷史背景參照**：提及的過往事件及其日期，用以提供脈絡
      - **轉換時程**：政府機關表示他們搬遷或轉換所需的時間長度

      每一筆時間軸項目都應包含日期（或時間範圍）、所指事項、是誰提到的，以及任何附帶的條件或註記。
    expected_behavior: |
      助手應該：

      1. 讀取並解析會議逐字稿
      2. 擷取所有時間相關的參照（明確日期、相對時間範圍、持續期間）
      3. 依時間順序加以組織
      4. 區分過去事件、目前狀態與未來期限

      預期的關鍵時間軸項目：

      **歷史／過去：**
      - June 2010：總統關於 500 MHz 頻譜目標的備忘錄
      - 會議前約 2.5 年（約 2009 年底／2010 年初）：歐巴馬政府確立 500 MHz 重新分配目標
      - June 2010 備忘錄後 6 個月內：NTIA／各機關辨識出 115 MHz 的頻譜
      - October 1, 2011：1755-1850 報告的期限（「臭名昭著的 10 月 1 日」）
      - 約 2001：先前搬遷（1710-1755）的初步成本估算約 $900 million
      - 過往經驗：1710-1755 MHz 頻段在 5 年內清空（主要為微波系統）
      - 過去：政府與業界在 5 GHz Wi-Fi 上的合作努力

      **目前（截至 2012 年 5 月 30 日）：**
      - 會議日期：May 30, 2012
      - 500 MHz 與 Sharing 兩個子委員會在工作小組階段暫停運作
      - 已提交 T-Mobile/CTIA STA 申請，以進行頻段量測
      - 工作小組邀請函將於下週內寄出

      **未來期限：**
      - 約下週：NTIA 將寄出工作小組邀請函、敲定共同主席
      - 約 10 天：委員會共同主席就收尾計畫回報（Tramont 的提案）
      - September 2012：工作小組 1（氣象衛星，1695-1710）的目標完成時間
      - July 24, 2012：下次 CSMAC 會議於 Boulder, Colorado（下午場次）
      - July 25-26, 2012：ISART 會議於 ITS 舉行，主題為頻譜共享（緊接 CSMAC 會議之後）
      - January 2013：工作小組 2-5（1755-1850 頻段）的目標完成時間
      - 5 年期程：執法機關退出 1755-1780 MHz（第一階段）
      - 10 年期程：機關全面轉出該頻段（如報告所述）
      - 10 年目標：500 MHz 頻譜重新分配（出自 2010 年備忘錄）
    grading_criteria:
      - "已建立 `timeline.md` 檔案"
      - "提及 June 2010 的總統備忘錄"
      - "提及 October 2011 的報告期限"
      - "記載下次 CSMAC 會議（July 24, Boulder, CO）"
      - "提及氣象衛星工作小組的 September 2012 目標"
      - "提及其餘工作小組的 January 2013 目標"
      - "提及 10 年的轉換期程"
      - "記載緊接 CSMAC 會議之後的 ISART 會議"
      - "時間軸依時間順序組織"
    llm_judge_rubric: |
      ### 評分項 1：時間軸項目的完整性（權重 35%）

      **1.0 分**：擷取出所有主要時間軸項目——歷史參照（2010 備忘錄、October 2011 報告、先前 1710-1755 搬遷、5 GHz Wi-Fi 前例、2001 成本估算）、目前狀態項目，以及未來期限（September、January、下次會議、10 年計畫）。至少有 10 筆不同的時間軸項目。

      **0.75 分**：擷取出多數項目，僅有一兩項遺漏。

      **0.5 分**：記載主要期限，但缺少歷史脈絡或次要項目。

      **0.25 分**：僅擷取最明顯的期限。

      **0.0 分**：幾乎沒有或完全沒有時間軸項目。

      ### 評分項 2：日期與時間範圍的準確性（權重 25%）

      **1.0 分**：所有日期、期間與相對時間範圍都準確取自逐字稿。沒有捏造的日期。

      **0.75 分**：多數日期正確，僅有一處小錯。

      **0.5 分**：部分日期正確，但有數處不準確。

      **0.25 分**：多處日期錯誤或捏造日期。

      **0.0 分**：日期大多不正確。

      ### 評分項 3：脈絡與歸屬（權重 20%）

      **1.0 分**：每筆項目都包含是誰提到的、所指事項，以及任何條件或相依關係。發言者歸屬正確。

      **0.75 分**：多數項目脈絡良好，僅有少許缺漏。

      **0.5 分**：提供部分脈絡，但歸屬不一致。

      **0.25 分**：脈絡或歸屬極少。

      **0.0 分**：完全沒有提供脈絡。

      ### 評分項 4：組織與可用性（權重 20%）

      **1.0 分**：時間軸依時間順序（或依過去／現在／未來邏輯）清楚組織，易於瀏覽，格式清晰，可區分日期與描述。

      **0.75 分**：組織良好，僅有少許問題。

      **0.5 分**：有一些組織，但難以追隨時序。

      **0.25 分**：組織不佳。

      **0.0 分**：沒有有意義的組織。

  task_meeting_advisory_acronyms:
    task_name: "NTIA 諮詢委員會縮寫詞彙表"
    prompt: |
      我有一份政府諮詢委員會的會議逐字稿，存放在 `meeting-transcript.md`。這是商務部頻譜管理諮詢委員會（Commerce Spectrum Management Advisory Committee, CSMAC）於 2012 年 5 月 30 日召開的會議，討論聯邦頻譜管理與共享。

      請分析這份逐字稿，並在一個名為 `acronym_glossary.md` 的檔案中建立一份完整的縮寫詞彙表。對於每個找到的縮寫或簡稱，請列出：

      - **縮寫（Acronym）**：逐字稿中使用的簡稱
      - **全稱（Full form）**：它所代表的完整名稱
      - **脈絡（Context）**：簡述它在本次會議中的使用方式（1-2 句）
      - **類別（Category）**：政府機關（Government Agency）、頻譜／技術（Spectrum/Technical）、法規（Regulatory）、業界（Industry）、軍事（Military）或其他（Other）

      請依縮寫的字母順序排序，並在最後附上找到的縮寫總數。

      注意：有些縮寫可能在逐字稿中本身就有展開；其他則可能需要頻譜管理與電信政策的領域知識才能解讀。請擷取所有出現的縮寫，包含只出現一次的。
    expected_behavior: |
      助手應該：

      1. 讀取並解析會議逐字稿
      2. 辨識所有縮寫與簡稱
      3. 由脈絡或領域知識判斷其全稱
      4. 加以分類並排序

      預期的關鍵縮寫（最低集合）：

      | Acronym | Full Form | Category |
      |---------|-----------|----------|
      | CSMAC | Commerce Spectrum Management Advisory Committee | Government Agency |
      | NTIA | National Telecommunications and Information Administration | Government Agency |
      | FCC | Federal Communications Commission | Government Agency |
      | NOAA | National Oceanic and Atmospheric Administration | Government Agency |
      | DoD | Department of Defense | Government Agency |
      | DHS | Department of Homeland Security | Government Agency |
      | OMB | Office of Management and Budget | Government Agency |
      | OSTP | Office of Science and Technology Policy | Government Agency |
      | ITS | Institute for Telecommunication Sciences | Government Agency |
      | ISART | International Symposium on Advanced Radio Technologies | Spectrum/Technical |
      | MHz | Megahertz | Spectrum/Technical |
      | GHz | Gigahertz | Spectrum/Technical |
      | UAV | Unmanned Aerial Vehicle | Military |
      | LTE | Long-Term Evolution | Industry |
      | PCS | Personal Communications Service | Spectrum/Technical |
      | AWS | Advanced Wireless Services | Spectrum/Technical |
      | CMRS | Commercial Mobile Radio Service | Industry |
      | STA | Special Temporary Authority | Regulatory |
      | CSEA | Commercial Spectrum Enhancement Act | Regulatory |
      | PCAST | President's Council of Advisors on Science and Technology | Government Agency |
      | CTIA | Cellular Telecommunications Industry Association | Industry |
      | TIA | Telecommunications Industry Association | Industry |
      | TSB | Telecommunications Systems Bulletin | Spectrum/Technical |
      | ITU-R | International Telecommunication Union - Radiocommunication | Spectrum/Technical |
      | WRC | World Radiocommunication Conference | Spectrum/Technical |
      | IP | Intellectual Property | Other |
      | TMI | Too Much Information | Other |
      | NFL | National Football League（隱喻指代大城市）| Other |

      總計：約 25-30 個縮寫
    grading_criteria:
      - "已建立 `acronym_glossary.md` 檔案"
      - "CSMAC 正確展開"
      - "NTIA 正確展開"
      - "辨識出至少 15 個不重複的縮寫"
      - "辨識出至少 20 個不重複的縮寫（加分門檻）"
      - "包含技術類縮寫（MHz、GHz、LTE、UAV、STA）"
      - "包含政府機關（FCC、DoD、DHS、OMB、OSTP）"
      - "對各項目套用類別或分組"
      - "採用字母順序排序"
    llm_judge_rubric: |
      ### 評分項 1：縮寫涵蓋度（權重 35%）

      **1.0 分**：辨識出 25 個以上縮寫，包含冷僻的如 CSEA、ISART、TSB、CMRS，以及脈絡性用法如 NFL（隱喻）與 TMI。既涵蓋明顯的政府縮寫，也涵蓋技術性頻譜術語。

      **0.75 分**：辨識出 20-24 個縮寫，涵蓋多數主要類別。

      **0.5 分**：辨識出 15-19 個縮寫，涵蓋明顯的縮寫，但漏掉數個領域專有術語。

      **0.25 分**：辨識出 10-14 個縮寫，大多只是廣為人知的政府機關。

      **0.0 分**：辨識出的縮寫少於 10 個。

      ### 評分項 2：展開準確性（權重 30%）

      **1.0 分**：所有縮寫展開皆正確。領域專有術語（CSEA、CSMAC、CMRS、ISART、TSB 10F）準確展開。

      **0.75 分**：多數展開正確，僅有一兩處小錯。

      **0.5 分**：常見縮寫正確，但數個領域專有縮寫錯誤或缺少展開。

      **0.25 分**：多處展開錯誤。

      **0.0 分**：展開大多錯誤或捏造。

      ### 評分項 3：脈絡品質（權重 20%）

      **1.0 分**：每筆項目都包含有意義且貼合本次會議的脈絡描述，說明該縮寫與此次 CSMAC 討論的關聯。

      **0.75 分**：多數項目有實用的脈絡。

      **0.5 分**：有脈絡但偏籠統（只是重述展開，而非會議脈絡）。

      **0.25 分**：脈絡極少或為樣板文字。

      **0.0 分**：完全沒有提供脈絡。

      ### 評分項 4：組織與分類（權重 15%）

      **1.0 分**：依字母排序，分類清楚（Government、Technical、Regulatory、Industry、Military、Other），全篇格式一致。

      **0.75 分**：組織良好，僅有少許格式不一致。

      **0.5 分**：有一些組織，但分類或排序不完整。

      **0.25 分**：組織不佳。

      **0.0 分**：沒有組織。

  task_meeting_executive_summary:
    task_name: "會議高階主管摘要"
    prompt: |
      我有一個檔案 `meeting_transcript.md`，內含 2021-06-28 舉行的 GitLab 產品行銷團隊會議逐字稿。請閱讀逐字稿，並產生一份精簡的高階主管摘要（executive summary）。

      請把你的摘要寫入名為 `executive_summary.md` 的檔案。內容應包含：

      - **會議標題與日期**
      - **與會者**（逐字稿中提到的姓名）
      - **討論的關鍵主題**（3-5 個重點，摘述主要討論面向）
      - **做成的決議**（團隊達成的具體決定或結論）
      - **行動項目（action items）**（指派給特定人員的任務，可辨識時附上負責人）
      - **後續步驟**（下次會議前需要完成的事項）

      摘要長度不應超過約 500 字，並以一位未出席會議的繁忙高階主管為對象來撰寫。
    expected_behavior: |
      助手應該：

      1. 讀取會議逐字稿
      2. 辨識主要討論主題：
         - 企業活動贊助分工（platform 對應 re:Invent、CI/CD 對應 Google Next、GitOps 對應 KubeCon）
         - Commit 大會的產品公告（橫跨各 stage 的前 5 大功能）
         - 競品比較資訊圖（design 團隊的新設計、配色決定）
         - 訊息框架（如「more speed, less risk」與「single source of truth, countless possibilities」等標語）
         - 競品試算表方法論（tier 1 競爭對手、按 stage 對應的比較）
      3. 辨識關鍵決議：
         - 活動分工：Platform→re:Invent、CI/CD→Google Next、GitOps→KubeCon
         - 訊息：選定「more speed, less risk」為最終標語
         - 競品資訊圖：維持僅用綠色配色（不用紅色）
         - 以 vulnerability management 作為最重要的安全公告
      4. 擷取行動項目（Cormac 負責補上 Plan stage 的前 5 大功能、團隊向 campaign managers 確認等）
      5. 撰寫一份結構良好的高階主管摘要
    grading_criteria:
      - "已建立 `executive_summary.md` 檔案"
      - "提及會議日期（2021-06-28 或 June 28, 2021）"
      - "辨識出至少 3 個關鍵主題"
      - "涵蓋企業活動／活動贊助主題"
      - "涵蓋產品公告／Commit 大會主題"
      - "記載至少 2 項具體決議"
      - "包含行動項目或後續步驟區段"
      - "摘要精簡（約 800 字以內）"
    llm_judge_rubric: |
      ### 評分項 1：準確性與完整性（權重 40%）

      **1.0 分**：摘要準確掌握所有主要討論主題（企業活動、產品公告、競品資訊圖、訊息框架）、關鍵決議與行動項目，且未引入錯誤資訊。

      **0.75 分**：多數主題與決議準確掌握，僅有一兩處小遺漏。

      **0.5 分**：核心主題俱在，但缺少或誤記了數項重要細節。

      **0.25 分**：僅涵蓋少數主題，或存在重大不準確。

      **0.0 分**：摘要缺失、空白或根本不準確。

      ### 評分項 2：高階主管可讀性（權重 30%）

      **1.0 分**：摘要精簡，結構良好且分區清楚，用語專業，繁忙的高階主管能在 2 分鐘內掌握重點。沒有從閒聊語氣中混入不必要的細節。

      **0.75 分**：摘要可讀且組織良好，僅略嫌冗長。

      **0.5 分**：有摘要，但過於瑣碎、組織不佳，或難以快速瀏覽。

      **0.25 分**：摘要雜亂，或讀起來更像原始筆記而非主管簡報。

      **0.0 分**：沒有摘要，或格式完全無法使用。

      ### 評分項 3：可執行性（權重 30%）

      **1.0 分**：決議陳述清楚，行動項目在可辨識時附有負責人，後續步驟具體到足以執行。讀者能確切知道做了哪些決定、接下來會發生什麼。

      **0.75 分**：多數決議與行動項目清楚，僅在負責人或具體性上有少許缺漏。

      **0.5 分**：有一些決議或行動項目，但模糊或缺乏脈絡。

      **0.25 分**：行動項目大多缺失或過於模糊而無用。

      **0.0 分**：未從會議擷取任何可執行內容。

  task_meeting_sentiment_analysis:
    task_name: "會議情緒分析"
    prompt: |
      我有一個檔案 `meeting_transcript.md`，內含 GitLab 產品行銷團隊會議的逐字稿。請分析這場會議整體的情緒與情感動態。

      請把你的分析寫入名為 `sentiment_analysis.md` 的檔案。內容應包含：

      - **整體會議情緒**（正面、負面或混合），並附簡短理由
      - **逐主題情緒拆解**：針對每個主要討論主題，評定其情緒（正面／中性／負面）並說明原因
      - **團隊動態觀察**：記錄出現認同、分歧、熱絡或不滿的時刻
      - **值得注意的引言（notable quotes）**：摘出 3-5 句最能呈現會議情感基調的直接引言
      - **投入程度（engagement level）**：評估參與者的投入程度（積極討論 vs. 被動聆聽）
      - **潛在疑慮**：找出參與者表達遲疑、不確定或反對意見的主題
    expected_behavior: |
      助手應該：

      1. 讀取會議逐字稿
      2. 辨識整體偏正面／合作的情緒——團隊大致同調且具生產力
      3. 逐主題分析情緒：
         - 企業活動：中性／略帶不確定（仍在等待各 GTM 團隊的回饋）
         - 產品公告：正面／熱絡（團隊對彙整成果感到興奮）
         - 競品資訊圖：正面，伴隨輕度爭辯（配色選擇、stage 名稱的描述性）
         - 訊息框架：高度投入、帶玩鬧氣氛（Talladega Nights 梗、對標語的熱烈討論）
      4. 記錄具體動態：
         - 對「more speed, less risk」標語的熱情
         - 玩鬧式打趣（Ricky Bobby／NASCAR 梗、學校集會）
         - William 直白的「我不是愛就是恨」風格
         - 對公司不夠慶祝成果的輕微不滿
         - Samia 對競品試算表方法論的建設性反對意見
      5. 摘出能呈現基調的相關引言
      6. 評估整體偏高的投入程度
    grading_criteria:
      - "已建立 `sentiment_analysis.md` 檔案"
      - "整體情緒正確辨識為正面／合作"
      - "至少分析 3 個主題並各自評定情緒"
      - "包含團隊動態或人際互動觀察"
      - "包含至少 2 句來自逐字稿的直接引言"
      - "評估了投入程度"
      - "至少辨識出一項疑慮或不確定之處"
      - "分析能區分不同主題間的不同情感基調"
    llm_judge_rubric: |
      ### 評分項 1：分析深度（權重 35%）

      **1.0 分**：分析超越表層的情緒標籤。辨識出會議過程中細膩的情緒轉折，解釋為何某些主題更具熱度，並掌握「非正式卻有生產力」的動態。記錄如 Talladega Nights 離題等具體時刻，作為團隊默契的佐證。

      **0.75 分**：分析良好，逐主題拆解清楚並具一定細膩度。

      **0.5 分**：指派了基本情緒標籤，但說明或洞見有限。

      **0.25 分**：分析淺薄，大多只是重述明顯的觀察。

      **0.0 分**：未做出有意義的分析。

      ### 評分項 2：以證據為本的觀察（權重 30%）

      **1.0 分**：論點有逐字稿中的具體引言或時刻佐證。在適當之處將情緒歸於特定人物（例如 William 對標語的強烈意見、Samia 對競品的條理化提問）。引言選得好且具說明力。

      **0.75 分**：多數論點有證據支持，引言選擇良好。

      **0.5 分**：提供部分證據，但許多論點是無佐證的斷言。

      **0.25 分**：引言極少或全無，多為臆測。

      **0.0 分**：未使用逐字稿中的任何證據。

      ### 評分項 3：實用價值（權重 35%）

      **1.0 分**：分析提供團隊主管可用的可執行洞見——辨識潛在摩擦點、團隊同調之處、誰可能需要更多支援，以及哪些主題能激發團隊。「疑慮」區段點出真正值得處理的問題。

      **0.75 分**：大致可執行，能良好辨識動態與疑慮。

      **0.5 分**：有一些有用觀察，但多為描述性而非可執行。

      **0.25 分**：實用價值有限；讀起來更像讀書報告而非有用的分析。

      **0.0 分**：沒有可執行的洞見。

  task_meeting_follow_up_email:
    task_name: "會議後續追蹤郵件"
    prompt: |
      我有一個檔案 `meeting_transcript.md`，內含 2021-06-28 舉行的 GitLab 產品行銷團隊會議逐字稿。請草擬一封專業的後續追蹤郵件，可在會後寄給團隊。

      請以英文撰寫這封郵件，並寫入名為 `follow_up_email.md` 的檔案。郵件應包含：

      - **主旨（Subject line）**
      - **稱呼語**：向產品行銷團隊致意
      - **簡短回顧**：摘述討論內容（最多 2-3 句）
      - **做成的決議**：清楚的編號清單
      - **行動項目**：可辨識時附上負責人與期限
      - **待解項目（Open items）**：仍需解決的事項
      - **結尾**：附上任何相關的下次會議資訊或期限

      郵件應專業，同時貼合團隊合作的語氣。請保持精簡——讓繁忙的團隊成員能在一分鐘內掃完。
    expected_behavior: |
      助手應該：

      1. 讀取會議逐字稿
      2. 草擬一封郵件，掌握：
         - **決議：**
           - 活動分工：Platform→re:Invent、CI/CD→Google Next、GitOps→KubeCon
           - 訊息標語：選定「more speed, less risk」
           - 競品資訊圖：維持僅用綠色的配色方案
           - 最重要公告選擇：以 vulnerability management 作為安全領域的主打故事
           - 集會（assembly）標語：「single source of truth, countless possibilities」
         - **行動項目：**
           - 全體：向 campaign managers 確認活動承諾、在 issue 上留言
           - Cormac：補上 Plan stage 的前 5 大功能
           - 團隊：完成產品公告試算表的填寫（週二 Tuesday 截止）
           - Samia：調整競品表，使每個 stage 只採用相關的 tier 1 競爭對手
           - 在競品比較中把 GitLab 也列為一個項目
         - **待解項目：**
           - 跨所有 stage 的最終前 5 大產品公告
           - 是否將 UX 改善打包成一個突出類別
           - 究竟要納入哪些 VS Code 整合功能
      3. 撰寫一封清楚、易於瀏覽的郵件
    grading_criteria:
      - "已建立 `follow_up_email.md` 檔案"
      - "有主旨行"
      - "包含決議或關鍵結論區段"
      - "列出至少 3 項具體決議"
      - "包含行動項目且至少有部分負責人姓名"
      - "列出至少 3 項行動項目"
      - "提及週二（Tuesday）的期限"
      - "語氣專業但平易近人"
      - "精簡（約 600 字以內）"
    llm_judge_rubric: |
      ### 評分項 1：內容準確性（權重 35%）

      **1.0 分**：郵件準確掌握會議中的決議、行動項目與待解問題。沒有捏造的承諾或錯誤歸屬。活動分工、標語選擇與競品做法都正確呈現。

      **0.75 分**：多數內容準確，僅有一兩處小錯或遺漏。

      **0.5 分**：核心決議俱在，但數項內容不準確，或缺少關鍵項目。

      **0.25 分**：明顯的不準確或重大遺漏，損及實用性。

      **0.0 分**：郵件缺失、空白或根本不準確。

      ### 評分項 2：郵件格式與專業度（權重 30%）

      **1.0 分**：讀起來像 PMM 主管會發出的真正後續郵件。有適當主旨、稱呼語、結構化且易掃描的內文區段（決議、行動項目、待解項目）以及專業結尾。貼合團隊「合作但直接」的語氣。

      **0.75 分**：郵件格式良好，僅有少許結構問題。

      **0.5 分**：包含正確資訊，但讀起來不像自然的郵件。

      **0.25 分**：格式不佳，或語氣過於正式／過於隨意。

      **0.0 分**：無法辨識為一封郵件。

      ### 評分項 3：可執行性與清晰度（權重 35%）

      **1.0 分**：收到此郵件的團隊成員能確切知道做了哪些決定、自己個人該做什麼、何時到期。行動項目具體且有歸屬。後續步驟毫無歧義。

      **0.75 分**：大致清楚且可執行，僅有少許歧義。

      **0.5 分**：有一些行動項目，但缺乏具體性或明確歸屬。

      **0.25 分**：對接下來該做什麼模糊或不清楚。

      **0.0 分**：沒有可執行內容。

  task_meeting_blog_post:
    task_name: "會議轉部落格文章"
    prompt: |
      我有一個檔案 `meeting_transcript.md`，內含 2021-06-28 舉行的 GitLab 產品行銷團隊會議逐字稿。團隊討論了他們如何處理產品公告、競品定位與訊息傳達。

      請以這場會議作為素材，撰寫一篇部落格文章，談產品行銷團隊在公司採增量出貨（持續交付／開源模式）而非大爆炸式發布（big-bang releases）時，如何有效溝通產品上市。

      請以英文撰寫這篇部落格文章，並寫入名為 `blog_post.md` 的檔案。要求：

      - **標題（Title）**：取一個吸引人的標題
      - **長度**：600-1000 字
      - **讀者對象**：產品行銷專業人士與 DevOps 實務工作者
      - **切入角度**：援引會議中關於「當路線圖公開、功能以 MVC／迭代方式出貨時，要如何做公告」這個挑戰的討論，提出洞見
      - **必含**：至少 2-3 個其他團隊可套用的具體策略或經驗
      - **語氣**：資訊性且務實，而非會議回顧

      這篇應讀起來像一篇可獨立成篇的部落格文章，而非會議摘要。請把會議內容當作靈感與素材，但撰寫原創內容。
    expected_behavior: |
      助手應該：

      1. 讀取會議逐字稿
      2. 辨識關鍵洞見：GitLab 採持續出貨且路線圖公開，使得傳統的「上市」公告變得困難
      3. 擷取討論到的策略：
         - 把小型 MVC 打包成較大的敘事主題（例如「vulnerability management」涵蓋許多小型發布）
         - 回顧過去一年，找出哪些功能現在已達「GA-ready」，即使個別零件較早就已出貨
         - 用興奮程度／堆疊排序（stack ranking）來決定優先突出哪些
         - 建立敘事桶（narrative buckets，如 UX 改善、GitOps 能力、安全），把多個功能打包在一起
         - 把公告時機安排在活動（Commit 大會）前後，以爭取媒體關注
         - 以正面框架陳述改善（用「新能力」而非「我們修好了壞掉的東西」）
      4. 撰寫一篇將上述歸納為可執行建議的部落格文章
      5. 維持適合行銷／DevOps 讀者的專業、資訊性語氣
    grading_criteria:
      - "已建立 `blog_post.md` 檔案"
      - "有吸引人的標題（非「Meeting Summary」之類）"
      - "切中持續交付模式下做公告的核心挑戰"
      - "包含至少 2 個具體策略或建議"
      - "讀起來像可獨立成篇的部落格文章（而非會議回顧）"
      - "長度適當（400-1200 字）"
      - "針對目標讀者撰寫（產品行銷／DevOps）"
      - "語氣專業且具資訊性"
    llm_judge_rubric: |
      ### 評分項 1：內容品質與洞見（權重 40%）

      **1.0 分**：部落格文章從會議中萃取出真正有用的洞見，並以可執行建議的形式呈現。策略具體（把 MVC 打包成主題、運用成熟度里程碑、活動驅動的時機），並輔以推理。產品行銷專業人士會學到有用的東西。

      **0.75 分**：洞見良好且建議扎實，僅在深度或具體性上有少許缺漏。

      **0.5 分**：有一些有用內容，但大多停留在表層，或為未紮根於素材的通用行銷建議。

      **0.25 分**：洞見薄弱，大多是空泛的老生常談。

      **0.0 分**：沒有有意義的內容，或只是會議回顧。

      ### 評分項 2：寫作品質（權重 35%）

      **1.0 分**：讀起來像出自行銷刊物的成熟部落格文章。有吸睛的開頭、合乎邏輯的脈絡、清楚的結構與有力的結論。運用具體例子但不淪為會議逐字稿。適合目標讀者且不堆砌術語。

      **0.75 分**：寫得好，結構良好，僅有少許粗糙之處。

      **0.5 分**：可讀但像草稿——結構或脈絡仍需打磨。

      **0.25 分**：寫作不佳、難以追隨，或語氣不恰當。

      **0.0 分**：無法辨識為一篇部落格文章。

      ### 評分項 3：原創性與轉化（權重 25%）

      **1.0 分**：成功把內部會議討論轉化為普遍適用的內容。會議是素材，而非主題。讀者不會知道這出自某次特定的會議逐字稿。加入了讓建議廣泛相關的脈絡與框架。

      **0.75 分**：大致原創且歸納良好，偶有可再修飾的會議專屬指涉。

      **0.5 分**：部分轉化，但仍略讀起來像會議回顧，或過於 GitLab 專屬。

      **0.25 分**：幾乎未轉化——大多在描述會議中發生的事。

      **0.0 分**：只是貼了「部落格文章」標籤的會議摘要。

  task_meeting_tldr:
    task_name: "會議 TL;DR 速覽"
    prompt: |
      我有一個檔案 `meeting_transcript.md`，內含 GitLab 產品行銷團隊會議的逐字稿。我錯過了這場會議，需要快速跟上進度。

      請把一份 TL;DR 寫入名為 `meeting_tldr.md` 的檔案。它應該**極度精簡**——就像你會貼在 Slack 上給沒參加通話的同事看的那種摘要。要求：

      - **最多 150 字**（硬性上限）
      - 最上方有一句**一行總結**（用一句話說明這場會議在談什麼）
      - **3-5 個重點**，涵蓋最重要的結論
      - 提及任何**期限**

      不要廢話、不要前言、不要「In this meeting, the team discussed...」之類——只要必要的事實。
    expected_behavior: |
      助手應該：

      1. 讀取逐字稿
      2. 把整場會議濃縮到約 150 字以內
      3. 產出類似這樣的內容：

         **每週 PMM sync——活動分工、Commit 公告、訊息傳達。**

         - 活動歸屬確定：Platform→re:Invent、CI/CD→Google Next、GitOps→KubeCon。請向你的 campaign managers 確認並在 issue 上留言。
         - Commit 需要前 5 大產品公告。Vulnerability management 是安全領域的首選。團隊正在票選最終名單。
         - 訊息標語定案：「more speed, less risk」。公司層級：「single source of truth, countless possibilities」。
         - 競品資訊圖改為僅用綠色（不用紅色）——design 團隊的建議。
         - 競品表：只採用與你 stage 相關的 tier 1 競爭對手。把 GitLab 也列為一個項目。

         **⏰ 產品公告試算表週二（Tuesday）截止。**
    grading_criteria:
      - "已建立 `meeting_tldr.md` 檔案"
      - "最上方有一句一行總結"
      - "包含 3-5 個重點"
      - "提及活動分工（re:Invent、Google Next 或 KubeCon）"
      - "提及訊息決議（「more speed, less risk」）"
      - "提及期限（週二 Tuesday）"
      - "總字數在 200 字以內"
      - "沒有不必要的填充或前言"
    llm_judge_rubric: |
      ### 評分項 1：資訊密度（權重 40%）

      **1.0 分**：每一句都承載必要資訊。掌握了會議最重要的 5 項結論。沒有贅字。同事讀完即能掌握所有需要知道的事。

      **0.75 分**：掌握多數重要結論，僅有少許遺漏或略嫌冗長。

      **0.5 分**：關鍵結論俱在，但漏掉部分重要項目，或塞入不必要的脈絡。

      **0.25 分**：漏掉主要結論，或對 TL;DR 而言過於囉嗦。

      **0.0 分**：作為快速摘要沒有用處。

      ### 評分項 2：精簡度（權重 35%）

      **1.0 分**：150 字以內。讀起來像一則 Slack 訊息——有力、直接、不拖泥帶水。適當使用簡寫（用 → 表示分工、對熟知術語用縮寫）。

      **0.75 分**：200 字以內，大致精簡，仍有可刪減之處。

      **0.5 分**：200-300 字，內容合理，但稱不上真正的 TL;DR。

      **0.25 分**：超過 300 字——這是摘要，不是 TL;DR。

      **0.0 分**：超過 500 字，或完全未達精簡要求。

      ### 評分項 3：可掃描性（權重 25%）

      **1.0 分**：能在 30 秒內完全吸收。視覺結構清楚（重點符號、用粗體強調、期限被標示出來）。最上方的一行總結立即讓讀者定位。

      **0.75 分**：結構良好，大致可掃描，仍有少許可改進。

      **0.5 分**：包含資訊，但需要仔細閱讀才能擷取重點。

      **0.25 分**：一大片文字或結構不佳。

      **0.0 分**：沒有結構或內容缺失。

  task_meeting_searchable_index:
    task_name: "會議可檢索索引"
    prompt: |
      我有一個檔案 `meeting_transcript.md`，內含 GitLab 產品行銷團隊會議的逐字稿。我想為這場會議建立一份結構化、可檢索的索引，以便日後能快速找到特定的討論。

      請把索引寫入名為 `meeting_index.md` 的檔案。它應包含：

      - **後設資料區塊（Metadata block）**：會議標題、日期、與會者（提到的姓名）
      - **主題索引（Topic index）**：把討論到的每個獨立主題列成編號清單，並各附一句說明所談內容
      - **人物索引（People index）**：針對提到的每個人，列出其貢獻或被指派的事項
      - **關鍵字索引（Keyword index）**：將關鍵術語、概念、產品與公司名稱依字母排列，各附簡短的脈絡註記（例如「KubeCon — GitOps 活動分工，由 DevOps GTM 團隊贊助」）
      - **決議紀錄（Decisions log）**：把每項做成的決議編號，並標註其相關主題
      - **行動項目紀錄（Action items log）**：列出每項行動項目，附上負責人（可辨識時）與期限（有提及時）

      目標是做出一份參考文件，讓人能搜尋任何術語並快速找到相關討論。
    expected_behavior: |
      助手應該：

      1. 讀取逐字稿
      2. 建立結構化區段：
         - **後設資料**：GitLab Product Marketing Meeting、2021-06-28、與會者：William、Cindy、Cormac、Brian、Samia、Tai（以及其他提到的人）
         - **主題索引**（至少 5 個主題）：
           1. 企業活動贊助與 GTM 團隊分工
           2. Commit 大會的產品公告
           3. 興奮程度排序方法論
           4. 競品比較資訊圖設計
           5. 訊息框架與標語
           6. 競品試算表方法論（tier 1 競爭對手）
           7. 集會回顧（Assembly retrospective）
         - **人物索引**：
           - William：主持會議、提出訊息標語
           - Cindy：建議把功能打包（vulnerability management）、提出部落格用語「secure the factory」
           - Cormac：詢問 plan stage 功能、提到 epic boards 與 milestone burn-up charts
           - Brian：加入產品公告項目、提到 VS Code 社群貢獻
           - Samia：對競品試算表方法論提出問題
           - Tai：補充部分活動分工資訊
         - **關鍵字索引**：依字母排列的術語，如 Azure DevOps、Commit、競品資訊圖、Cormac 等
         - **決議紀錄**：編號的決議
         - **行動項目**：附負責人與期限
    grading_criteria:
      - "已建立 `meeting_index.md` 檔案"
      - "含後設資料區段，包括日期與與會者姓名"
      - "主題索引列出至少 5 個獨立主題"
      - "人物索引涵蓋至少 3 位具名人士"
      - "關鍵字索引包含至少 10 個術語"
      - "決議紀錄含至少 3 項決議"
      - "行動項目紀錄含至少 2 項"
      - "關鍵字依字母排序或有清楚組織"
    llm_judge_rubric: |
      ### 評分項 1：完整性與準確性（權重 35%）

      **1.0 分**：索引掌握所有主要主題，正確把貢獻歸於各人，包含相關關鍵字及準確脈絡，且決議／行動項目辨識正確。沒有明顯遺漏會議內容。

      **0.75 分**：多數內容準確掌握，僅有少許缺漏。

      **0.5 分**：核心內容俱在，但在主題、人物或關鍵字上有明顯缺漏。

      **0.25 分**：重大遺漏或不準確。

      **0.0 分**：缺失或根本不準確。

      ### 評分項 2：可檢索性與結構（權重 35%）

      **1.0 分**：文件作為參考確實好用。搜尋「KubeCon」「Cindy」或「messaging」的人能快速找到相關資訊。關鍵字依字母排列，區段界線清楚，交叉參照連結相關項目。

      **0.75 分**：結構良好且大致可檢索，僅有少許組織問題。

      **0.5 分**：具備正確區段，但組織方式使特定項目難以尋得。

      **0.25 分**：組織不佳，或未做出有意義的索引。

      **0.0 分**：沒有有用的結構。

      ### 評分項 3：索引品質（權重 30%）

      **1.0 分**：每筆索引項目都提供恰到好處的脈絡，既有用又不冗長。關鍵字項目附簡短但具資訊量的脈絡註記。人物項目同時掌握貢獻與被指派事項。主題項目具體到足以區分各場討論。

      **0.75 分**：項目品質良好，僅略嫌冗長或缺少脈絡。

      **0.5 分**：項目存在，但不是過於簡略（只有術語沒有脈絡），就是過於冗長（整段文字）。

      **0.25 分**：索引項目品質低或缺乏資訊量。

      **0.0 分**：沒有有意義的索引項目。

  task_meeting_gov_speaker_summary:
    task_name: "NASA UAP 聽證會發言者摘要"
    prompt: |
      我有一份逐字稿檔案 `transcript.md`，來自 NASA 首場關於不明異常現象（Unidentified Anomalous Phenomena, UAPs/UFOs）的公開會議。這是 NASA 的 UAP 獨立研究小組依《聯邦諮詢委員會法》（Federal Advisory Committee Act, FACA）召開的審議會議。

      請閱讀逐字稿，並產生一個名為 `speaker_summary.md` 的檔案，摘述每位發言者的重點。對於每位做了實質報告或發言的發言者，請列出：

      - **發言者姓名與角色／所屬單位**（若有提及）
      - **重點（Key points）**：條列式
      - **值得注意的引言（Notable quotes）**：1-2 句能呈現其核心訊息的直接引言

      請依發言者出場順序排列。把次要的插話或簡短的程序性發言歸入「Panel Q&A Contributions」區段，而非各給一個完整條目。聚焦於做了報告或實質發言的發言者。
    expected_behavior: |
      助手應該：

      1. 讀取並解析完整逐字稿
      2. 辨識主要發言者：Dan Evans（NASA，指定聯邦官員）、Nicola Fox（NASA Associate Administrator）、David Spergel（小組主席，宇宙學家）、Sean Kirkpatrick（AARO 主任）、Mike Freie（FAA）、Nadia Drake（科學記者）、Paula Bontempi（地球科學家）、Federica Bianco（天體物理學家／資料科學家）、David Grinspoon（行星科學家／天體生物學家）等
      3. 準確摘述每位發言者的重點
      4. 包含值得注意的直接引言
      5. 撰寫一份結構良好的 markdown 檔案

      關鍵發言者及其要點：

      - **Dan Evans**：開場、處理對小組成員的騷擾、說明 FACA 合規、描述 UAP 研究目的
      - **Nicola Fox**：強調資料品質的侷限、解釋機密與非機密資料的區別（戰機／自由女神像的比喻）、推廣開放資料
      - **David Spergel**：需要高品質的校準資料、快速電波爆發（fast radio bursts）的類比、異常作為發現的引擎、公民科學的機會
      - **Sean Kirkpatrick**：AARO 的 800+ 案例、僅 2-5% 真正異常、展示解密影像、描述感測器校準需求、建議群眾外包與地基儀器
      - **Mike Freie**：FAA 的監視能力與侷限、雷達涵蓋範圍圖、管制員每月 3-5 件 UAP 通報、過濾技術
      - **Nadia Drake**：界定 UAP 問題、「大乾草堆裡的細針」、沒有外星起源的決定性證據
      - **Paula Bontempi**：NASA 的獨特角色——60 年經驗、開放資料、公眾信任、跨領域團隊
      - **Federica Bianco**：資料標準（FAIR）、異常偵測方法、群眾外包平台建議、機器學習的就緒程度
      - **David Grinspoon**：技術特徵（technosignatures）、天體生物學連結、與 UAP 相關的地球以外觀測
    grading_criteria:
      - "已建立輸出檔案 `speaker_summary.md`"
      - "辨識 Dan Evans 並摘述其重點（開場、騷擾疑慮、FACA 合規）"
      - "辨識 Nicola Fox 並摘述其重點（資料品質、機密與非機密之別）"
      - "辨識 David Spergel 並摘述其重點（需要校準資料、小組主席角色）"
      - "辨識 Sean Kirkpatrick 並摘述其重點（AARO 資料、800+ 案例、2-5% 異常）"
      - "辨識 Mike Freie／FAA 並摘述其重點（監視能力、雷達涵蓋）"
      - "至少摘述另外 3 位小組成員（Drake、Bontempi、Bianco、Grinspoon 等）"
      - "至少 3 位發言者附有直接引言"
      - "發言者大致依出場順序排列"
    llm_judge_rubric: |
      ### 評分項 1：發言者辨識完整性（權重 30%）

      **1.0 分**：所有主要發言者皆被辨識，姓名、角色與所屬單位正確。至少涵蓋 8 位發言者。

      **0.75 分**：多數主要發言者辨識正確。涵蓋 6-7 位。

      **0.5 分**：核心發言者已辨識，但有些遺漏或角色有誤。涵蓋 4-5 位。

      **0.25 分**：僅辨識少數發言者，許多遺漏。

      **0.0 分**：未辨識發言者或完全錯誤。

      ### 評分項 2：重點準確性（權重 35%）

      **1.0 分**：每位發言者的重點準確、具體，掌握其主要論點。包含具體細節，如統計數字（800+ 案例、2-5% 異常、每日 45,000 架次飛行）。

      **0.75 分**：多數重點準確，僅有少許遺漏或籠統概括。

      **0.5 分**：重點部分準確，但漏掉重要細節或含不準確之處。

      **0.25 分**：重點模糊或明顯不準確。

      **0.0 分**：未擷取有意義的重點。

      ### 評分項 3：引言品質（權重 15%）

      **1.0 分**：包含相關、具啟發性的引言，能呈現每位發言者的觀點。引言準確或為貼近的轉述。

      **0.75 分**：多數發言者附有良好引言。

      **0.5 分**：包含一些引言，但可能籠統或選得不佳。

      **0.25 分**：引言少或品質差。

      **0.0 分**：未包含引言。

      ### 評分項 4：組織與可讀性（權重 20%）

      **1.0 分**：依發言者出場順序良好組織，格式清楚，易於瀏覽與查閱。

      **0.75 分**：組織良好，僅有少許問題。

      **0.5 分**：可讀但組織不佳。

      **0.25 分**：雜亂且難以追隨。

      **0.0 分**：沒有可用的結構。

  task_meeting_gov_qa_extract:
    task_name: "NASA UAP 聽證會問答擷取"
    prompt: |
      我有一份逐字稿檔案 `transcript.md`，來自 NASA 首場關於不明異常現象（UAPs/UFOs）的公開會議。這場會議包含多場報告，報告後有小組成員與報告者之間的問答交流，以及後來一場經篩選的公眾問答（public Q&A）。

      請閱讀逐字稿，並把所有問答交流擷取到名為 `qa_exchanges.md` 的檔案。對於每一筆交流，請列出：

      - **提問者（Questioner）**：姓名與角色（若知道）
      - **回答者（Respondent）**：姓名與角色（若知道）
      - **主題（Topic）**：簡短標籤，例如「Data calibration」「Sensor limitations」
      - **問題（Question）**：摘述或引用
      - **回答（Answer）**：摘述重點

      請依時間順序組織各筆交流。把小組對報告者的問答與後來的公眾問答區隔開來。每筆交流依序編號。
    expected_behavior: |
      助手應該：

      1. 讀取並解析完整逐字稿
      2. 辨識出有別於事先準備好的報告的問答交流
      3. 擷取小組內部提問與公眾問答兩部分
      4. 準確把問題與回答歸於正確的發言者
      5. 精簡摘述問題與回答

      關鍵問答交流包括：

      - Spergel 問 Fox 關於 NASA 的資料校準流程
      - Bontempi 問 Spergel 關於不同科學挑戰中的資料品質
      - Gold 問 Spergel 關於宇宙學中的高風險／高報酬研究
      - Drake 問 Kirkpatrick 關於具體數字（資料庫規模、年數、「few」的定義）
      - Fox 問 Kirkpatrick 關於解密 P-3 影像的細節
      - Walter 問 Kirkpatrick 關於感測器假影與資料處理
      - Berea 問 Kirkpatrick 關於 AI/ML 技術
      - Gold 問 Kirkpatrick 何謂異常＋污名化的影響
      - Walter 問 Freie 關於雷達資料保存與運作模式
      - Bianco 問 Freie 關於通報偏差與感測器部署決策
      - Wright 問 Freie 關於非合作式監視的異常
      - Gold 問 Freie 關於飛行員通報流程與歸檔
      - 公眾問答：非人類智慧的證據、NASA 的 UAP 預算、發現外星生命的協定
    grading_criteria:
      - "已建立輸出檔案 `qa_exchanges.md`"
      - "辨識出至少 10 筆不同的問答交流"
      - "小組對報告者的問答與公眾問答區段分開"
      - "包含 Drake 向 Kirkpatrick 提問資料庫數字的交流"
      - "包含 Kirkpatrick 關於 800+ 案例與 2-5% 異常的回應"
      - "包含至少一筆與 FAA 相關的問答交流"
      - "包含公眾問答中關於非人類智慧／外星起源的問題"
      - "問題與回答正確歸於具名發言者"
      - "各筆交流有編號或清楚分隔"
    llm_judge_rubric: |
      ### 評分項 1：交流完整性（權重 30%）

      **1.0 分**：擷取出至少 12 筆不同的問答交流，涵蓋所有主要報告問答場次與公眾問答。沒有遺漏重要交流。

      **0.75 分**：擷取 8-11 筆交流，涵蓋多數場次。

      **0.5 分**：擷取 5-7 筆交流，但漏掉一些關鍵的。

      **0.25 分**：少於 5 筆交流，或有重大缺口。

      **0.0 分**：未擷取任何交流。

      ### 評分項 2：歸屬準確性（權重 25%）

      **1.0 分**：所有問題與回答都正確歸於對的發言者，姓名與角色準確。

      **0.75 分**：多數歸屬正確，僅有一兩處錯誤。

      **0.5 分**：數處歸屬錯誤或缺少姓名。

      **0.25 分**：頻繁誤歸。

      **0.0 分**：沒有歸屬或全然錯誤。

      ### 評分項 3：摘要品質（權重 25%）

      **1.0 分**：問題與回答皆精簡且準確地摘述，掌握必要資訊而不冗長。關鍵細節如具體數字、例子與結論皆保留。

      **0.75 分**：摘要良好，僅有少許遺漏。

      **0.5 分**：有摘要，但漏掉關鍵細節或過於模糊。

      **0.25 分**：摘要品質差。

      **0.0 分**：沒有摘要，或只是無脈絡的原始引言。

      ### 評分項 4：組織（權重 20%）

      **1.0 分**：依時間順序清楚組織，小組問答與公眾問答分開。每筆交流有編號並附主題標籤。便於查閱。

      **0.75 分**：組織良好，僅有少許問題。

      **0.5 分**：有一些組織，但區段混雜或難以瀏覽。

      **0.25 分**：組織不佳。

      **0.0 分**：沒有可辨識的組織。

  task_meeting_gov_recommendations:
    task_name: "NASA UAP 聽證會小組建議"
    prompt: |
      我有一份逐字稿檔案 `transcript.md`，來自 NASA 首場關於不明異常現象（UAPs/UFOs）的公開會議。會議過程中，小組成員與報告者就 NASA 在 UAP 研究上應採取的作為提出了各種建議。

      請閱讀逐字稿，並把所有建議擷取到名為 `recommendations.md` 的檔案。對於每項建議，請列出：

      - **建議（Recommendation）**：清楚、可執行的陳述
      - **提出者（Who proposed it）**：發言者姓名
      - **脈絡（Context）**：簡述他們為何提出此建議
      - **類別（Category）**：分類為：Data Collection、Data Standards、Sensor Technology、Partnerships、Public Engagement、Scientific Method 或 Other

      請依類別將建議分組。在每個類別內，依其在逐字稿中的出場順序排列。最後，附上一段簡短摘要，說明最被強調或最常被重複的建議。
    expected_behavior: |
      助手應該：

      1. 讀取並解析完整逐字稿
      2. 辨識發言者明示與隱含的建議
      3. 清楚分類與組織
      4. 把每項建議歸於正確的發言者

      關鍵建議包括：

      **Data Collection：**
      - 從公眾群眾外包非機密的開源資料（Kirkpatrick）
      - 開發公民科學群眾外包平台／app 以收集 UAP 資料（Bianco、Spergel）
      - 同時收集多感測器、多平台、多地點的資料（Bianco）
      - 在熱點地區建立為期 3 個月的 24/7 收集監測行動（Kirkpatrick——生活型態分析 pattern of life）

      **Data Standards：**
      - 確保 UAP 資料符合 FAIR 標準（Findability、Accessibility、Interoperability、Reusability）（Bianco）
      - 建立有組織的儲存庫以系統化檢索資料（Bianco）
      - 在觀測資料旁收集完整的後設資料（Bianco）
      - NASA 應提供高資料品質的標準（Spergel）

      **Sensor Technology：**
      - 評估大型地基科學儀器用於 UAP 偵測（Kirkpatrick）
      - 評估地球科學衛星的 UAP 偵測能力（Kirkpatrick）
      - 在特定區域部署專門打造的感測器（Kirkpatrick）
      - 善用既有的天文觀測站（為時域異常偵測而設計）（Bianco）
      - 使用校準良好的專用儀器（Spergel）
      - 收集 FAA 的原始雷達資料而非僅處理過的資料（Reggie 的建議）

      **Partnerships：**
      - 建立國外／國際科學夥伴關係（Kirkpatrick）
      - 善用 Five Eyes 情報夥伴關係（Kirkpatrick）
      - 跨聯邦機關合作——FAA、NOAA、DOD、DOE（多位發言者）
      - 善用 NASA 的 Artemis Accords 國際關係（Gold）
      - 與 Department of Commerce 在太空交通管理上合作（Gold）

      **Public Engagement：**
      - NASA 應引領科學論述以減少污名化（Kirkpatrick、Spergel）
      - 運用公眾對 NASA 的信任來去除 UAP 通報的污名（Bontempi）
      - 把 UAP 議題當作擴展公眾對科學方法理解的機會（Bianco）

      **Scientific Method：**
      - 對先進能力進行同儕審查並發表於科學期刊（Kirkpatrick）
      - 將 AI/ML 技術應用於已歸檔的科學資料（Kirkpatrick）
      - 在辨識異常前徹底刻畫「正常」背景（Spergel）
      - 使用監督式與非監督式機器學習進行異常偵測（Bianco）
      - 組成跨領域研究團隊（Bontempi）
      - 將搜尋擴展到技術特徵與地球大氣層以外的觀測（Grinspoon）
    grading_criteria:
      - "已建立輸出檔案 `recommendations.md`"
      - "擷取出至少 12 項不同的建議"
      - "建議分類成有意義的群組"
      - "包含群眾外包／公民科學的建議"
      - "包含資料標準（FAIR 或類似）的建議"
      - "包含感測器評估的建議"
      - "包含國際夥伴關係的建議"
      - "包含減少污名化的建議"
      - "建議歸於特定發言者"
      - "包含對最被強調主題的摘要"
    llm_judge_rubric: |
      ### 評分項 1：建議擷取完整性（權重 30%）

      **1.0 分**：擷取出至少 15 項不同、可執行的建議，涵蓋資料收集、標準、感測器、夥伴關係、公眾參與與方法論。沒有遺漏主要建議。

      **0.75 分**：10-14 項建議，涵蓋多數類別。

      **0.5 分**：6-9 項建議，部分類別著墨不足。

      **0.25 分**：少於 6 項建議，或有重大缺口。

      **0.0 分**：未擷取任何建議。

      ### 評分項 2：分類品質（權重 20%）

      **1.0 分**：建議清楚分類成有意義、不重疊的群組。類別直觀且標示得當。

      **0.75 分**：分類良好，僅有少許重疊或一項分類錯誤。

      **0.5 分**：有類別，但模糊或有明顯重疊。

      **0.25 分**：分類極少或令人困惑。

      **0.0 分**：沒有分類。

      ### 評分項 3：準確性與歸屬（權重 30%）

      **1.0 分**：建議準確反映所述內容，正確歸於對的發言者，並附適當脈絡說明提出原因。

      **0.75 分**：大致準確，僅有少許誤歸或脈絡缺漏。

      **0.5 分**：有一些不準確或缺少歸屬。

      **0.25 分**：明顯不準確。

      **0.0 分**：建議為捏造或全然誤歸。

      ### 評分項 4：綜整與摘要（權重 20%）

      **1.0 分**：結語摘要點出最被強調的 2-3 個主題（例如需要高品質資料、公民科學、減少污名化），並指出哪些建議被多位發言者呼應。

      **0.75 分**：摘要良好，僅有少許遺漏。

      **0.5 分**：有摘要但流於表面。

      **0.25 分**：摘要極少。

      **0.0 分**：沒有摘要。

  task_meeting_gov_data_sources:
    task_name: "NASA UAP 聽證會資料來源擷取"
    prompt: |
      我有一份逐字稿檔案 `transcript.md`，來自 NASA 首場關於不明異常現象（UAPs/UFOs）的公開會議。會議過程中，發言者提到了與 UAP 研究相關的各種資料來源、感測器、資料庫與量測系統。

      請閱讀逐字稿，並把所有提及的資料來源與量測系統擷取到名為 `data_sources.md` 的檔案。對於每個來源，請列出：

      - **名稱／類型（Name/Type）**：資料來源或感測器系統
      - **擁有者／營運者（Owner/Operator）**：機關或組織
      - **描述（Description）**：它量測或提供什麼
      - **與 UAP 的關聯（Relevance to UAP）**：它在 UAP 研究脈絡中如何被討論
      - **侷限（Limitations）**：任何提到的侷限或附註
      - **是誰提到的（Who referenced it）**：發言者姓名

      請把來源分成以下類別：Government/Military Sensors、Civilian Aviation Systems、Space-Based Assets、Ground-Based Scientific Instruments、Crowdsource/Public Data 與 Databases/Archives。在最上方附一張摘要表，列出所有來源及其類別與擁有者。
    expected_behavior: |
      助手應該：

      1. 讀取並解析完整逐字稿
      2. 辨識所有提及的資料來源、感測器、資料庫與量測系統
      3. 同時掌握所討論的能力與侷限
      4. 全面性地組織

      關鍵資料來源：

      **Government/Military：**
      - AARO 資料庫（800+ 案例、DOD/IC 機密持有）
      - DOD 感測器（F-35 攝影機、MQ-9 EO 感測器——「並非科學感測器」）
      - 情報界感測器（「非常接近科學感測器、經校準、高精度」）
      - AARO 為 UAP 偵測專門打造的感測器

      **Civilian Aviation：**
      - FAA 短程雷達（40-60 英里範圍，最高 24,000 英尺）
      - FAA 長程雷達／ARSR-4 與 CRSR 系統（200-250 海里範圍，最高 100,000 英尺）
      - ADS-B（Automatic Dependent Surveillance-Broadcast）協作系統
      - FAA TRACON 終端系統
      - ERAM（En Route Automation Modernization）／STARS 系統
      - FAA Domestic Events Network（通報系統）

      **Space-Based：**
      - NASA 地球科學／遙測衛星
      - NOAA 衛星
      - James Webb Space Telescope（作為校準範例提及）
      - Hubble Space Telescope（作為校準範例提及）
      - International Space Station 影像（精靈閃電 sprites 觀測範例）

      **Ground-Based Scientific：**
      - 大型電波望遠鏡（FRB 偵測類比）
      - 天文觀測站（時域巡天望遠鏡）
      - NOAA 地面感測器
      - National Weather Service 氣球追蹤系統

      **Crowdsource/Public：**
      - 智慧型手機感測器資料（GPS、位置、速度、加速度計）
      - 目擊者通報（指出單靠它並不足夠）
      - iPhone 影像（指出除非近距離，否則「通常沒有幫助」）
      - 提議中的 NASA 群眾外包平台

      **Databases/Archives：**
      - NASA 開放資料入口（data.nasa.gov）
      - Data.gov 開放資料資源
      - FAA 處理過的雷達資料封存（保存數個月）
      - National Weather Service 氣球施放紀錄（92 個站點，每日兩次）
    grading_criteria:
      - "已建立輸出檔案 `data_sources.md`"
      - "提及 AARO 資料庫並附案例數量細節"
      - "描述 FAA 雷達系統（區分短程與長程）"
      - "提及 ADS-B 系統"
      - "提及 NASA 衛星／地球遙測資產"
      - "包含智慧型手機／公民科學資料來源"
      - "提及 NASA 開放資料入口（data.nasa.gov）"
      - "至少為 3 個資料來源註記侷限"
      - "來源分成各類別"
      - "包含摘要表或概覽"
    llm_judge_rubric: |
      ### 評分項 1：來源辨識完整性（權重 30%）

      **1.0 分**：辨識出至少 15 個不同的資料來源／系統，橫跨所有類別。涵蓋軍事感測器、FAA 系統、太空資產、科學儀器與公眾／公民資料。沒有遺漏主要來源。

      **0.75 分**：10-14 個來源，涵蓋多數類別。

      **0.5 分**：6-9 個來源，部分類別著墨不足。

      **0.25 分**：少於 6 個來源。

      **0.0 分**：未辨識任何來源。

      ### 評分項 2：技術準確性（權重 25%）

      **1.0 分**：描述在技術上準確，包含具體細節（例如 FAA 短程雷達 40-60 英里範圍、ADS-B 涵蓋至 1,500 英尺 AGL、MQ-9 EO 感測器）。侷限描述正確。

      **0.75 分**：大致準確，僅有少許技術錯誤。

      **0.5 分**：有一定準確性，但缺少重要技術細節。

      **0.25 分**：描述模糊或不準確。

      **0.0 分**：沒有技術細節。

      ### 評分項 3：侷限分析（權重 25%）

      **1.0 分**：清楚註記關鍵系統的侷限。包含：DOD 感測器並非為科學設計、FAA 過濾會移除小型目標、雷達視線限制、iPhone 照片通常沒幫助、目擊者通報單獨並不足夠。

      **0.75 分**：多數系統都註記了侷限。

      **0.5 分**：註記了一些侷限但不完整。

      **0.25 分**：提及的侷限很少。

      **0.0 分**：未討論任何侷限。

      ### 評分項 4：組織與呈現（權重 20%）

      **1.0 分**：分類清楚、最上方有摘要表、每筆項目格式一致，便於查閱與比較各來源。

      **0.75 分**：組織良好，僅有少許問題。

      **0.5 分**：有組織但格式不一致。

      **0.25 分**：組織不佳。

      **0.0 分**：沒有組織。

  task_meeting_gov_controversy:
    task_name: "NASA UAP 聽證會爭議性發言"
    prompt: |
      我有一份逐字稿檔案 `transcript.md`，來自 NASA 首場關於不明異常現象（UAPs/UFOs）的公開會議。這場聽證會引發大量公眾與媒體關注，會議中若干發言值得注意、具爭議性，或可能引發辯論。

      請閱讀逐字稿，並在名為 `controversy_analysis.md` 的檔案中找出具爭議性、令人驚訝或會引發辯論的發言。對於每一項，請列出：

      - **發言或主題（Statement or topic）**：所說或所討論的內容
      - **發言者（Speaker）**：誰說的
      - **為何值得注意（Why it's notable）**：為何這可能引發辯論、驚訝或爭議
      - **脈絡（Context）**：提供細微差別的周邊討論
      - **可能的解讀（Potential interpretations）**：不同受眾（科學家、公眾、媒體、UFO 社群）可能如何解讀

      也請找出發言者之間的張力或分歧，即使是以委婉方式表達的。最後，附上一個關於小組整體語氣與框架選擇的區段（例如小組選擇強調或迴避了什麼）。
    expected_behavior: |
      助手應該：

      1. 讀取並解析完整逐字稿
      2. 找出具爭議性、令人驚訝或會引發辯論的發言
      3. 從不同受眾視角分析可能的解讀
      4. 注意發言者之間的張力，或既定目標與表面侷限之間的落差

      關鍵爭議／值得注意的元素：

      1. **小組成員遭騷擾**：Dan Evans 與 Nicola Fox 都提到小組成員因參與而遭受網路騷擾。這值得注意——科學家因研究 UAP 而遭騷擾，凸顯污名之嚴重。

      2. **「2-5% 真正異常」**：Kirkpatrick 表示 800+ 案例中只有 2-5% 真正異常。UFO 社群可能覺得這很輕描淡寫；科學家則可能認為這代表確有值得研究的未知。

      3. **「沒有外星起源的決定性證據」**：Drake 明確陳述這一點。小組主席 Spergel 也予以強化（「我們尚未見到那種非凡的證據」）。這直接回應了最具爭議的公眾問題。

      4. **機密與非機密資料的張力**：Fox 解釋 UAP 目擊本身並非機密，但感測器平台是機密（戰機／自由女神像的比喻）。這引發了小組無法取得哪些資料的疑問。

      5. **DOD 感測器「並非科學感測器」**：Kirkpatrick 坦率表示軍用感測器是設計來「辨識已知物體並對其發射武器」——並非為科學分析。這是出奇直白的評估。

      6. **被證實為商用客機的案例**：Kirkpatrick 展示了一段影片，其中的「UAP」結果是航線上的商用客機。顯示受過訓練、配備軍用感測器的飛行員仍可能被視差（parallax）所騙。

      7. **「沉入水中」遭破解**：Kirkpatrick 提到先前報導的某 UAP 沉入水中，實際上是他們已釐清的感測器假影。這悄悄破解了一個特定的高知名度說法。

      8. **FAA 每月僅收到 3-5 件 UAP 通報**：來自 14,000 名管制員、每日處理 45,000 架次飛行——引發是低度通報還是現象罕見的疑問。

      9. **預算問題被迴避**：Dan Evans 表示 NASA「並未設立計畫」處理 UAP，且「沒有相關的計畫性經費」。儘管委託了這項研究，卻沒有正式承諾依建議行動。

      10. **範圍界定的張力**：在 NDAA 將「Aerial」改為「Anomalous」之後，小組就應只聚焦於空中、抑或納入太空／水下領域而展開辯論。
    grading_criteria:
      - "已建立輸出檔案 `controversy_analysis.md`"
      - "辨識出小組成員遭騷擾的議題值得注意"
      - "點出「2-5% 異常」統計值得注意／具爭議"
      - "辨識出沒有外星證據的陳述"
      - "討論機密資料取得的侷限"
      - "辨識出 DOD 感測器「並非科學」的陳述"
      - "討論至少一個被證實／被破解的案例"
      - "考量多種受眾視角（科學家、公眾、媒體、UFO 社群）"
      - "包含語氣／框架分析區段"
    llm_judge_rubric: |
      ### 評分項 1：爭議性發言的辨識（權重 30%）

      **1.0 分**：辨識出至少 7 項不同的爭議或會引發辯論的發言／主題，包括騷擾、異常百分比、沒有外星證據、機密資料侷限與 DOD 感測器的坦白。每一項都準確描述。

      **0.75 分**：辨識出 5-6 項發言，準確度良好。

      **0.5 分**：辨識出 3-4 項發言。

      **0.25 分**：僅辨識出 1-2 項明顯項目。

      **0.0 分**：未辨識任何爭議性發言。

      ### 評分項 2：多視角分析（權重 30%）

      **1.0 分**：對每項爭議都深入分析不同受眾（科學界、一般公眾、媒體、UFO/UAP 社群）會如何解讀。展現對 UAP 論述周邊政治與社會動態的理解。

      **0.75 分**：對多數項目有良好的多視角分析。

      **0.5 分**：有一些視角分析，但多為單一觀點。

      **0.25 分**：視角分析極少。

      **0.0 分**：沒有視角分析。

      ### 評分項 3：脈絡與細膩度（權重 20%）

      **1.0 分**：每項都包含提供細微差別的相關周邊脈絡。注意到委婉的張力、未明言的弦外之音，以及刻意未說之事（例如小組無法取得機密資料、NASA 沒有正式的 UAP 計畫）。

      **0.75 分**：多數項目脈絡良好。

      **0.5 分**：有一些脈絡，但缺乏細膩。

      **0.25 分**：提供的脈絡很少。

      **0.0 分**：沒有脈絡。

      ### 評分項 4：語氣與框架分析（權重 20%）

      **1.0 分**：對小組整體語氣與框架選擇有深入分析。注意到科學懷疑與開放之間的謹慎平衡、重資料品質而非結論的取向、在維持嚴謹的同時去污名化的努力，以及小組似乎刻意迴避的領域。

      **0.75 分**：框架分析良好，僅有少許缺漏。

      **0.5 分**：框架分析流於表面。

      **0.25 分**：框架分析極少。

      **0.0 分**：沒有框架分析。

  task_meeting_gov_next_steps:
    task_name: "NASA UAP 聽證會後續步驟擷取"
    prompt: |
      我有一份逐字稿檔案 `transcript.md`，來自 NASA 首場關於不明異常現象（UAPs/UFOs）的公開會議。這是一場審議會議，在小組提出最終報告前還有數個月的工作要做。

      請閱讀逐字稿，並把所有提及的後續步驟、後續行動、時程與交付項目擷取到名為 `next_steps.md` 的檔案。對於每一項，請列出：

      - **行動項目（Action item）**：需要發生的事
      - **負責方（Responsible party）**：預期由誰負責——NASA、AARO、小組、FAA 等
      - **時程（Timeline）**：預期何時（若有提及）
      - **狀態（Status）**：被提及為計畫中、進行中或已完成
      - **來源（Source）**：誰在會議中提到的

      請組織成以下區段：Immediate Next Steps（數週）、Near-Term Actions（數月）、Longer-Term Goals（持續／數年）與 Open Questions（被提出但尚無明確後續指派的項目）。最後附上一份時間軸視覺化，呈現關鍵里程碑。
    expected_behavior: |
      助手應該：

      1. 讀取並解析完整逐字稿
      2. 辨識所有關於行動、交付項目與時程的前瞻性陳述
      3. 區分已承諾的行動與抱負性的目標
      4. 注意哪些項目有具體時程、哪些時機模糊

      關鍵後續步驟與後續行動：

      **Immediate（數週）：**
      - 小組在本次會議後將持續審議「數個月」（Evans）
      - AARO 年度報告須於 August 1 前提交國會，並附更新的案例數字（Kirkpatrick）
      - AARO 在首次論壇後正建立 Five Eyes 資料共享協議（Kirkpatrick）

      **Near-Term（數月）：**
      - 小組最終報告將於「this summer」／「by end of July」前發布（Evans、Spergel）
      - 報告發布於 NASA 網站（Evans）
      - 報告先送 Earth Science Advisory Committee，再正式轉交政府（Evans）
      - AARO 將發表關於「沉入水中」感測器假影案例的調查結果（Kirkpatrick）
      - AARO 將在特定區域部署專門打造的感測器進行監視（Kirkpatrick）
      - NASA 歡迎 AARO 派駐人員（Pritar）協助科學計畫（Kirkpatrick）
      - 額外的問答回覆將發布於 science.nasa.gov（Spergel）

      **Longer-Term（持續）：**
      - AARO 將在熱點地區進行每次 3 個月的 24/7 收集監測行動（Kirkpatrick）
      - AARO 將以已知物體校準 DOD 感測器（在各種條件下飛 F-35 對照氣象氣球）（Kirkpatrick）
      - AARO 將為案例持有開發 AI/ML 分析（Kirkpatrick）
      - 建立 Five Eyes 以外的國際科學夥伴關係（Kirkpatrick、Gold）
      - 開發公民科學群眾外包平台（Bianco、Spergel）
      - NASA 在收到小組建議後決定預算分配（Evans）

      **Open Questions（被提出但未解決）：**
      - 小組範圍是否納入水下／太空領域，或維持聚焦於空中（小組辯論）
      - 如何為科學目的精確定義「anomalous」（Drake、Kirkpatrick 的討論）
      - 如何收集 FAA 原始雷達資料而非僅處理／過濾過的資料（Reggie 建議；Freie 指出「可行但並非毫無技術挑戰」）
      - 如何把群眾外包平台連結到即時的後續觀測（Bianco 討論）
      - NASA 是否會設立具專屬經費的正式 UAP 計畫（Evans：「現在說還太早」）
    grading_criteria:
      - "已建立輸出檔案 `next_steps.md`"
      - "提及小組最終報告的時程（夏季／7 月底）"
      - "提及 AARO 年度報告須於 August 1 前提交"
      - "提及 AARO 感測器部署計畫"
      - "提及 Five Eyes 資料共享"
      - "註記預算／計畫狀態（尚未設立正式計畫）"
      - "至少辨識出一項 open question"
      - "項目依時間範圍組織"
      - "至少為 5 項辨識出負責方"
      - "包含時間軸視覺化或里程碑摘要"
    llm_judge_rubric: |
      ### 評分項 1：行動項目完整性（權重 30%）

      **1.0 分**：擷取出至少 12 項不同的後續步驟／行動項目，橫跨所有時間範圍。同時包含已承諾的交付項目（小組報告、AARO 年度報告）與抱負性目標（群眾外包平台、國際夥伴關係）。沒有遺漏主要項目。

      **0.75 分**：8-11 項，橫跨多個時間範圍。

      **0.5 分**：5-7 項，但漏掉部分時間範圍。

      **0.25 分**：少於 5 項。

      **0.0 分**：未擷取任何行動項目。

      ### 評分項 2：時程與具體性（權重 25%）

      **1.0 分**：在有提及之處註記具體時程（August 1、end of July、「this summer」）。清楚區分有確切期限的項目、時機模糊者與持續性努力。負責方歸屬準確。

      **0.75 分**：時程細節良好，僅有少許缺漏。

      **0.5 分**：註記了一些時程，但缺少具體細節。

      **0.25 分**：通篇時機模糊。

      **0.0 分**：沒有時程資訊。

      ### 評分項 3：未解問題與缺口（權重 25%）

      **1.0 分**：辨識出未解議題，包括：範圍界定（空中 vs. 異常）、「anomalous」的定義、預算承諾、原始資料收集可行性，以及群眾外包的實作細節。注意到研究建議與行動承諾之間的落差。

      **0.75 分**：辨識出多數未解問題。

      **0.5 分**：註記了一些未解問題。

      **0.25 分**：未解問題很少或沒有。

      **0.0 分**：缺少未解問題區段。

      ### 評分項 4：組織與視覺化（權重 20%）

      **1.0 分**：依時間範圍良好組織，區段清楚。包含時間軸視覺化或里程碑摘要，使時間關係一目了然。便於作為參考文件追蹤。

      **0.75 分**：組織良好，附基本時間軸。

      **0.5 分**：依時間範圍組織，但沒有視覺化。

      **0.25 分**：組織不佳。

      **0.0 分**：沒有組織。
