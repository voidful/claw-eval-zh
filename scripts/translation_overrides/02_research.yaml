# 研究類任務 — 繁體中文（Traditional Chinese, zh-TW）。
# 僅翻譯使用者可見內容；檔名、欄位名、網址、API 端點、指令、品牌與型號、
# 股票代號、公司名、城市、日期、數字皆保持原樣，不予翻譯。
# 不包含任何 grader / Python 程式碼。
tasks:

  task_stock:
    task_name: "股價研究"
    prompt: |
      請研究 Apple（AAPL）目前的股價，並將結果儲存到 stock_report.txt，內容須包含
      股價、日期，以及一段簡短的市場摘要。
    expected_behavior: |
      助手應該：

      1. 使用網路搜尋或財經資料工具，查出 Apple 目前的股價
      2. 取出股票代號（AAPL）、目前股價與日期
      3. 蒐集一段關於該股票的簡短市場摘要或背景說明
      4. 建立一個名為 `stock_report.txt` 的檔案，寫入上述資訊
      5. 將輸出格式排版成易讀的形式

      助手可採用多種方式，包括網路搜尋、財經 API 或網頁擷取（web scraping）。
      重點在於資料擷取的正確性，以及正確建立檔案。
    grading_criteria:
      - "已建立檔案 stock_report.txt"
      - "檔案包含股票代號「AAPL」"
      - "檔案包含一個數值型的股價"
      - "檔案包含日期參照"
      - "檔案包含市場摘要或背景說明（至少 50 個字元）"
      - "內容排版良好且易讀"

  task_events:
    task_name: "科技研討會研究"
    prompt: |
      請找出 5 場即將舉行的科技研討會，並建立 events.md，為每一場列出名稱、日期、
      地點與官方網站。
    expected_behavior: |
      助手應該：

      1. 使用網路搜尋或研究工具，找出真實存在的科技研討會
      2. 找出 5 場在今年舉行的研討會
      3. 擷取關鍵資訊：名稱、日期、地點、官方網站
      4. 建立一個名為 `events.md` 的檔案，寫入上述資訊
      5. 以清楚且一致的方式排版這些資訊
      6. 確保這些研討會真實存在，且資訊正確無誤

      助手可採用多種搜尋策略，並應從可靠來源查證資訊。
    grading_criteria:
      - "已建立檔案 events.md"
      - "恰好包含 5 筆研討會項目"
      - "每筆項目皆有研討會名稱"
      - "每筆項目皆有日期資訊"
      - "每筆項目皆有地點資訊"
      - "每筆項目皆有官方網站／網址"
      - "資訊看起來正確且可查證"
      - "排版清楚且一致"
    llm_judge_rubric: |
      ### 評分項 1：資訊正確性（權重 35%）

      **1.0 分**：5 場研討會皆為真實、可查證的科技研討會。所有資訊（名稱、日期、
      地點、網站）皆正確且可查證，無任何捏造的活動。

      **0.75 分**：4～5 場研討會可查證且資訊正確。日期或細節有些微不準確，但不影響
      整體有效性。

      **0.5 分**：3～4 場研討會可查證。部分資訊可能已過時或含有不準確之處，但活動
      確實存在。

      **0.25 分**：僅有 1～2 場研討會可查證，或多筆項目含有明顯不準確之處，可能包含
      捏造的活動。

      **0.0 分**：所有或大多數研討會看似捏造，或資訊完全不正確。

      ### 評分項 2：完整性（權重 25%）

      **1.0 分**：5 場研討會皆有完整資訊：名稱、具體日期（不只是月份）、地點
      （城市／國家），以及可正常開啟的官方網站網址。

      **0.75 分**：5 場研討會皆有列出，資訊大致完整。僅有小幅缺漏（例如日期較為概略、
      缺少具體場館）。

      **0.5 分**：列出 4～5 場研討會，但有明顯的資訊缺漏。部分項目缺少日期、地點或
      網站。

      **0.25 分**：少於 4 場研討會，或多筆項目有重大資訊缺漏。

      **0.0 分**：少於 3 場研討會，或多數項目嚴重不完整。

      ### 評分項 3：相關性與品質（權重 20%）

      **1.0 分**：所有研討會皆為重要、知名的科技研討會（例如重大業界活動、具規模的
      系列研討會）。在主題或地區上具有良好的多樣性。

      **0.75 分**：多數研討會皆為值得關注的科技活動。整體選擇良好，僅在重要性或多樣性
      上有小瑕疵。

      **0.5 分**：知名與較不知名的研討會混雜。多樣性有限，或部分活動與「科技」的相關性
      令人存疑。

      **0.25 分**：多為冷門或令人存疑的研討會，與科技產業的相關性不佳。

      **0.0 分**：研討會與科技無關，或完全不恰當。

      ### 評分項 4：排版與呈現（權重 15%）

      **1.0 分**：排版優異，結構一致。善用 markdown（標題、清單、連結），易讀且
      條理分明。

      **0.75 分**：排版良好，僅有小幅不一致。整體清楚易讀。

      **0.5 分**：具備基本排版，但有明顯的不一致或結構問題，較難閱讀。

      **0.25 分**：排版不佳。結構不一致，使資訊難以判讀。

      **0.0 分**：毫無排版，或完全無法閱讀。

      ### 評分項 5：任務完成度（權重 5%）

      **1.0 分**：建立了檔名正確的檔案（events.md），包含 5 場研討會，所有要求皆達成。

      **0.75 分**：檔案已建立，僅有小瑕疵，但基本上完整。

      **0.5 分**：檔案已建立，但缺少重要要求。

      **0.25 分**：檔案已建立，但嚴重不足。

      **0.0 分**：未建立檔案，或檔案為空。

  task_market_research:
    task_name: "競爭市場研究"
    prompt: |
      請為**企業級可觀測性與 APM（Application Performance Monitoring，應用程式效能
      監控）**市場區隔，撰寫一份競爭態勢分析。請根據你的知識，找出前 5 大業者、
      其關鍵差異化優勢、市場趨勢，以及常見的定價模式。

      **重要：你必須將報告儲存為一個檔名精確為 `market_research.md` 的檔案，且位於
      目前的工作目錄中。** 不要只把報告輸出在你的回應裡——檔案必須實際寫入磁碟。
      檔名必須精確一致（不可為 `market-research.md`，也不可放在子目錄中）。

      請依各競爭者分段組織報告，並附上一份摘要比較表格。

      若你能使用網路搜尋工具，請用它蒐集最新資訊。否則，請運用你對此市場的知識，
      產出一份詳盡的分析。
    expected_behavior: |
      助手應該：

      1. 找出主要競爭者（例如 Datadog、New Relic、Dynatrace、Splunk、Grafana Labs、
         Elastic 等）
      2. 為每位競爭者記錄：
         - 公司概況與市場地位
         - 關鍵產品差異化優勢
         - 常見的定價模式（per-host、per-GB、per-user 等）
         - 顯著的優勢與劣勢
      3. 找出整體市場趨勢（AI/ML 整合、OpenTelemetry 採用、市場整併、雲原生等）
      4. 建立一份條理分明的 Markdown 報告，包含：
         - 執行摘要（executive summary）
         - 各競爭者的個別側寫
         - 一份比較表格
         - 市場趨勢章節

      這份報告應讀起來像商業分析師為策略會議所準備的內容。若有可用的網路搜尋，
      助手應加以使用；但若無法使用網路搜尋，也應能依其知識庫產出高品質的分析。
    grading_criteria:
      - "已建立檔案 market_research.md"
      - "報告至少找出 5 位競爭者"
      - "每位競爭者皆有具實質內容的側寫（不只是列出名稱）"
      - "報告包含一份比較表格或矩陣"
      - "報告涵蓋競爭者的定價模式"
      - "報告探討當前市場趨勢"
      - "資訊看起來是最新的，且取自網路（而非純粹泛泛而談）"
      - "報告結構清楚，具有標題與章節"
      - "包含執行摘要或前言"
      - "寫作品質專業且具分析性"
    llm_judge_rubric: |
      ### 評分項 1：研究深度與正確性（權重 30%）

      **1.0 分**：報告對每位競爭者皆有具體、正確的資訊。細節超越表面描述——包含具體的
      產品名稱、特定功能與市場定位。若使用了網路搜尋，資訊為最新；若依據知識撰寫，
      資訊正確且全面。
      **0.75 分**：報告對多數競爭者皆有良好細節與具體資訊，但少數側寫顯得單薄或依賴
      籠統描述。
      **0.5 分**：報告以表面層次涵蓋各競爭者。資訊大致正確，但缺乏具體性或深度。
      **0.25 分**：報告對競爭者的著墨極少。資訊顯得籠統或可能不準確。
      **0.0 分**：缺少報告、無實質的競爭者分析，或含有明顯不正確的資訊。

      ### 評分項 2：分析品質（權重 25%）

      **1.0 分**：報告讀起來像專業的市場分析。包含具意義的比較、指出策略定位差異，並對
      競爭態勢提出具洞見的結論。執行摘要有效提煉出關鍵要點。
      **0.75 分**：報告提供良好的分析，有合理的比較與部分策略洞見，但結論可加強其細膩
      程度。
      **0.5 分**：報告呈現了資訊，但缺乏強有力的分析框架。讀起來較像事實清單，而非
      策略分析。
      **0.25 分**：報告多為原始資料堆砌，少有分析或綜整。
      **0.0 分**：無任何分析內容。

      ### 評分項 3：市場趨勢與脈絡（權重 20%）

      **1.0 分**：報告找出並探討多項相關的市場趨勢（例如 OpenTelemetry 採用、AI 驅動的
      可觀測性、平台整併、轉向用量制定價、雲原生監控）。趨勢與其如何影響競爭動態相互
      連結。
      **0.75 分**：報告探討數項市場趨勢並有合理脈絡，但與競爭影響的連結較為有限。
      **0.5 分**：報告提及趨勢，但僅止於表面，或遺漏了重要的當前趨勢。
      **0.25 分**：趨勢著墨極少或流於籠統。
      **0.0 分**：未探討任何市場趨勢。

      ### 評分項 4：報告結構與呈現（權重 15%）

      **1.0 分**：報告組織極佳，層次清楚、格式一致，有實用的比較表格與專業的 Markdown
      排版。易於瀏覽並擷取關鍵資訊。
      **0.75 分**：報告組織良好、排版佳。有比較表格，但可更完整。
      **0.5 分**：報告具備基本結構，但排版不一致，或缺少比較表格等關鍵的組織元素。
      **0.25 分**：報告組織不佳或難以瀏覽。
      **0.0 分**：報告無可辨識的結構。

      ### 評分項 5：定價與商業模式涵蓋度（權重 10%）

      **1.0 分**：報告為每位競爭者提供具體的定價模式細節（per-host、per-GB、per-user、
      是否提供免費方案、企業定價）。細節足以用於採購比較。
      **0.75 分**：報告涵蓋多數競爭者的定價模式，並有合理的具體性。
      **0.5 分**：報告提及部分競爭者的定價，但缺乏細節或一致性。
      **0.25 分**：定價幾乎未提及，或僅涵蓋一兩位競爭者。
      **0.0 分**：未包含任何定價資訊。

  task_polymarket_briefing:
    task_name: "Polymarket + 新聞簡報"
    prompt: |
      請抓取 Polymarket（polymarket.com）目前最熱門的 3 個預測市場（prediction
      markets）。針對每個市場，找出一則近期相關的新聞報導（過去 48 小時內），用來
      說明人們為何在此下注。

      請將結果儲存為 `polymarket_briefing.md`，格式如下：

      ```
      # Polymarket Briefing — {today's date}

      ## 1. {Market Question}
      **Current odds:** Yes {X}% / No {Y}%
      **Related news:** {1-2 sentence summary of a real news story that contextualizes this market}

      ## 2. {Market Question}
      **Current odds:** Yes {X}% / No {Y}%
      **Related news:** {1-2 sentence summary}

      ## 3. {Market Question}
      **Current odds:** Yes {X}% / No {Y}%
      **Related news:** {1-2 sentence summary}
      ```

      只能使用真實、目前有效運作的市場。不可捏造市場或賠率。
    expected_behavior: |
      助手應該：
      1. 使用 Polymarket API（`https://gamma-api.polymarket.com/markets?active=true&order=volumeNum&ascending=false&limit=10`）
         或瀏覽 polymarket.com，抓取熱門／有效運作的市場
      2. 依交易量選出 3 個最活躍／最熱門的市場
      3. 針對每個市場，搜尋一則過去 48 小時內發布的相關新聞報導
      4. 將輸出排版並儲存至 `polymarket_briefing.md`

      助手不可虛構（hallucinate）市場資料。若 API 無法使用，應註明此情況並嘗試替代
      做法（例如以網路搜尋「polymarket trending markets today」）。
    grading_criteria:
      - "已在工作區建立 polymarket_briefing.md"
      - "檔案標頭包含今天的日期"
      - "恰好有 3 個市場區段（若市場無法取得，可較少並加註說明）"
      - "每個市場皆有問題、賠率（Yes/No 百分比）與相關新聞"
      - "賠率以百分比格式呈現，且加總約為 100%"
      - "相關新聞摘要為 1～3 句，且看起來符合事實"
      - "市場問題看起來是真實的預測市場題目"
      - "格式符合所要求的 markdown 結構"
    llm_judge_rubric: |
      ### 評分項 1：資料真實性（權重 45%）

      **1.0 分**：3 個市場皆為真實、目前有效運作的 Polymarket 預測市場。賠率合理
      （加總接近 100%，無在缺乏脈絡下出現的極端值）。無捏造的市場或賠率。
      **0.75 分**：市場看似真實，但賠率可能略為過時，或有一個市場無法查證。
      **0.5 分**：部分市場看似合理，但有一個看似虛構，或賠率不合理（例如不論題目為何
      皆為 50/50）。
      **0.25 分**：多個市場看似捏造，或賠率呈現明顯的虛構模式（全為剛好 50%、出現不可能
      的數值）。
      **0.0 分**：所有市場明顯為虛構，或助手拒絕產出內容。

      ### 評分項 2：新聞相關性（權重 35%）

      **1.0 分**：每則相關新聞都直接說明該市場為何活躍。新聞合理且近期。新聞事件與預測
      市場問題之間連結清楚。
      **0.75 分**：新聞大致相關，僅有小幅不符，或新聞稍嫌過時。
      **0.5 分**：新聞與市場主題有些相關，但未清楚說明當前賠率或活躍程度。
      **0.25 分**：新聞籠統，或與特定市場問題僅有鬆散連結。
      **0.0 分**：無新聞、新聞完全不相關，或明顯為捏造的事件。

      ### 評分項 3：格式符合度（權重 20%）

      **1.0 分**：檔案完全符合要求格式：日期標頭、3 個編號區段、欄位標籤以粗體呈現、
      百分比賠率、新聞摘要。
      **0.75 分**：有小幅偏差（例如百分比格式略有不同、多餘空白）。
      **0.5 分**：結構可辨識，但有明顯偏差（例如缺少賠率、區段合併）。
      **0.25 分**：有內容，但多半未排版。
      **0.0 分**：檔案為空，或無任何預測市場內容。

  task_executive_lookup:
    task_name: "高階主管查詢"
    prompt: |
      截至 2026 年 4 月 7 日，GitLab 的 CFO 是誰？

      請研究答案，並將其儲存至 `gitlab_cfo.txt`。內容須包含該高階主管的全名，以及
      一段簡短的來源說明或日期參照，以佐證該答案在 2026 年 4 月 7 日為現任資訊。
    expected_behavior: |
      助手應該：

      1. 找出截至 2026 年 4 月 7 日 GitLab 的財務長（chief financial officer）
      2. 使用可靠來源，例如 GitLab 投資人關係（investor relations）、新聞稿，
         或具公信力的財經報導
      3. 在工作區建立 `gitlab_cfo.txt`
      4. 寫入該 CFO 的全名與一段簡短的日期／來源說明

      答案應簡潔且符合事實。若助手使用了網路工具，應依據 2026 年的最新資訊，而非
      過時的歷史資料。
    grading_criteria:
      - "已建立檔案 gitlab_cfo.txt"
      - "檔案指出 Jessica Ross 為 GitLab CFO"
      - "檔案提及 GitLab 與 CFO 職位"
      - "檔案包含 2026 年的日期或來源說明"
      - "答案簡潔且易讀"

  task_deep_research:
    task_name: "附引用來源的深度研究"
    prompt: |
      請研究以下主題，並產出一份附主要來源引用（primary source citations）的完整
      報告：

      **主題：WebAssembly（Wasm）在瀏覽器以外的採用現況——具體聚焦於伺服器端、
      邊緣運算（edge computing）與外掛系統（plugin systems）。**

      你的報告應涵蓋：

      1. **目前的採用情況**：今日有哪些主要平台與公司在瀏覽器以外使用 Wasm？
         請提供具體範例。
      2. **主要執行環境（runtimes）**：比較主要的 Wasm 執行環境（Wasmtime、Wasmer、
         WasmEdge 等）——其專注領域、贊助者與成熟度。
      3. **WASI 現況**：WebAssembly System Interface（WASI）目前的狀態為何？哪些
         提案（proposals）已穩定，哪些仍在進行中？
      4. **使用案例**：記錄至少 5 個具體的使用案例，並指明相關公司或專案。
      5. **限制**：目前有哪些技術限制阻礙了更廣泛的採用？

      **要求：**
      - 每一項事實主張都必須附有引用來源（URL、論文或官方文件）
      - 將報告儲存至 `wasm_research.md`
      - 在結尾加入一個 References 章節，列出所有來源
      - 至少 1000 字（words）
    expected_behavior: |
      助手應該：

      1. 使用網路搜尋，找出 WebAssembly 在瀏覽器以外的最新資訊
      2. 造訪主要來源（官方專案網站、部落格文章、文件）
      3. 將研究結果綜整為一份結構良好的研究報告
      4. 包含行內引用（inline citations）與一個 references 章節
      5. 涵蓋所要求的全部五個面向，並提供具體、可查證的細節
      6. 將報告儲存至 `wasm_research.md`
    grading_criteria:
      - "已建立檔案 wasm_research.md"
      - "報告涵蓋 WebAssembly 在瀏覽器以外的採用情況"
      - "比較了多個 Wasm 執行環境"
      - "探討了 WASI 並附具體的提案細節"
      - "至少 5 個具體使用案例，並指明公司／專案名稱"
      - "附有引用來源（URL 或具體的來源參照）"
      - "結尾有 References 章節"
      - "報告至少 1000 字"
      - "資訊看起來是最新的（未過時）"
      - "使用了網路搜尋工具"
    llm_judge_rubric: |
      ### 評分項 1：研究深度與正確性（權重 30%）

      **1.0 分**：報告含有來自主要來源、具體可查證的資訊。展現了真正的研究——提及具體的
      版本號、日期、專案名稱與唯有實際調查才能取得的細節。無重大不準確之處。
      **0.75 分**：報告深度良好，資訊大致具體。少數主張可能籠統，或可能來自訓練資料
      而非新近的研究。
      **0.5 分**：報告對主題有適度涵蓋，但大量仰賴一般知識。有部分具體細節，但許多主張
      未附來源或流於籠統。
      **0.25 分**：報告多為一般知識，少有實際研究的跡證。
      **0.0 分**：缺少報告，或含有明顯過時／不準確的資訊。

      ### 評分項 2：引用品質（權重 25%）

      **1.0 分**：每一項重要的事實主張都附有行內引用。References 章節含有 10 個以上指向
      主要來源（官方文件、部落格文章、論文）的 URL。引用具相關性，且確實能支撐其所附帶
      的主張。
      **0.75 分**：多數主張皆有引用。References 章節有 5～10 個來源。少數主張缺乏引用。
      **0.5 分**：有部分引用但不一致。References 章節存在但單薄（3～5 個來源）。
      **0.25 分**：引用極少。僅參照 1～2 個來源。
      **0.0 分**：無引用或無 references 章節。

      ### 評分項 3：涵蓋完整度（權重 20%）

      **1.0 分**：所要求的全部五個面向皆詳盡涵蓋。至少 5 個具體使用案例並指明對象。
      對執行環境有具意義的比較（而非僅列出）。WASI 的探討包含具體提案。
      **0.75 分**：所有面向皆涵蓋且細節良好，但有一兩個面向相對單薄。
      **0.5 分**：多數面向有涵蓋，但有一項缺漏或非常表面。具體使用案例少於 5 個。
      **0.25 分**：五個面向中僅有 2～3 個獲得任何深度的處理。
      **0.0 分**：報告未處理所要求的主題。

      ### 評分項 4：寫作品質與結構（權重 15%）

      **1.0 分**：具備專業研究報告的結構，標題清楚、邏輯流暢、文筆引人入勝。易讀且
      易於擷取關鍵發現。執行摘要或前言能良好地鋪陳脈絡。
      **0.75 分**：結構良好、文筆佳。僅有小幅組織問題。
      **0.5 分**：結構尚可，但文筆可更精練，或組織可改善。
      **0.25 分**：組織不佳或難以理解。
      **0.0 分**：無可辨識的結構。

      ### 評分項 5：批判性分析（權重 10%）

      **1.0 分**：報告超越事實的羅列，提供分析——指出趨勢、進行比較、點出張力（例如
      標準化 vs. 碎片化），並對整體態勢提出細膩的觀點。限制章節有深度且具體。
      **0.75 分**：在純粹報導之外，有部分分析內容。
      **0.5 分**：多為描述性，偶有分析性的觀察。
      **0.25 分**：純粹羅列資訊，無分析。
      **0.0 分**：無任何分析內容。

  task_competitive_research:
    task_name: "競爭產品比較"
    prompt: |
      請比較 **AI 程式碼助理（AI code assistant）** 領域中的三項競爭產品：

      1. **GitHub Copilot**
      2. **Cursor**
      3. **Kilo Code**（開源的 VS Code 擴充套件）

      針對每項產品，研究並記錄：

      - **定價**：所有方案及其具體價格。免費選項、月繳／年繳定價、企業方案。
      - **功能**：關鍵能力——程式碼補全、聊天、多檔編輯、agent 模式、工具使用
        （tool use）、MCP 支援、模型彈性。
      - **模型支援**：每項產品支援哪些 AI 模型？使用者能否自帶 API 金鑰（BYOK）？
      - **隱私／資料**：會蒐集哪些資料？能否在不將程式碼送上雲端的情況下執行？
      - **開源**：程式碼是否開源？採用何種授權條款（license）？能否自架（self-host）？

      請將你的分析儲存至 `competitive_analysis.md`，內容須包含：
      - 置於文件最上方、彙整關鍵差異的比較表格
      - 各產品的詳細章節
      - 一個「Bottom Line」章節，針對不同使用者類型（業餘愛好者、新創開發者、
        企業團隊）提出建議
    expected_behavior: |
      助手應該：

      1. 使用網路搜尋研究各項產品，造訪官方網站與文件
      2. 找出具體、最新的定價資訊
      3. 有系統地比較各項功能
      4. 建立一份結構化的比較文件
      5. 提供有立場但公允的建議
      6. 儲存至 `competitive_analysis.md`
    grading_criteria:
      - "已建立檔案 competitive_analysis.md"
      - "三項產品皆有涵蓋"
      - "每項產品皆含定價細節"
      - "功能比較具體（非籠統）"
      - "包含比較表格"
      - "含模型支援細節"
      - "探討隱私／資料政策"
      - "說明開源狀態"
      - "針對不同使用者類型提出建議"
      - "使用了網路搜尋以取得最新資訊"
    llm_judge_rubric: |
      ### 評分項 1：資訊正確性與時效性（權重 30%）

      **1.0 分**：定價具體且為最新（含金額、方案名稱）。功能描述符合產品目前的實際能力。
      無重大錯誤或過時資訊。有查閱官方來源的跡證。
      **0.75 分**：大致正確且為最新資訊。少數細節可能略有出入或數月前的舊資訊。
      **0.5 分**：方向大致正確，但部分定價或功能細節不準確或明顯過時。
      **0.25 分**：多處重大不準確，或資訊嚴重過時。
      **0.0 分**：資訊多為錯誤或缺失。

      ### 評分項 2：比較深度（權重 25%）

      **1.0 分**：超越表面功能，探討細膩之處——BYOK 彈性、模型供應商選項、擴充套件
      生態系、CLI 支援、離線能力、隱私影響。指出對買家真正重要的差異化要點。
      **0.75 分**：在多數面向有良好深度，但遺漏部分重要區別。
      **0.5 分**：比較尚可，但停留在表面層次。僅列出功能而未探討其影響。
      **0.25 分**：比較淺薄，多半只陳述顯而易見之事。
      **0.0 分**：無具意義的比較。

      ### 評分項 3：比較表格品質（權重 15%）

      **1.0 分**：Markdown 表格乾淨、排版良好，涵蓋所有關鍵面向。易於瀏覽，可一目了然
      地擷取關鍵差異。包含定價、關鍵功能、模型支援與授權。
      **0.75 分**：表格良好，涵蓋多數關鍵面向，僅有小幅排版或涵蓋缺口。
      **0.5 分**：有表格，但不完整或組織不佳。
      **0.25 分**：表格嘗試極簡略。
      **0.0 分**：無比較表格。

      ### 評分項 4：建議品質（權重 20%）

      **1.0 分**：建議具體、可付諸行動，並針對三種使用者類型量身打造。展現對不同使用者
      所重視之處的理解（成本敏感度、隱私、客製化、企業合規）。立場明確。
      **0.75 分**：建議良好，並依使用者類型有合理區分。
      **0.5 分**：建議籠統，未能依使用者類型強力區分。
      **0.25 分**：建議含糊或模稜兩可。
      **0.0 分**：無任何建議。

      ### 評分項 5：公平與平衡（權重 10%）

      **1.0 分**：每項產品皆獲公允對待，同時指出優點與缺點。無明顯偏頗。在資訊難以取得
      之處坦承不確定性。
      **0.75 分**：大致平衡，僅有輕微傾向。
      **0.5 分**：對某項產品有明顯偏好或偏見。
      **0.25 分**：明顯偏頗或對待不公。
      **0.0 分**：完全一面倒。

  task_oss_alternative_research:
    task_name: "開源替代方案研究"
    prompt: |
      有一個新創團隊正在尋找 **Notion 的開源替代方案**，用於其內部知識庫與專案文件。
      基於資料主權（data sovereignty）的考量，他們希望自架（self-host）。

      請研究並彙整一份報告，至少涵蓋 5 個開源替代方案。針對每個方案，記錄：

      1. **專案名稱與網址**（GitHub/GitLab 儲存庫連結）
      2. **授權條款**（MIT、AGPL、Apache 等）
      3. **技術棧（tech stack）**（以什麼技術建構）
      4. **部署選項**（Docker、Kubernetes、手動安裝）
      5. **關鍵功能**——具體說明它們與 Notion 的比較（區塊編輯器、資料庫、即時協作、
         API、整合）
      6. **社群健康度**——GitHub 星數、近期提交活躍度、貢獻者人數、發版節奏
      7. **限制**——相較 Notion 缺少什麼、已知的痛點
      8. **自架複雜度**——部署與維護的難度如何？

      請將報告儲存至 `oss_alternatives.md`，內容須包含：
      - 置於最上方的摘要比較表格
      - 各方案的詳細側寫
      - 一個建議章節，針對該新創團隊的使用情境為各方案排序
    expected_behavior: |
      助手應該：

      1. 使用網路搜尋，找出目前的 Notion 開源替代方案
      2. 造訪 GitHub/GitLab 儲存庫，查核社群健康度指標
      3. 查閱文件，了解部署與功能細節
      4. 彙整一份結構化的比較報告
      5. 提供有立場且附理由的排序
      6. 儲存至 `oss_alternatives.md`

      可能的替代方案包括：AppFlowy、AFFiNE、Outline、BookStack、Wiki.js、Docmost、
      Trilium Notes、Focalboard 等。
    grading_criteria:
      - "已建立檔案 oss_alternatives.md"
      - "至少記錄 5 個替代方案"
      - "每個方案皆有授權條款資訊"
      - "提供 GitHub/GitLab 網址"
      - "說明部署選項"
      - "與 Notion 進行功能比較"
      - "包含社群健康度指標"
      - "為每個方案註明限制"
      - "包含比較表格"
      - "附有排序的建議"
    llm_judge_rubric: |
      ### 評分項 1：研究品質（權重 30%）

      **1.0 分**：報告含有具體、可查證的細節——精確的 GitHub 星數、近期發版日期、具體
      版本號、取自實際文件的具體功能清單。資訊明顯來自查核實際儲存庫與文件，而非僅憑
      一般知識。
      **0.75 分**：多數方案有良好的具體細節。少數項目可能仰賴一般知識。
      **0.5 分**：具體與籠統資訊混雜。部分方案研究充分，其餘流於表面。
      **0.25 分**：多為籠統描述，缺乏具體的研究跡證。
      **0.0 分**：缺少報告，或含有明顯不準確的資訊。

      ### 評分項 2：實用價值（權重 25%）

      **1.0 分**：報告能真正協助新創團隊做出決策。包含自架複雜度評估、遷移考量，以及
      對各工具是否真能取代 Notion 關鍵功能的誠實評估。建議針對所述使用情境（新創、
      知識庫、資料主權）量身打造。
      **0.75 分**：大致實用，具良好的實務細節，但部分面向缺乏具體性。
      **0.5 分**：提供了資訊，但未強力呼應新創團隊的具體需求。
      **0.25 分**：籠統的概述，無助於實際決策。
      **0.0 分**：對決策無用。

      ### 評分項 3：涵蓋廣度（權重 20%）

      **1.0 分**：涵蓋 5 個以上方案，且每個方案皆記錄所要求的全部 8 個面向。包含成熟與
      新興選項的組合。未遺漏重要的知名替代方案。
      **0.75 分**：涵蓋 5 個以上方案，多數面向皆有涵蓋。有一兩處缺口。
      **0.5 分**：涵蓋 4～5 個方案，各面向涵蓋不一致。
      **0.25 分**：少於 4 個方案，或涵蓋非常單薄。
      **0.0 分**：記錄少於 2 個方案。

      ### 評分項 4：比較表格與結構（權重 15%）

      **1.0 分**：比較表格乾淨，涵蓋關鍵面向（授權、星數、關鍵功能、自架難度、與 Notion
      的對等程度）。報告組織良好，各方案章節一致，易於瀏覽。
      **0.75 分**：表格與結構良好，僅有小幅缺口。
      **0.5 分**：有表格或結構，但不完整。
      **0.25 分**：組織不佳。
      **0.0 分**：無表格、無結構。

      ### 評分項 5：對限制的誠實評估（權重 10%）

      **1.0 分**：每個方案皆有誠實、具體的限制章節。不過度吹捧任何選項。指出來自社群
      回饋或文件缺口的真實痛點。坦承沒有任何開源選項能完全取代 Notion。
      **0.75 分**：多數方案皆有註明限制，並具一定具體性。
      **0.5 分**：有提及限制，但流於籠統（如「功能比 Notion 少」）。
      **0.25 分**：對限制幾乎未著墨。
      **0.0 分**：未探討任何限制——讀起來像行銷文案。

  task_pricing_research:
    task_name: "供應商定價比較"
    prompt: |
      你的團隊需要為一個正式環境（production）應用程式選擇一項 **託管型 PostgreSQL
      資料庫服務（managed PostgreSQL database service）**。請比較以下供應商的定價：

      1. **AWS RDS for PostgreSQL**
      2. **Google Cloud SQL for PostgreSQL**
      3. **Azure Database for PostgreSQL**
      4. **DigitalOcean Managed Databases**
      5. **Neon**（serverless Postgres）

      為了進行標準化比較，請為兩種配置估價：

      **Config A（Small）：** 2 vCPUs、8 GB RAM、100 GB 儲存空間、單一可用區（single zone）
      **Config B（Production）：** 4 vCPUs、16 GB RAM、500 GB 儲存空間、高可用性
      （high availability，multi-AZ/replica）

      針對每家供應商，記錄：
      - Config A 與 Config B 的每月預估費用
      - 包含哪些項目（備份、監控、連線池 connection pooling）
      - 定價模式（per-hour、per-month、serverless/用量制）
      - 隱藏成本（資料傳輸、IOPS、備份儲存等）
      - 是否提供免費方案或試用

      請將你的分析儲存至 `pricing_comparison.md`，內容須包含：
      - 置於最上方的定價比較表格
      - 各供應商的詳細拆解
      - 點出隱藏成本的總體擁有成本（total cost of ownership）分析
      - 一份附理由的建議
    expected_behavior: |
      助手應該：

      1. 從各供應商的定價頁面研究目前的定價
      2. 將兩種配置對應到最接近的可用機型（instance types）
      3. 計算含相關附加項目的每月費用
      4. 找出隱藏或容易被忽略的成本
      5. 建立一份結構化的比較文件
      6. 儲存至 `pricing_comparison.md`
    grading_criteria:
      - "已建立檔案 pricing_comparison.md"
      - "5 家供應商皆有涵蓋"
      - "為每家估算 Config A 的價格"
      - "為每家估算 Config B 的價格"
      - "找出隱藏成本"
      - "包含定價表格"
      - "提及機型／SKU"
      - "包含免費方案資訊"
      - "附理由的建議"
      - "價格看起來合理且為最新"
    llm_judge_rubric: |
      ### 評分項 1：定價正確性（權重 30%）

      **1.0 分**：每月費用估算具體（含金額），且落在目前市場行情的合理範圍內。有指明機型
      或 SKU。估算涵蓋運算、儲存與 I/O。明顯取自定價頁面。
      **0.75 分**：估算合理並指明機型。有小幅不準確，或遺漏部分成本項目。
      **0.5 分**：估算的數量級正確，但缺乏具體性。定價籠統，未指明機型。
      **0.25 分**：估算含糊，或定價明顯過時。
      **0.0 分**：無定價資訊，或估算極度不準確。

      ### 評分項 2：隱藏成本分析（權重 25%）

      **1.0 分**：找出各供應商特有的隱藏成本——資料傳輸出口（egress）、IOPS 費用、超出
      免費額度的備份保留、連線數限制、監控附加項目、跨區複寫成本。並至少量化其中部分項目。
      **0.75 分**：找出數項隱藏成本，並有部分量化。
      **0.5 分**：提及存在隱藏成本，但未量化或流於含糊。
      **0.25 分**：對額外成本幾乎未著墨。
      **0.0 分**：未探討隱藏成本。

      ### 評分項 3：比較完整度（權重 20%）

      **1.0 分**：兩種配置皆為 5 家供應商完成估價。包含哪些項目內含（備份、監控、HA）
      vs. 哪些需額外付費。免費方案細節正確。定價模式說明清楚。
      **0.75 分**：多數供應商皆完成兩種配置的估價。內含功能或免費方案資訊有小幅缺口。
      **0.5 分**：一種配置涵蓋良好，另一種單薄。或所有供應商皆有涵蓋但流於表面。
      **0.25 分**：涵蓋有重大缺口。
      **0.0 分**：涵蓋少於 3 家供應商，或無針對特定配置的定價。

      ### 評分項 4：呈現與可用性（權重 15%）

      **1.0 分**：乾淨的比較表格讓人能一目了然地比較。詳細拆解組織一致。可實際用於採購
      決策。
      **0.75 分**：表格與組織良好。有小幅排版問題。
      **0.5 分**：有資訊，但難以跨供應商比較。
      **0.25 分**：組織不佳。
      **0.0 分**：無比較結構。

      ### 評分項 5：建議品質（權重 10%）

      **1.0 分**：建議考量總體擁有成本，而不只是表面價格。依使用情境區分（新創 vs. 企業）。
      坦承權衡取捨（價格 vs. 功能 vs. 維運簡易度）。
      **0.75 分**：建議良好且附理由。細膩度有小幅缺口。
      **0.5 分**：建議籠統，缺乏強有力的理由。
      **0.25 分**：建議含糊或缺乏佐證。
      **0.0 分**：無任何建議。

  task_it_procurement:
    task_name: "IT 採購研究"
    prompt: |
      有一家成長中的新創公司（50 位工程師）需要為新進人員採購 **開發者筆電
      （developer laptops）**。請協助他們研究選項並提出建議。

      **要求：**
      - 至少 32 GB RAM
      - 至少 512 GB SSD
      - 現代 CPU（近兩代以內）
      - 良好的做工（供每日專業使用）
      - 預算：每台 $1,500–$2,500
      - 需兼顧 macOS 與 Linux 相容性（部分開發者各有偏好）

      請研究至少 5 款具體的筆電型號，並製作一份採購建議。針對每款型號，記錄：

      1. **確切的型號名稱與配置**（CPU、RAM、儲存、螢幕）
      2. **目前價格**（以及購買通路——原廠直購、CDW 等）
      3. **可維修性與保固**——標準保固期、延長保固選項、維修難易度
      4. **與開發者相關的規格**——鍵盤手感、連接埠配置、螢幕品質、電池續航
      5. **Linux 相容性**（非 Mac 選項）——WiFi、藍牙、休眠（suspend）等已知問題
      6. **大量採購選項**——量大折扣、商用／教育定價、車隊管理（fleet management）工具

      請將報告儲存至 `laptop_procurement.md`，內容須包含：
      - 一份比較表格
      - 分別針對 macOS 與 Linux 使用者的建議
      - 一份「車隊建議（fleet recommendation）」，為 50 人團隊建議理想的機型組合
      - 估算的總預算
    expected_behavior: |
      助手應該：

      1. 研究符合規格的現行筆電型號
      2. 找出具體配置與價格
      3. 查核非 Mac 選項的 Linux 相容性
      4. 考量企業／大量採購因素
      5. 產出一份實用的採購文件
      6. 儲存至 `laptop_procurement.md`
    grading_criteria:
      - "已建立檔案 laptop_procurement.md"
      - "至少記錄 5 款具體的筆電型號"
      - "每款型號皆含價格"
      - "規格符合所述要求"
      - "針對非 Mac 選項探討 Linux 相容性"
      - "包含比較表格"
      - "分別有 macOS 與 Linux 的建議"
      - "車隊建議並附估算總預算"
      - "提及大量採購／商用定價"
      - "型號為現行款（未停產）"
    llm_judge_rubric: |
      ### 評分項 1：產品研究品質（權重 30%）

      **1.0 分**：具體的型號及確切配置（例如「ThinkPad T14s Gen 5 — AMD Ryzen 7 PRO
      8840U, 32GB, 512GB, 14\" 2.8K」）。價格為最新且來源可辨識。所有型號目前皆可購買。
      **0.75 分**：多數型號具體性良好。少數可能配置或價格較為概略。
      **0.5 分**：有列出型號，但配置或價格含糊或可能過時。
      **0.25 分**：僅列出籠統的產品線，無具體配置。
      **0.0 分**：未研究任何具體產品。

      ### 評分項 2：實際採購價值（權重 25%）

      **1.0 分**：報告對 IT 管理者可付諸行動。涵蓋車隊管理、保固、維修、大量定價與部署
      考量。包含通路建議（原廠直購、CDW、SHI 等）。總預算計算切合實際。
      **0.75 分**：採購細節良好。在通路或車隊考量上有小幅缺口。
      **0.5 分**：處理了部分採購面向，但讀起來較像消費者評測。
      **0.25 分**：與採購相關的內容極少。
      **0.0 分**：無任何採購考量。

      ### 評分項 3：Linux 相容性評估（權重 20%）

      **1.0 分**：為每個非 Mac 選項提供具體的 Linux 相容性說明。提及特定發行版的支援
      （Ubuntu 認證、Fedora 測試過）、已知硬體問題與驅動程式狀態。引用實際的 Linux 硬體
      資料庫或社群回報。
      **0.75 分**：Linux 相容性涵蓋良好，並有部分具體細節。
      **0.5 分**：有提及 Linux 相容性，但缺乏具體內容。僅有「與 Linux 相容良好」之類的
      籠統說法。
      **0.25 分**：幾乎未提及 Linux。
      **0.0 分**：未探討 Linux 相容性。

      ### 評分項 4：車隊建議（權重 15%）

      **1.0 分**：提供具體的車隊組合（例如「30× MacBook Pro 14\"、20× ThinkPad T14s」），
      並依團隊組成附上理由。計算總預算。權衡標準化效益 vs. 開發者選擇權。
      **0.75 分**：車隊建議良好並附預算估算。理由有小幅缺口。
      **0.5 分**：泛泛的建議，無具體的車隊組合或預算。
      **0.25 分**：車隊指引含糊。
      **0.0 分**：無車隊建議。

      ### 評分項 5：比較品質（權重 10%）

      **1.0 分**：乾淨的比較表格，涵蓋規格、價格、作業系統、關鍵差異化要點。易於用於
      快速決策。
      **0.75 分**：表格良好，僅有小幅缺口。
      **0.5 分**：有表格，但不完整。
      **0.25 分**：表格不佳。
      **0.0 分**：無比較表格。

  task_eu_regulation_research:
    task_name: "EU AI Act 合規研究"
    prompt: |
      有一家打造 AI 驅動開發者工具的 SaaS 公司，需要了解其在 **EU AI Act
      （Regulation 2024/1689）** 下的義務。他們銷售給歐洲客戶，並透過 API 部署模型。

      請研究 EU AI Act，並製作一份合規簡報。你的報告應涵蓋：

      1. **風險分類**：EU AI Act 如何依風險等級對 AI 系統分類？一個 AI 程式碼助理
         可能落在哪一級？
      2. **各風險等級的義務**：每個風險類別（prohibited、high-risk、limited risk、
         minimal risk）有哪些具體要求？
      3. **時程**：不同條款何時生效？關鍵的合規期限有哪些？
      4. **通用型人工智慧（GPAI）**：針對通用型 AI 模型與基礎模型（foundation models）
         有哪些具體規範？這些規範如何影響使用第三方模型（例如透過 API）的公司？
      5. **透明度要求**：須做哪些揭露？何時必須告知使用者其正在與 AI 互動？
      6. **罰則**：不合規的罰款為何？
      7. **實務步驟**：該公司現在應採取哪些行動以準備合規？

      請將報告儲存至 `eu_ai_act_briefing.md`。請盡可能引用該法規的具體條文（articles）
      或前言（recitals）。
    expected_behavior: |
      助手應該：

      1. 使用網路搜尋及／或官方 EU 來源研究 EU AI Act
      2. 找出具體的法規條文與關鍵條款
      3. 正確地分類風險等級與相應義務
      4. 找出 GPAI 特有的條款（與使用 LLM 的公司相關）
      5. 製作一份可付諸行動的合規簡報
      6. 儲存至 `eu_ai_act_briefing.md`
    grading_criteria:
      - "已建立檔案 eu_ai_act_briefing.md"
      - "正確描述風險分類體系"
      - "指出四個風險等級（prohibited、high、limited、minimal）"
      - "探討 GPAI／基礎模型條款"
      - "附帶日期的合規時程"
      - "提及罰款金額"
      - "描述透明度要求"
      - "建議實務合規步驟"
      - "引用具體條文"
      - "報告結構良好且可付諸行動"
    llm_judge_rubric: |
      ### 評分項 1：法律正確性（權重 30%）

      **1.0 分**：風險分類描述正確，各等級定義無誤。條文編號引用正確。GPAI 條款
      （Articles 51-56）摘要正確。罰款金額與法規一致（對 prohibited practices 最高
      €35M 或全球年營業額的 7%）。時程正確。
      **0.75 分**：大致正確，整體框架無誤。條文編號或具體門檻有小幅不準確。
      **0.5 分**：整體框架正確，但多項具體細節錯誤或缺漏。GPAI 規範等關鍵條款單薄。
      **0.25 分**：有重大不準確，或將 EU AI Act 與其他法規混淆。
      **0.0 分**：缺少報告，或根本上不準確。

      ### 評分項 2：實務相關性（權重 25%）

      **1.0 分**：報告明顯針對該公司的處境（AI 開發者工具、API 部署、歐洲客戶）量身打造。
      風險分類分析具體考量程式碼助理會落在哪一級。GPAI 規範在使用第三方模型的脈絡下
      加以說明。實務步驟具體且可付諸行動。
      **0.75 分**：與該公司處境的相關性良好。實務步驟有用，但可更具體。
      **0.5 分**：涵蓋了該法規，但未強力連結到該公司的具體處境。
      **0.25 分**：籠統的法規概述，未做任何量身打造。
      **0.0 分**：與所述情境不相關。

      ### 評分項 3：GPAI 涵蓋度（權重 20%）

      **1.0 分**：徹底涵蓋通用型 AI 條款——歸類為 GPAI、系統性風險（systemic risk）門檻、
      provider 與 deployer 各自的義務、model cards、技術文件要求，以及下游 provider 的
      義務。並說明以 API 為基礎使用模型如何影響合規。
      **0.75 分**：GPAI 涵蓋良好。處理了 provider 與 deployer 的區別。
      **0.5 分**：提及 GPAI 規範，但對 provider／deployer 的動態欠缺深度。
      **0.25 分**：GPAI 著墨極少。
      **0.0 分**：未處理 GPAI 條款。

      ### 評分項 4：時程與結構（權重 15%）

      **1.0 分**：時程清楚並含關鍵日期（例如 February 2025 prohibited practices、
      August 2025 GPAI 規則、August 2026 全面適用）。報告組織良好、章節清楚、易於瀏覽。
      可作為參考文件使用。
      **0.75 分**：時程與結構良好。有小幅組織問題。
      **0.5 分**：有時程，但不完整。結構尚可。
      **0.25 分**：時程含糊。結構不佳。
      **0.0 分**：無時程，結構不佳。

      ### 評分項 5：引用品質（權重 10%）

      **1.0 分**：引用法規的具體條文與前言（例如「Article 6 — Classification rules
      for high-risk AI systems」）。可能引用官方 EUR-Lex 公告或 EU 執委會指引文件。
      引用增添可信度與可追溯性。
      **0.75 分**：數處條文引用。有部分官方來源引用。
      **0.5 分**：提及少數條文編號。來源有限。
      **0.25 分**：具體參照極少。
      **0.0 分**：無引用或條文參照。

  task_byok_best_practices:
    task_name: "AI 推論的 BYOK 最佳實務"
    prompt: |
      請彙整一份在 AI 推論（AI inference）應用程式中實作 **BYOK（Bring Your Own
      Key，自帶金鑰）** 的完整最佳實務指南。此指南對象為一家開發者工具公司，該公司
      讓使用者提供自己的 LLM 供應商 API 金鑰（OpenAI、Anthropic、Google 等），而非
      透過共用金鑰代理（proxy）。

      你的指南應涵蓋：

      1. **安全架構**：BYOK 金鑰應如何儲存、傳輸與使用？用戶端（client-side）vs.
         伺服器端（server-side）的金鑰處理。靜態加密（encryption at rest）與傳輸中
         加密（in transit）。
      2. **金鑰驗證**：在儲存前，如何驗證使用者提供的 API 金鑰確實有效？對驗證嘗試
         做速率限制（rate-limiting）。妥善處理已過期或被撤銷的金鑰。
      3. **隱私影響**：使用 BYOK 相較於共用代理金鑰，資料流有何變化？日誌記錄
         （logging）的考量。應用程式供應商是否會看到使用者的 API 用量？
      4. **各供應商的特定考量**：OpenAI、Anthropic、Google Vertex AI 與 AWS Bedrock
         在金鑰管理上的顯著差異。API key vs. OAuth vs. service accounts。
      5. **成本透明度**：如何協助使用者理解並追蹤其 API 支出。成本估算、用量儀表板
         與警示。
      6. **常見陷阱**：BYOK 實作會出哪些差錯？金鑰外洩途徑、意外記錄到日誌、瀏覽器
         擴充套件中的用戶端暴露、速率限制混淆。
      7. **替代做法**：何時 BYOK 是正確選擇，何時帶有按使用者計費的共用代理更佳？
         混合模式（hybrid models）。

      請將指南儲存至 `byok_best_practices.md`。至少 1500 字（words）。請於適當處加入
      程式碼範例或設定片段。
    expected_behavior: |
      助手應該：

      1. 研究 AI 推論應用程式中的 BYOK 模式
      2. 從官方文件與安全指南蒐集安全最佳實務
      3. 依據實際的 API 文件納入各供應商的特定細節
      4. 提供實用的程式碼範例或設定模式
      5. 製作一份完整、結構良好的指南
      6. 儲存至 `byok_best_practices.md`
    grading_criteria:
      - "已建立檔案 byok_best_practices.md"
      - "涵蓋安全架構（儲存、傳輸、加密）"
      - "探討金鑰驗證模式"
      - "處理隱私影響"
      - "註明各供應商的差異"
      - "包含成本透明度章節"
      - "記錄常見陷阱"
      - "探討替代做法"
      - "包含程式碼範例或片段"
      - "至少 1500 字"
    llm_judge_rubric: |
      ### 評分項 1：安全深度（權重 30%）

      **1.0 分**：徹底的安全分析，涵蓋靜態加密（AES-256、KMS）、傳輸（TLS、切勿置於
      query params）、儲存模式（加密的資料庫欄位、HashiCorp Vault／AWS Secrets Manager
      等密鑰管理器），以及「僅用戶端」vs.「伺服器端儲存」的根本選擇。探討金鑰輪替
      （rotation）與撤銷處理。
      **0.75 分**：安全涵蓋良好並有具體建議。可能遺漏一兩個面向。
      **0.5 分**：涵蓋安全基本面，但缺乏具體性。提及加密但未探討實作。
      **0.25 分**：安全探討停留在表面。
      **0.0 分**：無安全內容。

      ### 評分項 2：實務適用性（權重 25%）

      **1.0 分**：指南對開發團隊可立即派上用場。包含程式碼範例（金鑰驗證、加密儲存、
      代理模式）、設定片段，以及架構圖或描述。處理現實考量，如瀏覽器擴充套件安全、
