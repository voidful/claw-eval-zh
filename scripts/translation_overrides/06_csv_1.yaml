      - **平均壽命最低的後 10 國**（2007 年），附上其所屬大洲與確切的平均壽命數值
      - **各大洲平均壽命平均值**（2007 年）
      - **排名隨時間的變化**：比較 1952 與 2007 的前 5 國與後 5 國
      - 一段簡短的**總結**，說明排名中的關鍵型態（例如哪些大洲主導頂端／底端、有無
