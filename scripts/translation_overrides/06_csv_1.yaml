      - "正確列出 2007 年前 10 國並附平均壽命數值"
      - "正確找出 Japan 為第 1 名（82.603）"
      - "正確列出 2007 年後 10 國"
      - "正確找出 Swaziland 為最低（39.613）"
      - "計算並回報各大洲平均"
      - "指出 Africa 的大洲平均最低"
      - "包含歷史比較（1952 vs 2007）"
      - "提供型態總結"
    llm_judge_rubric: |
      ### 評分項 1：排名正確性（權重 35%）

      **1.0 分**：前 10 國與後 10 國皆正確找出，平均壽命數值準確。所有數值皆符合
      資料集。
      **0.75 分**：多數排名正確，僅有一、兩國位置不對或數值小錯。
      **0.5 分**：大方向正確（頂端／底端國家正確），但數個具體名次或數值錯誤。
      **0.25 分**：找出一些正確國家，但排名多半錯誤或不完整。
      **0.0 分**：未嘗試排名或完全錯誤。

      ### 評分項 2：分析深度（權重 30%）

      **1.0 分**：包含各大洲平均、歷史比較與具洞察力的型態分析。指出關鍵觀察，例如
      Africa 主導底端排名、最高與最低之間 43 年的差距，以及排名自 1952 至 2007 的
      變化。
      **0.75 分**：包含多數分析元素並有良好觀察，但缺少一個元件。
      **0.5 分**：有基本分析，但缺乏深度——缺少各大洲平均、歷史比較或型態分析其中之一。
      **0.25 分**：除列出國家外幾無分析。
      **0.0 分**：除原始數字外毫無分析。

      ### 評分項 3：報告結構與呈現（權重 20%）

      **1.0 分**：markdown 組織良好，分節清楚，以排版過的表格或清單呈現排名，由概覽到
      細節的脈絡流暢。
      **0.75 分**：組織良好，僅有小幅排版問題。
      **0.5 分**：內容齊備，但組織不佳。
      **0.25 分**：雜亂或不易閱讀。
      **0.0 分**：無報告或輸出無法使用。

      ### 評分項 4：完整性（權重 15%）

      **1.0 分**：所有要求元素皆齊備：前 10、後 10、各大洲平均、歷史比較與總結。
      **0.75 分**：多數元素齊備，僅有一處小缺漏。
      **0.5 分**：缺少數個要求元素。
      **0.25 分**：僅部分完成。
      **0.0 分**：報告缺漏或近乎空白。

  task_csv_life_exp_outliers:
    task_name: "平均壽命離群值偵測"
    prompt: |
      我的工作區中有一個 CSV 檔 `gapminder_life_expectancy.csv`，內含取自 Gapminder
      資料集的平均壽命資料。該檔有下列欄位：`country`、`year`、`pop`、`continent`、
      `lifeExp` 與 `gdpPercap`。資料涵蓋 5 大洲的 142 個國家，自 1952 至 2007 每 5 年
      一筆。

      請找出平均壽命資料中的離群值（outliers）與異常（anomalies），並將你的發現寫入
      名為 `life_exp_outliers.md` 的檔案。你的報告應包含：

      - **2007 年的統計離群值偵測**：使用 z-score 或 IQR 法找出平均壽命異常高或異常低
        的國家。回報所用方法、門檻，以及哪些國家屬於離群值。
      - **大洲內離群值**：找出 2007 年明顯偏離其所屬大洲平均的國家（例如某非洲國家的
        平均壽命遠高於非洲平均）。
      - **時序異常**：找出平均壽命在相鄰時間點（5 年區間）之間**下降**的國家。由於
        平均壽命通常隨時間上升，這類情形相當令人意外。列出國家、時間區間與下降幅度。
      - **最劇烈的單期下降**：找出所有國家中相鄰時間點之間最大的 5 次平均壽命下降。
      - 一段簡短的**分析**，說明可能驅動這些離群值與異常的因素（例如 HIV/AIDS 疫情、
        戰爭、種族滅絕）。
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔
      2. 對 2007 年資料套用統計方法（z-score 或 IQR）。以 z-score（離平均 >2 個標準差）
         找出 6 個低離群值：Swaziland (z=-2.27)、Mozambique (z=-2.06)、Zambia (z=-2.04)、
         Sierra Leone (z=-2.02)、Lesotho (z=-2.02)、Angola (z=-2.01)。無高離群值。
         以 IQR（1.5×IQR）則因分布甚廣（IQR=19.556）而找不到離群值。
      3. 找出 2007 年大洲內離群值——偏離其大洲平均 >1.5 個標準差的國家：
         - Africa：Reunion (76.442, z=2.25)、Libya (73.952)、Tunisia (73.923)、
           Algeria (72.301)、Mauritius (72.801)、Morocco (71.164)、Egypt (71.338) 偏高；
           Swaziland (39.613, z=-1.58) 偏低
         - Americas：Haiti (60.916, z=-2.86) 明顯偏低；Canada (80.653) 與
           Bolivia (65.554) 為離群值
         - Asia：Afghanistan (43.828, z=-3.38) 為極端離群值
         - Europe：Turkey (71.777)、Romania (72.476)、Bulgaria (73.005) 為低離群值
      4. 找出時序下降——平均壽命在相鄰 5 年區間之間下滑的國家
      5. 標示最劇烈的下降：Rwanda 1987-1992 (-20.421)、Zimbabwe 1992-1997 (-13.568)、
         Lesotho 1997-2002 (-10.965)、Swaziland 1997-2002 (-10.420)、
         Botswana 1992-1997 (-10.189)
      6. 將離群值連結到真實世界事件（南部非洲的 HIV/AIDS、盧安達種族滅絕、柬埔寨種族
         滅絕、戰爭）

      預期關鍵數值：

      - 2007 年 z-score 離群值（z < -2）：Swaziland、Mozambique、Zambia、Sierra Leone、
        Lesotho、Angola
      - 最嚴重的大洲內離群值：Asia 的 Afghanistan（z=-3.38）
      - 最大的單期下降：Rwanda 1987-1992（-20.421 年，自 44.02 降至 23.599）
      - 第二大：Zimbabwe 1992-1997（-13.568）
    grading_criteria:
      - "已建立報告檔 `life_exp_outliers.md`"
      - "描述統計離群值方法（z-score、IQR 或類似方法）"
      - "找出 2007 年低端離群值（Swaziland、Mozambique 等）"
      - "分析大洲內離群值"
      - "找出 Afghanistan 為 Asia 內的離群值"
      - "找出平均壽命的時序下降"
      - "找出 Rwanda 1987-1992 的下降為極端（約 20 年降幅）"
      - "列出最劇烈的下降並附幅度"
      - "提供真實世界的解釋（HIV/AIDS、衝突等）"
    llm_judge_rubric: |
      ### 評分項 1：統計嚴謹性（權重 30%）

      **1.0 分**：清楚描述所用統計方法，回報門檻與具體數值（z-score 或 IQR 界限），
      正確找出離群值及其統計量，並指出其侷限（例如分布甚廣時 IQR 可能標不出離群值）。
      **0.75 分**：使用有效的統計方法並正確找出多數離群值，但在門檻或方法論細節上有
      缺漏。
      **0.5 分**：找出離群值，但統計佐證薄弱或不清楚。
      **0.25 分**：提及離群值但缺乏適當的統計分析。
      **0.0 分**：未嘗試統計離群值偵測。

      ### 評分項 2：異常偵測廣度（權重 30%）

      **1.0 分**：涵蓋三類異常：全域統計離群值、大洲內離群值與時序下降。對每一類皆
      提供具體國家、時間區間與幅度。
      **0.75 分**：涵蓋至少兩類異常並具良好細節。
      **0.5 分**：將一類處理得當，或多類但流於表面。
      **0.25 分**：僅有基本的離群值辨識而無深度。
      **0.0 分**：無具意義的異常偵測。

      ### 評分項 3：脈絡分析（權重 25%）

      **1.0 分**：將離群值連結到真實世界事件（南部非洲的 HIV/AIDS 疫情、盧安達種族
      滅絕、柬埔寨赤柬、伊拉克／索馬利亞的戰爭），並有具體引述。
      **0.75 分**：對多數離群值提供合理解釋，但缺少一些關鍵連結。
      **0.5 分**：提供一些解釋，但缺乏具體性或遺漏主要成因。
      **0.25 分**：解釋含糊或籠統。
      **0.0 分**：未嘗試任何解釋。

      ### 評分項 4：報告品質（權重 15%）

      **1.0 分**：報告結構良好，分節清楚，以表格或排版過的清單呈現資料，由方法論到
      發現再到分析的脈絡合乎邏輯。
      **0.75 分**：結構良好，僅有小問題。
      **0.5 分**：內容齊備，但組織不佳。
      **0.25 分**：不易閱讀或缺少章節。
      **0.0 分**：無報告或輸出無法使用。

  task_csv_life_exp_change:
    task_name: "平均壽命隨時間的變化"
    prompt: |
      我的工作區中有一個 CSV 檔 `gapminder_life_expectancy.csv`，內含取自 Gapminder
      資料集的平均壽命資料。該檔有下列欄位：`country`、`year`、`pop`、`continent`、
      `lifeExp` 與 `gdpPercap`。資料涵蓋 5 大洲的 142 個國家，自 1952 至 2007 每 5 年
      一筆。

      請分析平均壽命隨時間的變化，並將你的發現寫入名為 `life_exp_change.md` 的檔案。
      你的報告應包含：

      - **全球趨勢**：計算每一年（1952 至 2007）的全球平均壽命，並描述整體走勢
      - **大洲層級趨勢**：計算每一年各大洲的平均壽命，並比較不同大洲的進展
      - **進步最多者**：找出自 1952 至 2007 平均壽命絕對增幅最大的 10 個國家，附上
        起始值、結束值與總變化
      - **進步最慢者／衰退者**：找出自 1952 至 2007 平均壽命改善最小（或衰退）的
        10 個國家
      - **收斂或發散**：分析最高與最低大洲平均之間的差距隨時間是縮小還是擴大
      - 一段簡短的**總結**，說明關鍵重點
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔
      2. 計算各年全球平均：1952 (49.058)、1957 (51.507)、1962 (53.609)、1967 (55.678)、
         1972 (57.647)、1977 (59.570)、1982 (61.533)、1987 (63.213)、1992 (64.160)、
         1997 (65.015)、2002 (65.695)、2007 (67.007)
      3. 計算各大洲平均，呈現 Europe／Oceania 居頂、Africa 居底，而 Asia 增幅最大
      4. 找出前 10 名進步者：Oman (+38.062)、Vietnam (+33.837)、Indonesia (+33.182)、
         Saudi Arabia (+32.902)、Libya (+31.229)、Korea Rep. (+31.170)、
         Nicaragua (+30.585)、West Bank and Gaza (+30.262)、Yemen Rep. (+30.150)、
         Gambia (+29.448)
      5. 找出後 10 名：Norway (+7.526)、Congo Dem. Rep. (+7.319)、Liberia (+7.198)、
         Rwanda (+6.242)、South Africa (+4.330)、Botswana (+3.106)、Lesotho (+0.454)、
         Zambia (+0.346)、Swaziland (-1.794)、Zimbabwe (-4.964)
      6. 分析收斂／發散：指出最高（Oceania/Europe）與最低（Africa）大洲平均之間的差距
         持續存在，且可能因 HIV/AIDS 而在 1990–2000 年代略為擴大

      預期關鍵數值：

      - 全球平均 1952：約 49.06，2007：約 67.01
      - 整體全球增幅：約 17.95 年
      - 進步最多者：Oman（+38.062，自 37.578 至 75.640）
      - 衰退最多者：Zimbabwe（-4.964，自 48.451 至 43.487）
      - 1952-2007 間僅有 2 國淨變化為負：Swaziland (-1.794)、Zimbabwe (-4.964)
    grading_criteria:
      - "已建立報告檔 `life_exp_change.md`"
      - "計算各年（或多數年份）的全球平均壽命"
      - "正確描述全球上升趨勢（55 年間自約 49 升至約 67）"
      - "計算並比較大洲層級趨勢"
      - "找出進步最多者，以 Oman 為第 1（+38 年）"
      - "找出進步最慢者／衰退者"
      - "找出 Zimbabwe 與 Swaziland 為唯二淨衰退的國家"
      - "包含收斂／發散分析"
      - "提供含關鍵重點的總結"
    llm_judge_rubric: |
      ### 評分項 1：資料分析正確性（權重 35%）

      **1.0 分**：所有計算數值皆正確——全球平均符合資料，前／後進步者皆正確找出且
      幅度準確，大洲趨勢準確。
      **0.75 分**：多數數值正確，僅有一、兩處輕微數值錯誤。
      **0.5 分**：整體趨勢正確，但數個具體數值錯誤或缺漏。
      **0.25 分**：有重大計算錯誤，或多數數值不正確。
      **0.0 分**：無任何正確計算。

      ### 評分項 2：趨勢分析深度（權重 30%）

      **1.0 分**：在全球、大洲與國家層級皆有完整分析。指出 1990 年後全球增幅趨緩、
      Africa 因 HIV/AIDS 而進展停滯、Asia 戲劇性追趕，以及少數倒退的國家。討論各大洲
      間的收斂／發散。
      **0.75 分**：多層級分析良好，但缺少一個維度或對成因著墨不足。
      **0.5 分**：在一、兩個層級有基本趨勢描述，但缺乏深度。
      **0.25 分**：分析流於表面，洞見甚少。
      **0.0 分**：無趨勢分析。

      ### 評分項 3：比較洞見（權重 20%）

      **1.0 分**：有效對比進步最多者與衰退者，說明中東／亞洲國家何以進步最多（起點低、
      快速發展），而南部非洲國家何以衰退（HIV/AIDS）。指出 Norway 增幅小（+7.5）是因
      其起點本就很高（1952 年 72.7）。
      **0.75 分**：比較良好，但缺少一些細緻之處。
      **0.5 分**：嘗試一些比較，但缺乏深度。
      **0.25 分**：比較分析極少。
      **0.0 分**：未在各群組間作比較。

      ### 評分項 4：完整性與呈現（權重 15%）

      **1.0 分**：所有要求元素皆齊備（全球趨勢、大洲趨勢、進步最多者、衰退者、收斂
      分析、總結），組織良好並含表格或排版過的資料。
      **0.75 分**：多數元素齊備且組織良好。
      **0.5 分**：缺少數個元素或組織不佳。
      **0.25 分**：不完整或雜亂。
      **0.0 分**：報告缺漏或無法使用。

  task_csv_gdp_ranking:
    task_name: "世界 GDP 各國排名"
    prompt: |
      我的工作區中有一個 CSV 檔 `world_gdp_2014.csv`，內含全球各國與屬地的 GDP 資料。
      該檔有三個欄位：`COUNTRY`、`GDP (BILLIONS)`（單位為美元）與 `CODE`（ISO 國家
      代碼）。共有 222 筆。

      請分析 GDP 排名，並將你的發現寫入 `gdp_ranking_report.md`。你的報告應包含：

      - **前 20 大經濟體**，依 GDP 由高至低排名，附上國名、GDP 數值，以及其佔世界 GDP
        的百分比份額
      - **後 10 小經濟體**，由 GDP 最低者往上排名
      - **摘要統計**：世界 GDP 總額、平均 GDP、中位數 GDP、最小值與最大值
      - **集中度分析**：前 5、前 10 與前 20 大經濟體各佔世界 GDP 總額的百分比
      - **「1 兆美元俱樂部」（$1 trillion club）**：列出所有 GDP 超過 1 兆美元的國家
        及其合計佔世界 GDP 的份額
      - 一段簡短的**總結段落**，解讀全球 GDP 的分布
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔（222 列）
      2. 依 GDP 由高至低排序
      3. 找出最大經濟體：United States，$17,420.0B
      4. 計算世界 GDP 總額（約 $78,285.45B）
      5. 計算各國的百分比份額
      6. 計算集中度指標（前 5、前 10、前 20 的份額）
      7. 找出 GDP 超過 1 兆美元的 15 個國家
      8. 計算摘要統計（平均約 $352.64B、中位數約 $21.52B）
      9. 撰寫一份結構良好的 markdown 報告

      預期關鍵數值：

      - 世界 GDP 總額：約 $78,285.45B
      - 第 1：United States（$17,420.0B，約 22.3%）
      - 第 2：China（$10,360.0B，約 13.2%）
      - 第 3：Japan（$4,770.0B，約 6.1%）
      - 第 4：Germany（$3,820.0B，約 4.9%）
      - 第 5：France（$2,902.0B，約 3.7%）
      - 前 5 份額：約 50.2%
      - 前 10 份額：約 64.6%
      - 前 20 份額：約 79.2%
      - 平均 GDP：約 $352.64B
      - 中位數 GDP：約 $21.52B
      - $1T+ 俱樂部：15 個國家
      - 最小經濟體：Niue（$0.01B）
    grading_criteria:
      - "已建立報告檔 `gdp_ranking_report.md`"
      - "正確列出前 20 大經濟體，第 1 為 United States"
      - "正確列出後 10 小經濟體，最小為 Niue"
      - "摘要統計包含總額、平均、中位數、最小值與最大值"
      - "集中度分析呈現前 5、前 10 與前 20 的份額"
      - "找出 1 兆美元俱樂部（15 個國家）"
      - "排名國家附上百分比份額"
      - "含解讀分布的總結段落"
    llm_judge_rubric: |
      ### 評分項 1：資料正確性（權重 35%）

      **1.0 分**：所有排名皆正確，統計符合預期值（總額約 $78,285B、平均約 $353B、
      中位數約 $21.5B），且百分比份額準確計算。
      **0.75 分**：排名與統計大致正確，僅有小幅四捨五入差異。
      **0.5 分**：頂端經濟體正確，但統計或較後排名有錯誤。
      **0.25 分**：排名或統計有數個重大錯誤。
      **0.0 分**：未嘗試分析或根本性錯誤。

      ### 評分項 2：分析深度（權重 30%）

      **1.0 分**：對 GDP 集中度提供具意義的解讀（平均與中位數間巨大差距反映極端偏態），
      討論美中主導地位，指出多數經濟體規模偏小，並為 $1T 俱樂部提供脈絡。
      **0.75 分**：解讀良好，僅有小缺漏。
      **0.5 分**：陳述事實，但解讀或洞見有限。
      **0.25 分**：除列出數字外幾無分析。
      **0.0 分**：未提供任何分析或解讀。

      ### 評分項 3：報告完整性（權重 20%）

      **1.0 分**：所有要求章節皆齊備：前 20、後 10、摘要統計、集中度分析、$1T 俱樂部、
      總結段落。
      **0.75 分**：多數章節齊備，僅有一處小缺漏。
      **0.5 分**：缺少數個章節。
      **0.25 分**：僅有一、兩個章節。
      **0.0 分**：報告缺漏或為空。

      ### 評分項 4：呈現品質（權重 15%）

      **1.0 分**：markdown 排版良好，以表格呈現排名，標題清楚、版面有條理。百分比份額
      清楚顯示於 GDP 數值旁。
      **0.75 分**：排版良好，僅有小問題。
      **0.5 分**：可讀但組織不佳。
      **0.25 分**：不易閱讀。
      **0.0 分**：無報告或無法閱讀。

  task_csv_gdp_per_capita:
    task_name: "世界人均 GDP 估算"
    prompt: |
      我的工作區中有一個 CSV 檔 `world_gdp_2014.csv`，內含全球各國與屬地的 GDP 資料。
      該檔有三個欄位：`COUNTRY`、`GDP (BILLIONS)`（單位為美元）與 `CODE`（ISO 國家
      代碼）。共有 222 筆。

      此資料集含有總 GDP，但沒有人口。請運用你對 2014 年**GDP 前 30 大經濟體**約略
      人口的知識，為每一國估算人均 GDP (GDP per capita)，並將你的發現寫入
      `gdp_per_capita_report.md`。你的報告應包含：

      - **依總 GDP 排序的前 30 大經濟體**，欄位包含：排名、國家、GDP（單位 billions）、
        估計人口，以及估計人均 GDP
      - **依人均 GDP 重新排名**：將同樣這 30 國依人均 GDP 由高至低重新排序
      - **關鍵觀察**：哪些大型經濟體在人均上排名最高、哪些最低，以及這對生活水準
        相對於經濟規模透露了什麼
      - **離群值與意外之處**：找出人均排名與其總 GDP 排名差異極大的國家（例如某前 10
        大經濟體在人均上卻排得很低，或某較小經濟體在人均上排得很高）
      - 一段簡短的**方法論說明**，闡明由於 CSV 缺乏人口資料，人口是依一般知識估算的
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔
      2. 依 GDP 排序以找出前 30 大經濟體
      3. 套用合理的 2014 年人口估計（依一般知識）
      4. 為每一國計算人均 GDP（GDP in billions × 1,000,000,000 / 人口）
      5. 依人均 GDP 重新排名
      6. 找出關於經濟規模相對於人均財富的關鍵洞見
      7. 撰寫一份含方法論說明、結構良好的 markdown 報告

      預期關鍵數值（約略，使用 2014 年人口）：

      依總 GDP 的前 30 大以下列開頭：US ($17,420B)、China ($10,360B)、Japan ($4,770B)、
      Germany ($3,820B)、France ($2,902B)

      前 30 國依人均排名大致應呈現：
      - 前 30 中人均最高者：Australia（約 $62k）、Sweden（約 $58k）、
        United States（約 $55k）、Netherlands（約 $52k）、Switzerland 不在內
        （依總 GDP 不在前 30）
      - 前 30 中人均最低者：India（約 $1.6k）、Nigeria（約 $3.4k）、Indonesia
        （約 $3.5k）、Pakistan（約 $1.3k，若在前 30 內）
      - China 人均：約 $7.5k，儘管總 GDP 排第 2
      - India 人均：約 $1.6k，儘管總 GDP 排第 10
    grading_criteria:
      - "已建立報告檔 `gdp_per_capita_report.md`"
      - "依總 GDP 列出前 30 大經濟體並附 GDP 數值"
      - "為每一國提供人口估計"
      - "為每一國計算人均 GDP"
      - "包含依人均 GDP 的重新排名"
      - "含關於規模相對於人均財富的關鍵觀察"
      - "找出離群值（例如 India／China 總 GDP 高但人均低）"
      - "含關於估計人口的方法論說明"
    llm_judge_rubric: |
      ### 評分項 1：人口估計品質（權重 30%）

      **1.0 分**：人口估計對 2014 年而言合理（例如 US 約 318M、China 約 1.36B、
      India 約 1.25B、Japan 約 127M、Germany 約 81M）。可接受小幅不準，但應落在
      合理範圍內。
      **0.75 分**：多數估計合理，僅少數明顯偏差。
      **0.5 分**：有提供估計，但數個明顯錯誤（偏差 >20%）。
      **0.25 分**：許多估計嚴重不準。
      **0.0 分**：未提供人口估計或完全捏造。

      ### 評分項 2：人均分析品質（權重 30%）

      **1.0 分**：在給定人口估計下，人均計算正確，重新排名做得妥當，且分析正確指出
      人口眾多的開發中國家（India、China、Indonesia）人均排名低得多，而較小的富裕
      國家排名較高。
      **0.75 分**：計算與重新排名大致正確，分析良好。
      **0.5 分**：算出部分人均值，但重新排名不完整或分析流於表面。
      **0.25 分**：有人均值但計算有重大錯誤。
      **0.0 分**：未嘗試人均分析。

      ### 評分項 3：洞見品質（權重 25%）

      **1.0 分**：清楚說明總 GDP 反映經濟規模、人均反映個人富裕程度。指出具體意外
      （例如 India 以 GDP 排第 10 但人均近墊底、Australia 為中型經濟體卻人均居頂）。
      討論人口在此分歧中的作用。
      **0.75 分**：洞見良好，僅有小缺漏。
      **0.5 分**：有基本觀察但缺乏更深入的解讀。
      **0.25 分**：觀察流於表面或不正確。
      **0.0 分**：未提供任何洞見。

      ### 評分項 4：方法論與呈現（權重 15%）

      **1.0 分**：方法論說明清楚、表格排版良好，並坦承估計上的侷限。承認人口數字
      為約略值。
      **0.75 分**：呈現良好，僅有小幅排版問題或方法論說明較簡短。
      **0.5 分**：可讀，但缺少方法論說明或表格排版不佳。
      **0.25 分**：不易閱讀或方法論不清楚。
      **0.0 分**：無報告或無法閱讀。

  task_csv_gdp_regions:
    task_name: "世界 GDP 區域分析"
    prompt: |
      我的工作區中有一個 CSV 檔 `world_gdp_2014.csv`，內含全球各國與屬地的 GDP 資料。
      該檔有三個欄位：`COUNTRY`、`GDP (BILLIONS)`（單位為美元）與 `CODE`（ISO 國家
      代碼）。共有 222 筆。

      此資料集不含區域（region）欄位。請運用你的世界地理知識，將每一國歸入下列其中
      一個區域：**North America**、**Europe**、**East Asia & Pacific**、
      **South Asia**、**Latin America & Caribbean**、
      **Middle East & North Africa**、**Sub-Saharan Africa** 與
      **Central Asia & Caucasus**。接著將區域分析寫入 `gdp_regions_report.md`。你的
      報告應包含：

      - **各區域 GDP 總額**，附上各區域的合計 GDP、國家數，以及佔世界 GDP 的百分比
        份額，並依總 GDP 由高至低排序
      - **各區域前 3 大經濟體**（國名與 GDP）
      - **區域比較**：哪 3 個區域主導全球經濟，其合計份額為何
      - **各區域平均每國 GDP**：哪個區域平均每國 GDP 最高、哪個最低，這代表什麼
      - **差距分析**：對每個區域計算最大與最小經濟體之間的比值——哪個區域呈現最大的
        內部差距
      - 一段簡短的**總結段落**，說明全球經濟產出的地理分布

      注意：部分國家可能存在歸類上的模糊（例如 Russia、Turkey）。請將它們歸入你認為
      最合適的區域，並註明任何邊界案例。
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔（222 筆）
      2. 運用地理知識將每一國歸入某區域
      3. 依區域聚合 GDP
      4. 計算百分比份額與平均
      5. 找出各區域前幾大經濟體
      6. 分析區域內部差距
      7. 撰寫一份結構良好的 markdown 報告

      預期關鍵數值（約略，視區域歸類而定）：

      - East Asia & Pacific：約 $21,000–27,000B（最大區域，由 China 與 Japan 帶動）
      - North America：約 $20,500B（3 國：US、Canada、Mexico）
      - Europe：約 $18,000–22,000B（視 Russia/Turkey 歸類，30–40 國）
      - South Asia：約 $2,500B（7 國，由 India 主導）
      - Latin America & Caribbean：約 $4,500B（20+ 國，由 Brazil 領銜）
      - Middle East & North Africa：約 $3,000–4,000B（由 Saudi Arabia 領銜）
      - Sub-Saharan Africa：約 $1,700B（40+ 國，由 Nigeria 領銜）
      - Central Asia & Caucasus：約 $400–500B（8 國，由 Kazakhstan 領銜）

      前 3 大區域合計應佔世界 GDP 約 75-80%。
      North America 平均每國 GDP 最高（僅 3 國，約 $6,800B/國）。
      Sub-Saharan Africa 平均最低（約 $35B/國，儘管筆數最多）。
    grading_criteria:
      - "已建立報告檔 `gdp_regions_report.md`"
      - "計算各區域 GDP 總額並附百分比份額"
      - "列出各區域前 3 大經濟體"
      - "找出三個主導區域並附合計份額"
      - "分析各區域平均每國 GDP"
      - "為各區域計算內部差距比值"
      - "註明邊界案例（Russia、Turkey 等）"
      - "含關於地理分布的總結段落"
    llm_judge_rubric: |
      ### 評分項 1：區域歸類正確性（權重 25%）

      **1.0 分**：各國歸入合理的區域。8 個區域涵蓋全部或近乎全部 222 筆。邊界案例
      （Russia、Turkey、Cyprus）獲得承認並說明理由。小型屬地處理合理。
      **0.75 分**：多數歸類正確，僅少數放錯且對邊界案例有所承認。
      **0.5 分**：大致正確，但漏掉重要國家或將數國放錯區域。
      **0.25 分**：許多歸類錯誤或涵蓋有大量缺口。
      **0.0 分**：未嘗試歸類或根本性錯誤。

      ### 評分項 2：量化分析（權重 30%）

      **1.0 分**：各區域總額、百分比、平均與差距比值皆正確計算。數字內部一致
      （百分比合計約 100%、各區域總額相加等於世界 GDP）。
      **0.75 分**：多數計算正確，僅有小幅落差。
      **0.5 分**：部分計算正確，但有明顯錯誤或缺少指標。
      **0.25 分**：有重大計算錯誤。
      **0.0 分**：未嘗試任何計算。

      ### 評分項 3：分析深度（權重 25%）

      **1.0 分**：對全球 GDP 分布提供具意義的洞見——North America 何以在平均上領先
      （僅 3 個大型經濟體）、Sub-Saharan Africa 何以平均偏低（眾多小型經濟體）、
      East Asia 總額何以由 China/Japan 帶動，以及差距比值透露的區域經濟結構。
      **0.75 分**：洞見良好，僅有小缺漏。
      **0.5 分**：有基本觀察但缺乏更深入的解讀。
      **0.25 分**：分析流於表面。
      **0.0 分**：未提供任何分析。

      ### 評分項 4：完整性與呈現（權重 20%）

      **1.0 分**：所有要求章節皆齊備，表格或清單排版良好，標題清楚、脈絡合乎邏輯。
      各區域前 3、平均、差距、主導區域與總結皆齊備。
      **0.75 分**：多數章節齊備且排版良好。
      **0.5 分**：缺少數個章節或排版不佳。
      **0.25 分**：內容極少。
      **0.0 分**：報告缺漏或為空。

  task_csv_stations_by_elevation:
    task_name: "Idaho 氣象站海拔排名"
    prompt: |
      我的工作區中有一個 CSV 檔 `idaho_weather_stations.csv`，內含 Idaho 各地 213 個
      氣象站的資料。該檔有下列欄位：`OBJECTID`、`Station Name`、`Station Code`、
      `Managing Agency`、`County`、`Longitude`、`Latitude`、`Elevation (feet)`、
      `x`、`y`。

      請依海拔（elevation）分析這些測站，並將你的發現寫入 `elevation_report.md`。你的
      報告應包含：

      - **海拔最高的前 10 個測站**，由高至低排名，包含測站名稱、海拔、所在郡（county）
        與管理機構（managing agency）
      - **海拔最低的後 10 個測站**，由低至高排名，包含測站名稱、海拔、所在郡與管理機構
      - **摘要統計**：所有測站的最小、最大、平均與中位數海拔
      - **依管理機構的海拔分布**：比較 NWS 測站與 NRCS 測站的平均海拔，並解釋其差異
      - **平均海拔最高的郡**（僅限有 3 個以上測站的郡）與平均海拔最低的郡（同樣僅限
        有 3 個以上測站的郡）
      - 一段簡短的**總結段落**，解讀海拔型態
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔（213 列，UTF-8 含 BOM）
      2. 依 `Elevation (feet)` 欄位排序測站
      3. 找出最高測站：MEADOW LAKE SNOTEL，9,150 ft（LEMHI 郡，NRCS）
      4. 找出最低測站：DWORSHAK FISH HATCHERY，995 ft（CLEARWATER 郡，NWS）
      5. 計算摘要統計：最小 995、最大 9150、平均約 4859、中位數約 4920
      6. 比較機構：NWS 平均約 3,993 ft（143 站）vs NRCS 平均約 6,628 ft（70 站）
      7. 找出郡層級的海拔型態（以 3 站以上為篩選）
      8. 撰寫一份結構良好的 markdown 報告

      預期關鍵數值：

      - 最高：MEADOW LAKE SNOTEL，9,150 ft
      - 最低：DWORSHAK FISH HATCHERY，995 ft
      - 平均海拔：約 4,859 ft
      - 中位數海拔：約 4,920 ft
      - NWS 平均：約 3,993 ft（143 站）
      - NRCS 平均：約 6,628 ft（70 站）
      - 前 10 包含：MEADOW LAKE SNOTEL (9150)、VIENNA MINE PILLOW (8960)、
        MILL CREEK SUMMIT SNOTEL (8800)、GALENA SUMMIT SNOTEL (8780)、
        DOLLARHIDE SUMMIT SNOTEL (8420)
    grading_criteria:
      - "已建立報告檔 `elevation_report.md`"
      - "列出海拔最高的前 10 站，第 1 正確（MEADOW LAKE SNOTEL，9150 ft）"
      - "列出海拔最低的後 10 站，第 1 正確（DWORSHAK FISH HATCHERY，995 ft）"
      - "摘要統計包含最小、最大、平均與中位數"
      - "包含 NWS 與 NRCS 海拔比較並附正確平均"
      - "含最高／最低平均海拔的郡層級分析"
      - "含解讀型態的總結段落"
    llm_judge_rubric: |
      ### 評分項 1：資料正確性（權重 35%）

      **1.0 分**：所有排名皆正確，統計準確（平均約 4859、中位數約 4920、前／後 10 正確），
      且各機構平均符合預期值。
      **0.75 分**：排名與統計大致正確，僅有小幅落差（例如平均差幾英尺）。
      **0.5 分**：最高與最低測站正確，但中間排名或統計有錯誤。
      **0.25 分**：排名或統計有數個重大錯誤。
      **0.0 分**：未嘗試分析或根本性錯誤。

      ### 評分項 2：分析深度（權重 30%）

      **1.0 分**：對 NWS 與 NRCS 差異提供具意義的解讀（NRCS/SNOTEL 測站為高海拔積雪
      監測站，NWS 測站位於有人口的河谷）、郡型態，以及海拔分布洞見。
      **0.75 分**：解讀良好，僅在說明機構差異上有小缺漏。
      **0.5 分**：陳述事實，但解讀或洞見有限。
      **0.25 分**：除列出數字外幾無分析。
      **0.0 分**：未提供任何分析或解讀。

      ### 評分項 3：報告完整性（權重 20%）

      **1.0 分**：所有要求章節皆齊備：前 10、後 10、摘要統計、機構比較、郡分析、
      總結段落。
      **0.75 分**：多數章節齊備，僅有一處小缺漏。
      **0.5 分**：缺少數個章節。
      **0.25 分**：僅有一、兩個章節。
      **0.0 分**：報告缺漏或為空。

      ### 評分項 4：呈現品質（權重 15%）

      **1.0 分**：markdown 排版良好，含表格、標題清楚、版面有條理。
      **0.75 分**：排版良好，僅有小問題。
      **0.5 分**：可讀但組織不佳。
      **0.25 分**：不易閱讀。
      **0.0 分**：無報告或無法閱讀。
