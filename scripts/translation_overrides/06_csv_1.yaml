# CSV 分析類任務（第一批）— 繁體中文（zh-TW）翻譯覆寫。
# 僅翻譯使用者可見內容（任務名稱、prompt、預期行為、評分標準、LLM 評審 rubric）。
# 不包含任何 grader / Python 程式碼；CSV 檔名、欄位名、輸出報告檔名、URL、識別字、
# 股票代碼、國家／城市名、數值、日期與門檻一律保留原文且不更動。
tasks:

  task_csv_stock_volatility:
    task_name: "Apple 股票 2014 年波動率分析"
    prompt: |
      我的工作區（workspace）中有一個 CSV 檔 `apple_stock_2014.csv`，內含 Apple
      (AAPL) 2014 年的調整後收盤價。該檔有兩個欄位：`AAPL_x`（日期，格式為
      YYYY-MM-DD）與 `AAPL_y`（調整後收盤價）。共有 240 個交易日的資料。

      請分析 Apple 股票 2014 年的每日波動率（daily volatility），並將你的發現寫入
      名為 `volatility_report.md` 的檔案。你的報告應包含：

      - **每日波動率指標**：計算每日百分比報酬（收盤對收盤，close-to-close），再
        計算這些每日報酬的標準差（standard deviation），作為波動率的衡量。
      - **年化波動率**：將每日標準差乘以 252 的平方根（square root of 252），以進行
        年化（annualize）。
      - **波動最大的前 5 個交易日**：依每日百分比變化的絕對值最大者排序，列出其日期
        與數值。
      - 該年度的**每日絕對百分比變化平均值**。
      - **各季波動率比較**：分別計算各季每日報酬的標準差（Q1：Jan-Mar、Q2：Apr-Jun、
        Q3：Jul-Sep、Q4：Oct-Dec），以呈現全年波動率的變化。
      - 一段簡短的**總結**，解讀波動率的型態。
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔
      2. 以 `(price_today - price_yesterday) / price_yesterday * 100` 計算每日百分比報酬
      3. 計算每日報酬的標準差（約 1.47%）
      4. 將波動率年化（約 23.35%）
      5. 依每日百分比變化的絕對值找出波動最大的前 5 個交易日
      6. 計算各季標準差以比較全年波動率
      7. 撰寫一份結構良好的 markdown 報告

      預期關鍵數值：

      - 每日報酬標準差：約 1.47%
      - 年化波動率：約 23.35%
      - 波動最大的前 5 日（依百分比變化絕對值）：
        1. 2014-01-28：-7.51%
        2. 2014-04-24：+7.40%
        3. 2014-10-21：+4.78%
        4. 2014-12-02：-4.47%
        5. 2014-09-04：-4.13%
      - 各季標準差：Q1 約 1.58%、Q2 約 1.39%、Q3 約 1.30%、Q4 約 1.64%
    grading_criteria:
      - "已建立報告檔 `volatility_report.md`"
      - "正確計算每日報酬標準差（約 1.47%）"
      - "正確計算年化波動率（約 23%）"
      - "找出波動最大的前 5 日並附正確日期"
      - "波動日附上每日百分比變化"
      - "包含各季波動率分解"
      - "包含每日報酬平均值或平均絕對變化"
      - "提供波動率型態的總結解讀"
    llm_judge_rubric: |
      ### 評分項 1：分析正確性（權重 35%）

      **1.0 分**：所有波動率指標皆正確計算：每日標準差（約 1.47%）、年化波動率
      （約 23%）、波動最大的日期符合預期值，且各季分解皆正確。
      **0.75 分**：多數指標正確，僅有一、兩處輕微的數值落差。
      **0.5 分**：部分指標正確，但有數個關鍵數字錯誤，或方法論部分不正確。
      **0.25 分**：僅少數指標正確；出現重大計算錯誤或方法論錯誤。
      **0.0 分**：無任何正確計算，或未嘗試分析。

      ### 評分項 2：波動率解讀（權重 30%）

      **1.0 分**：提供對波動率型態具意義的解讀，說明各季差異可能代表的意義，將高波動
      日連結到可能的市場事件（財報、產品發表），並為年化波動率數字提供情境脈絡。
      **0.75 分**：解讀良好，對型態與可能成因提供一些具意義的脈絡。
      **0.5 分**：基本解讀，能指出型態，但對成因或意涵著墨有限。
      **0.25 分**：解讀極少；大多只是呈現數字而缺乏脈絡。
      **0.0 分**：未提供解讀，或分析完全錯誤。

      ### 評分項 3：報告結構與呈現（權重 20%）

      **1.0 分**：報告組織良好，分節清楚，以表格呈現波動日與各季資料，排版適當，行文
      流暢有邏輯。
      **0.75 分**：報告有條理、可讀，僅有小幅排版問題。
      **0.5 分**：報告包含分析，但組織不佳或不易閱讀。
      **0.25 分**：報告雜亂或缺少主要章節。
      **0.0 分**：未建立報告，或報告為空／無法使用。

      ### 評分項 4：完整性（權重 15%）

      **1.0 分**：所有要求的元素皆齊備：每日標準差、年化波動率、波動最大的前 5 日、
      平均指標、各季比較與總結。
      **0.75 分**：多數要求元素齊備，僅有一、兩處小缺漏。
      **0.5 分**：缺少數個要求元素。
      **0.25 分**：僅有少數要求元素。
      **0.0 分**：報告缺漏或近乎空白。

  task_csv_stock_best_worst:
    task_name: "Apple 股票 2014 年最佳與最差交易日"
    prompt: |
      我的工作區中有一個 CSV 檔 `apple_stock_2014.csv`，內含 Apple (AAPL) 2014 年的
      調整後收盤價。該檔有兩個欄位：`AAPL_x`（日期，格式為 YYYY-MM-DD）與 `AAPL_y`
      （調整後收盤價）。共有 240 個交易日的資料。

      請找出 Apple 股票 2014 年最佳與最差的交易日，並將你的發現寫入名為
      `best_worst_days_report.md` 的檔案。你的報告應包含：

      - **最佳的前 5 個交易日**：每日百分比漲幅（收盤對收盤）最高的日子，列出日期、
        前一日價格、當日價格、價格變化（美元）與百分比變化。
      - **最差的前 5 個交易日**：每日百分比跌幅最大的日子，附上相同的細節。
      - **群聚分析**：指出是否有任何極端日彼此相鄰群聚（例如連續或相近的好日／壞日）。
      - **分布脈絡**：上漲日與下跌日各佔多少百分比？每日報酬平均值為何？
      - 一段簡短的**分析**，討論這些極端日可能反映出該股票的何種行為。
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔
      2. 計算全部 239 組相鄰日對的每日收盤對收盤百分比變化
      3. 排序以找出最佳與最差的日子
      4. 檢查極端日之間是否有群聚型態
      5. 計算上漲日／下跌日的占比
      6. 撰寫一份結構良好的 markdown 報告

      預期關鍵數值：

      - 最佳的前 5 日：
        1. 2014-04-24：+7.40%（+$5.49）
        2. 2014-10-21：+4.78%（+$4.66）
        3. 2014-12-10：+3.83%（+$4.20）
        4. 2014-04-29：+3.65%（+$2.93）
        5. 2014-01-15：+2.84%（+$2.13）
      - 最差的前 5 日：
        1. 2014-01-28：-7.51%（-$5.76）
        2. 2014-12-02：-4.47%（-$5.29）
        3. 2014-09-04：-4.13%（-$4.22）
        4. 2014-12-09：-3.43%（-$3.90）
        5. 2014-09-16：-2.92%（-$2.98）
    grading_criteria:
      - "已建立報告檔 `best_worst_days_report.md`"
      - "正確找出最佳的前 5 日並附日期"
      - "最佳日的百分比變化正確"
      - "正確找出最差的前 5 日並附日期"
      - "最差日的百分比變化正確"
      - "極端日附上美元價格變化"
      - "討論群聚型態"
      - "包含上漲日與下跌日的分布"
      - "提供總結分析"
    llm_judge_rubric: |
      ### 評分項 1：分析正確性（權重 35%）

      **1.0 分**：最佳與最差的前 5 日皆正確找出，日期、美元變化與百分比變化皆準確，
      且符合預期值。
      **0.75 分**：多數日子正確找出，僅有一、兩處數值或排序的小錯誤。
      **0.5 分**：找出數個正確日子，但有明顯的數值錯誤或項目缺漏。
      **0.25 分**：僅少數數值正確；在辨識或計算上有重大錯誤。
      **0.0 分**：無任何正確計算，或未嘗試分析。

      ### 評分項 2：型態分析（權重 25%）

      **1.0 分**：提供具洞察力的群聚分析，指出 12 月有兩個最差日相近、4 月有兩個最佳
      日相近、9 月有兩個最差日，並將型態連結到可能的市場事件。
      **0.75 分**：找出多數群聚型態並提供一些具意義的解讀。
      **0.5 分**：指出部分極端日的相近性，但分析有限。
      **0.25 分**：型態分析極少；大多只是列出日子而未檢視彼此關係。
      **0.0 分**：未提供群聚或型態分析。

      ### 評分項 3：報告結構與呈現（權重 25%）

      **1.0 分**：報告組織良好，以清楚的表格呈現最佳／最差日，排版正確並顯示所有要求
      的欄位（日期、價格、變化、百分比），由資料到分析的脈絡流暢。
      **0.75 分**：報告有條理、可讀，僅有小幅排版問題。
      **0.5 分**：報告包含分析，但組織不佳或缺少欄位細節。
      **0.25 分**：報告雜亂或缺少主要章節。
      **0.0 分**：未建立報告，或報告為空／無法使用。

      ### 評分項 4：脈絡與分布（權重 15%）

      **1.0 分**：包含上漲日／下跌日分布、每日報酬平均值，並將極端日相對於整體分布
      加以脈絡化。
      **0.75 分**：包含分布指標，僅有小缺漏。
      **0.5 分**：提供部分脈絡，但分布資料不完整。
      **0.25 分**：脈絡資訊非常有限。
      **0.0 分**：未提供任何分布脈絡。

  task_csv_finance_report:
    task_name: "Apple 股票 2014 年綜合財務報告"
    prompt: |
      我的工作區中有一個 CSV 檔 `apple_stock_2014.csv`，內含 Apple (AAPL) 2014 年的
      調整後收盤價。該檔有兩個欄位：`AAPL_x`（日期，格式為 YYYY-MM-DD）與 `AAPL_y`
      （調整後收盤價）。共有 240 個交易日的資料。

      請根據此 CSV 資料產出一份綜合財務報告（comprehensive finance report），並儲存至
      `finance_report.md`。這份報告應適合投資人或分析師審閱，並包含下列章節：

      1. **執行摘要（Executive Summary）**：簡述 Apple 股票 2014 年的表現，包含期初
         價格、期末價格與整體報酬。
      2. **價格表現（Price Performance）**：各月平均價格、各季報酬，並指出該年度的
         最高與最低價位及其日期。
      3. **波動率分析（Volatility Analysis）**：每日報酬統計（平均、標準差）、年化
         波動率，以及各季波動率比較。
      4. **值得注意的交易日（Notable Trading Days）**：依百分比計的最佳與最差前 3 大
         單日變動，附上日期與脈絡。
      5. **趨勢分析（Trend Analysis）**：關鍵趨勢期間（重大反彈與賣壓）、最長的連漲／
         連跌天數，以及任何可觀察到的型態。
      6. **風險指標（Risk Metrics）**：最大回撤（maximum drawdown，峰至谷的跌幅）
         及其日期，以及一個簡單的風險調整後報酬指標（例如報酬除以波動率）。
      7. **結論（Conclusion）**：關鍵重點，以及對該股票 2014 年表現的整體評估。
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔
      2. 進行涵蓋所有要求章節的綜合財務分析
      3. 從原始價格資料準確計算所有指標
      4. 以專業、結構良好的 markdown 報告呈現發現
      5. 同時包含量化資料與質性解讀

      預期關鍵數值：

      - 期初：$77.45（2014-01-02），期末：$110.03（2014-12-12），報酬：約 42%
      - 年度最高：約 $118.80（11 月底），年度最低：約 $69.00（2014-01-31）
      - 年化波動率：約 23%
      - 最佳日：2014-04-24（+7.40%），最差日：2014-01-28（-7.51%）
      - 最長連漲：8 月的 9 天
      - 由年初高點至 1 月 31 日低點的最大回撤：約 11%（自約 $77.45 至約 $69.00）
    grading_criteria:
      - "已建立報告檔 `finance_report.md`"
      - "包含含整體報酬的執行摘要"
      - "呈現各月或各季價格資料"
      - "計算並呈現波動率指標"
      - "找出最佳與最差交易日"
      - "包含含連漲／連跌辨識的趨勢分析"
      - "計算風險指標（回撤）"
      - "報告專業地結構化且可讀"
      - "結論提供具意義的投資洞見"
    llm_judge_rubric: |
      ### 評分項 1：分析深度與正確性（權重 30%）

      **1.0 分**：所有章節皆含準確的量化分析。價格表現、波動率、值得注意的日子、趨勢
      與風險指標皆正確計算。呈現多個衍生指標（報酬、標準差、年化波動率、回撤、風險
      調整後報酬）。數字符合預期值。
      **0.75 分**：多數章節含準確分析，僅有一、兩處輕微計算錯誤或缺少衍生指標。
      **0.5 分**：數個章節分析正確，但在重要區域有明顯計算錯誤或缺少指標（例如回撤
      錯誤、缺少波動率）。
      **0.25 分**：分析多半流於表面，或在多個章節含重大錯誤。
      **0.0 分**：無具意義的量化分析，或計算完全錯誤。

      ### 評分項 2：章節完整性（權重 25%）

      **1.0 分**：七個要求章節皆齊備且具實質內容：執行摘要、價格表現、波動率分析、
      值得注意的交易日、趨勢分析、風險指標與結論。每節皆涵蓋其指定的所有子要點。
      **0.75 分**：多數章節齊備且具實質內容，僅有一節缺漏或明顯不足。
      **0.5 分**：七節中至少四節齊備，但有數節缺漏或缺乏深度。
      **0.25 分**：僅有兩、三節且內容極少。
      **0.0 分**：報告缺漏，或僅有一節粗略內容。

      ### 評分項 3：專業呈現（權重 25%）

      **1.0 分**：報告讀來如同專業財務簡報。善用 markdown 排版（標題、數值表格）、
      組織有條理、各節脈絡清晰。資料以適當精度呈現（價格 2 位小數、合理四捨五入），
      並同時包含原始資料與解讀。
      **0.75 分**：排版良好，僅有小幅呈現問題（例如排版不一致、某節結構不佳）。
      **0.5 分**：報告可讀，但排版不一致或顯得業餘。資料呈現有顯著改進空間。
      **0.25 分**：排版不佳，資料呈現難以判讀。
      **0.0 分**：毫無排版，或完全無法閱讀。

      ### 評分項 4：洞見品質（權重 20%）

      **1.0 分**：報告提供超越原始數字的真正分析洞見。將價格變動連結到脈絡（例如 1 月
      可能反映財報、4 月突破、穩定吸籌期），並對風險／報酬作出具意義的結論。結論提供
      可採取行動的重點。
      **0.75 分**：洞見良好，含一些具意義的解讀與合理結論。
      **0.5 分**：有一些解讀性評論，但大多只是覆述數字而未增添分析價值。
      **0.25 分**：解讀極少；報告基本上是資料堆砌。
      **0.0 分**：未提供任何洞見或解讀，或內容完全錯誤。

  task_csv_temp_anomalies:
    task_name: "全球氣溫異常偵測"
    prompt: |
      我的工作區中有一個 CSV 檔 `global_temperature.csv`，內含全球氣溫距平
      （temperature anomaly）資料。該檔有三個欄位：`Source`（為 "GISTEMP" 或
      "gcag"）、`Year`（格式為 YYYY-MM）與 `Mean`（相對於某基準期的氣溫距平，
      單位 °C）。

      GISTEMP 資料涵蓋 1880–2023，gcag 資料涵蓋 1850–2024。

      請分析此資料集的氣溫異常，並將你的發現寫入名為 `anomaly_report.md` 的檔案。
      請聚焦於 GISTEMP 來源資料。你的報告應包含：

      - **極端月度距平**：在 GISTEMP 紀錄中找出最熱與最冷的單一月份及其數值
      - **統計離群值（statistical outliers）**：計算每個曆月（例如所有的一月、所有的
        二月）跨各年的平均與標準差，找出距平超過其月平均 2 個標準差以上（z-score > 2）
        的月份。至少列出最極端的前 10 個離群值及其 z-score
      - **最冷年份**：依年度平均距平找出最冷的 5 個年份
      - **最暖年份**：依年度平均距平找出最暖的 5 個年份
