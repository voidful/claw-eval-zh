      - 1980 年代平均：約 0.25°C
      - 2010 年代平均：約 0.80°C（最暖的完整十年）
      - 2020 年代平均（部分）：約 0.98°C
      - 最大的十年對十年暖化：1970 年代→1980 年代（+0.21°C）或
        2000 年代→2010 年代（+0.22°C）
