    prompt: |
      我的工作區中有一個 CSV 檔 `global_temperature.csv`，內含全球氣溫距平資料。該檔
      有三個欄位：`Source`（為 "GISTEMP" 或 "gcag"）、`Year`（格式為 YYYY-MM）與
