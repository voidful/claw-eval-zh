      | `.modal-content` | `.modal-dialog` |
      | `.cancel-btn` | `[data-action="close-modal"]` |
      | `.submit-btn` | `button[type="submit"]` |
    expected_behavior: |
      助手應該：

      1. 閱讀 `dashboard_component.html`，了解現行的 DOM 結構、class 名稱與 data 屬性
      2. 閱讀 `dashboard_tests.py`，找出每一個失效的選擇器
      3. 以對照表為指引，有系統地將每個選擇器更新為符合新的標記
      4. 保留所有測試邏輯、斷言的值與結構性模式——只應更動選擇器
      5. 將修正後的檔案儲存為 `dashboard_tests.py`

      修正後的選擇器應使用 HTML 中實際存在的 class 名稱與屬性（例如 `.sidebar-nav`、
      `.nav-items`、`[aria-current="page"]`、`.metric-card`、`.status-badge.status-active`、
      `[data-action="edit-member"]`、`.toast-container .toast-message`、`.modal-overlay`
      等）。
    grading_criteria:
      - "編輯後檔案 `dashboard_tests.py` 存在"
      - "檔案包含有效的 Python 語法"
      - "Sidebar 選擇器已更新（`.sidebar-nav`、`.nav-items`、`aria-current`）"
      - "Header 選擇器已更新（`.header-bar`、`.page-title`）"
      - "使用者選單選擇器已更新（`.avatar-btn`、`.dropdown-panel`）"
      - "Metric card 選擇器已更新（`.metrics-grid`、`.metric-card`、`.metric-label`、`.metric-value`、`.metric-trend`）"
      - "搜尋輸入框選擇器已更新（以 `.search-input` 取代 `#searchBox`）"
      - "表格選擇器已更新（以 `.data-section` 取代 `.members-table`）"
      - "排序表頭選擇器已更新（`th[data-sort]` 或 `th[aria-sort]`）"
      - "狀態標章選擇器已更新（`.status-badge`、`.status-active`、`.status-idle`、`.status-offline`）"
      - "編輯按鈕選擇器已更新（`data-action=\"edit-member\"`）"
      - "Toast 選擇器已更新（`.toast-container`、`.toast-message`）"
      - "分頁選擇器已更新（`.pagination-bar`、`.page-controls`、`.is-active`、`.page-info`）"
      - "Modal 選擇器已更新（`.modal-overlay`、`.modal-dialog`、`data-action=\"close-modal\"`、`button[type=\"submit\"]`）"
      - "檔案中沒有殘留任何舊選擇器"
    llm_judge_rubric: |
      ### 評分項 1：選擇器正確性與專一性（權重 40%）

      **1.0 分**：更新後的測試檔案中，每一個選擇器都精準對應 `dashboard_component.html`
      中的元素。選擇器使用正確的 class 名稱、data 屬性與結構性關係。沒有誤判——每個
      選擇器都恰好鎖定預期的元素。在 HTML 使用 data／ARIA 屬性而非樣式化 class 之處，
      適當使用了 `[aria-current="page"]`、`[data-action="edit-member"]` 與 `[data-sort]`
      等屬性選擇器。

      **0.75 分**：幾乎所有選擇器都正確。有一兩個小瑕疵（例如稍微過度指定但仍可運作的
      選擇器，或在更適合使用 data 屬性處改用了父層 class）。

      **0.5 分**：多數選擇器更新正確，但有數個不精準或部分錯誤（例如鎖定父層而非特定
      元素，或使用了近似的 class 名稱）。

      **0.25 分**：更新了部分選擇器，但有許多不準確，或在未對照實際 HTML 結構下憑空
      猜測。

      **0.0 分**：選擇器大致未變、捏造，或不對應實際的標記。

      ### 評分項 2：選擇器風格的一致性（權重 20%）

      **1.0 分**：更新後的選擇器在整個檔案中遵循一致的模式。若助手對互動元素使用 data
      屬性、對樣式化元素使用 class，這項慣例就被一致地套用。選擇器專一性適中——不會
      過於寬泛或不必要地深入。

      **0.75 分**：大致一致，僅有一兩處風格偏差。

      **0.5 分**：選擇器策略混雜——有些用 data 屬性、有些用深層巢狀路徑、有些用 class，
      沒有明確的理由。

      **0.25 分**：不一致且雜亂——選擇器的選擇沒有可辨識的模式。

      **0.0 分**：完全沒有一致性。

      ### 評分項 3：測試邏輯的保留（權重 25%）

      **1.0 分**：所有測試函式都保留了原本的結構、斷言值、預期數量與行為檢查。沒有移除、
      更動或破壞任何測試邏輯。註解與 docstring 都被保留。只有選擇器被修改。

      **0.75 分**：測試邏輯完整保留，僅有微不足道的外觀變更（例如重新排版某一行、更新
      某個註解）。

      **0.5 分**：多數測試邏輯被保留，但有一兩個斷言被不必要地更動（例如改變了預期數量
      或文字值）。

      **0.25 分**：有數個測試在選擇器修正之外，其邏輯也被修改。

      **0.0 分**：測試邏輯被大幅更動——測試可能不再驗證相同的行為。

      ### 評分項 4：整體程式碼品質（權重 15%）

      **1.0 分**：更新後的檔案是整潔、格式良好的 Python。import 維持不變。沒有語法
      錯誤。選擇器字串有正確的引號，並在需要處正確跳脫（escape）。檔案能在無 import 或
      語法錯誤的情況下執行。

      **0.75 分**：程式碼整潔，僅有些微風格問題（例如屬性選擇器的引號不一致）。

      **0.5 分**：有一些格式問題，或對非選擇器的程式碼做了不必要的更動。

      **0.25 分**：有明顯的程式碼品質問題——引號不匹配、字串損壞，或不必要的重構。

      **0.0 分**：檔案有語法錯誤，或無法 import。

  task_codebase_navigation:
    task_name: "程式庫導覽"
    prompt: |
      你拿到一個不熟悉的開源專案：GitHub 上的 **expressjs/express** 儲存庫
      （https://github.com/expressjs/express）。

      請回答下列關於這個程式庫中身分驗證（authentication）與請求處理運作方式的問題，
      並將你的答案儲存到 `codebase_report.md`。

      1. **路由（routing）在哪裡處理？** 找出負責路由比對與分派（dispatching）的
         檔案。請提供相對於儲存庫根目錄的檔案路徑。
      2. **request 與 response 物件在哪裡被擴充？** 找出新增 Express 專屬方法
         （例如 `res.send`、`res.json`、`req.params`）的檔案。請提供檔案路徑。
      3. **middleware 的執行是如何運作的？** 追蹤從請求抵達、到 middleware stack
         被執行的程式碼路徑。描述其中涉及的關鍵函式與檔案。
      4. **身分驗證 middleware 會在哪裡接入？** 根據這個架構，說明像 `passport`
         這樣的 middleware 會在何處、以何種方式整合。引用你所找到的具體程式碼模式。

      每個答案都請附上你所檢視的具體檔案路徑與行號範圍。在有助於說明時請使用程式碼
      片段。
    expected_behavior: |
      助手應該：

      1. clone 或瀏覽 Express.js 儲存庫以檢視其原始碼
      2. 在程式庫中導覽，找出路由邏輯（`lib/router/index.js`、`lib/router/route.js`、
         `lib/router/layer.js`）
      3. 找出 request／response 的擴充（`lib/request.js`、`lib/response.js`）
      4. 透過 router 的 `handle` 方法追蹤 middleware 的執行
      5. 說明 middleware 模式，以及 auth 會在何處接入
      6. 將一份結構良好的報告儲存到 `codebase_report.md`

      助手可使用 `git clone`、`gh` CLI、web fetch，或任意組合來探索程式碼。重點在於
      展現出導覽並理解一個不熟悉的程式庫的能力。
    grading_criteria:
      - "已建立檔案 `codebase_report.md`"
      - "報告找出路由相關檔案（lib/router/）"
      - "報告找出 request／response 擴充檔案"
      - "報告說明 middleware 的執行流程"
      - "報告討論身分驗證的整合接入點"
      - "檔案路徑具體且正確"
      - "包含程式碼片段或行號參照"
    llm_judge_rubric: |
      ### 評分項 1：程式庫理解（權重 35%）

      **1.0 分**：報告展現對 Express 內部運作的深入理解。正確找出 router、layer 與
      route 抽象。從 `app.handle` 一路追蹤到 router 分派的完整請求生命週期。引用具體
      函式及其角色。

      **0.75 分**：報告正確找出關鍵檔案並說明整體架構，但遺漏了 middleware 鏈或路由
      內部的一些細微之處。

      **0.5 分**：報告找出部分正確的檔案，但說明流於表面或含有些微不準確之處。

      **0.25 分**：報告提及 Express 的檔案，但對它們之間的關聯理解有限。

      **0.0 分**：報告缺失，或看不出有探索程式庫的跡象。

      ### 評分項 2：導覽策略（權重 25%）

      **1.0 分**：助手使用有效的策略來導覽程式庫——搜尋關鍵詞、追蹤 import、先閱讀進入
      點再深入細節。有系統化探索的證據。

      **0.75 分**：助手展現出合理的導覽能力，但本可更有效率或更有系統。

      **0.5 分**：助手找到一些相關程式碼，但導覽雜亂或缺乏效率。

      **0.25 分**：助手在尋找相關程式碼上明顯吃力。

      **0.0 分**：看不出有程式庫導覽的跡象。

      ### 評分項 3：具體性與佐證（權重 25%）

      **1.0 分**：報告包含具體的檔案路徑、行號或範圍，以及直接支持每個答案的程式碼
      片段。各項主張都有具體參照佐證。

      **0.75 分**：報告包含檔案路徑與部分程式碼參照，但並非所有主張都充分佐證。

      **0.5 分**：報告有一些檔案路徑，但缺少程式碼片段或具體的行號參照。

      **0.25 分**：報告多為籠統的陳述，缺乏具體的程式碼參照。

      **0.0 分**：沒有任何對原始碼的具體參照。

      ### 評分項 4：Auth 整合分析（權重 15%）

      **1.0 分**：清楚說明身分驗證 middleware 如何與 Express 的 middleware 模式整合。
      引用 `app.use()`、middleware 排序與 `next()` 模式。可能引用真實的 auth 函式庫。

      **0.75 分**：對 auth 整合說明良好，僅有些微缺漏。

      **0.5 分**：基本說明正確，但缺乏深度。

      **0.25 分**：說明含糊或部分不正確。

      **0.0 分**：沒有討論身分驗證的整合。

  task_browser_automation:
    task_name: "瀏覽器自動化工作流程"
    prompt: |
      工作區中有一個檔案 `shop.html`，它是一個自我完整（self-contained）、附帶購物車的
      電子商務商品頁。你的任務：

      1. 閱讀 `shop.html`，了解頁面結構、商品與購物車行為。
      2. 撰寫一支 **Playwright 端對端測試腳本**，使用 `playwright.sync_api`（Python
         同步 API），並儲存為 `test_shop.py`。
      3. 該腳本應自動化下列多步驟工作流程：
         - 開啟頁面
         - 確認「Webcam HD 1080p」（缺貨）的「Add to Cart」按鈕為 disabled
         - 將「Wireless Mouse」加入購物車
         - 將「Mechanical Keyboard」加入購物車
         - 再加入第二個「Wireless Mouse」（使數量變為 2）
         - 確認購物車顯示正確的總額（$149.97 = 29.99×2 + 89.99）
         - 從購物車移除「Mechanical Keyboard」
         - 確認更新後的總額（$59.98 = 29.99×2）
         - 點選「Checkout」
         - 確認出現訂單確認，且訂單 ID 符合 `ORD-` 前綴
      4. 請盡可能使用正確的 Playwright 斷言（`expect`）。
      5. 測試應針對本機檔案 URL 執行：`file://{workspace}/shop.html`
    expected_behavior: |
      助手應該：

      1. 閱讀 HTML 檔案，了解 DOM 結構與 JavaScript 行為
      2. 撰寫一支涵蓋完整購物流程的 Playwright 測試
      3. 使用適當的選擇器（以文字、data 屬性或 CSS 選擇器）
      4. 在每個步驟加入斷言
      5. 處理購物車的動態特性（品項新增／移除、總額更新）
    grading_criteria:
      - "已建立檔案 `test_shop.py`"
      - "腳本使用 `playwright.sync_api`"
      - "測試缺貨時的 disabled 按鈕"
      - "將多個商品加入購物車"
      - "驗證購物車總額計算"
      - "從購物車移除品項"
      - "測試結帳（checkout）流程"
      - "驗證訂單確認"
      - "使用正確的斷言"
    llm_judge_rubric: |
      ### 評分項 1：測試覆蓋（權重 35%）

      **1.0 分**：測試涵蓋所有指定的步驟：disabled 按鈕檢查、加入多個商品、數量追蹤、
      總額驗證、品項移除、更新後的總額、結帳，以及訂單確認。每個步驟都有有意義的斷言。

      **0.75 分**：涵蓋大多數步驟並附斷言。可能有一兩個步驟缺失或斷言薄弱。

      **0.5 分**：涵蓋基本流程，但遺漏數個驗證步驟。

      **0.25 分**：僅涵蓋工作流程中的少數步驟。

      **0.0 分**：沒有有意義的測試覆蓋。

      ### 評分項 2：程式碼品質（權重 25%）

      **1.0 分**：測試程式碼整潔、組織良好。正確使用 Playwright 慣用法（page fixture、
      expect 斷言、適當的選擇器）。程式碼可讀，變數命名清楚，並在有助益處加上註解。

      **0.75 分**：程式碼品質良好，僅有些微問題。大致為慣用的 Playwright 寫法。

      **0.5 分**：可運作，但有程式碼品質問題（選擇器不佳、缺少錯誤處理、硬編碼的等待）。

      **0.25 分**：程式碼有重大問題，會使其不可靠或難以維護。

      **0.0 分**：程式碼無法運作，或不是有效的 Python。

      ### 評分項 3：選擇器策略（權重 20%）

      **1.0 分**：使用穩健的選擇器——以文字為基礎的選擇器、以 role 為基礎的查詢，或
      data 屬性。避免依賴版面配置的脆弱 CSS 選擇器。選擇器能在 HTML 些微變動後仍存活。

      **0.75 分**：選擇器大致良好，僅有少數脆弱者。

      **0.5 分**：良好與脆弱的選擇器混雜。

      **0.25 分**：多數為脆弱的選擇器（nth-child、複雜的 CSS 路徑）。

      **0.0 分**：沒有選擇器（程式碼未與頁面互動）。

      ### 評分項 4：斷言品質（權重 20%）

      **1.0 分**：使用 Playwright 的 `expect` API 進行斷言。檢查具體的值（確切總額、
      文字內容、可見狀態）。斷言能抓到真正的 bug。

      **0.75 分**：使用 expect API 進行良好的斷言。少數本可更具體。

      **0.5 分**：有斷言，但偏弱（只檢查元素是否存在，而非內容）。

      **0.25 分**：斷言極少。

      **0.0 分**：沒有斷言。

  task_video_transcript_extraction:
    task_name: "影片逐字稿擷取與摘要"
    prompt: |
      請取得這支 YouTube 影片的逐字稿（transcript），並建立一份結構化的摘要：

      **影片：** https://www.youtube.com/watch?v=dQw4w9WgXcQ

      從這支影片中擷取或下載逐字稿／字幕。然後建立：

      1. **Metadata（中繼資料）**：標題、頻道、片長、上傳日期
      2. **完整逐字稿**：將完整逐字稿儲存到 `transcript.txt`
      3. **摘要**：一份 200-300 字描述影片內容的摘要，儲存到 `video_summary.md`
      4. **重點**：以項目符號列出主要主題或重點（放在摘要檔案中）
      5. **時間戳記**：值得注意的時刻及其時間戳記（放在摘要檔案中）

      請將完整逐字稿儲存到 `transcript.txt`，並將結構化摘要儲存到 `video_summary.md`。
    expected_behavior: |
      助手應該：

      1. 存取該 YouTube 影片以擷取其逐字稿（透過 yt-dlp、YouTube API、網頁爬取，或
         逐字稿服務）
      2. 將逐字稿解析為乾淨、易讀的文字
      3. 建立一份結構良好的摘要文件
      4. 找出重點與值得注意的時間戳記
      5. 同時儲存原始逐字稿與摘要

      助手可採用多種方式：
      - 以 `yt-dlp --write-auto-sub` 下載字幕
      - YouTube 逐字稿 API 或服務
      - 以 web fetch 存取逐字稿資料
      - 任何其他能產出逐字稿文字的方法
    grading_criteria:
      - "已建立含逐字稿內容的 `transcript.txt`"
      - "已建立含摘要的 `video_summary.md`"
      - "包含影片 metadata（標題、頻道）"
      - "摘要為 200-300 字"
      - "已列出重點／重要結論"
      - "有引用時間戳記"
      - "逐字稿文字易讀（並非帶有時間碼的原始 SRT）"
    llm_judge_rubric: |
      ### 評分項 1：逐字稿擷取（權重 30%）

      **1.0 分**：完整逐字稿被擷取並儲存為乾淨、易讀的文字。時間碼已移除或經過整潔
      排版。文字流暢自然，準確捕捉影片中的口語內容。

      **0.75 分**：逐字稿已擷取，僅有些微排版問題。多數內容已捕捉。

      **0.5 分**：取得部分逐字稿，或有明顯的排版問題（原始 SRT 資料、重複行）。

      **0.25 分**：僅擷取到極少量逐字稿內容。

      **0.0 分**：未取得逐字稿。

      ### 評分項 2：摘要品質（權重 25%）

      **1.0 分**：摘要以 200-300 字準確捕捉影片的主要內容。文筆良好、資訊充足，能讓
      讀者不必觀看影片就了解影片在講什麼。

      **0.75 分**：摘要良好，涵蓋主要重點。可能略微超出字數範圍。

      **0.5 分**：摘要尚可，但遺漏關鍵重點，或過於簡短／冗長。

      **0.25 分**：摘要非常單薄，或大致不準確。

      **0.0 分**：未建立摘要。

      ### 評分項 3：結構與 Metadata（權重 20%）

      **1.0 分**：摘要檔案結構良好，metadata、摘要、重點與時間戳記各有清楚的區塊。
      影片標題、頻道與片長皆正確辨識。

      **0.75 分**：結構良好，metadata 大致齊全。組織上有些微問題。

      **0.5 分**：有基本結構，但缺少部分 metadata 或區塊。

      **0.25 分**：組織不佳，metadata 極少。

      **0.0 分**：沒有結構。

      ### 評分項 4：重點與時間戳記（權重 15%）

      **1.0 分**：重點具洞察力且準確反映影片內容。時間戳記對應影片中的實際時刻，且有助
      於導覽。

      **0.75 分**：重點良好，時間戳記大致準確。

      **0.5 分**：有列出重點，但流於籠統，或時間戳記不準確。

      **0.25 分**：重點極少，沒有時間戳記。

      **0.0 分**：既無重點也無時間戳記。

      ### 評分項 5：技術執行（權重 10%）

      **1.0 分**：助手使用適當工具有效率地擷取逐字稿。執行過程乾淨俐落，沒有不必要的
      重試或失敗。

      **0.75 分**：取得逐字稿時有些微困難，但最終成功。

      **0.5 分**：需要多次嘗試或變通做法，但最終成功。

      **0.25 分**：困難重重，僅部分成功。

      **0.0 分**：未能擷取逐字稿。
