# PinchBench CSV 分析任務（第二批）— 繁體中文（zh-TW）翻譯覆蓋檔。
# 僅翻譯使用者可見內容（prompt / expected_behavior / grading_criteria / llm_judge_rubric）。
# 不翻譯：CSV 檔名、CSV 欄位名、輸出報告檔名、網址、識別碼、shell 指令；
# 數值、日期、國家／城市／州名、物種名（setosa/versicolor/virginica）一律保持原樣。
tasks:

  task_csv_stations_coverage:
    task_name: "愛達荷州氣象站涵蓋缺口分析"
    prompt: |
      我的工作區裡有一個 CSV 檔案 `idaho_weather_stations.csv`，內含愛達荷州（Idaho）213 個氣象站的資料。檔案欄位有：`OBJECTID`、`Station Name`、`Station Code`、`Managing Agency`、`County`、`Longitude`、`Latitude`、`Elevation (feet)`、`x`、`y`。

      愛達荷州共有 44 個郡（county）。請分析這個氣象站網路的地理與海拔涵蓋情況，並把你的發現寫到 `coverage_report.md`。你的報告應包含：

      - **郡級涵蓋（county coverage）**：愛達荷州的 44 個郡中，有多少個郡至少有一個氣象站？哪一個（或哪些）郡完全沒有氣象站？
      - **各郡氣象站密度（station density by county）**：哪些郡的氣象站最多、哪些（在有氣象站的郡之中）最少？
      - **海拔帶分布（elevation band distribution）**：把氣象站依海拔分組（例如以 1,000 ft 為一段），統計每個海拔帶各有多少個氣象站。指出哪些海拔帶涵蓋過多、哪些涵蓋不足。
      - **機構涵蓋比較（agency coverage comparison）**：NWS 與 NRCS 在氣象站布點上的地理差異為何？哪些郡只由 NWS 服務、哪些只由 NRCS 服務、哪些兩者都有？
      - **資料品質問題（data quality issues）**：找出任何郡別資料缺漏或空白的氣象站。
      - 一個**建議區段（recommendations）**：說明在哪些地方增設氣象站能改善涵蓋。
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔案（213 列）
      2. 將氣象站的郡別與愛達荷州的 44 個郡交叉比對
      3. 發現 44 個郡中有 43 個有氣象站；Payette County 完全沒有氣象站
      4. 注意到有 5 個氣象站的郡別資料空白／缺漏
      5. 找出氣象站最多的郡：Idaho（13）、Blaine（11）、Shoshone（10）、Custer（10）、Clearwater（10）
      6. 找出只有單一氣象站的郡：Kootenai、Jefferson、Nez Perce、Madison、Lincoln
      7. 建立海拔帶分布，呈現氣象站集中在 4,000-6,000 ft 區間
      8. 比較 NWS（143 個站，海拔較低）與 NRCS（70 個站，海拔較高）
      9. 撰寫一份結構清晰、含建議的報告

      關鍵預期數值：

      - 氣象站總數：213
      - 有氣象站的郡：44 個中有 43 個（若僅計郡別非空白者則為 38-39 個）
      - 缺漏的郡：Payette County 完全沒有氣象站
      - 有 5 個氣象站的郡別欄位空白
      - 氣象站最多：Idaho County（13）
      - 機構：NWS（143）、NRCS（70）
      - 最大的海拔帶：4,000-5,000 ft（37 個站）、5,000-6,000 ft（42 個站）
      - 氣象站最少：低於 2,000 ft（10 個站）、高於 8,000 ft（7 個站）
    grading_criteria:
      - "已建立報告檔案 `coverage_report.md`"
      - "已指出 Payette County 沒有氣象站"
      - "已列出各郡氣象站數，且氣象站最多的郡正確"
      - "已包含海拔帶分布"
      - "已包含 NWS 與 NRCS 的地理比較"
      - "已指出郡別資料缺漏（5 個站）"
      - "有建議區段"
    llm_judge_rubric: |
      ### 評分項 1：涵蓋分析正確性（權重 35%）

      - 1.0：正確指出 44 個郡中有 43 個有氣象站，點名 Payette 為缺漏的郡，提供各郡正確的氣象站數，並正確找出 5 個郡別缺漏的氣象站。
      - 0.75：多數涵蓋事實正確，僅有一兩處小錯（例如某郡計數略有偏差）。
      - 0.5：找出部分缺口，但漏掉 Payette 或有多處計數錯誤。
      - 0.25：嘗試做涵蓋分析，但有重大事實錯誤。
      - 0.0：沒有涵蓋分析，或完全錯誤。

      ### 評分項 2：海拔分布品質（權重 25%）

      - 1.0：海拔帶劃分清楚且計數正確，指出 4,000-6,000 ft 的集中現象，並注意到低於 2,000 ft 與高於 8,000 ft 涵蓋稀疏。
      - 0.75：海拔帶劃分良好，僅有小幅計數錯誤。
      - 0.5：有做海拔分組，但不完整或有錯誤。
      - 0.25：海拔分析極少。
      - 0.0：完全沒有海拔分布。

      ### 評分項 3：機構分析（權重 20%）

      - 1.0：清楚說明 NWS 與 NRCS 在地理／海拔上的分布差異，指出只由單一機構服務的郡，並提供差異成因的洞見（NWS 設於城鎮、NRCS 設於山區以監測積雪）。
      - 0.75：機構比較良好，僅有小幅缺漏。
      - 0.5：提到兩個機構，但比較有限。
      - 0.25：機構討論極少。
      - 0.0：完全沒有機構分析。

      ### 評分項 4：建議品質（權重 20%）

      - 1.0：提出具體、可執行且緊扣已發現缺口的建議（例如在 Payette County 增設氣象站、改善北部郡的低海拔涵蓋、補上空白的郡別資料）。
      - 0.75：建議良好，具一定具體性。
      - 0.5：建議籠統，未緊扣具體發現。
      - 0.25：建議模糊或無助益。
      - 0.0：沒有建議區段。

  task_csv_stations_filter:
    task_name: "愛達荷州氣象站多條件篩選"
    prompt: |
      我的工作區裡有一個 CSV 檔案 `idaho_weather_stations.csv`，內含愛達荷州（Idaho）213 個氣象站的資料。檔案欄位有：`OBJECTID`、`Station Name`、`Station Code`、`Managing Agency`、`County`、`Longitude`、`Latitude`、`Elevation (feet)`、`x`、`y`。

      請執行下列篩選與分析任務，並把結果寫到 `filter_report.md`：

      1. **高海拔 NWS 氣象站**：找出所有由 NWS 管理、海拔在 5,000 ft 以上（含）的氣象站。依海拔由高到低排序，列出站名、海拔與郡別。共有幾個？

      2. **Custer County 的 NRCS 氣象站**：找出所有位於 Custer County、由 NRCS 管理的氣象站。依海拔由高到低排序，列出站名與海拔。

      3. **南部低海拔氣象站**：找出所有海拔介於 3,000 到 4,000 ft（含）之間、且位於北緯 43°N 以南的氣象站。緯度欄位為 DMS 格式（例如 "42 57 00"）。列出站名、郡別、海拔與緯度。

      4. **彙總表**：建立一個交叉統計表（cross-tabulation），呈現各管理機構（NWS、NRCS）與各海拔類別（Below 3000、3000-4999、5000-6999、7000+）的氣象站數。

      每一項篩選都請註明符合條件的氣象站總數。
    expected_behavior: |
      助手應該：

      1. 解析 CSV 檔案，處理 BOM 與 DMS 格式座標
      2. 篩選海拔 >= 5,000 ft 的 NWS 站：恰好 39 個站，最高為 GALENA（7,300 ft）
      3. 篩選 Custer County 的 NRCS 站：4 個站（DOLLARHIDE SUMMIT SNOTEL 8420、HILTS CREEK SNOTEL 8000、BEAR CANYON SNOTEL 7900、STICKNEY MILL SNOTEL 7430）
      4. 解析 DMS 緯度，篩選海拔 3000-4000 ft 且位於 43°N 以南者：8 個站，包含 BLISS 4 NW、BUHL 2、CASTLEFORD 2 N、GOODING 2S、JEROME、SHOSHONE 1 WNW、TWIN FALLS KVMT、TWIN FALLS WSO
      5. 建立機構 × 海拔類別的交叉統計表
      6. 把整理後的結果寫到報告檔

      關鍵預期數值：

      - NWS >= 5000 ft：39 個站；最高為 GALENA（7,300 ft）
      - Custer 的 NRCS：4 個站；DOLLARHIDE SUMMIT SNOTEL（8,420 ft）最高
      - 3000-4000 ft 且位於 43°N 以南：8 個站
      - 交叉統計表總計：NWS 143、NRCS 70
    grading_criteria:
      - "已建立報告檔案 `filter_report.md`"
      - "NWS >= 5000 ft 的數量為 39"
      - "已指出 GALENA 為最高的 NWS 站（7,300 ft）"
      - "Custer County 的 NRCS 數量為 4"
      - "已指出 DOLLARHIDE SUMMIT SNOTEL（8,420 ft）"
      - "南部篩選有正確解析 DMS 緯度"
      - "已找出 8 個南部低海拔氣象站"
      - "有依機構與海拔類別建立的交叉統計表"
    llm_judge_rubric: |
      ### 評分項 1：篩選正確性（權重 40%）

      - 1.0：四項篩選結果全部正確，數量精確（39、4、8）且站名清單正確；DMS 緯度解析正確處理。
      - 0.75：四項中有三項正確，一項有小錯。
      - 0.5：兩項正確，其餘有明顯錯誤。
      - 0.25：僅一項正確，其餘有重大錯誤。
      - 0.0：沒有任何篩選結果正確。

      ### 評分項 2：DMS 座標處理（權重 20%）

      - 1.0：正確解析 DMS 格式緯度（例如 "42 57 00" → 42.95°），準確套用 43°N 門檻，並列出全部 8 個符合的氣象站。
      - 0.75：DMS 解析正確，但漏掉一個站或有輕微邊界誤差。
      - 0.5：嘗試解析 DMS，但錯誤影響到結果。
      - 0.25：把 DMS 當成十進位度，或只取度的部分。
      - 0.0：沒有嘗試緯度篩選，或完全錯誤。

      ### 評分項 3：交叉統計表品質（權重 20%）

      - 1.0：表格／矩陣清楚，以機構為列、海拔帶為欄，計數正確，且列／欄總計加總為 213。
      - 0.75：表格良好，僅有小幅計數錯誤。
      - 0.5：嘗試做交叉統計，但格式不佳或計數有誤。
      - 0.25：交叉統計做得極少。
      - 0.0：完全沒有交叉統計。

      ### 評分項 4：報告組織（權重 20%）

      - 1.0：每一項篩選結果各自分區，數量顯著標示，站名清單排版良好（表格或排序清單），報告流暢有條理。
      - 0.75：組織良好，僅有小幅排版問題。
      - 0.5：有結果但組織不佳、不易閱讀。
      - 0.25：雜亂或缺漏區段。
      - 0.0：沒有報告或無法使用。

  task_csv_iris_summary:
    task_name: "鳶尾花統計摘要"
    prompt: |
      我的工作區裡有一個 CSV 檔案 `iris_flowers.csv`，內含經典的鳶尾花（Iris）資料集。它有 150 列、5 個欄位：`SepalLength`、`SepalWidth`、`PetalLength`、`PetalWidth`，以及 `Name`（物種）。

      請計算統計摘要並寫到 `iris_summary.md`。你的報告應包含：

      - **資料集概覽（dataset overview）**：總列數、欄位數，以及三個物種名稱與各自的數量
      - 每個數值欄位的**整體統計（overall statistics）**：平均值（mean）、中位數（median）、標準差（standard deviation）、最小值（min）、最大值（max）
      - **各物種統計（per-species statistics）**：依物種分組，計算每個數值欄位的平均值與標準差
      - **相關性洞見（correlation insight）**：哪一對數值特徵之間的線性相關最強，這代表什麼意義
      - 一個簡短的**關鍵發現（key findings）**區段，點出資料中最值得注意的模式
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔案
      2. 確認共 150 列、三個物種（Iris-setosa、Iris-versicolor、Iris-virginica），各 50 列
      3. 計算整體統計：
         - SepalLength：mean≈5.84、median=5.80、stdev≈0.83、min=4.3、max=7.9
         - SepalWidth：mean≈3.05、median=3.00、stdev≈0.43、min=2.0、max=4.4
         - PetalLength：mean≈3.76、median=4.35、stdev≈1.76、min=1.0、max=6.9
         - PetalWidth：mean≈1.20、median=1.30、stdev≈0.76、min=0.1、max=2.5
      4. 計算各物種平均值（例如 setosa PetalLength mean≈1.46、virginica PetalLength mean≈5.55）
      5. 指出 PetalLength 與 PetalWidth 之間的相關性最強
      6. 注意到 setosa 可依花瓣量測值清楚與其他兩個物種區分
      7. 撰寫一份結構清晰的 markdown 報告

      關鍵預期數值：

      - 150 列、3 個物種、各 50 列
      - 整體 SepalLength 平均值：~5.84
      - 整體 PetalLength 平均值：~3.76
      - Setosa PetalLength 平均值：~1.46
      - Virginica PetalLength 平均值：~5.55
      - 相關性最強：PetalLength–PetalWidth
    grading_criteria:
      - "已建立報告檔案 `iris_summary.md`"
      - "資料集概覽：正確說明 150 列、3 個物種、各 50 列"
      - "每個數值欄位都有報告整體 mean、median、stdev、min、max"
      - "每個數值欄位都有報告各物種統計（至少平均值）"
      - "已指出相關性最強者（PetalLength–PetalWidth）"
      - "關鍵發現：setosa 可依花瓣量測值與 versicolor/virginica 區分"
      - "報告結構清晰、有 markdown 排版"
    llm_judge_rubric: |
      ### 評分項 1：統計正確性（權重 35%）

      - 1.0：所有統計值（mean、median、stdev、min/max）在整體與各物種層級皆數值正確。
      - 0.75：多數統計正確，僅有一兩處小幅四捨五入差異。
      - 0.5：部分統計正確，但有多項關鍵數值錯誤或缺漏。
      - 0.25：僅少數統計正確，存在重大計算錯誤。
      - 0.0：沒有正確統計，或未進行分析。

      ### 評分項 2：分析洞見（權重 30%）

      - 1.0：正確指出 PetalLength–PetalWidth 相關性最強，注意到 setosa 的可分性，並對資料模式做出有意義的詮釋。
      - 0.75：指出關鍵相關性與物種差異，有合理的細節。
      - 0.5：提到相關性或物種差異，但分析淺薄或部分有誤。
      - 0.25：洞見模糊或不正確。
      - 0.0：沒有提供洞見，或分析完全錯誤。

      ### 評分項 3：報告結構與呈現（權重 20%）

      - 1.0：markdown 組織良好，分區清楚，統計以表格呈現，且從概覽到細部分析再到關鍵發現流程合理。
      - 0.75：組織良好、易讀，僅有小幅排版問題。
      - 0.5：有分析，但組織不佳、不易閱讀。
      - 0.25：雜亂或缺少主要區段。
      - 0.0：沒有報告，或空白／無法使用。

      ### 評分項 4：完整性（權重 15%）

      - 1.0：所有要求的元素皆具備：概覽、整體統計、各物種統計、相關性、關鍵發現。
      - 0.75：多數元素具備，僅有一兩處小幅缺漏。
      - 0.5：有多項要求的元素缺漏。
      - 0.25：只有少數元素。
      - 0.0：報告缺漏或幾乎空白。

  task_csv_iris_classify:
    task_name: "鳶尾花物種分類規則"
    prompt: |
      我的工作區裡有一個 CSV 檔案 `iris_flowers.csv`，內含經典的鳶尾花（Iris）資料集，共 150 個樣本。欄位：`SepalLength`、`SepalWidth`、`PetalLength`、`PetalWidth`，以及 `Name`（物種：Iris-setosa、Iris-versicolor、Iris-virginica）。

      請分析資料，並發展出一組可由量測值預測物種的簡單分類規則。把結果寫到 `iris_classification.md`。你的報告應包含：

      - **特徵分析（feature analysis）**：哪些特徵對區分物種最有用，並附上佐證的統計值或數值範圍
      - **分類規則（classification rules）**：一套清楚的決策樹式或門檻式規則（例如「若 PetalLength < X 則物種為 Y」）
      - **準確度評估（accuracy evaluation）**：把你的規則套用到整個資料集，回報每條規則正確分類了多少樣本，以及整體準確度
      - **誤分類分析（misclassification analysis）**：列出被你的規則誤分類的樣本（若有），並說明為何它們是困難案例
      - 一個**混淆矩陣（confusion matrix）**或等效的彙總，呈現預測物種與實際物種的對照
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔案
      2. 發現 PetalLength 與 PetalWidth 是最具區分力的特徵
      3. 發現 setosa 完全可分（PetalLength < 2.5 可涵蓋全部 50 個 setosa 且不含其他物種）
      4. 發展出區分 versicolor 與 virginica 的規則（例如 PetalLength < 4.9 或 PetalWidth < 1.7）
      5. 達到高準確度（>= 90%，理想為 95%+）
      6. 指出 versicolor/virginica 的邊界是多數錯誤發生之處
      7. 回報混淆矩陣或各物種準確度
      8. 撰寫一份結構清晰的 markdown 報告

      關鍵預期數值：

      - PetalLength < 2.5 → Iris-setosa（100% 正確，全部 50 個皆對）
      - versicolor/virginica 邊界約在 PetalLength ~4.8–5.0 或 PetalWidth ~1.6–1.8
      - 以簡單門檻規則可達到的整體準確度：94–97%
      - 多數誤分類發生在 versicolor 與 virginica 之間
    grading_criteria:
      - "已建立報告檔案 `iris_classification.md`"
      - "已指出 PetalLength（或 PetalWidth）為最具區分力的特徵"
      - "已正確指出 setosa 可用一個簡單門檻完全分離"
      - "已明確列出帶數值門檻的分類規則"
      - "準確度評估：規則套用到整個資料集並回報整體準確度"
      - "準確度 >= 90%"
      - "有討論或列出誤分類的樣本"
      - "有混淆矩陣或各物種準確度細項"
    llm_judge_rubric: |
      ### 評分項 1：分類規則品質（權重 35%）

      - 1.0：規則明確列出具體數值門檻，能完全分離 setosa，且在 versicolor/virginica 上達到 95%+ 準確度。規則如決策樹或流程圖般易於依循。
      - 0.75：規則清楚、有門檻，能分離 setosa，整體準確度達 90%+。
      - 0.5：有規則但模糊、缺乏具體門檻，或僅達中等準確度。
      - 0.25：規則定義不良或準確度偏低。
      - 0.0：沒有提供分類規則，或規則完全錯誤。

      ### 評分項 2：資料分析深度（權重 25%）

      - 1.0：完整的特徵分析，含各物種數值範圍，以統計佐證指出 PetalLength/PetalWidth 為最佳區分特徵，並解釋為何 setosa 可分而 versicolor/virginica 重疊。
      - 0.75：特徵分析良好，有物種比較與所選特徵的合理理由。
      - 0.5：基本特徵分析，但缺少關鍵比較或統計佐證。
      - 0.25：分析極少；規則看似武斷、缺乏資料依據。
      - 0.0：沒有特徵分析。

      ### 評分項 3：評估嚴謹度（權重 25%）

      - 1.0：評估完整，含混淆矩陣、各物種準確度、具體列出誤分類樣本，並解釋邊界案例為何困難。
      - 0.75：評估良好，有準確度與混淆矩陣，並有部分錯誤討論。
      - 0.5：有回報準確度，但錯誤分析有限。
      - 0.25：準確度宣稱模糊，缺乏佐證。
      - 0.0：沒有對規則表現做評估。

      ### 評分項 4：報告清晰度（權重 15%）

      - 1.0：組織良好，分區清楚，規則易於依循，表格排版良好，且從分析到規則再到評估流程合理。
      - 0.75：組織良好、易讀，僅有小問題。
      - 0.5：有分析但不易依循。
      - 0.25：雜亂或缺少主要區段。
      - 0.0：沒有報告，或空白／無法使用。

  task_csv_iris_outliers:
    task_name: "鳶尾花離群值偵測"
    prompt: |
      我的工作區裡有一個 CSV 檔案 `iris_flowers.csv`，內含經典的鳶尾花（Iris）資料集，共 150 個樣本。欄位：`SepalLength`、`SepalWidth`、`PetalLength`、`PetalWidth`，以及 `Name`（物種：Iris-setosa、Iris-versicolor、Iris-virginica）。

      請分析資料集中的離群值（outlier）與異常觀測值，並把你的發現寫到 `iris_outliers.md`。你的報告應包含：

      - **離群值偵測方法（outlier detection method）**：說明所使用的統計方法（例如 IQR、z-score，或兩者）
      - **整體離群值（overall outliers）**：在整個資料集中對每個數值欄位偵測到的離群值，附上具體數值與所屬列的辨識
      - **物種內離群值（within-species outliers）**：在各物種群組內偵測到的離群值（某個數值在整體上可能正常，但對其所屬物種而言屬於極端值）
      - **異常觀測值（unusual observations）**：同時考量多個特徵時，對其物種而言屬於非典型的樣本（例如花瓣異常小的 virginica）
      - **摘要（summary）**：共找到多少離群值、哪些特徵與物種受影響最多，以及是否有任何樣本可能被標錯類別
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔案
      2. 對每個數值欄位套用以 IQR 或 z-score 為基礎的離群值偵測
      3. 找出整體資料集中的 SepalWidth 離群值：
         - 第 16 列：Iris-setosa，SepalWidth=4.4（高於上界）
         - 第 33 列：Iris-setosa，SepalWidth=4.1（高於上界）
         - 第 34 列：Iris-setosa，SepalWidth=4.2（高於上界）
         - 第 61 列：Iris-versicolor，SepalWidth=2.0（低於下界）
      4. 進行物種內分析，找出對其群組而言屬於極端值的觀測
      5. 注意多特徵的異常觀測，例如：
         - 第 42 列：Iris-setosa，SepalWidth=2.3（setosa 中最低，遠離 setosa 平均值 3.42）
         - 第 107 列：Iris-virginica，SepalLength=4.9，是最小的 virginica（平均值 6.59）
      6. 討論是否有任何離群值可能代表標錯類別
      7. 撰寫一份結構清晰的 markdown 報告

      關鍵預期數值：

      - SepalWidth IQR 離群值：第 16、33、34 列（高）、第 61 列（低）
      - SepalWidth Q1=2.8、Q3=3.3、IQR=0.5、界限：[2.05, 4.05]
      - 對整個資料集以 IQR 計算時，SepalLength、PetalLength、PetalWidth 皆無離群值
      - 物種內分析會揭露整體資料中看不到的額外離群值
    grading_criteria:
      - "已建立報告檔案 `iris_outliers.md`"
      - "已清楚說明離群值偵測方法（IQR、z-score 或類似）"
      - "已指出 SepalWidth 是整體離群值最多的欄位"
      - "已回報具體離群值與列號（4 個 SepalWidth 離群值中至少 2 個）"
      - "已進行物種內離群值分析"
      - "已討論多特徵異常觀測（例如對其物種而言非典型的樣本）"
      - "有摘要，含離群值數量與受影響的特徵／物種"
    llm_judge_rubric: |
      ### 評分項 1：離群值偵測品質（權重 35%）

      - 1.0：使用定義良好的統計方法（IQR 或 z-score），正確找出所有 SepalWidth 離群值並附具體數值，且指出以整體 IQR 方法時其他欄位並無離群值。
      - 0.75：使用有效方法，正確找出多數離群值並附具體數值。
      - 0.5：找出部分離群值，但漏掉關鍵者，或方法套用不佳。
      - 0.25：嘗試偵測離群值，但結果多半錯誤或不完整。
      - 0.0：沒有進行離群值偵測，或完全錯誤。

      ### 評分項 2：物種內與多特徵分析（權重 30%）

      - 1.0：進行物種內離群值偵測，找出對其物種屬極端但整體上不極端的樣本（例如 SepalWidth=2.3 的 setosa、SepalLength=4.9 的 virginica），並討論多特徵的異常模式。
      - 0.75：物種內分析良好，並有部分多特徵討論。
      - 0.5：基本的物種內分析，但多特徵洞見有限。
      - 0.25：物種內分析極少。
      - 0.0：沒有進行物種內分析。

      ### 評分項 3：詮釋與脈絡（權重 20%）

      - 1.0：討論離群值的生物學合理性、是否可能代表量測誤差或標錯類別，解釋為何某些物種受影響較多，並提出可執行的結論。
      - 0.75：詮釋良好，並有一些關於離群值意義的脈絡。
      - 0.5：基本詮釋，深度不足。
      - 0.25：詮釋極少；只列數字而無脈絡。
      - 0.0：沒有對發現做詮釋。

      ### 評分項 4：報告完整性與清晰度（權重 15%）

      - 1.0：所有要求的區段皆具備（方法、整體離群值、物種內、異常觀測、摘要），排版良好（表格或結構化清單），清楚易讀。
      - 0.75：多數區段具備，排版良好。
      - 0.5：部分區段缺漏或組織不佳。
      - 0.25：主要區段缺漏或不易閱讀。
      - 0.0：沒有報告，或空白／無法使用。

  task_csv_cities_ranking:
    task_name: "美國城市人口排名"
    prompt: |
      我的工作區裡有一個 CSV 檔案 `us_cities_top1000.csv`，內含美國人口最多的 1,000 個城市的資料。檔案欄位有：`City`、`State`、`Population`、`lat`、`lon`。

      請分析人口排名，並把你的發現寫到名為 `cities_ranking_report.md` 的檔案。你的報告應包含：

      - **人口前 10 大城市（top 10 cities）**：附上所屬州別與確切人口
      - **資料集中人口最少的 10 個城市（bottom 10 cities）**（即前 1,000 大中最小的）
      - 全部 1,000 個城市的**總人口（total population）**
      - 人口的**平均值與中位數（mean and median）**
      - 依該州在資料集中各城市人口加總排名的**人口前 10 大州（top 10 states）**，包含各州的城市數
      - **人口分布（population distribution）**：有多少城市落在下列各區間：<50k、50k-100k、100k-250k、250k-500k、500k-1M、>1M
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔案（1,000 列資料、5 個欄位）
      2. 依人口排序城市以找出排名
      3. 計算彙總統計
      4. 依州分組以進行州級排名
      5. 建立人口分布區間
      6. 撰寫一份結構清晰的 markdown 報告

      關鍵預期數值：

      - 第 1 名城市：New York, New York — 8,405,837
      - 第 2 名：Los Angeles, California — 3,884,307
      - 第 3 名：Chicago, Illinois — 2,718,782
      - 第 4 名：Houston, Texas — 2,195,914
      - 第 5 名：Philadelphia, Pennsylvania — 1,553,165
      - 資料集中最小的城市：Panama City, Florida — 36,877
      - 總人口：131,132,443
      - 平均人口：~131,132
      - 中位數人口：~68,224
      - 人口加總最高的州：California（212 個城市，27,910,620）
      - 人口 > 1M 的城市：10 個
      - 人口 >= 500k 的城市：34 個
    grading_criteria:
      - "已建立報告檔案 `cities_ranking_report.md`"
      - "正確列出人口前 10 大城市，且 New York 為第 1 名"
      - "列出人口最少的 10 個城市，且 Panama City, FL 為最小者"
      - "正確回報總人口（~131,132,443）"
      - "正確計算平均人口（~131,132）"
      - "正確計算中位數人口（~68,224）"
      - "列出人口加總最高的州，且 California 為第 1 名"
      - "已包含人口分布區間"
      - "報告結構清晰、分區明確"
    llm_judge_rubric: |
      ### 評分項 1：資料正確性（權重 35%）

      - 1.0：所有排名、總計、平均值、中位數與州級彙總皆數值正確。
      - 0.75：多數數值正確，僅有一兩處小幅數值錯誤。
      - 0.5：部分數值正確，但有多項關鍵數字錯誤。
      - 0.25：多項指標有重大計算錯誤。
      - 0.0：沒有正確計算，或未進行分析。

      ### 評分項 2：完整性（權重 30%）

      - 1.0：所有要求的元素皆具備：前 10、後 10、總計／平均／中位數、州級排名、分布區間。
      - 0.75：多數元素具備，僅有一處小幅缺漏。
      - 0.5：有多項要求的元素缺漏。
      - 0.25：只有少數元素。
      - 0.0：報告缺漏或幾乎空白。

      ### 評分項 3：報告品質（權重 20%）

      - 1.0：markdown 組織良好，分區清楚，排名以表格呈現，流程合理。
      - 0.75：組織良好、易讀，僅有小幅排版問題。
      - 0.5：有分析但組織不佳。
      - 0.25：雜亂或不易閱讀。
      - 0.0：沒有報告或無法使用。

      ### 評分項 4：洞見品質（權重 15%）

      - 1.0：超越原始數字，指出模式——例如 California 的主導地位、第 1 名與第 2 名之間的巨大差距、小型城市的長尾現象。
      - 0.75：對資料中的模式有一些觀察。
      - 0.5：大多是原始數字，詮釋極少。
      - 0.25：純數字、無評論。
      - 0.0：沒有進行分析。

  task_csv_cities_filter:
    task_name: "美國城市多條件篩選"
    prompt: |
      我的工作區裡有一個 CSV 檔案 `us_cities_top1000.csv`，內含美國人口最多的 1,000 個城市的資料。檔案欄位有：`City`、`State`、`Population`、`lat`、`lon`。

      請執行下列篩選分析，並把結果寫到 `cities_filter_report.md`：

      1. **California 大城市**：列出 California 中人口 ≥ 200,000 的所有城市，依人口由大到小排序。包含此篩選結果集的數量與總人口。

      2. **南部城市**：找出緯度低於北緯 33°N（即 `lat < 33.0`）且人口 ≥ 100,000 的所有城市。列出它們的州別與人口。

      3. **州別比較——Texas 對 Florida**：比較這兩個州，列出各州在資料集中的城市總數、總人口、平均城市人口，以及各自人口前 5 大城市。

      4. **中型城市**：找出人口介於 75,000 到 125,000（含）之間的所有城市。回報共有幾個，並依字母順序列出前 10 個。

      5. **西岸各州**：篩選 California、Oregon、Washington 的城市。回報這個合併區域的城市總數、總人口，以及人口前 10 大城市。
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔案
      2. 使用欄位值正確套用每一項篩選
      3. 對篩選後的子集進行彙總
      4. 為每個區段清楚呈現結果

      關鍵預期數值：

      - California 人口 ≥ 200k：21 個城市（最高為 Los Angeles 3,884,307；最低為 Moreno Valley 201,175）
      - CA ≥ 200k 子集的總人口：~12,343,323
      - 南部城市（lat < 33.0、pop ≥ 100k）：包含 San Diego、Phoenix、Tucson、El Paso，以及數個 Texas/Florida/Arizona 城市
      - Texas：83 個城市，總人口 14,836,230，最大城市 Houston（2,195,914）
      - Florida：73 個城市，總人口 7,410,114，最大城市 Jacksonville（842,583）
      - Texas 平均城市人口（~178,749）高於 Florida（~101,508）
      - 中型城市（75k-125k）：此區間城市數量可觀
      - 西岸（CA+OR+WA）：254 個城市，總人口 32,548,214
    grading_criteria:
      - "已建立報告檔案 `cities_filter_report.md`"
      - "California ≥ 200k 篩選回傳 21 個城市，清單正確"
      - "正確套用南部城市篩選（lat < 33.0、pop ≥ 100k）"
      - "Texas 對 Florida 的比較含城市數、總計與平均"
      - "正確呈現 Texas 平均人口高於 Florida"
      - "已套用中型城市篩選（75k-125k）並列出結果"
      - "西岸各州篩選含全部三個州"
      - "各項篩選的數值皆正確"
      - "報告結構清晰，每項篩選各有清楚分區"
    llm_judge_rubric: |
      ### 評分項 1：篩選正確性（權重 40%）

      - 1.0：五項篩選皆正確套用，數量與數值準確。邊界條件處理正確（≥ 對 >、含端點區間）。
      - 0.75：多數篩選正確，僅有一處數量或邊界處理小錯。
      - 0.5：部分篩選正確，但有多項結果錯誤。
      - 0.25：多個區段有重大篩選錯誤。
      - 0.0：未套用篩選，或完全錯誤。

      ### 評分項 2：完整性（權重 25%）

      - 1.0：五個篩選區段皆具備，含要求的數量、清單與彙總等完整結果。
      - 0.75：所有區段具備，但缺少部分要求的細節（例如總計或平均）。
      - 0.5：有區段完全缺漏。
      - 0.25：只有一兩個區段。
      - 0.0：報告缺漏或空白。

      ### 評分項 3：比較品質（權重 20%）

      - 1.0：Texas 對 Florida 的比較詳盡，資料清楚並列，且助手指出儘管兩州城市數相近，Texas 的平均城市人口仍較高。
      - 0.75：比較良好，多數指標具備，但缺少部分洞見。
      - 0.5：基本比較，指標有限。
      - 0.25：比較淺薄。
      - 0.0：未進行比較。

      ### 評分項 4：報告結構（權重 15%）

      - 1.0：每項篩選有清楚的區段標題，適當使用表格，組織合理。
      - 0.75：組織良好，僅有小幅排版問題。
      - 0.5：有結果但組織不佳。
      - 0.25：不易閱讀或缺乏結構。
      - 0.0：沒有報告或無法使用。

  task_csv_cities_density:
    task_name: "美國城市各州人口集中度"
    prompt: |
      我的工作區裡有一個 CSV 檔案 `us_cities_top1000.csv`，內含美國人口最多的 1,000 個城市的資料。檔案欄位有：`City`、`State`、`Population`、`lat`、`lon`。

      請分析各州之間的人口集中（population concentration）模式，並把你的發現寫到 `cities_density_report.md`。你的報告應包含：

      1. **各州人口集中度（population concentration by state）**：對每個州計算每城市平均人口（該州在資料集中的總人口 ÷ 城市數）。依此指標將各州排名，並列出前 10 與後 10。

      2. **單一城市主導（single-city dominance）**：對於有 5 個（含）以上城市的州，計算該州在資料集中最大城市占該州總人口的百分比。找出最大城市主導程度最高的前 5 個州。

      3. **州代表性（state representation）**：資料集中出現了多少個不同的州（加上 DC）？哪些州在資料集中的城市最多、哪些最少（只有 1 或 2 個）？

      4. **州內人口不均（population inequality within states）**：對於有 10 個（含）以上城市的州，計算最大城市人口與最小城市人口的比值。哪些州的城市規模分布最均、哪些最不均？

      5. **區域摘要（regional summary）**：將各州分組為區域（Northeast、Southeast、Midwest、West），比較各區域的總人口、城市數與平均城市規模。
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔案
      2. 依州分組並計算各州指標
      3. 計算集中度比值與主導百分比
      4. 找出州內各城市人口分布的模式
      5. 建立區域分組與比較

      關鍵預期數值：

      - 不同的州／領地：48 個（47 州 + DC）
      - 每城市平均人口最高：DC（646,449 — 僅 1 個城市），其次 New York（584,314，17 個城市）
      - 每城市平均人口最低：Vermont（42,284 — 1 個城市）、West Virginia（~50,000，2 個城市）
      - 城市最多：California（212）、Texas（83）、Florida（73）
      - 只有 1 個城市的州：DC、Hawaii、Alaska、Vermont、Maine（依確切計數而定）
      - California 最大城市（LA 3,884,307）約占 CA 資料集總人口（27,910,620）的 13.9%
      - New York 州：NYC（8,405,837）約占該州資料集總計（9,933,332）的 84.6% — 極端主導
    grading_criteria:
      - "已建立報告檔案 `cities_density_report.md`"
      - "已計算每城市平均人口並依州排名"
      - "已指出 New York 州集中度高（NYC 主導）"
      - "已為符合資格的州計算單一城市主導百分比"
      - "正確回報不同的州／領地數量（~48）"
      - "已指出城市最少的州"
      - "已為符合資格的州計算人口不均比值"
      - "已建立區域分組並比較"
      - "報告結構清晰、分區明確"
    llm_judge_rubric: |
      ### 評分項 1：分析正確性（權重 35%）

      - 1.0：所有集中度指標、主導百分比與比值皆正確計算。州分組與計數準確。
      - 0.75：多數指標正確，僅有一兩處小錯。
      - 0.5：部分指標正確，但有多項關鍵計算錯誤。
      - 0.25：多數計算有重大錯誤。
      - 0.0：沒有正確分析。

      ### 評分項 2：洞見品質（權重 30%）

      - 1.0：指出關鍵模式，如 NYC 在 New York 州的極端主導、California 的分散人口、邊緣的單一城市州，以及有意義的區域差異，並對這些模式的意義做出結論。
      - 0.75：模式辨識良好，掌握多數關鍵洞見。
      - 0.5：有一些觀察，但漏掉主要模式。
      - 0.25：大多是原始數字，詮釋很少。
      - 0.0：沒有指出任何洞見或模式。

      ### 評分項 3：完整性（權重 20%）

      - 1.0：五個要求的區段皆具備，每個都有充分分析。
      - 0.75：所有區段具備，僅有小幅缺漏。
      - 0.5：有區段缺漏。
      - 0.25：多數區段缺漏。
      - 0.0：報告缺漏或空白。

      ### 評分項 4：報告結構（權重 15%）

      - 1.0：組織良好，分區清楚，使用適當表格，且從集中度指標到洞見流程合理。
      - 0.75：組織良好，僅有小幅排版問題。
      - 0.5：有分析但結構不佳。
      - 0.25：不易閱讀。
      - 0.0：沒有報告或無法使用。

  task_csv_cities_growth:
    task_name: "美國城市地理分布分析"
    prompt: |
      我的工作區裡有一個 CSV 檔案 `us_cities_top1000.csv`，內含美國人口最多的 1,000 個城市的資料。檔案欄位有：`City`、`State`、`Population`、`lat`、`lon`。

      請分析這些城市的地理分布，並把你的發現寫到 `cities_geographic_report.md`。你的報告應包含：

      1. **人口地理中心（geographic center of population）**：計算以人口為權重的重心（用人口當權重，對緯度與經度取加權平均）。將其與所有城市位置的簡單未加權重心比較。兩者的差異告訴我們什麼？

      2. **地理極值（geographic extremes）**：找出最北、最南、最東、最西的城市。附上它們的座標與人口。

      3. **緯度帶分析（latitude band analysis）**：將城市分成每 5° 的緯度帶（低於 30°N、30-35°N、35-40°N、40-45°N、高於 45°N）。對每個帶回報城市數、總人口與平均城市人口。哪個帶城市最多？哪個帶總人口最多？

      4. **東西分割（east-west split）**：以經度 -95°W 為分界線，比較全國東半與西半的城市數、總人口與平均城市規模。

      5. **各州地理跨幅（state geographic spread）**：對於有 10 個（含）以上城市的州，以最大與最小緯度、經度之間的簡單差距，計算該州任兩城市之間的最大距離（以度為單位）作為地理跨幅。哪些州地理上分布最廣？
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔案
      2. 計算加權與未加權的地理重心
      3. 使用 lat/lon 欄位找出極值位置
      4. 依緯度將城市分箱並計算各帶統計
      5. 依經度分割並比較兩半
      6. 計算各州的地理範圍

      關鍵預期數值：

      - 人口加權重心：約 (36.99°N, 96.51°W)
      - 未加權重心：約 (37.34°N, 96.48°W)
      - 最北：Anchorage, Alaska（61.22°N）
      - 最南：Honolulu, Hawaii（21.31°N）
      - 最東：Portland, Maine（70.26°W）
      - 最西：Honolulu, Hawaii（157.86°W）
      - 城市最多的緯度帶：40-45°N（316 個城市）
      - 總人口最多的帶：30-35°N（38,580,127）
      - 95°W 以東：546 個城市，人口 ~67,016,952
      - 95°W 以西：454 個城市，人口 ~64,115,491
    grading_criteria:
      - "已建立報告檔案 `cities_geographic_report.md`"
      - "已計算人口加權重心（約 37°N、96-97°W）"
      - "已計算未加權重心並與加權重心比較"
      - "已正確找出全部四個地理極值"
      - "緯度帶分析含城市數與人口"
      - "已包含東西分割比較"
      - "已為符合資格的州計算地理跨幅"
      - "已從地理模式中得出關鍵洞見"
      - "報告結構清晰、分區明確"
    llm_judge_rubric: |
      ### 評分項 1：分析正確性（權重 35%）

      - 1.0：重心計算正確，極值正確找出（包含 Honolulu 同時為最南與最西），緯度帶與預期計數相符，東西分割準確。
      - 0.75：多數計算正確，僅有一兩處小錯。
      - 0.5：部分正確，但有多項關鍵計算錯誤。
      - 0.25：地理計算有重大錯誤。
      - 0.0：沒有正確分析。

      ### 評分項 2：洞見品質（權重 30%）

      - 1.0：從資料得出有意義的結論——例如人口集中於 30-45°N 走廊、人口加權重心相較未加權重心略向南偏移、東西人口大致平衡，以及 Hawaii/Alaska 如何使地理極值偏斜。
      - 0.75：對多數區段有良好洞見。
      - 0.5：有一些觀察，但漏掉主要模式。
      - 0.25：大多是原始數字。
      - 0.0：沒有詮釋。

      ### 評分項 3：完整性（權重 20%）

      - 1.0：五個要求的分析皆具備，且處理充分。
      - 0.75：所有區段具備，僅有小幅缺漏。
      - 0.5：有區段缺漏。
      - 0.25：多數區段缺漏。
      - 0.0：報告缺漏或空白。

      ### 評分項 4：報告結構（權重 15%）

      - 1.0：組織良好，分區清楚，緯度帶資料以表格呈現，流程合理。
      - 0.75：組織良好，僅有小問題。
      - 0.5：有分析但組織不佳。
      - 0.25：不易閱讀。
      - 0.0：沒有報告或無法使用。

  task_csv_pension_ranking:
    task_name: "美國退休金各州排名"
    prompt: |
      我的工作區裡有一個 CSV 檔案 `us_pension_by_state.csv`，內含按州與國會選區（congressional district）細分的美國聯邦退休金給付資料。欄位如下：

      - `STATE_ABBREV_NAME` — 州縮寫與名稱（例如州總計列為 "OH-OHIO Total"、選區列為 "OH-OHIO"）
      - `DISTRICT` — 國會選區號碼、"At Large" 或年份（Grand Total 列使用 "2018"）
      - `PAYEE_AMOUNT` — 給付給退休人員的總金額（以 $ 與逗號格式化）
      - `PAYEE_COUNT` — 目前領取者人數（以逗號格式化）
      - `DEFERRED_COUNT` — 遞延（未來）領取者人數（以逗號格式化）

      以 "Total" 結尾的列為州級彙總。第一列資料是跨所有州的 Grand Total。

      請分析這份資料，並把你的發現寫到 `pension_ranking_report.md`。你的報告應包含：

      - 依總給付金額（payee amount）由大到小排名的**前 10 大州（top 10 states）**，附上金額與領取人數
      - 依總給付金額排名的**後 5 名州（bottom 5 states）**（排除領地與金額為 $0 的項目）
      - 依目前領取者人數排名的**前 10 大州（top 10 states）**
      - 跨所有州的**總計（grand total）**（總金額、總領取人數、總遞延人數）
      - 一段簡短的**分析**：說明哪些區域在聯邦退休金給付上占主導，以及可能的原因
    expected_behavior: |
      助手應該：

      1. 讀取並解析 CSV 檔案，處理以美元格式化的金額（去除 `$` 與逗號）
      2. 篩選州級 "Total" 列，取出金額、領取人數與遞延人數
      3. 依總給付金額排序各州，產生前 10 名排名
      4. 找出金額非零的後 5 名州／領地
      5. 依領取人數排序，做出領取人數排名
      6. 取出 Grand Total 列
      7. 撰寫一份結構清晰、含分析的 markdown 報告

      關鍵預期數值：

      - Grand Total：~$5,711,533,247，跨 877,305 名領取者，遞延 483,720 人
      - 金額前 3 名：Ohio（~$536.2M）、Pennsylvania（~$456.4M）、Florida（~$429.0M）
      - 金額第 4-5 名：Michigan（~$389.7M）、California（~$357.7M）
      - 領取人數前 3 名：Pennsylvania（78,119）、Ohio（77,679）、Florida（59,857）
      - 後段州包含：Northern Mariana Islands（~$5,894）、American Samoa（~$39,962）、Armed Forces Pacific（~$103,423）
    grading_criteria:
      - "已建立報告檔案 `pension_ranking_report.md`"
      - "正確列出依總給付金額排名的前 10 大州"
      - "已指出 Ohio 為金額第 1 名（~$536M）"
      - "已指出 Pennsylvania 為金額第 2 名（~$456M）"
      - "已指出 Florida 為金額第 3 名（~$429M）"
      - "已指出後 5 名州／領地"
      - "已回報總計數字（~$5.7B、~877K 領取者、~484K 遞延）"
      - "已包含依領取人數排名的前段州"
      - "已提供地理模式分析"
    llm_judge_rubric: |
      ### 評分項 1：資料解析與正確性（權重 35%）

      - 1.0：所有金額、領取人數與排名皆正確解析並回報。州總計精確符合預期值。
      - 0.75：多數數值正確，僅有小幅四捨五入差異，或排名中有一州位置擺錯。
      - 0.5：排名大致正確，但有多項數值解析錯誤，或將選區列與州總計混淆。
      - 0.25：重大解析錯誤——金額錯誤、列類型混淆，或排名明顯不正確。
      - 0.0：未能解析 CSV，或產出完全錯誤的結果。

      ### 評分項 2：排名完整性（權重 30%）

      - 1.0：所有要求的排名皆具備：依金額的前 10、後 5、依領取人數的前段、Grand Total——每項都有佐證數字。
      - 0.75：多數排名具備，僅有小幅缺漏（例如缺一種排名類型或缺佐證數字）。
      - 0.5：只提供依金額的前 10，其他排名缺漏或不完整。
      - 0.25：只有部分排名且資料缺漏。
      - 0.0：沒有提供排名。

      ### 評分項 3：分析品質（權重 20%）

      - 1.0：地理分析有洞見，將退休金集中與聯邦就業模式、軍事基地或歷史因素連結。指出有趣模式，如鏽帶（Rust Belt）的主導地位。
      - 0.75：分析合理，有一些地理觀察。
      - 0.5：表面觀察，缺乏更深入分析。
      - 0.25：分析極少或模糊。
      - 0.0：沒有提供分析。

      ### 評分項 4：報告結構（權重 15%）

      - 1.0：markdown 組織良好，分區清楚，排名以表格或清單呈現，可讀性佳。
      - 0.75：結構良好，僅有小幅排版問題。
      - 0.5：有內容但組織不佳。
      - 0.25：雜亂或不易閱讀。
      - 0.0：沒有報告或空白檔案。

  task_csv_pension_liability:
    task_name: "美國退休金負債分析"
    prompt: |
      我的工作區裡有一個 CSV 檔案 `us_pension_by_state.csv`，內含按州與國會選區細分的美國聯邦退休金給付資料。欄位如下：

      - `STATE_ABBREV_NAME` — 州縮寫與名稱（例如州總計列為 "OH-OHIO Total"）
      - `DISTRICT` — 國會選區號碼、"At Large" 或年份
      - `PAYEE_AMOUNT` — 給付給目前退休人員的總金額（以 $ 與逗號格式化）
      - `PAYEE_COUNT` — 目前領取者人數
      - `DEFERRED_COUNT` — 遞延（未來）領取者人數，尚未開始請領給付

      以 "Total" 結尾的列為州級彙總。第一列是 Grand Total。

      請分析退休金負債曝險（liability exposure），並把你的發現寫到 `pension_liability_report.md`。你的報告應包含：

      - 每個州的**每位領取者平均給付（average payout per payee）**——依此指標將前 10 大州排名
      - 各州的**遞延總人數（total deferred count by state）**——將遞延（未來）領取者最多的前 10 大州排名
      - **預估未來負債（projected future liability）**：對每個州，以該州的每位領取者平均給付乘以其遞延人數，估算未來年度負債。依此預估負債將前 10 大州排名。
      - **全國摘要（national summary）**：目前年度給付總額、目前領取者總數、遞延領取者總數、整體每位領取者平均給付，以及若所有遞延領取者皆以目前平均水準請領時的預估未來負債總額
      - 一段簡短的**分析**：說明哪些州代表最大的未來財務曝險，以及原因

      請注意：預估未來負債是一個估計值，它假設遞延領取者未來將以與目前領取者相同的平均水準請領。強的回應應指出此假設及其限制。
    expected_behavior: |
      助手應該：

      1. 解析 CSV，去除美元格式與逗號
      2. 計算每個州的每位領取者平均給付（PAYEE_AMOUNT / PAYEE_COUNT）
      3. 依平均給付排名各州——Colorado（~$9,711）、Hawaii（~$9,643）、Washington（~$9,224）居前
      4. 依遞延人數排名各州——New York（40,592）、California（35,564）、Pennsylvania（34,285）居前
      5. 計算每個州的預估負債（平均給付 × 遞延人數）
      6. 回報全國總計：~$5.71B 目前、877,305 名領取者、483,720 遞延、~$6,510 平均
      7. 計算預估未來負債總額：~$6,510 × 483,720 = ~$3.15B

      關鍵預期數值：

      - 整體平均給付：每位領取者 ~$6,510
      - 平均給付最高：Colorado（~$9,711/領取者）、Hawaii（~$9,643/領取者）、Washington（~$9,224/領取者）
      - 遞延最多：New York（40,592）、California（35,564）、Pennsylvania（34,285）
      - 預估負債前段：New York、California、Ohio、Pennsylvania（高遞延人數 × 中至高平均給付）
      - 全國預估未來負債：~$3.15B
    grading_criteria:
      - "已建立報告檔案 `pension_liability_report.md`"
      - "已計算每位領取者平均給付並列出前 10 大州"
      - "已指出 Colorado 為平均給付最高（~$9,711）"
      - "已列出依遞延人數排名的前 10 大州"
      - "已指出 New York 為遞延人數最多（40,592）"
      - "已逐州計算預估未來負債"
      - "全國摘要含總金額、領取者、遞延與整體平均"
      - "已估算預估未來負債總額（~$3.15B）"
      - "已提供財務曝險分析"
    llm_judge_rubric: |
      ### 評分項 1：計算正確性（權重 35%）

      - 1.0：所有計算正確——平均給付、遞延人數、預估負債與全國總計皆符合預期值。正確處理貨幣格式。
      - 0.75：多數計算正確，僅有小幅四捨五入或一處計算錯誤。
      - 0.5：核心方法正確，但有多項數值錯誤，或預估負債方法有瑕疵。
      - 0.25：重大計算錯誤或對資料理解有誤。
      - 0.0：未能完成計算，或結果完全錯誤。

      ### 評分項 2：多維度分析（權重 30%）

      - 1.0：三種排名維度皆具備（平均給付、遞延人數、預估負債），且彼此區分清楚。展現出對「高負債來自高平均給付『且』高遞延人數的組合」之理解。
      - 0.75：三種維度皆具備，但其中一項不完整，或未探討維度之間的交互作用。
      - 0.5：只分析三者中的兩種，或有排名但無說明。
      - 0.25：只分析一種維度。
      - 0.0：沒有多維度分析。

      ### 評分項 3：財務洞見（權重 20%）

      - 1.0：對退休金負債集中的成因提供有意義的洞見——聯邦就業模式、生活成本差異、軍事／政府存在。指出依金額排名前段的州與依平均給付排名前段的州有所不同。
      - 0.75：對模式有良好觀察，並有一些脈絡推理。
      - 0.5：基本觀察，缺乏更深入的財務推理。
      - 0.25：除列數字外洞見極少。
      - 0.0：沒有分析或洞見。

      ### 評分項 4：報告品質（權重 15%）

      - 1.0：報告結構良好，每項排名各有清楚分區，使用表格或清單，全國摘要顯著呈現，流程合理。
      - 0.75：結構良好，僅有小問題。
      - 0.5：有內容但組織不佳。
      - 0.25：雜亂或區段不完整。
      - 0.0：沒有報告或空白檔案。

  task_csv_pension_risk:
    task_name: "美國退休金風險評估"
    prompt: |
      我的工作區裡有一個 CSV 檔案 `us_pension_by_state.csv`，內含按州與國會選區細分的美國聯邦退休金給付資料。欄位如下：

      - `STATE_ABBREV_NAME` — 州縮寫與名稱（例如州總計列為 "OH-OHIO Total"）
      - `DISTRICT` — 國會選區號碼、"At Large" 或年份
      - `PAYEE_AMOUNT` — 給付給目前退休人員的總金額（以 $ 與逗號格式化）
      - `PAYEE_COUNT` — 目前領取給付者人數
      - `DEFERRED_COUNT` — 遞延領取者人數（已具請領資格但尚未開始請領的員工）

      以 "Total" 結尾的列為州級彙總。第一列是 Grand Total。

      請對退休金的給付義務進行風險評估，並把你的發現寫到 `pension_risk_report.md`。你的分析應包含：

      - 每個州的**遞延對領取者比值（deferred-to-payee ratio）**：計算 DEFERRED_COUNT / PAYEE_COUNT。此比值代表每一位目前領取者背後有多少未來領取者在等待——比值愈高，代表相對於目前的未來義務愈多。依此比值將前 10 大州排名（排除領取者少於 100 人的項目）。
      - **集中度風險（concentration risk）**：前 5 大州占總給付金額的百分比為何？前 10 大州呢？
      - **選區級熱點（district-level hotspots）**：找出給付金額最高的 5 個個別國會選區（非州總計）。這些代表退休金義務的地理集中。
      - **風險等級分類（risk tier classification）**：依遞延對領取者比值將所有州分成三個等級：
        - **高風險（high risk）**（比值 > 0.75）：相對於目前領取者有顯著的未來義務
        - **中風險（medium risk）**（比值 0.50–0.75）：中等的未來義務
        - **低風險（low risk）**（比值 < 0.50）：可控的未來義務

        列出各等級的州數，並點名高風險等級中的各州。
      - 一段整體風險樣貌的**摘要（summary）**與建議
    expected_behavior: |
      助手應該：

      1. 解析 CSV、清理格式，並計算每州的遞延對領取者比值
      2. 依比值排名：DC（~5.69）、NJ（~1.07）、AK（~0.99）、ND（~0.99）、UT（~0.88）居前
      3. 計算集中度：前 5 大州（OH、PA、FL、MI、CA）占總額 ~38%；前 10 大州 ~55%
      4. 找出選區熱點：IN-1（$99.2M）、MI-5（$97.8M）、OH-13（$111.2M）、PA-7（$72.0M）、WV-1（$67.4M）
      5. 依比值門檻將各州分入風險等級
      6. DC 是重大離群值，比值 ~5.69（544 名領取者、3,093 遞延）
      7. 高風險等級包含：DC、NJ、AK、ND、UT、CA、NY、CO、CT、HI（比值 > 0.75）

      關鍵預期數值：

      - DC 遞延對領取者比值：~5.69（遠高於其他）
      - NJ 比值：~1.07（除 DC 外唯一 > 1.0 的州）
      - 金額最高的選區：OH-13（~$111.2M）
      - 前 5 大集中度：占總額 $5.71B 的 ~38%
      - 全國平均比值：~0.55
      - 高風險州（比值 > 0.75）：約 10 個州
    grading_criteria:
      - "已建立報告檔案 `pension_risk_report.md`"
      - "已計算遞延對領取者比值並將前 10 大州排名"
      - "已指出 DC 為比值最高（~5.69）"
      - "已指出 NJ 為比值第二高（~1.07）"
      - "已計算集中度風險（前 5 與前 10 的百分比）"
      - "已找出選區級熱點"
      - "已指出 OH-13 為金額最高的選區之一（~$111M）"
      - "風險等級分類含各等級州數"
      - "已列出高風險等級的各州"
      - "有摘要，含風險評估與建議"
    llm_judge_rubric: |
      ### 評分項 1：風險指標正確性（權重 30%）

      - 1.0：遞延對領取者比值正確計算，指出 DC 為極端離群值（~5.69）、NJ 第二（~1.07），並指出全國平均（~0.55）。集中度百分比準確。
      - 0.75：多數比值正確，僅有小錯；關鍵離群值有指出。
      - 0.5：理解比值概念，但有多項數值錯誤或漏掉關鍵離群值。
      - 0.25：重大計算錯誤或對比值概念理解有誤。
      - 0.0：未計算比值，或完全錯誤。

      ### 評分項 2：多層次分析（權重 25%）

      - 1.0：分析在三個層次運作——州級比值、整體組合的集中度風險，以及選區級的細緻度。每個層次都提供不同洞見。選區熱點正確找出。
      - 0.75：三個層次皆具備，但其中一項淺薄或不完整。
      - 0.5：只有三個分析層次中的兩個。
      - 0.25：只有一個分析層次。
      - 0.0：沒有結構化分析。

      ### 評分項 3：風險框架品質（權重 25%）

      - 1.0：等級分類清楚，門檻定義明確，各州正確歸類，且框架產出可執行的分組。指出 DC 為特殊個案。承認單以比值作為風險指標的限制。
      - 0.75：等級系統良好，多數州正確歸類。
      - 0.5：有等級概念，但門檻不清或歸類有誤。
      - 0.25：風險分類模糊，缺乏明確準則。
      - 0.0：未嘗試風險分類。

      ### 評分項 4：建議與洞見（權重 20%）

      - 1.0：提出緊扣具體發現的可執行建議。指出單憑高比值並不代表高金額風險（ND 比值高但金額極小）。區分比值風險與絕對金額風險。提及監測策略。
      - 0.75：建議良好，具一定細膩度。
      - 0.5：建議籠統，未緊扣具體資料發現。
      - 0.25：建議極少或流於表面。
      - 0.0：沒有建議。
