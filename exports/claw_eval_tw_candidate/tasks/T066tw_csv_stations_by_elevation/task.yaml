expected_actions:
- 已建立報告檔 `elevation_report.md`
- 列出海拔最高的前 10 站，第 1 正確（玉山主峰測站，3,952 公尺）
- 列出海拔最低的後 10 站，第 1 正確（安平海濱潮位站，2 公尺）
- 摘要統計包含最小、最大、平均與中位數（單位公尺）
- 包含各管理機構（林業署 對比 中央氣象署）海拔比較並附正確平均
- 含最高／最低平均海拔的縣市層級分析（南投縣最高、澎湖縣最低）
- 含解讀海拔型態的總結段落
user_agent:
  enabled: false
judge_rubric: '### 評分項 1：資料正確性（權重 35%）


  **1.0 分**：所有排名皆正確，統計準確（平均約 961、中位數 575、前／後 10 正確），

  且各管理機構平均符合預期值（林業署約 1,890、中央氣象署約 432、水利署約 963）。

  **0.75 分**：排名與統計大致正確，僅有小幅落差（例如平均差幾公尺）。

  **0.5 分**：最高與最低測站正確，但中間排名或統計有錯誤。

  **0.25 分**：排名或統計有數個重大錯誤。

  **0.0 分**：未嘗試分析或根本性錯誤。


  ### 評分項 2：分析深度（權重 30%）


  **1.0 分**：對各機構差異提供具意義的解讀（林業署測站多為高山林班、稜線、野溪等

  高海拔監測點，中央氣象署測站多位於有人口的平原、市區與海濱）、縣市型態，以及

  海拔分布洞見。

  **0.75 分**：解讀良好，僅在說明機構差異上有小缺漏。

  **0.5 分**：陳述事實，但解讀或洞見有限。

  **0.25 分**：除列出數字外幾無分析。

  **0.0 分**：未提供任何分析或解讀。


  ### 評分項 3：報告完整性（權重 20%）


  **1.0 分**：所有要求章節皆齊備：前 10、後 10、摘要統計、機構比較、縣市分析、

  總結段落。

  **0.75 分**：多數章節齊備，僅有一處小缺漏。

  **0.5 分**：缺少數個章節。

  **0.25 分**：僅有一、兩個章節。

  **0.0 分**：報告缺漏或為空。


  ### 評分項 4：呈現品質（權重 15%）


  **1.0 分**：markdown 排版良好，含表格、標題清楚、版面有條理。

  **0.75 分**：排版良好，僅有小問題。

  **0.5 分**：可讀但組織不佳。

  **0.25 分**：不易閱讀。

  **0.0 分**：無報告或無法閱讀。'
reference_solution: "助手應該：\n\n1. 讀取並解析 CSV 檔（190 列，UTF-8 含 BOM）\n2. 依 `Elevation (meters)` 欄位排序測站\n3.\
  \ 找出最高測站：玉山主峰測站，3,952 公尺（南投縣，林業署）\n4. 找出最低測站：安平海濱潮位站，2 公尺（臺南市，中央氣象署）\n5. 計算摘要統計：最小 2、最大 3,952、平均約 961、中位數\
  \ 575\n6. 比較管理機構平均海拔，並解讀林業署（高山林班／野溪測站）普遍高於中央氣象署\n   （多位於人口稠密之平原、市區與海濱）的型態\n7. 找出縣市層級的海拔型態（以 3 站以上為篩選）\n\
  8. 撰寫一份結構良好的 markdown 報告\n\n預期關鍵數值（以 `tw_weather_stations.csv` 實際資料計）：\n\n- 測站總數：190 站（中央氣象署 95 站、林業署\
  \ 54 站、水利署 41 站）\n- 最高：玉山主峰測站，3,952 公尺（南投縣，林業署）\n- 第 2~5 高：雪山圈谷站（3,886）、玉山北峰氣象站（3,845）、南湖大山山屋站（3,742）、\n\
  \  奇萊北峰站（3,607）\n- 最低：安平海濱潮位站，2 公尺（臺南市，中央氣象署）\n- 海拔範圍：2 公尺 至 3,952 公尺\n- 平均海拔：約 961 公尺\n- 中位數海拔：575\
  \ 公尺\n- 林業署平均：約 1,890 公尺（54 站）\n- 中央氣象署平均：約 432 公尺（95 站）\n- 水利署平均：約 963 公尺（41 站）\n- 平均海拔最高的縣市（3 站以上）：南投縣，約\
  \ 1,971 公尺（17 站）\n- 平均海拔最低的縣市（3 站以上）：澎湖縣，約 38 公尺（4 站）\n- 有 5 列的縣市（County）欄位為空白"
