expected_actions:
- 建立縮寫詞彙表檔案 acronym_glossary.md
- DGC 正確展開為「數位治理委員會」
- OSM 正確展開為「頻譜管理署」
- 辨識出至少 15 個不重複的縮寫
- 辨識出至少 20 個不重複的縮寫（加分門檻）
- 包含技術類縮寫（MHz、GHz、LTE、UAV、STA）
- 包含政府機關縮寫（OSM、OSTP、OMB、ITS）
- 對各項目套用類別或分組（政府機關／頻譜技術／法規／業界／軍事／其他）
- 採用英文字母順序排序，並附上縮寫總數
user_agent:
  enabled: false
judge_rubric: "### 評分項 1：縮寫涵蓋度（權重 35%）\n- 1.0：辨識出 25 個以上縮寫，包含冷僻的如 CSEA、ISART、TSB、CMRS、DGO，以及\n  脈絡性用法如\
  \ NFL（比喻大城市）、TMI（口語自嘲）與 WG1～WG5 工作小組。\n  既涵蓋明顯的政府縮寫，也涵蓋技術性頻譜術語。\n- 0.75：辨識出 20～24 個縮寫，涵蓋多數主要類別。\n- 0.5：辨識出\
  \ 15～19 個縮寫，涵蓋明顯的縮寫但漏掉數個領域專有術語。\n- 0.25：辨識出 10～14 個縮寫，大多只是常見機關。\n- 0.0：辨識出的縮寫少於 10 個。\n### 評分項 2：展開準確性（權重\
  \ 30%）\n- 1.0：所有縮寫展開皆正確且貼合台灣語境（DGC＝數位治理委員會、OSM＝頻譜管理署、\n  STA＝特別臨時授權、ISART＝先進無線技術國際研討會、CMRS＝商用行動無線服務）。\n\
  - 0.75：多數展開正確，僅有一兩處小錯。\n- 0.5：常見縮寫正確，但數個領域專有縮寫錯誤或缺少展開。\n- 0.25：多處展開錯誤。\n- 0.0：展開大多錯誤或捏造（如沿用英文原版 CSMAC／NTIA\
  \ 等與本逐字稿不符之事實）。\n### 評分項 3：脈絡品質（權重 20%）\n- 1.0：每筆項目都有貼合本次會議的脈絡描述，說明該縮寫與 1755-1850 MHz 頻譜共用\n  討論的關聯（如\
  \ STA 是台灣大哥大會同電信公會提出的實地量測申請）。\n- 0.75：多數項目有實用脈絡。\n- 0.5：有脈絡但偏籠統（只重述全稱，而非會議脈絡）。\n- 0.25：脈絡極少或為樣板文字。\n\
  - 0.0：完全沒有提供脈絡。\n### 評分項 4：組織與分類（權重 15%）\n- 1.0：依英文字母排序、分類清楚（政府機關、頻譜技術、法規、業界、軍事、其他）、\n  全篇格式一致，並附縮寫總數。\n\
  - 0.75：組織良好，僅有少許格式不一致。\n- 0.5：有一些組織，但分類或排序不完整。\n- 0.25：組織不佳。\n- 0.0：沒有組織。"
reference_solution: '助手應讀取 meeting-transcript.md，辨識所有縮寫與簡稱，判斷其中文全稱、貼合

  會議的脈絡與類別，依字母排序後寫入 acronym_glossary.md，並在最後附上縮寫總數。


  逐字稿中出現的關鍵縮寫（最低集合，全稱以台灣語境為準）：


  | 縮寫 | 全稱（台灣語境） | 類別 |

  |------|------------------|------|

  | DGC | 數位治理委員會 | 政府機關 |

  | SCAB | 智慧城市暨資安顧問委員會 | 政府機關 |

  | OSM | 頻譜管理署（Office of Spectrum Management） | 政府機關 |

  | OSTP | 行政院科技與政策辦公室 | 政府機關 |

  | OMB | 行政院主計與預算辦公室 | 政府機關 |

  | ITS | 電信技術研究所 | 政府機關 |

  | ISART | 先進無線技術國際研討會 | 頻譜技術 |

  | MHz | 百萬赫茲（Megahertz） | 頻譜技術 |

  | GHz | 十億赫茲（Gigahertz） | 頻譜技術 |

  | LTE | 長期演進技術（Long-Term Evolution） | 產業 |

  | UAV | 無人機／無人飛行載具 | 軍事 |

  | PCS | 個人通訊服務 | 頻譜技術 |

  | AWS | 先進無線服務 | 頻譜技術 |

  | CMRS | 商用行動無線服務 | 產業 |

  | STA | 特別臨時授權（Special Temporary Authority） | 法規 |

  | CSEA | 商用頻譜加值條例 | 法規 |

  | PCAST | 科技顧問會議 | 政府機關 |

  | CTIA | 電信業者公會 | 產業 |

  | TIA | 電信工業協會 | 產業 |

  | TSB | 電信系統公報 | 頻譜技術 |

  | ITU-R | 國際電信聯盟無線電通信部門 | 頻譜技術 |

  | WRC | 世界無線電通信大會 | 頻譜技術 |

  | EW | 電子戰（Electronic Warfare） | 軍事 |

  | DGO | 指定政府聯絡官 | 政府機關 |

  | IP | 智慧財產權 | 其他 |

  | TMI | 資訊過載（與會者口語自嘲） | 其他 |

  | NFL | 職業聯盟（比喻「重點大城市」的口語） | 其他 |

  | WG1～WG5 | 第 1 至第 5 工作小組 | 其他 |


  此外，逐字稿也提到 NESA（鼎峰緊急救難服務協會）、PINF（公共利益網路基金會）、

  DZX（玉山防務系統）等虛構機構縮寫，可一併收錄。總計約 25～30 個縮寫。'
