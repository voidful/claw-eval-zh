prompt:
  text: "我的工作區中有一個 CSV 檔 `apple_stock_2014.csv`，內含 Apple (AAPL) 2014 年的\n調整後收盤價。該檔有兩個欄位：`AAPL_x`（日期，格式為\
    \ YYYY-MM-DD）與 `AAPL_y`\n（調整後收盤價）。共有 240 個交易日的資料。\n\n請根據此 CSV 資料產出一份綜合財務報告（comprehensive finance report），並儲存至\n\
    `finance_report.md`。這份報告應適合投資人或分析師審閱，並包含下列章節：\n\n1. **執行摘要（Executive Summary）**：簡述 Apple 股票 2014 年的表現，包含期初\n\
    \   價格、期末價格與整體報酬。\n2. **價格表現（Price Performance）**：各月平均價格、各季報酬，並指出該年度的\n   最高與最低價位及其日期。\n3. **波動率分析（Volatility\
    \ Analysis）**：每日報酬統計（平均、標準差）、年化\n   波動率，以及各季波動率比較。\n4. **值得注意的交易日（Notable Trading Days）**：依百分比計的最佳與最差前\
    \ 3 大\n   單日變動，附上日期與脈絡。\n5. **趨勢分析（Trend Analysis）**：關鍵趨勢期間（重大反彈與賣壓）、最長的連漲／\n   連跌天數，以及任何可觀察到的型態。\n\
    6. **風險指標（Risk Metrics）**：最大回撤（maximum drawdown，峰至谷的跌幅）\n   及其日期，以及一個簡單的風險調整後報酬指標（例如報酬除以波動率）。\n7.\
    \ **結論（Conclusion）**：關鍵重點，以及對該股票 2014 年表現的整體評估。"
  language: zh
