expected_actions:
- 建立報告檔案 action_items.md
- 至少擷取 5 個行動項目（條列或編號）
- 至少正確標出 3 位逐字稿中被指派工作的負責人（戴立安／高敏哲／蔡思敏／王志明）
- 標出與活動／研討會（COSCUP／DevOpsDays Taipei／Kubernetes Day Taiwan／贊助）相關的行動項目
- 標出與對內公告（announcement／通知各部門）相關的行動項目
- 標出產品發布相關行動項目（整體前 5 名／top 5／Plan 候選清單）
- 標出競品分析相關行動項目（tier 1 對手／在比較表新增鼎峰一列）
- 標出訊息架構行動項目（定稿、主標語「更快交付，更低風險」）
- 依主題分組，並標註期限（星期二／本週內／今天下班前）
user_agent:
  enabled: false
judge_rubric: "### 評分項 1：行動項目完整度（權重 35%）\n- 1.0：擷取涵蓋全部五大主題（活動贊助、產品發布、資訊圖／競品方法論、競品試算表、\n  訊息架構）的行動項目，明示與隱含的承諾皆有抓到。\n\
  - 0.75：抓到多數，僅漏一兩個次要項目。\n- 0.5：僅涵蓋部分主題，整個主題區塊被遺漏。\n- 0.25：只抓到少數明顯項目。\n- 0.0：嚴重遺漏或無有意義內容。\n### 評分項 2：負責人歸屬正確度（權重\
  \ 30%）\n- 1.0：各行動項目的負責人皆正確（戴立安、高敏哲、蔡思敏、王志明，全體事項標為「全體」），\n  姓名依逐字脈絡正確指派。\n- 0.75：多數正確，僅一兩處輕微錯置。\n- 0.5：部分正確，數處錯誤或缺漏。\n\
  - 0.0：未做負責人歸屬或大量錯誤。\n### 評分項 3：分類、結構與期限（權重 25%）\n- 1.0：依主題清楚分組、格式一致、開頭含總數；期限（星期二／本週內／今天下班前）\n  正確標註；特別標出活動／研討會與對內公告兩類。\n\
  - 0.5：有分組或期限其一，但不完整。\n- 0.0：雜亂、無分組、無期限。\n### 評分項 4：可讀性（權重 10%）\n- 1.0：條列清楚、易於當作後續追蹤清單。\n- 0.0：難以閱讀。"
reference_solution: "助手應讀取 meeting_transcript.md，至少擷取下列行動項目並正確指派負責人與期限：\n- 全體：各自向自己的活動行銷經理確認三場研討會（平台→COSCUP、CI/CD→DevOpsDays\n\
  \  Taipei、GitOps→Kubernetes Day Taiwan）的贊助承諾，並在活動 issue 底下留言回報。\n- 戴立安：本週內整理三場活動分工，發出一份對內公告（announcement）通知各部門。\n\
  - 高敏哲：星期二前為 Plan（規劃）這個 stage 補上一份 top 5 候選清單（如史詩看板、\n  里程碑燃盡圖）。\n- 全體：把產品發布試算表欄位補完、各自檢視並投票選出整體前 5 名功能，星期二截止。\n\
  - 蔡思敏：把競品試算表改成每個 stage 只列出與該 stage 相關的 tier 1 對手。\n- 蔡思敏：在競品比較表新增「鼎峰」自己一列。\n- 王志明：今天下班前把訊息架構定稿，以「更快交付，更低風險」當主標語。\n\
  \n並把結果整理成清楚、依主題分組、含負責人與期限的 action_items.md，開頭附上總數。"
