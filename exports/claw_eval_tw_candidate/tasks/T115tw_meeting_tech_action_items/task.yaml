prompt:
  text: '工作區裡有一份會議逐字稿 meeting_transcript.md，是虛構台灣軟體公司「鼎峰科技」

    的「產品暨行銷週會」紀錄（時區 Asia/Taipei）。會議內容涵蓋幾個主題：企業活動／

    研討會贊助分工、自家「鼎峰匯流大會」的產品發布題材、競品比較資訊圖設計回饋、

    競品分析方法論與比較試算表，以及訊息架構（標語）練習。


    請閱讀整份逐字稿，擷取所有**行動項目（action items）**，並寫入 action_items.md。


    每個行動項目請包含：

    - **負責人**（由逐字稿中明確指派的人，請寫出姓名）

    - **要做的事**（具體事項）

    - **期限**（若逐字稿有提到，例如「星期二」「本週內」「今天下班前」）

    - **脈絡**（屬於哪一個討論主題）


    請依「主題」分組整理，並在報告開頭附上行動項目的**總數**。也請特別標出與

    「活動／研討會（發表會）」以及「對內公告（announcement）」相關的行動項目。'
  language: zh
