prompt:
  text: "工作區中的 `deployment.yml` 包含一個 Web API Deployment 及其 Service 的\nKubernetes manifest。這些 manifest\
    \ 有數個 bug，會在真實叢集（cluster）中造成\n問題。請找出並修正所有問題，並就地儲存修正後的版本。\n\n團隊回報的已知症狀：\n\n1. Pod 永遠無法進入 Ready 狀態——Deployment\
    \ 的 `selector.matchLabels` 與 pod\n   template 標籤不符，因此 ReplicaSet 找不到它的 pod。\n2. 容器持續被 OOMKilled——記憶體\
    \ limit 被設定得比記憶體 request 還低，這是無效的\n   設定，會導致立即被終止。\n3. 資料庫密碼以純文字 `value` 的形式硬編碼在容器的 env 中，而非引用 Kubernetes\n\
    \   Secret。\n4. Service 的 `targetPort` 與容器的 `containerPort` 不符，因此流量永遠到不了\n   應用程式。\n\n請直接在檔案中修正全部四個問題。關於\
    \ Secret 引用，請假設同一個 namespace 中已存在\n一個名為 `web-api-secrets` 的 Secret，其中有一個名為 `db-password` 的 key。請勿\n\
    加入說明這些變更的註解。"
  language: zh
