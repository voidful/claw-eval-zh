prompt:
  text: '請將下列終端機需求翻譯成一條 shell 指令，並只以純文字（plain text）將它儲存到

    `command.txt`，不要附加任何說明：


    在目前目錄底下的任意位置中，找出每一個內容包含完整字串 `FATAL:` 的 `.log`

    檔案，並將每個相符的檔案路徑各印出一次。


    這條指令應該在從目標目錄的根目錄執行時能夠正常運作。'
