reference_solution: '助手應該在 `command.txt` 中產生一條 shell 指令，使其從目前目錄執行時能解決

  該需求。


  可接受的做法包括使用 `find`、`grep`、`xargs` 或 `rg` 等工具，只要該指令能：


  1. 從目前目錄起遞迴搜尋

  2. 將比對範圍限定在 `.log` 檔案

  3. 檢查檔案內容是否包含完整字串 `FATAL:`

  4. 將每個相符的檔案路徑各印出一次


  該指令的搜尋根目錄可使用 `.` 或等效的目前目錄路徑。輸出順序不重要。'
