expected_actions:
- 助手探索並讀取了 inbox/ 中全部 13 封郵件
- 已建立檔案 `triage_report.md`
- 報告中包含全部 13 封郵件
- 每封郵件都已指派優先順序（P0-P4）
- 每封郵件都已指派分類（如 incident／client／spam 等）
- 每封郵件都附有建議行動
- 正式環境服務中斷郵件（01）被歸類為 P0
- 監控警報（13）與資料庫服務中斷事件相連結或歸為一組
- 客戶郵件（05，年約新臺幣 6,000 萬元）被歸類為高優先（P0 或 P1）
- 快閃促銷垃圾郵件（11）被歸類為 P4
- 報告依優先順序排序（最緊急者在最前）
- 報告最上方有摘要區段（標題含「摘要」）
user_agent:
  enabled: false
judge_rubric: '### 評分項 1：優先順序指派準確度（權重 30%）


  **1.0 分**：所有優先順序皆正確指派。正式環境服務中斷（郵件 01）與相關連的監控

  警報（郵件 13）為 P0。南港數位後續追蹤（郵件 05，年約新臺幣 6,000 萬元）為

  P0 或 P1。資安密碼／SSH 金鑰更換（郵件 08）因有 2 天期限，為 P1 或 P2。

  auth service 程式碼審查（郵件 10）因會卡住行動版發布，為 P2。預算對帳

  （郵件 12）為 P2。績效考核（郵件 07）與部落格審查（郵件 02）為 P2 至 P3。

  福利／健檢提醒（郵件 04）為 P2 至 P3。Dependabot PR（郵件 03）為 P3。

  LinkedIn（郵件 06）、電子報（郵件 09）與促銷垃圾郵件（郵件 11）為 P3 至 P4。

  無重大排序錯誤。


  **0.75 分**：多數優先順序合理，僅有 1 至 2 處輕微排序失準（例如程式碼審查評得

  太低或太高）。所有關鍵項目（服務中斷、客戶、資安）皆正確辨識為高優先。


  **0.5 分**：有數處優先順序指派值得商榷。可能未察覺客戶郵件或資安期限的急迫性。

  明顯的項目能答對（服務中斷＝P0、垃圾郵件＝P4），但在中間優先級上力有未逮。


  **0.25 分**：排序明顯失準。可能未能辨識正式環境服務中斷為最高優先，或把低價值

  項目排得太高。優先順序的安排顯得隨意。


  **0.0 分**：未指派優先順序，或優先順序完全錯誤（例如把垃圾郵件排得比正式環境

  事故還高）。


  ### 評分項 2：分類品質（權重 15%）


  **1.0 分**：所有郵件分類正確。能辨識：incident（郵件 01、13）、client

  （郵件 05）、internal-request（郵件 02、07、08、10、12）、automated

  （郵件 03）、newsletter（郵件 09）、spam（郵件 11）、administrative

  （郵件 04）。分類一致且具意義。


  **0.75 分**：多數分類正確，僅有 1 至 2 處輕微誤分類。分類取自合理的分類體系。


  **0.5 分**：部分分類正確，但有數封郵件被誤分類。可能使用不一致或過於籠統的分類。


  **0.25 分**：分類不佳。許多郵件被誤分類，或分類缺乏意義。


  **0.0 分**：未指派分類，或完全錯誤。


  ### 評分項 3：行動建議（權重 25%）


  **1.0 分**：建議具體、可執行且得宜。例如：對服務中斷建議「立即加入戰情室通話」；

  對客戶郵件建議「回覆陳建宏提議週二／週四的時段、把客戶經理拉進來、備妥 SOC 2

  與資料處理協議文件」；對垃圾郵件建議「歸檔／刪除」；對程式碼審查建議「在週四前

  審查 PR #156，重點放在 PKCE 流程的變更」。建議顯示出對情境的理解（例如警報與

  服務中斷相關連、程式碼審查會卡住行動版發布）。


  **0.75 分**：多數建議良好且可執行。僅有少量瑕疵，例如 1 至 2 項過於含糊，或漏掉

  情境上的關聯。


  **0.5 分**：有提出建議，但偏向通用（「回覆這封郵件」）而非具體。漏掉關鍵情境，

  例如新臺幣 6,000 萬元的年約價值，或程式碼審查會卡住發布的特性。


  **0.25 分**：建議過於含糊而無實用價值，或對數封郵件的建議並不得宜。


  **0.0 分**：未提供建議，或完全無用。


  ### 評分項 4：情境意識與關聯（權重 15%）


  **1.0 分**：展現強大的情境推理能力。明確將監控警報（郵件 13）與正式環境服務中斷

  （郵件 01）相連結。辨識出南港數位這段關係新臺幣 6,000 萬元的年約價值。指出 auth

  程式碼審查會卡住行動版發布。理解資安期限只剩 2 天。亦可能指出服務中斷可能影響

  南港數位的客戶關係。


  **0.75 分**：做出多數關鍵關聯。將警報連結到服務中斷。辨識多數具時效性的項目及其

  影響。


  **0.5 分**：做出 1 至 2 項關聯，但漏掉其他。多半孤立看待每封郵件，未看出彼此關係。


  **0.25 分**：情境意識極少。各封郵件獨立處理，毫無交叉參照。


  **0.0 分**：未做出任何情境關聯。


  ### 評分項 5：報告結構與可用性（權重 15%）


  **1.0 分**：報告結構良好且可立即據以行動。最上方有清楚的摘要／當日計畫。郵件依

  優先順序組織。格式一致（標題、條列、表格）。易於快速瀏覽。忙碌的人掃一眼就知道

  該先做什麼。


  **0.75 分**：結構良好，僅有少量格式問題。有摘要。大致易於瀏覽。


  **0.5 分**：具備基本結構，但組織仍可改善。可能缺少摘要或格式不一致。要擷取關鍵

  資訊較費力。


  **0.25 分**：結構不佳，難以瀏覽。沒有清楚的組織或摘要。


  **0.0 分**：輸出毫無結構或無法理解。'
reference_solution: "助手應該：\n\n1. 探索並讀取 `inbox/` 目錄中全部 13 個郵件檔案（繁體中文內容）。\n2. 針對每封郵件分析其急迫性、寄件者重要性、期限與內容。\n\
  3. 指派適當的優先順序，並考量下列原則：\n   - 正式環境服務事故（郵件 01）為 P0。\n   - 與服務中斷相關連的監控警報（郵件 13）為 P0，並應與事故相連結。\n   - 高價值客戶往來郵件（郵件\
  \ 05，年約新臺幣 6,000 萬元）為 P0 或 P1。\n   - 資安強制密碼／SSH 金鑰更換（郵件 08，2 天期限）為 P1 至 P2。\n   - 有期限且會卡住發布的同事程式碼審查（郵件\
  \ 10）為 P2。\n   - 第一季預算對帳（郵件 12）為 P2。\n   - 績效自評（郵件 07）與部落格技術審查（郵件 02）為 P2 至 P3。\n   - 福利／健檢提醒（郵件 04）為\
  \ P2 至 P3。\n   - Dependabot 自動 PR（郵件 03）為 P3。\n   - LinkedIn 通知（郵件 06）、電子報（郵件 09）為 P3 至 P4。\n   - 快閃促銷垃圾郵件（郵件\
  \ 11）為 P4。\n4. 為每封郵件正確分類。\n5. 為每封郵件提供可執行、具體的建議。\n6. 製作一份結構化、易於快速瀏覽、且依優先順序排序的報告。\n7. 在最上方加入一段標題為「摘要」的總結，並附上建議的當日行動計畫。\n\
  8. 將報告儲存到 `triage_report.md`。\n\n這項任務測試助手是否能夠：\n\n- 處理一批異質的輸入。\n- 運用判斷力來分類並排定資訊的優先順序。\n- 辨識情境線索（例如監控警報與資料庫服務中斷相關連、客戶郵件涉及高額年約、\n\
  \  程式碼審查會卡住行動版發布、資安期限只剩 2 天）。\n- 區分緊急、重要與低價值項目。\n- 產出結構化、可執行的輸出。"
