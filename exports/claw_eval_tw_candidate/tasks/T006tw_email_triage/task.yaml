prompt:
  text: "你在幫忙整理一個快被塞爆的電子郵件收件匣（這是虛構台灣軟體公司「鼎峰科技」一位\n工程師的收件匣）。這些郵件已經放在工作區的 `inbox/` 資料夾裡（檔名 `email_01.txt`\n\
    到 `email_13.txt`，內容為繁體中文）。請把全部 13 封郵件讀過，做成一份分類報告，\n存到 `triage_report.md`（請以繁體中文撰寫）。每一封郵件都要標上：\n\n\
    1. **優先順序（Priority）**：P0（放下手邊一切、馬上處理）、P1（今天）、\n   P2（這週）、P3（有空再處理）、P4（不用動作／歸檔）\n2. **分類（Category）**：從下列擇一指派——incident（事故）、client（客戶）、\n\
    \   internal-request（內部請求）、administrative（行政）、code-review（程式碼審查）、\n   automated（自動通知）、newsletter（電子報）、spam（垃圾／促銷）\n\
    3. **建議行動（Recommended action）**：用 1 到 2 句簡短說明該怎麼處理\n\n請把報告依優先順序排好（最緊急的排最前面）。並在最上面加一段簡短摘要（標題請用\n「摘要」），把最關鍵的項目點出來，順便幫今天排個行動計畫。\n\
    \n備註：所有時間皆為 Asia/Taipei 時區，金額為新臺幣（NT$）。"
  language: zh
