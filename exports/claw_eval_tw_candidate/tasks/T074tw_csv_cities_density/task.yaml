judge_rubric: "### 評分項 1：分析正確性（權重 35%）\n- 1.0：所有集中度指標、主導百分比與不均比值皆正確計算；縣市分組與計數準確\n  （22 縣市、195 鄉鎮；臺北市每鄉鎮平均最高、連江縣最低；臺東縣主導最高；\n\
  \  高雄市最不均、臺北市最均）。\n- 0.75：多數指標正確，僅有一兩處小錯。\n- 0.5：部分指標正確，但有多項關鍵計算錯誤。\n- 0.25：多數計算有重大錯誤。\n- 0.0：沒有正確分析。\n\
  \n### 評分項 2：洞見品質（權重 30%）\n- 1.0：指出關鍵型態，如六都的鄉鎮多且平均人口高、東部與外島縣市的單一鄉鎮主導\n  與低密度、高雄市鄉鎮規模極不均（鳳山區 vs. 茂林區）、北部人口高度集中，並對\n\
  \  這些型態的意義做出結論。\n- 0.75：型態辨識良好，掌握多數關鍵洞見。\n- 0.5：有一些觀察，但漏掉主要型態。\n- 0.25：大多是原始數字，詮釋很少。\n- 0.0：沒有指出任何洞見或型態。\n\
  \n### 評分項 3：完整性（權重 20%）\n- 1.0：五個要求的區段皆具備，每個都有充分分析。\n- 0.75：所有區段具備，僅有小幅缺漏。\n- 0.5：有區段缺漏。\n- 0.25：多數區段缺漏。\n\
  - 0.0：報告缺漏或空白。\n\n### 評分項 4：報告結構（權重 15%）\n- 1.0：組織良好，分區清楚，使用適當表格，且從集中度指標到洞見流程合理。\n- 0.75：組織良好，僅有小幅排版問題。\n\
  - 0.5：有分析但結構不佳。\n- 0.25：不易閱讀。\n- 0.0：沒有報告或無法使用。"
reference_solution: "助手應該：\n\n1. 讀取並解析 `tw_townships_density.csv`\n2. 依縣市（County）分組並計算各縣市指標\n3. 計算集中度比值與單一鄉鎮主導百分比\n\
  4. 找出縣市內各鄉鎮人口分布的型態（最均／最不均）\n5. 依題目給定的縣市分組建立五大區域並比較\n\n關鍵預期數值（已由程式自 fixture `tw_townships_density.csv`\
  \ 實算，僅供查核）：\n\n- 不同縣市數：22 個；鄉鎮市區總數：195 個；資料集總人口：19,417,900。\n- 每鄉鎮平均人口最高：臺北市（約 218,500，12 個鄉鎮市區），其次新北市（約\
  \ 195,325，\n  20 個）、桃園市（約 173,000，13 個）。\n- 每鄉鎮平均人口最低：連江縣（約 3,425，4 個）、澎湖縣（約 16,617，6 個）、\n  臺東縣（約 22,250，8\
  \ 個）。\n- 單一鄉鎮主導前 5（鄉鎮數≥5）：臺東縣（臺東市約 61.8%）、澎湖縣（馬公市約 58.2%）、\n  屏東縣（屏東市約 41.7%）、新竹縣（竹北市約 41.6%）、花蓮縣（花蓮市約\
  \ 37.6%）。\n  其中臺東縣主導程度最高。\n- 鄉鎮市區最多：新北市（20）、高雄市（16）、臺中市（15）。\n- 鄉鎮市區最少：嘉義市（2）、新竹市（3）。\n- 縣市內不均（鄉鎮數≥10，共\
  \ 7 個縣市符合：高雄市、新北市、臺南市、桃園市、臺中市、\n  彰化縣、臺北市）：最不均為高雄市（最大/最小約 188.9 倍，鳳山區 359,000／茂林區\n  1,900）；最均為臺北市（約\
  \ 2.5 倍，大安區 303,000／南港區 122,000）。\n- 區域摘要：北部總人口最多（約 10,427,000，69 個鄉鎮），其次南部（約 4,347,600，\n  48 個）、中部（約\
  \ 3,928,500，46 個）、東部（約 449,000，16 個）、外島最少\n  （約 265,800，16 個）。"
