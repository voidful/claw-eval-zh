- 已計算每鄉鎮平均人口並依縣市排名（臺北市最高、連江縣最低）
- 已為鄉鎮數≥5 的縣市計算單一鄉鎮主導百分比，並指出臺東縣（臺東市）主導程度最高
- 正確回報不同縣市數量（22 個）
- 已指出鄉鎮市區最多（新北市）與最少（嘉義市）的縣市
- 已為鄉鎮數≥10 的縣市計算人口不均比值（最不均為高雄市、最均為臺北市）
