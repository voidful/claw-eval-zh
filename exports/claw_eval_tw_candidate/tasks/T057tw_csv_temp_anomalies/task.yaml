expected_actions:
- 已建立報告檔 `anomaly_report.md`
- 正確找出最熱月份為 2023-09，數值約 1.48°C
- 正確找出最冷月份為 1893-01，數值約 -0.82°C
- 最暖年份包含 2023、2016 與 2020
- 最冷年份包含 1909 與 1904
- 包含含 z-score 的統計離群值分析
- 找出 2023 年 9 月為最大離群值（z-score 約 3.7–3.8）
- 計算年對年變化並找出最大的擺動
- 提供總結或解讀
user_agent:
