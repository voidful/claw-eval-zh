judge_rubric: '### 評分項 1：資料分析正確性（權重 35%）


  **1.0 分**：極端月份、最暖／最冷年份、z-score 與年對年變化在數值上皆正確，並以

  具體數值清楚呈現。

  **0.75 分**：多數數值正確，僅有一、兩處輕微落差。

  **0.5 分**：部分數值正確，但有數個關鍵數字錯誤或缺漏。

  **0.25 分**：少數數值正確；有重大計算錯誤。

  **0.0 分**：無任何正確計算，或未嘗試分析。


  ### 評分項 2：統計嚴謹性（權重 30%）


  **1.0 分**：正確計算各月統計與 z-score，以正確門檻找出離群值，並以適當脈絡呈現

  結果（例如解釋 z-score > 2 的意義）。

  **0.75 分**：z-score 分析已具備且大致正確，僅有小問題。

  **0.5 分**：有一些統計分析，但缺少 z-score 或計算錯誤。

  **0.25 分**：統計分析極少，多為質性觀察。

  **0.0 分**：無統計分析。


  ### 評分項 3：報告結構與解讀（權重 20%）


  **1.0 分**：markdown 組織良好，各分析元件分節清楚，並有一段周延的總結，將異常

  連結到更廣的氣溫型態。

  **0.75 分**：報告有條理，僅有小幅結構問題；有總結但較簡短。

  **0.5 分**：含分析但組織不佳，或缺少總結。

  **0.25 分**：雜亂或缺少主要章節。

  **0.0 分**：無報告或為空。


  ### 評分項 4：完整性（權重 15%）


  **1.0 分**：所有要求元素皆齊備：極端月份、含 z-score 的離群值分析、最暖／最冷

  年份、年對年變化與總結。

  **0.75 分**：多數元素齊備，僅有一處小缺漏。

  **0.5 分**：缺少數個元素。

  **0.25 分**：僅有少數元素。

  **0.0 分**：報告缺漏或近乎空白。'
reference_solution: "助手應該：\n\n1. 讀取並解析 CSV 檔\n2. 篩選出 GISTEMP 紀錄（1880–2023）\n3. 找出最熱月份：2023 年 9 月，+1.48°C\n\
  4. 找出最冷月份：1893 年 1 月，-0.82°C\n5. 計算各曆月統計並找出 z-score 離群值\n6. 計算年度平均並為年份排名\n7. 計算年度平均的年對年變化\n8. 撰寫一份結構化的\
  \ markdown 報告\n\n預期關鍵數值：\n\n- 最熱月份（GISTEMP）：2023-09，+1.48°C\n- 最冷月份（GISTEMP）：1893-01，-0.82°C\n- 最暖的前\
  \ 5 個年份：2023（約 1.17）、2016（約 1.01）、2020（約 1.01）、\n  2019（約 0.98）、2017（約 0.92）\n- 最冷的前 5 個年份：1909（約 -0.49）、1904（約\
  \ -0.48）、1917（約 -0.46）、\n  1911（約 -0.45）、1910（約 -0.44）\n- 最極端的統計離群值：2023-09，z-score 約 3.76\n- 許多離群值集中在\
  \ 2015–2023，反映暖化加速\n- 最大的年對年躍升包括 1976→1977（+0.28）與 2022→2023（+0.28）"
