judge_rubric: '### 評分項 1：決議辨識準確度（權重 35%）


  **1.0 分**：辨識出所有主要決議，包含活動贊助分工、產品發布整合方式、競品方法論、

  資訊圖配色與訊息主標語。正確區分決議與進行中的討論（例如把「活動預算仍待活動行銷

  經理確認」標為待後續，而非已定案）。

  **0.75 分**：掌握多數決議，但漏掉一項，或誤把曾討論但未拍板的項目納入。

  **0.5 分**：掌握部分決議，但漏掉數項，或把討論與決議混為一談。

  **0.25 分**：僅辨識出一兩項顯而易見的決議。

  **0.0 分**：未辨識出有意義的決議。


  ### 評分項 2：背景脈絡品質（權重 25%）


  **1.0 分**：每項決議皆附上準確的背景脈絡，說明是什麼促成討論、考慮過哪些替代方案，

  以及為何選定該方案（例如資訊圖不用紅色是為了避免變成攻擊式素材、保持比較調性）。

  **0.75 分**：多數決議有良好背景脈絡，僅有少許缺口。

  **0.5 分**：提供部分背景脈絡，但缺少關鍵推理或所考慮的替代方案。

  **0.25 分**：背景脈絡極少，決議僅逐條列出而無說明。

  **0.0 分**：未提供背景脈絡。


  ### 評分項 3：參與者歸屬（權重 20%）


  **1.0 分**：正確指出誰倡議每一立場、誰參與了達成共識，姓名準確取自逐字稿

  （王志明、林淑芬、高敏哲、陳柏宇、蔡思敏、戴立安）。

  **0.75 分**：多數參與者正確辨識，僅有少許錯誤。

  **0.5 分**：辨識出部分參與者，但有數位缺漏或誤植。

  **0.25 分**：參與者辨識極少。

  **0.0 分**：未歸屬參與者。


  ### 評分項 4：結構與實用性（權重 20%）


  **1.0 分**：決議格式清楚、結構一致，附上實用的彙總，並標示哪些決議為 final、哪些

  需 follow-up。可直接作為會議紀錄使用。

  **0.75 分**：結構良好，僅有少許格式問題。

  **0.5 分**：可讀，但結構不一致或缺少彙總。

  **0.25 分**：組織不佳，難以作為參考。

  **0.0 分**：無可用結構。'
reference_solution: "助手應該：\n\n1. 讀取並解析會議逐字稿 meeting_transcript.md\n2. 區分決議（已達成的結論／共識）與尚在進行的討論\n3. 掌握每項決議背後的背景脈絡與相關參與者\n\
  \n應辨識出的關鍵決議（皆取自逐字稿、皆為虛構素材）：\n\n1. 活動贊助分工：平台（Platform）→ 開源人年會 COSCUP；CI/CD → DevOpsDays Taipei；\n   GitOps\
  \ → Kubernetes Day Taiwan。三場各對一條產品主線。（注意：各條線預算仍待\n   各自的活動行銷經理確認，王志明先列為暫定／待確認，故狀態為 needs follow-up。）\n\
  2. 產品發布方式：把過去一年的多個小型 MVC 整合（bundle）成一個大主題敘事（例如\n   「漏洞管理 vulnerability management」），而非逐條列功能；重用 5.0 版的發布內容\n\
  \   再加上之後的新增項目。\n3. Top 5 功能挑選：改掉「每個 stage 各挑 3 個」的做法，改成從所有 stage 裡挑出\n   整體前 5 名（top 5 overall），交給公關（PR）團隊當\
  \ keynote 素材。\n4. 競品比較方法論：只聚焦 tier 1 對手；每個 stage 只放與該 stage 相關的 tier 1 對手\n   （不是每頁都塞滿六家）；並在比較表新增「鼎峰」自己一列，以誠實呈現對手較強之處。\n\
  5. 資訊圖配色：維持只用綠色的配色（不放紅色或黃色），以保持「比較」的調性，而非\n   競爭攻擊式（attack piece）。\n6. 訊息主標語：在多個候選中選定「更快交付，更低風險」為最終主標語（勝過「自信地\n\
  \   快速前進」「零取捨」等替代方案）。\n7. stage 命名：承認如「設定（Configure）」「監控（Monitor）」等名稱描述性不足，\n   但這次先沿用（needs follow-up），下一版迭代再加上可點選進入的細節頁。"
