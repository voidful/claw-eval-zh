prompt:
  text: '我手上有一份逐字稿檔案 `transcript.md`，來自 NASA 首場關於不明異常現象（UAPs/UFOs）的公開會議。會議過程中，發言者提到了與 UAP 研究相關的各種資料來源、感測器、資料庫與量測系統。


    請幫我讀過逐字稿，把所有提及的資料來源與量測系統擷取到名為 `data_sources.md` 的檔案。對於每個來源，請列出：


    - **名稱／類型（Name/Type）**：資料來源或感測器系統

    - **擁有者／營運者（Owner/Operator）**：機關或組織

    - **描述（Description）**：它量測或提供什麼

    - **與 UAP 的關聯（Relevance to UAP）**：它在 UAP 研究脈絡中如何被討論

    - **侷限（Limitations）**：任何提到的侷限或附註

    - **是誰提到的（Who referenced it）**：發言者姓名


    請把來源分成以下類別：Government/Military Sensors、Civilian Aviation Systems、Space-Based Assets、Ground-Based Scientific
    Instruments、Crowdsource/Public Data 與 Databases/Archives。在最上方附一張摘要表，列出所有來源及其類別與擁有者。'
  language: zh
