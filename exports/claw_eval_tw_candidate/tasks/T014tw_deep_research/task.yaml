judge_rubric: '### 評分項 1：研究深度與正確性（權重 30%）


  **1.0 分**：報告含有來自主要來源、具體可查證的資訊。展現了真正的研究——提及

  具體的目標數字、目標年度、裝置容量、機關名稱與唯有實際調查才能取得的細節。

  無重大不準確之處。


  **0.75 分**：報告深度良好，資訊大致具體。少數主張可能籠統，或可能來自訓練

  資料而非新近的研究。


  **0.5 分**：報告對主題有適度涵蓋，但大量仰賴一般知識。有部分具體細節，但許多

  主張未附來源或流於籠統。


  **0.25 分**：報告多為一般知識，少有實際研究的跡證。


  **0.0 分**：缺少報告，或含有明顯過時／不準確的資訊。


  ### 評分項 2：引用品質（權重 20%）


  **1.0 分**：每一項重要的事實主張都附有行內引用。References 章節含有多個指向

  主要來源（政府機關官方文件、官方報告、能源統計、新聞）的 URL。引用具相關性，

  且確實能支撐其所附帶的主張。


  **0.75 分**：多數主張皆有引用。References 章節有 5～10 個來源。少數主張缺乏引用。


  **0.5 分**：有部分引用但不一致。References 章節存在但單薄（3～5 個來源）。


  **0.25 分**：引用極少。僅參照 1～2 個來源。


  **0.0 分**：無引用或無 references 章節。


  ### 評分項 3：來源、查詢日期與不確定性（權重 20%）


  **1.0 分**：所有目標數字、裝置容量與進度資料皆標示可追溯的資料來源與統計年度，

  明確標示查詢日期，並說明資料限制與不確定性（政策可能修訂、進度數字隨統計時點

  變動）。明顯以引用來源取代捏造或寫死的數值。


  **0.75 分**：多數關鍵數據有標示來源並標示查詢日期，對不確定性有提及但較簡略。


  **0.5 分**：有標示部分來源或查詢日期，但不一致，或未說明資料限制。


  **0.25 分**：僅零星提及來源或日期，未說明不確定性。


  **0.0 分**：完全未標示來源或查詢日期，或出現捏造／寫死且未加註的目標或容量數字。


  ### 評分項 4：涵蓋完整度與寫作品質（權重 20%）


  **1.0 分**：所要求的全部五個面向皆詳盡涵蓋。報告具備專業研究報告的結構，標題

  清楚、邏輯流暢、達到至少 1000 字，易讀且易於擷取關鍵發現。


  **0.75 分**：所有面向皆涵蓋且細節良好，但有一兩個面向相對單薄；結構良好。


  **0.5 分**：多數面向有涵蓋，但有一項缺漏或非常表面；結構尚可。


  **0.25 分**：五個面向中僅有 2～3 個獲得任何深度的處理，或組織不佳。


  **0.0 分**：報告未處理所要求的主題，或無可辨識的結構。


  ### 評分項 5：批判性分析（權重 10%）


  **1.0 分**：報告超越事實的羅列，提供分析——指出趨勢、進行比較、點出張力（例如

  能源轉型目標 vs. 電網與土地限制），並對整體態勢提出細膩的觀點。限制章節有深度

  且具體。


  **0.75 分**：在純粹報導之外，有部分分析內容。


  **0.5 分**：多為描述性，偶有分析性的觀察。


  **0.25 分**：純粹羅列資訊，無分析。


  **0.0 分**：無任何分析內容。'
reference_solution: '助手應該：


  1. 使用網路搜尋，找出台灣再生能源政策的最新資訊

  2. 造訪主要來源（政府機關官方網站、官方報告、能源統計、新聞報導）

  3. 將研究結果綜整為一份結構良好的研究報告

  4. 包含行內引用（inline citations）與一個 References 章節

  5. 涵蓋所要求的全部五個面向，並提供具體、可查證的細節

  6. 將報告儲存至 `wasm_research.md`（檔名沿用原任務，不可更改）


  因為是即時資料，正確行為是**標示資料來源、標示查詢日期，並說明資料限制與

  不確定性**（政策與目標可能修訂、進度數字隨統計時點而異），而非捏造或寫死

  任何目標或裝置容量數字。'
