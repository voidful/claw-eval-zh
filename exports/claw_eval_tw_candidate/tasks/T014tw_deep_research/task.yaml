prompt:
  text: "請研究以下主題，並產出一份附主要來源引用（primary source citations）的完整\n報告：\n\n**主題：台灣再生能源政策的現況——具體聚焦於太陽光電、離岸風電、能源轉型\n\
    目標與相關獎勵／躉購（FIT）機制。**\n\n你的報告應涵蓋：\n\n1. **政策框架與目標**：台灣目前的再生能源政策框架與裝置容量／占比目標為何？\n   請提供具體數字與目標年度。\n\
    2. **主管機關與法規**：哪些政府機關與法規（例如能源主管機關、相關能源條例）\n   在推動再生能源？\n3. **獎勵機制**：目前有哪些獎勵或躉購費率（FIT）、競標或補助機制？\n4.\
    \ **進展現況**：太陽光電與離岸風電目前的裝置容量與進度如何？請指明來源年度。\n5. **限制與挑戰**：目前有哪些政策、土地、電網或社會接受度上的挑戰？\n\n**要求：**\n- 每一項事實主張都必須附有引用來源（URL、官方文件或報告）\n\
    - 將報告儲存至 `wasm_research.md`\n- 在結尾加入一個 References 章節，列出所有來源\n- 至少 1000 字（words）\n\n注意：這是即時資料。請對每一項數據與目標**標示資料來源、標示查詢日期**，並\n\
    說明**資料限制與不確定性**（政策可能修訂、進度數字隨統計時點變動）。切勿捏造\n或寫死任何目標數字或裝置容量。"
