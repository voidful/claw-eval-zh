judge_rubric: '### 評分項 1：正確性與忠實度（權重 30%）


  **1.0 分**：README 中的所有資訊皆源自實際原始碼。技術堆疊、端點、環境變數與腳本

  皆正確，無捏造的功能或函式庫。


  **0.75 分**：大致正確，僅有一處小幅不準確，或假設了原始碼中沒有的細節。


  **0.5 分**：整體正確，但含有明顯的不準確之處或捏造的細節。


  **0.25 分**：有多處重大不準確之處或捏造的功能。


  **0.0 分**：內容多半為捏造，未反映實際的程式碼庫。


  ### 評分項 2：完整性（權重 25%）


  **1.0 分**：涵蓋所有必要章節：標題／說明、技術堆疊、快速上手、環境變數、API 端點、

  腳本與授權。無重大章節缺漏。


  **0.75 分**：涵蓋大部分章節，僅有一處小幅遺漏。


  **0.5 分**：缺少兩個以上章節，或有數個章節流於表面。


  **0.25 分**：涵蓋極少；大部分必要章節缺漏。


  **0.0 分**：無有意義的 README 內容。


  ### 評分項 3：API 文件品質（權重 20%）


  **1.0 分**：所有路由皆記錄了 HTTP 方法、路徑與簡短說明。驗證路由（register、

  login）、task CRUD 路由、webhook 端點與健康檢查皆有涵蓋。


  **0.75 分**：多數路由皆有記錄，僅有小幅缺漏（例如漏掉健康檢查或一項 CRUD 操作）。


  **0.5 分**：部分路由有記錄；有數個端點缺漏或方法不正確。


  **0.25 分**：API 文件極少。


  **0.0 分**：無 API 文件。


  ### 評分項 4：結構與可讀性（權重 15%）


  **1.0 分**：組織良好，標題清楚、格式一致、指令與環境變數妥善使用程式碼區塊，且

  讓新進開發者易於依循。


  **0.75 分**：結構良好，僅有小幅格式不一致。


  **0.5 分**：可讀，但組織不佳或格式不一致。


  **0.25 分**：難以依循或結構不佳。


  **0.0 分**：無法閱讀或無結構。


  ### 評分項 5：快速上手品質（權重 10%）


  **1.0 分**：步驟清楚的設定說明，包含先決條件（Node.js、PostgreSQL、Redis）、安裝

  相依套件、設定環境變數、執行 migration，以及啟動伺服器。


  **0.75 分**：設定說明良好，僅有一處小幅缺漏。


  **0.5 分**：具備基本說明，但缺少關鍵步驟（例如資料庫 migration 或 Redis）。


  **0.25 分**：設定說明極少或不清楚。


  **0.0 分**：無設定說明。'
reference_solution: "助手應該閱讀原始檔案以了解專案結構，接著產製一份組織良好、能準確反映程式碼庫的\nREADME。\n\n助手應該發掘並納入的關鍵細節：\n\n- 此專案名為「TaskFlow\
  \ API」（來自 package.json 的 name/description 與 logger\n  輸出）。\n- 技術堆疊：TypeScript、Express、Prisma（PostgreSQL）、Redis、JWT\
  \ 驗證、bcrypt。\n- 路由：`/api/auth`（register、login）、`/api/tasks`（CRUD）、`/api/webhooks`\n  （task-complete）、`/health`。\n\
  - 環境變數：PORT、DATABASE_URL、JWT_SECRET、REDIS_URL、WEBHOOK_SECRET。\n- 腳本：dev、build、start、test、lint、db:migrate、db:seed。\n\
  - 授權：MIT。\n\n這份 README 應結構完整，具有清楚的標題、指令的程式碼區塊，以及源自實際原始碼\n（而非憑空捏造功能）的正確資訊。"
