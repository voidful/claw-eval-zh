prompt:
  text: "請檢視本工作區中的原始碼 — 這是一個小型的 TypeScript REST API 專案。請為此專案\n產製一份完整的 `README.md`。\n\n注意：README 慣例上以英文撰寫，請以英文輸出這份\
    \ README；以下需求說明僅以中文\n呈現。\n\n這份 README 應該包含：\n\n1. **專案標題與說明** — 此專案的用途。\n2. **技術堆疊（tech stack）** —\
    \ 所使用的語言、框架與關鍵函式庫。\n3. **快速上手（getting started）** — 先決條件、安裝步驟，以及如何在本機執行此\n   專案（含資料庫設定）。\n4. **環境變數**\
    \ — 以表格或清單說明 `.env.example` 中的每一個變數。\n5. **API 端點** — 記錄可用的路由、其 HTTP 方法與簡短說明。\n6. **可用腳本（scripts）**\
    \ — 說明每一個 npm script 的作用。\n7. **授權（License）** — 依據 `package.json` 中的內容。\n\n請將輸出存為工作區根目錄下的 `README.md`。"
  language: zh
