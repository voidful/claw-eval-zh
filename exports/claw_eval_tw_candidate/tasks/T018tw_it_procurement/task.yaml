prompt:
  text: '有一家台灣公司／政府單位（約 50 位使用者）需要為新進人員採購 **開發者／辦公

    用筆電（laptops）**。請協助他們研究選項並提出建議，並納入**政府採購法**與

    **新臺幣（NT$）預算**的考量。


    **要求：**

    - 至少 32 GB RAM、至少 512 GB SSD、現代 CPU（近兩代以內）、良好做工

    - 預算：每台 NT$45,000–NT$75,000

    - 需兼顧 macOS 與 Linux 相容性（部分開發者各有偏好）

    - 須考量政府採購法相關規範（如共同供應契約、決標方式、資安要求）


    請研究至少 5 款在台灣可採購的具體筆電型號，並製作一份採購建議。針對每款型號，

    記錄：


    1. **確切的型號名稱與配置**（CPU、RAM、儲存、螢幕）

    2. **台灣市場目前價格**（新臺幣，並註明購買通路——原廠、經銷商、政府共同供應契約）

    3. **可維修性與保固**——標準保固、延長保固選項、在台維修服務

    4. **與使用者相關的規格**——鍵盤、連接埠、螢幕、電池續航

    5. **Linux 相容性**（非 Mac 選項）——WiFi、藍牙、休眠等已知問題

    6. **大量採購／政府採購選項**——量大折扣、政府共同供應契約品項、資安合規


    請將報告儲存至 `laptop_procurement.md`，內容須包含比較表格、分別針對 macOS

    與 Linux 使用者的建議、一份為 50 人團隊建議理想機型組合的「車隊建議」，以及

    估算的總預算（新臺幣）。


    注意：這是即時資料。請對型號、價格與共同供應契約品項**標示資料來源、標示查詢

    日期**，並說明**資料限制與不確定性**（價格與供貨狀態常變動、共同供應契約品項

    會更新）。切勿捏造或寫死特定價格。法規正式名稱（政府採購法）保留原文。'
  language: zh
