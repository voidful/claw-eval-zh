expected_actions:
- 已建立報告檔 `life_exp_outliers.md`
- 描述統計離群值方法（z-score、IQR 或類似方法）
- 找出 2007 年低端離群值（Swaziland、Mozambique 等）
- 分析大洲內離群值
- 找出 Afghanistan 為 Asia 內的離群值
- 找出平均壽命的時序下降
- 找出 Rwanda 1987-1992 的下降為極端（約 20 年降幅）
- 列出最劇烈的下降並附幅度
- 提供真實世界的解釋（HIV/AIDS、衝突等）
user_agent:
