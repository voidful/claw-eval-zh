judge_rubric: '### 評分項 1：統計嚴謹性（權重 30%）


  **1.0 分**：清楚描述所用統計方法，回報門檻與具體數值（z-score 或 IQR 界限），

  正確找出離群值及其統計量，並指出其侷限（例如分布甚廣時 IQR 可能標不出離群值）。

  **0.75 分**：使用有效的統計方法並正確找出多數離群值，但在門檻或方法論細節上有

  缺漏。

  **0.5 分**：找出離群值，但統計佐證薄弱或不清楚。

  **0.25 分**：提及離群值但缺乏適當的統計分析。

  **0.0 分**：未嘗試統計離群值偵測。


  ### 評分項 2：異常偵測廣度（權重 30%）


  **1.0 分**：涵蓋三類異常：全域統計離群值、大洲內離群值與時序下降。對每一類皆

  提供具體國家、時間區間與幅度。

  **0.75 分**：涵蓋至少兩類異常並具良好細節。

  **0.5 分**：將一類處理得當，或多類但流於表面。

  **0.25 分**：僅有基本的離群值辨識而無深度。

  **0.0 分**：無具意義的異常偵測。


  ### 評分項 3：脈絡分析（權重 25%）


  **1.0 分**：將離群值連結到真實世界事件（南部非洲的 HIV/AIDS 疫情、盧安達種族

  滅絕、柬埔寨赤柬、伊拉克／索馬利亞的戰爭），並有具體引述。

  **0.75 分**：對多數離群值提供合理解釋，但缺少一些關鍵連結。

  **0.5 分**：提供一些解釋，但缺乏具體性或遺漏主要成因。

  **0.25 分**：解釋含糊或籠統。

  **0.0 分**：未嘗試任何解釋。


  ### 評分項 4：報告品質（權重 15%）


  **1.0 分**：報告結構良好，分節清楚，以表格或排版過的清單呈現資料，由方法論到

  發現再到分析的脈絡合乎邏輯。

  **0.75 分**：結構良好，僅有小問題。

  **0.5 分**：內容齊備，但組織不佳。

  **0.25 分**：不易閱讀或缺少章節。

  **0.0 分**：無報告或輸出無法使用。'
reference_solution: "助手應該：\n\n1. 讀取並解析 CSV 檔\n2. 對 2007 年資料套用統計方法（z-score 或 IQR）。以 z-score（離平均 >2 個標準差）\n\
  \   找出 6 個低離群值：Swaziland (z=-2.27)、Mozambique (z=-2.06)、Zambia (z=-2.04)、\n   Sierra Leone (z=-2.02)、Lesotho\
  \ (z=-2.02)、Angola (z=-2.01)。無高離群值。\n   以 IQR（1.5×IQR）則因分布甚廣（IQR=19.556）而找不到離群值。\n3. 找出 2007 年大洲內離群值——偏離其大洲平均\
  \ >1.5 個標準差的國家：\n   - Africa：Reunion (76.442, z=2.25)、Libya (73.952)、Tunisia (73.923)、\n     Algeria\
  \ (72.301)、Mauritius (72.801)、Morocco (71.164)、Egypt (71.338) 偏高；\n     Swaziland (39.613, z=-1.58)\
  \ 偏低\n   - Americas：Haiti (60.916, z=-2.86) 明顯偏低；Canada (80.653) 與\n     Bolivia (65.554) 為離群值\n   -\
  \ Asia：Afghanistan (43.828, z=-3.38) 為極端離群值\n   - Europe：Turkey (71.777)、Romania (72.476)、Bulgaria (73.005)\
  \ 為低離群值\n4. 找出時序下降——平均壽命在相鄰 5 年區間之間下滑的國家\n5. 標示最劇烈的下降：Rwanda 1987-1992 (-20.421)、Zimbabwe 1992-1997\
  \ (-13.568)、\n   Lesotho 1997-2002 (-10.965)、Swaziland 1997-2002 (-10.420)、\n   Botswana 1992-1997 (-10.189)\n\
  6. 將離群值連結到真實世界事件（南部非洲的 HIV/AIDS、盧安達種族滅絕、柬埔寨種族\n   滅絕、戰爭）\n\n預期關鍵數值：\n\n- 2007 年 z-score 離群值（z < -2）：Swaziland、Mozambique、Zambia、Sierra\
  \ Leone、\n  Lesotho、Angola\n- 最嚴重的大洲內離群值：Asia 的 Afghanistan（z=-3.38）\n- 最大的單期下降：Rwanda 1987-1992（-20.421\
  \ 年，自 44.02 降至 23.599）\n- 第二大：Zimbabwe 1992-1997（-13.568）"
