judge_rubric: "### 評分項 1：與會者辨識完整度（權重 35%）\n- 1.0：所有委員、列席官員與公眾參與者皆以正確姓名與角色辨識，無一遺漏（21 位）。\n- 0.75：辨識出多數與會者（18\
  \ 位以上），僅少許遺漏。\n- 0.5：辨識出多數，但有數位缺漏（14-17 位）。\n- 0.25：僅辨識出最突出的發言者。\n- 0.0：辨識出的與會者不到一半。\n### 評分項 2：細節準確度（權重\
  \ 30%）\n- 1.0：所有機關、職稱與與會方式皆正確；視訊連線 對比 親自到場 與逐字稿的星號標記\n  及點名相符（如何信宏、馮淑惠等 9 位為視訊連線；6 位委員與主席為親自到場）。\n-\
  \ 0.75：多數細節正確，僅一兩處小誤。\n- 0.5：機關或與會方式有數處錯誤。\n- 0.25：隸屬或角色有許多不準確之處。\n- 0.0：細節大致錯誤或為杜撰。\n### 評分項 3：組織與結構（權重\
  \ 20%）\n- 1.0：清楚分區——主席、親自到場委員、視訊連線委員、列席官員、公眾參與者，易於瀏覽。\n- 0.75：組織良好，僅少許結構問題。\n- 0.5：有部分組織，但區段不清楚或不一致。\n\
  - 0.25：組織不佳，難以查找。\n- 0.0：無有意義的結構。\n### 評分項 4：發言角色評估（權重 15%）\n- 1.0：準確區分積極參與者（致詞、提問、技術發言）與僅在點名時報出身分者。\n\
  - 0.75：多數發言角色正確記下。\n- 0.5：嘗試記下參與程度但不完整。\n- 0.25：區分參與程度的努力極少。\n- 0.0：未評估發言角色。"
reference_solution: "助手應讀取 meeting-transcript.md，從「一、出席名單」區塊（含親自到場、視訊連線、\n列席官員、公眾參與者四類）與「二、會議逐字內容」的點名與對話交叉比對，整理出所有\n\
  具名人物（皆為虛構），並正確歸類與會方式與發言角色：\n\n- 委員會主席（親自到場）：王志明 主席，鼎峰緊急救難協會（NESA）理事長。\n- 委員（親自到場，6 位）：林淑芬（DGC 頻率管理處\
  \ 處長）、陳建宏（中華電信寬頻技術\n  研究所 所長）、周明德（南港大學電機工程學系 教授）、鄭雅文（鼎峰科技 標準與法規部\n  協理）、黃國昌（台灣公共利益網路基金會 PINF 執行長）、吳孟儒（玉山防務系統\
  \ DZX\n  首席工程師）。\n- 委員（視訊連線，9 位，姓名後標星號*）：何信宏（南港大學頻譜政策研究中心 主任）、\n  馮淑惠（遠傳行動通訊 政策研究部 副總）、麥國輝（台電綜合研究所 通訊組\
  \ 組長）、\n  史丹利（中央科技大學 NC 無線實驗室 教授）、雷瑞瑟（雷神防務台灣分公司 經理）、\n  唐諾文（台灣有線電視業者協會 技術顧問）、包大維（工研院 通訊技術組 資深研究員）、\n\
  \  賴明達（南港市政府 智慧城市辦公室 主任）、柯怡君（資安署 風險評估科 科長）。\n- 列席官員（非委員，親自到場，4 位）：史國良（經濟與數位發展部 政務次長）、\n  聶必亞（頻譜管理署 OSM\
  \ 副署長）、鮑威霖（指定政府聯絡官 DGO）、包柏特（行政院\n  科技與政策辦公室 OSTP 諮詢委員）。\n- 公眾參與者：史耐德 先生（一般民眾，於公眾意見時段發言）。\n\n與會方式判定：星號（*）與點名回應為「在線上／連線」者屬視訊連線；其餘為親自到場。\n\
  發言角色：主席、史國良、聶必亞、包柏特等有實質致詞或政策發言；多數委員在技術討論\n與工作小組分工時有發言；少數委員僅在點名時報出身分。委員具名人數共 16 位（含主席），\n連同 4 位列席官員與\
  \ 1 位公眾參與者，與會者總數約 21 位。"
