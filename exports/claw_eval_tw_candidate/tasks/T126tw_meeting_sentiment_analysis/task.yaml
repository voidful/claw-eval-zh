expected_actions:
- 已建立 `sentiment_analysis.md` 檔案
- 整體情緒正確辨識為正面／合作
- 至少分析 3 個主題並各自評定情緒
- 包含團隊動態或人際互動觀察
- 包含至少 2 句來自逐字稿的直接引言
- 評估了投入程度
- 至少辨識出一項疑慮或不確定之處
- 分析能區分不同主題間的不同情感基調
user_agent:
  enabled: false
judge_rubric: '### 評分項 1：分析深度（權重 35%）


  **1.0 分**：分析超越表層的情緒標籤。辨識出會議過程中細膩的情緒轉折，解釋為何某些主題更具熱度，並掌握「非正式卻有生產力」的動態。記錄如 Talladega Nights 離題等具體時刻，作為團隊默契的佐證。


  **0.75 分**：分析良好，逐主題拆解清楚並具一定細膩度。


  **0.5 分**：指派了基本情緒標籤，但說明或洞見有限。


  **0.25 分**：分析淺薄，大多只是重述明顯的觀察。


  **0.0 分**：未做出有意義的分析。


  ### 評分項 2：以證據為本的觀察（權重 30%）


  **1.0 分**：論點有逐字稿中的具體引言或時刻佐證。在適當之處將情緒歸於特定人物（例如 William 對標語的強烈意見、Samia 對競品的條理化提問）。引言選得好且具說明力。


  **0.75 分**：多數論點有證據支持，引言選擇良好。


  **0.5 分**：提供部分證據，但許多論點是無佐證的斷言。


  **0.25 分**：引言極少或全無，多為臆測。


  **0.0 分**：未使用逐字稿中的任何證據。


  ### 評分項 3：實用價值（權重 35%）


  **1.0 分**：分析提供團隊主管可用的可執行洞見——辨識潛在摩擦點、團隊同調之處、誰可能需要更多支援，以及哪些主題能激發團隊。「疑慮」區段點出真正值得處理的問題。


  **0.75 分**：大致可執行，能良好辨識動態與疑慮。


  **0.5 分**：有一些有用觀察，但多為描述性而非可執行。


  **0.25 分**：實用價值有限；讀起來更像讀書報告而非有用的分析。


  **0.0 分**：沒有可執行的洞見。'
reference_solution: "助手應該：\n\n1. 讀取會議逐字稿\n2. 辨識整體偏正面／合作的情緒——團隊大致同調且具生產力\n3. 逐主題分析情緒：\n   - 企業活動：中性／略帶不確定（仍在等待各\
  \ GTM 團隊的回饋）\n   - 產品公告：正面／熱絡（團隊對彙整成果感到興奮）\n   - 競品資訊圖：正面，伴隨輕度爭辯（配色選擇、stage 名稱的描述性）\n   - 訊息框架：高度投入、帶玩鬧氣氛（Talladega\
  \ Nights 梗、對標語的熱烈討論）\n4. 記錄具體動態：\n   - 對「more speed, less risk」標語的熱情\n   - 玩鬧式打趣（Ricky Bobby／NASCAR\
  \ 梗、學校集會）\n   - William 直白的「我不是愛就是恨」風格\n   - 對公司不夠慶祝成果的輕微不滿\n   - Samia 對競品試算表方法論的建設性反對意見\n5. 摘出能呈現基調的相關引言\n\
  6. 評估整體偏高的投入程度"
