prompt:
  text: "我的工作區中有一個 CSV 檔 `world_gdp_2014.csv`，內含全球各國與屬地的 GDP 資料。\n該檔有三個欄位：`COUNTRY`、`GDP (BILLIONS)`（單位為美元）與\
    \ `CODE`（ISO 國家\n代碼）。共有 222 筆。\n\n此資料集不含區域（region）欄位。請運用你的世界地理知識，將每一國歸入下列其中\n一個區域：**North America**、**Europe**、**East\
    \ Asia & Pacific**、\n**South Asia**、**Latin America & Caribbean**、\n**Middle East & North Africa**、**Sub-Saharan\
    \ Africa** 與\n**Central Asia & Caucasus**。接著將區域分析寫入 `gdp_regions_report.md`。你的\n報告應包含：\n\n- **各區域\
    \ GDP 總額**，附上各區域的合計 GDP、國家數，以及佔世界 GDP 的百分比\n  份額，並依總 GDP 由高至低排序\n- **各區域前 3 大經濟體**（國名與 GDP）\n- **區域比較**：哪\
    \ 3 個區域主導全球經濟，其合計份額為何\n- **各區域平均每國 GDP**：哪個區域平均每國 GDP 最高、哪個最低，這代表什麼\n- **差距分析**：對每個區域計算最大與最小經濟體之間的比值——哪個區域呈現最大的\n\
    \  內部差距\n- 一段簡短的**總結段落**，說明全球經濟產出的地理分布\n\n注意：部分國家可能存在歸類上的模糊（例如 Russia、Turkey）。請將它們歸入你認為\n最合適的區域，並註明任何邊界案例。"
  language: zh
