prompt:
  text: "有一家台灣中小企業正在尋找以**開源軟體替代商業軟體**的方案，以降低授權成本\n並兼顧資料主權（data sovereignty）。請聚焦於可自架（self-host）的選項，協助\n\
    他們評估替代常見商業軟體（例如以 Nextcloud 替代雲端硬碟、以 Mattermost 替代\n商業即時通訊、以 Odoo 替代商業 ERP、以 OnlyOffice 替代文書處理）。\n\n\
    請研究並彙整一份報告，至少涵蓋 5 個開源替代方案。針對每個方案，記錄：\n\n1. **專案名稱與網址**（GitHub/GitLab 儲存庫連結）— 軟體名稱保留原文，不翻譯\n2. **所替代的商業軟體**\n\
    3. **授權條款**（MIT、AGPL、Apache 等）\n4. **技術棧（tech stack）**\n5. **部署選項**（Docker、Kubernetes、手動安裝）\n6. **關鍵功能**——具體說明與其所替代的商業軟體相比的差異\n\
    7. **社群健康度**——GitHub 星數、近期提交活躍度、貢獻者人數、發版節奏\n8. **限制與自架複雜度**——相較商業軟體缺少什麼、部署與維護的難度、繁體中文\n   與台灣在地化（如發票、報稅整合）支援程度\n\
    \n請將報告儲存至 `oss_alternatives.md`，內容須包含置於最上方的摘要比較表格、\n各方案的詳細側寫，以及針對該台灣中小企業使用情境為各方案排序的建議章節。\n\n注意：這是即時資料。請對星數、版本與功能**標示資料來源、標示查詢日期**，並\n\
    說明**資料限制與不確定性**（專案活躍度與功能持續變動）。切勿捏造或寫死星數\n或版本號。軟體名稱（Nextcloud、Mattermost、Odoo 等）一律保留英文原文。"
  language: zh
