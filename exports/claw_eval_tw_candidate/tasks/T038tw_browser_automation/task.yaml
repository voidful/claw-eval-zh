      >\n          <h3>${p.name}</h3>\n          <div class=\"price\">$${p.price.toFixed(2)}</div>\n \
      \         <div class=\"stock\">${p.stock > 0 ? p.stock + \" in stock\" : \"Out of stock\"}</div>\n\
