      ).style.display = \"block\";\n      document.getElementById(\"cart\").style.display = \"none\";\n\
      \      document.querySelector(\".products\").style.display = \"none\";\n      cart = [];\n    });\n\
      \    renderProducts();\n    renderCart();\n  </script>\n</body>\n</html>"
