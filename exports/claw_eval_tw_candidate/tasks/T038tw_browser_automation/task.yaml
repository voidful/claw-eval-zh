      \    <p>Your order <span id=\"order-id\"></span> has been placed.</p>\n    <p id=\"order-summary\"\
      ></p>\n  </div>\n  <script>\n    const products = [\n      { id: 1, name: \"Wireless Mouse\", price:\
      \ 29.99, stock: 15 },\n      { id: 2, name: \"Mechanical Keyboard\", price: 89.99, stock: 8 },\n\
      \      { id: 3, name: \"USB-C Hub\", price: 45.00, stock: 23 },\n      { id: 4, name: \"Webcam HD\
      \ 1080p\", price: 59.99, stock: 0 },\n      { id: 5, name: \"Monitor Stand\", price: 34.50, stock:\
