prompt:
  text: "請分析位於 `apache_error.log` 的 Apache 錯誤日誌，並將所有 `[error]` 等級的條目依錯誤類型分類。請忽略 `[notice]` 等級的條目。\n\n\
    請產生一份由最常見到最不常見的錯誤類型排名清單。對於每一種錯誤類型，請提供：\n\n1. 該錯誤類別的描述性名稱\n2. 出現次數的精確計數\n3. 一則範例日誌行\n4. 簡短說明此錯誤的成因，以及它是否代表資安疑慮\n\
    \n請把你的發現寫到 `error_types_report.json`，以如下結構的 JSON 物件呈現：\n\n```json\n{\n  \"total_errors\": 753,\n \
    \ \"error_types\": [\n    {\n      \"rank\": 1,\n      \"category\": \"Descriptive name\",\n     \
    \ \"count\": 224,\n      \"example\": \"One example log line\",\n      \"explanation\": \"What causes\
    \ this and security implications\"\n    }\n  ]\n}\n```\n\n請聚焦於面向用戶端的錯誤（即帶有 `[client ...]` 者），但同時也納入伺服器內部錯誤（例如\
    \ `mod_jk` 初始化失敗與 `env.createBean2()` 工廠錯誤）。"
