prompt:
  text: "工作區裡有兩個資料檔，提供給你分析（金額單位皆為新臺幣 NT$）：\n\n1. `quarterly_sales.csv` —— 一個包含銷售交易的 CSV 檔，欄位有：Date、Region、Product、\n\
    \   Units_Sold、Unit_Price、Revenue、Cost（共 24 列資料）。Region 為台灣地區（北部、中部、\n   南部、東部），Product 為產品名稱（智慧手環、藍牙耳機、行動電源）。\n\
    2. `company_expenses.xlsx` —— 一個 Excel 活頁簿，含兩個工作表：「Q1_Expenses」（員工費用\n   報告，12 筆紀錄，部門為 研發、業務、行銷、管理）與「Budgets」（各部門季度預算分配）。\n\
    \n請讀取並分析這兩個檔案，然後把一份摘要報告寫入 `data_summary.md`，內容包含：\n\n- **CSV 分析**：總營收、總利潤（營收減成本）、總銷售數量、依營收計算表現最佳的地區，\n\
    \  以及依營收計算最暢銷的產品。\n- **Excel 分析**：Q1 總費用、費用最高的部門、總費用最高的員工，以及各部門 Q1 實際費用\n  與 Q1 預算的比較。\n- 一段結合兩個檔案發現的整體洞察（insights）區段。\n\
    \n報告請全程使用繁體中文，金額一律以新臺幣（NT$）表示，並只根據檔案中實際存在的資料作答，\n不要臆測或填補缺漏的數字。"
  language: zh
