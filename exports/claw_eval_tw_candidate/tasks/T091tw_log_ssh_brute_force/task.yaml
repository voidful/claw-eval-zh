prompt:
  text: "你是一名資安分析師，正在檢視位於 `auth.log` 的 OpenSSH 認證日誌。你的任務是偵測暴力破解（brute-force）攻擊樣態，並產生一份威脅評估。\n\n暴力破解攻擊的定義為：**在日誌期間內，來自單一\
    \ IP 位址的認證失敗嘗試超過 10 次**。\n\n你的報告應包含：\n\n1. **暴力破解來源（Brute Force Sources）**：列出所有達到暴力破解門檻的 IP，並附各 IP\
    \ 的失敗嘗試總數\n2. **攻擊強度（Attack Intensity）**：對每個暴力破解來源，計算約略的嘗試速率（每分鐘嘗試次數）\n3. **使用者名稱樣態（Username Patterns）**：對每個攻擊\
    \ IP，他們嘗試了哪些使用者名稱？是字典攻擊（dictionary attack，眾多使用者名稱）還是定向攻擊（targeted，少數使用者名稱）？\n4. **攻擊時間軸（Attack Timeline）**：每個攻擊何時開始與停止？攻擊者之間是否有重疊？\n\
    5. **反向 DNS 分析（Reverse DNS Analysis）**：哪些攻擊 IP 觸發了「POSSIBLE BREAK-IN ATTEMPT」警告？\n6. **風險評估（Risk Assessment）**：評定整體威脅等級，並建議具體的對策\n\
    \n請把報告寫到 `brute_force_report.json`，採用如下結構的 JSON 文件：\n\n```json\n{\n  \"summary\": \"Brief summary\"\
    ,\n  \"brute_force_sources\": [\n    {\n      \"ip\": \"x.x.x.x\",\n      \"total_attempts\": 100,\n\
    \      \"first_seen\": \"Dec 10 HH:MM:SS\",\n      \"last_seen\": \"Dec 10 HH:MM:SS\",\n      \"usernames_tried\"\
    : [\"user1\", \"user2\"],\n      \"attack_type\": \"dictionary|targeted\",\n      \"reverse_dns_warning\"\
    : true\n    }\n  ],\n  \"risk_level\": \"critical|high|medium|low\",\n  \"recommendations\": [\"rec1\"\
    , \"rec2\"]\n}\n```"
  language: zh
