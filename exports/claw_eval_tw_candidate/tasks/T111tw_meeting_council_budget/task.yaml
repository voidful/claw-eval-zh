  enabled: false
judge_rubric: "### 評分項 1：財務資料擷取（權重 40%）\n- 1.0：所有主要新臺幣金額皆正確擷取（容量費現/提議費率、30 億資本支出、每年增收、\n  羅馬倉庫 9,400 萬、行政園區增建\
  \ 3,420 萬與分期、和解金 65 萬、義塚紀念館 8,000 萬等）。\n- 0.5：擷取多數但有部分缺漏或金額錯置。\n- 0.0：金額大量缺漏或錯誤。\n### 評分項 2：背景脈絡（權重\
  \ 25%）\n- 1.0：每一項目皆有清楚的背景脈絡與議會行動（一讀／追加預算／尚未編列等）。\n- 0.5：部分項目有脈絡。\n- 0.0：僅列金額，幾乎沒有脈絡。\n### 評分項 3：周延度（權重\
  \ 20%）\n- 1.0：涵蓋逐字稿第五節所有財務段落（容量費、羅馬倉庫、行政園區增建、消防分隊、\n  和解金、義塚紀念館、管線月費）。\n- 0.5：僅涵蓋主要幾項。\n- 0.0：明顯不完整。\n\
  ### 評分項 4：財務彙總（權重 15%）\n- 1.0：結尾有清楚的財務彙總（財務摘要），整理本日重大金額。\n- 0.5：有彙總但不完整。\n- 0.0：沒有彙總。"
reference_solution: "助手應讀取 transcript.md，並產生 budget_report.md，至少涵蓋以下（皆為虛構）重大財務項目：\n\n- **自來水及污水容量費（容量接管費）**：未來\
  \ 20 年總計需投入約新臺幣 30 億元\n  （NT$3,000,000,000）資本改善，其中已爭取中央補助約 1 億 7,000 萬元（NT$170,000,000）。\n  目前每戶自來水\
  \ NT$1,020、污水 NT$1,237；提案調整為自來水 NT$1,530、污水 NT$1,847。\n  調整後預估每年可增加約 NT$1,500 萬至 2,000 萬元之額外收入。第二十三案已完成一讀。\n\
  - **羅馬倉庫園區（Rome Yard）第四期**：總開發經費約新臺幣 9,400 萬元（NT$94,000,000），\n  其中民間開發商（鼎峰都更開發）投入約 NT$300 萬元先期建設，預計\
  \ 2028 年 9 月完工。\n- **南港大道行政園區增建**：總經費新臺幣 3,420 萬元（NT$34,200,000）；第一期已支用約\n  NT$700 萬元（NT$7,000,000，已支出），第二期尚需\
  \ NT$2,720 萬元（NT$27,200,000）。\n- **第 24 號消防分隊**：保證最高價（GMP）將於 5 月 15 日提報核定，預計 2027 年 9 月完工。\n- **天然氣管線損鄰和解金**：新臺幣\
  \ 65 萬元（NT$650,000），已納入追加預算。\n- **義塚紀念館（市民請求）**：市民任薇等人請求編列 NT$8,000 萬元（NT$80,000,000）設置義塚\n  紀念館暨族譜中心，本案尚未編列，將提交研議。\n\
  - **老舊管線汰換方案**：擬採每戶每月加收 NT$8 元自來水管線費加 NT$8 元污水管線費\n  （合計每月 NT$16 元）方式分攤。\n\n並在最後附上清楚的財務彙總（財務摘要），整理上述金額。"
