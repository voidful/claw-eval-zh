judge_rubric: '### 評分項 1：財務資料擷取（權重 40%）

  **1.0 分**：所有主要金額皆正確擷取。**0.5 分**：部分缺漏。**0.0 分**：完全沒有。


  ### 評分項 2：背景脈絡（權重 25%）

  **1.0 分**：每一項目皆有清楚的背景脈絡。**0.5 分**：部分有。**0.0 分**：完全沒有。


  ### 評分項 3：周延度（權重 20%）

  **1.0 分**：涵蓋所有會議段落。**0.5 分**：僅主要部分。**0.0 分**：不完整。


  ### 評分項 4：彙總（權重 15%）

  **1.0 分**：彙總清楚。**0.5 分**：不完整。**0.0 分**：完全沒有。'
reference_solution: 關鍵財務項目：Water/Wastewater Capacity Fees（$3B 投資、$170M 補助、目前每單位 $1,020/$1,237、提議 $1,530/$1,847、每年額外
