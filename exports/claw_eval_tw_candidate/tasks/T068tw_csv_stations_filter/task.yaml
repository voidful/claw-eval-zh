judge_rubric: '### 評分項 1：篩選正確性（權重 40%）


  - 1.0：四項篩選結果全部正確，數量精確（39、4、8）且站名清單正確；DMS 緯度解析正確處理。

  - 0.75：四項中有三項正確，一項有小錯。

  - 0.5：兩項正確，其餘有明顯錯誤。

  - 0.25：僅一項正確，其餘有重大錯誤。

  - 0.0：沒有任何篩選結果正確。


  ### 評分項 2：DMS 座標處理（權重 20%）


  - 1.0：正確解析 DMS 格式緯度（例如 "42 57 00" → 42.95°），準確套用 43°N 門檻，並列出全部 8 個符合的氣象站。

  - 0.75：DMS 解析正確，但漏掉一個站或有輕微邊界誤差。

  - 0.5：嘗試解析 DMS，但錯誤影響到結果。

  - 0.25：把 DMS 當成十進位度，或只取度的部分。

  - 0.0：沒有嘗試緯度篩選，或完全錯誤。


  ### 評分項 3：交叉統計表品質（權重 20%）


  - 1.0：表格／矩陣清楚，以機構為列、海拔帶為欄，計數正確，且列／欄總計加總為 213。

  - 0.75：表格良好，僅有小幅計數錯誤。

  - 0.5：嘗試做交叉統計，但格式不佳或計數有誤。

  - 0.25：交叉統計做得極少。

  - 0.0：完全沒有交叉統計。


  ### 評分項 4：報告組織（權重 20%）


  - 1.0：每一項篩選結果各自分區，數量顯著標示，站名清單排版良好（表格或排序清單），報告流暢有條理。

  - 0.75：組織良好，僅有小幅排版問題。

  - 0.5：有結果但組織不佳、不易閱讀。

  - 0.25：雜亂或缺漏區段。

  - 0.0：沒有報告或無法使用。'
reference_solution: '助手應該：


  1. 解析 CSV 檔案，處理 BOM 與 DMS 格式座標

  2. 篩選海拔 >= 5,000 ft 的 NWS 站：恰好 39 個站，最高為 GALENA（7,300 ft）

  3. 篩選 Custer County 的 NRCS 站：4 個站（DOLLARHIDE SUMMIT SNOTEL 8420、HILTS CREEK SNOTEL 8000、BEAR CANYON
  SNOTEL 7900、STICKNEY MILL SNOTEL 7430）

  4. 解析 DMS 緯度，篩選海拔 3000-4000 ft 且位於 43°N 以南者：8 個站，包含 BLISS 4 NW、BUHL 2、CASTLEFORD 2 N、GOODING 2S、JEROME、SHOSHONE
  1 WNW、TWIN FALLS KVMT、TWIN FALLS WSO

  5. 建立機構 × 海拔類別的交叉統計表

  6. 把整理後的結果寫到報告檔


  關鍵預期數值：


  - NWS >= 5000 ft：39 個站；最高為 GALENA（7,300 ft）

  - Custer 的 NRCS：4 個站；DOLLARHIDE SUMMIT SNOTEL（8,420 ft）最高

  - 3000-4000 ft 且位於 43°N 以南：8 個站

  - 交叉統計表總計：NWS 143、NRCS 70'
