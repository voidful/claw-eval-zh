- 已計算遞延對領取者比值並將前 10 大縣市排名
- 已指出中央直轄機關為比值最高（約 5.69）的離群值
- 已指出連江縣／臺北市等為地方縣市中比值最高者（約 0.88–0.89）
- 已計算集中度風險（前 5 約 61.6%、前 10 約 84.6%）
- 已找出選區級熱點
