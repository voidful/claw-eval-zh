judge_rubric: '### 評分項 1：人口估計品質（權重 30%）


  **1.0 分**：人口估計對 2014 年而言合理（例如 US 約 318M、China 約 1.36B、

  India 約 1.25B、Japan 約 127M、Germany 約 81M）。可接受小幅不準，但應落在

  合理範圍內。

  **0.75 分**：多數估計合理，僅少數明顯偏差。

  **0.5 分**：有提供估計，但數個明顯錯誤（偏差 >20%）。

  **0.25 分**：許多估計嚴重不準。

  **0.0 分**：未提供人口估計或完全捏造。


  ### 評分項 2：人均分析品質（權重 30%）


  **1.0 分**：在給定人口估計下，人均計算正確，重新排名做得妥當，且分析正確指出

  人口眾多的開發中國家（India、China、Indonesia）人均排名低得多，而較小的富裕

  國家排名較高。

  **0.75 分**：計算與重新排名大致正確，分析良好。

  **0.5 分**：算出部分人均值，但重新排名不完整或分析流於表面。

  **0.25 分**：有人均值但計算有重大錯誤。

  **0.0 分**：未嘗試人均分析。


  ### 評分項 3：洞見品質（權重 25%）


  **1.0 分**：清楚說明總 GDP 反映經濟規模、人均反映個人富裕程度。指出具體意外

  （例如 India 以 GDP 排第 10 但人均近墊底、Australia 為中型經濟體卻人均居頂）。

  討論人口在此分歧中的作用。

  **0.75 分**：洞見良好，僅有小缺漏。

  **0.5 分**：有基本觀察但缺乏更深入的解讀。

  **0.25 分**：觀察流於表面或不正確。

  **0.0 分**：未提供任何洞見。


  ### 評分項 4：方法論與呈現（權重 15%）


  **1.0 分**：方法論說明清楚、表格排版良好，並坦承估計上的侷限。承認人口數字

  為約略值。

  **0.75 分**：呈現良好，僅有小幅排版問題或方法論說明較簡短。

  **0.5 分**：可讀，但缺少方法論說明或表格排版不佳。

  **0.25 分**：不易閱讀或方法論不清楚。

  **0.0 分**：無報告或無法閱讀。'
reference_solution: "助手應該：\n\n1. 讀取並解析 CSV 檔\n2. 依 GDP 排序以找出前 30 大經濟體\n3. 套用合理的 2014 年人口估計（依一般知識）\n4.\
  \ 為每一國計算人均 GDP（GDP in billions × 1,000,000,000 / 人口）\n5. 依人均 GDP 重新排名\n6. 找出關於經濟規模相對於人均財富的關鍵洞見\n7. 撰寫一份含方法論說明、結構良好的\
  \ markdown 報告\n\n預期關鍵數值（約略，使用 2014 年人口）：\n\n依總 GDP 的前 30 大以下列開頭：US ($17,420B)、China ($10,360B)、Japan\
  \ ($4,770B)、\nGermany ($3,820B)、France ($2,902B)\n\n前 30 國依人均排名大致應呈現：\n- 前 30 中人均最高者：Australia（約 $62k）、Sweden（約\
  \ $58k）、\n  United States（約 $55k）、Netherlands（約 $52k）、Switzerland 不在內\n  （依總 GDP 不在前 30）\n- 前 30 中人均最低者：India（約\
  \ $1.6k）、Nigeria（約 $3.4k）、Indonesia\n  （約 $3.5k）、Pakistan（約 $1.3k，若在前 30 內）\n- China 人均：約 $7.5k，儘管總\
  \ GDP 排第 2\n- India 人均：約 $1.6k，儘管總 GDP 排第 10"
