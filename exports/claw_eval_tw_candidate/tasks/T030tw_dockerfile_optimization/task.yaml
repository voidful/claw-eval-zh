reference_solution: "助手應該分析原始的 Dockerfile，並產生套用常見 Docker 最佳實務的\n`Dockerfile.optimized`：\n\n- 改用更精簡的基礎映像檔，例如\
  \ `python:3.11-slim`、`python:3.12-slim` 或\n  Alpine 版本。\n- 將眾多個別的 `apt-get install` 或 `apk add` 指令合併為單一\
  \ `RUN` layer，並在\n  同一個 layer 中清理快取。\n- 移除執行階段不需要的套件：`vim`、`nano`、`wget`、`git`，以及可能的\n  `build-essential`（或使用\
  \ multi-stage build 來區分建置階段與執行階段的相依性）。\n- 在複製完整原始碼之前先複製 `requirements.txt` 並安裝相依性，以利用 layer 快取。\n- 移除\
  \ `ENV DEBUG=true`。\n- 保留 `EXPOSE 8000` 與原本的 `CMD`。"
