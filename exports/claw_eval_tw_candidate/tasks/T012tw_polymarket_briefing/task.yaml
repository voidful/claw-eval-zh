expected_actions:
- 已在工作區建立 polymarket_briefing.md
- 檔案標頭包含今天的日期
- 恰好有 3 個市場區段（若市場無法取得，可較少並加註說明）
- 每個市場皆有問題、賠率（Yes/No 百分比）與相關新聞
- 賠率以百分比格式呈現，且加總約為 100%
- 市場選取與台灣相關，並從台灣角度簡述影響
- 標示資料來源（Polymarket／新聞）、查詢日期，並說明資料限制與不確定性
- 格式符合所要求的 markdown 結構
user_agent:
