- 廟前里 與 麥尼爾巡佐 / 治安犯罪
- 西港里 與 中崙倉庫園區 / 職棒球場（樂天桃猿）
- 南港大道 與 封街施工 / 老舊管線下水道
- 東港里 與 開發（東港路廊 / 分區變更 / 環評）
- 高地里 與 街友（遊民）安置
- 3 處以上分區變更門牌（公道五路 4102、市民大道二段 2707、南港大道 110）
- 提及 南港空軍基地
- 記下 河岸步道 與 中崙倉庫園區 / 串聯關係
- 出現次數統計或議題交叉對照
- 15 個以上不同地點
