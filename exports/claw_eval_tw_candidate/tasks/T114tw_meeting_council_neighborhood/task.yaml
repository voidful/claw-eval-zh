judge_rubric: '### 評分項 1：完整度（權重 35%）

  **1.0 分**：辨識 20 個以上地點。**0.75 分**：15-19 個。**0.5 分**：10-14 個。

  **0.0 分**：少於 5 個。


  ### 評分項 2：背景脈絡（權重 25%）

  **1.0 分**：每一地點皆有準確的背景脈絡（相關議案／發言者／議題）。

  **0.5 分**：部分含糊。**0.0 分**：完全沒有脈絡。


  ### 評分項 3：組織（權重 25%）

  **1.0 分**：依選區分組、有提及次數、有議題交叉對照。**0.5 分**：僅部分具備。

  **0.0 分**：完全沒有組織。


  ### 評分項 4：廣度（權重 15%）

  **1.0 分**：涵蓋多種尺度（從門牌地址到區域、軍事用地、跨縣市比較）。

  **0.5 分**：僅單一尺度。**0.0 分**：極少。'
reference_solution: "助手應讀取 transcript.md（虛構南港市議會逐字稿）並產出 neighborhoods_report.md，\n準確辨識下列里別／選區／地點及其脈絡（皆為虛構）：\n\
  \n- 廟前里（第 6 選區）：治安改善，麥尼爾巡佐 獲本月模範員警，竊盜與街頭犯罪下降。\n- 西港里（第 4 選區）：中崙倉庫園區 開發、未來職棒球場（樂天桃猿）選址、義塚公園 保存；\n  為本日提及最頻繁地點（提及\
  \ 6 次）。\n- 南港大道沿線（第 2 選區）：封街施工、老舊管線與雨水下水道更新，商家 米其里尼 陳情。\n- 東港里（第 5 選區）：東港路廊 建設、土地分區變更與環評補充。\n- 高地里（第\
  \ 5 選區）：街友（遊民）安置，中正路高架橋下，高德森 陳情。\n- 社子里（第 2 選區）：雨水下水道與颱風（凱米颱風）防災積水。\n- 古堡里 與 古堡灣：人行道（騎樓）退縮法規漏洞，班奈特 陳情。\n\
  - 市中心（南港大道商圈）：商業活動與交通。\n- 河岸步道（基隆河 河岸步道）：與 中崙倉庫園區 開發及西側 串聯／延伸。\n- 永豐里：社區權益。\n- 重要門牌（分區變更基地）：公道五路 4102\
  \ 號、市民大道二段 2707 號、南港大道 110 號。\n- 南港空軍基地：周邊飛航噪音與用地協調。\n- 跨縣市比較：參考 台中、嘉義、高雄 等地之容量費與都更經驗。\n\n並以選區分組概覽、提及次數與議題交叉對照方式組織，辨識至少\
  \ 15 個不同地點，\n涵蓋從門牌地址到區域層級等多種尺度。"
