judge_rubric: "請依下列四個評分項評估助手產出的 humanized_blog.txt，各項給 0.0 至 1.0 的分數，\n並依權重加權。整體任務的核心是「把一篇 AI 味很重的繁體中文部落格，改寫成讀起來\n\
  像真人撰寫，且全程保留繁體中文」。\n\n### 評分項 1：技能使用或手動改寫（權重 25%）\n- 1.0：正確嘗試以 `/install humanizer` 安裝並使用 humanizer 技能來改寫，\n\
  \  或在技能不可用時完成一份高品質的手動改寫。\n- 0.75：有嘗試安裝／使用技能，並在不可用時適當退回手動改寫。\n- 0.5：有嘗試改寫，但方法不理想或交代不清。\n- 0.25：僅做了極少量的改寫。\n\
  - 0.0：完全沒有嘗試改寫。\n\n### 評分項 2：輸出品質—自然語氣（繁中）（權重 35%）\n- 1.0：讀起來像台灣真人部落客寫的繁體中文，語氣自然口語、句型多樣、有個人聲音，\n  幾乎沒有機械感。明顯拿掉了「在這個瞬息萬變的時代／此外／再者／值得注意的是／\n\
  \  我們必須理解／總而言之」這類罐頭套話與空泛行動呼籲。\n- 0.75：大致自然流暢，僅殘留少量 AI 痕跡或略嫌正式之處。\n- 0.5：有改善，但仍保留明顯的 AI 套話、重複句型或彆扭措辭。\n\
  - 0.25：相較原文幾乎沒有改善，套話與機械感大量殘留。\n- 0.0：未改、改得更差，或檔案缺失。\n\n### 評分項 3：內容保留（權重 25%）\n- 1.0：完整保留原文的核心訊息與七個生產力策略（排定優先順序、排除干擾、時間\n\
  \  區塊化、定期休息、善用科技、設定清楚目標、工作生活平衡）的重點與建議。\n- 0.75：大致保留，僅有少量遺漏或更動。\n- 0.5：保留主要內容，但遺失或扭曲了部分策略或重點。\n- 0.25：重大內容遺失或語意扭曲。\n\
  - 0.0：內容完全改變或缺失。\n\n### 評分項 4：語言正確性與任務完成度（權重 15%）\n- 1.0：全程保留繁體中文（zh-TW），未翻成英文或夾雜簡體字；輸入正確讀取、\n  改寫結果正確存到\
  \ humanized_blog.txt。\n- 0.75：完成且保留繁中，但檔案處理有小瑕疵（如檔名略有出入）。\n- 0.5：部分完成，或出現少量非預期的語言／簡繁混用問題。\n- 0.25：有嘗試但輸出未正確儲存，或把內容翻成英文／大量簡體字。\n\
  - 0.0：未建立輸出檔案。\n\n重要：本任務要求「保留繁體中文」。若助手把內容翻成英文，或大量出現簡體字／中國\n用語，應在評分項 2 與 4 明顯扣分，並視為偏離任務。"
reference_solution: "助手應該：\n\n1. 讀取 ai_blog.txt 裡那篇 AI 味很重的繁體中文部落格文章。\n2. 嘗試用 `/install humanizer` 安裝並使用\
  \ humanizer 技能來改寫；若該技能不可用，\n   則合理地退回手動改寫。\n3. 把文章改寫得更自然、更像真人撰寫，同時：\n   - 保留繁體中文（zh-TW），不翻成英文。\n   -\
  \ 減少或消除常見 AI 中文寫作痕跡，例如：套話開頭「在這個瞬息萬變的時代」、\n     濫用轉折詞「此外／再者／此外」、過度修飾語氣「值得注意的是／值得一提的是／\n     我們必須理解」、罐頭結論「總而言之／綜上所述」、句型一成不變、過度正式、\n\
  \     像清單一樣堆疊的段落，以及空泛的行動呼籲結尾。\n   - 使語氣更口語自然、句型更多變，貼近台灣讀者習慣的說法。\n4. 保留文章的核心內容與七個生產力策略的重點，不可遺漏或扭曲。\n\
  5. 把改寫結果存到 humanized_blog.txt。"
