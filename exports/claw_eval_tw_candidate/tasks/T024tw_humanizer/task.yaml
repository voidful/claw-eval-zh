prompt:
  text: '我的工作區（workspace）裡有一篇 ai_blog.txt，是一篇關於「遠端工作生產力」的

    繁體中文部落格文章。問題是它讀起來太生硬、太有 AI 味了——通篇都是

    「在這個瞬息萬變的時代」「此外」「再者」「值得注意的是」「我們必須理解」

    「總而言之」這種套話，句型一個樣，語氣又過度正式，完全不像台灣人平常會寫的東西。


    麻煩你先用 `/install humanizer` 從 skill registry 安裝 humanizer 技能，再用它

    把這篇文章改寫得更自然、更像真人寫的；如果這個技能不能用，你也可以自己手動改寫。


    **請保留繁體中文（zh-TW），不要翻譯成英文或其他語言。** 改寫時請保留文章的核心

    內容與七個策略的重點，但讓它讀起來像一個真人部落客寫的：語氣自然口語一點、句型

    多變、拿掉那些罐頭轉折詞與空話、適度用第一人稱與貼近台灣讀者的說法。


    把改寫後的版本存到 humanized_blog.txt。'
