prompt:
  text: '你的工作區 `emails/` 資料夾裡有一批郵件（11 個郵件檔，檔名中含有日期）。請搜尋所有郵件，

    找出所有與「Project Alpha」相關的內容，並建立一份完整的摘要文件。


    請把摘要存到 alpha_summary.md，包含以下區段：


    1. **Project Overview（專案概述）**：Project Alpha 是什麼、使用哪些技術、預算多少？

    2. **Timeline（時程）**：原始時程與任何變更，包含目前預期的日期

    3. **Key Risks and Issues（關鍵風險與問題）**：預算疑慮、安全發現、技術挑戰

    4. **Client/Business Impact（客戶／業務影響）**：銷售管線、客戶回饋與營收預測

    5. **Current Status（目前狀態）**：根據最新進度，專案目前處於什麼階段


    請只依據郵件中實際出現的資訊撰寫，不要臆測郵件未提及的細節。'
