expected_actions:
- 建立報告檔案 cities_filter_report.md
- 六都人口篩選正確（5 個，含新北/臺中/高雄/臺北/桃園，排除臺南）
- 南部大縣市正確（高雄市、臺南市）
- 臺北市 vs 高雄市比較正確（高雄較多）
- 中型縣市篩選正確（屏東/新竹縣/苗栗/雲林，共 4 個）
- 北部區域合計正確（7 個縣市，前段含新北/臺北/桃園）
user_agent:
  enabled: false
judge_rubric: '### 評分項 1：篩選正確度（權重 60%）

  - 1.0：五項篩選的縣市清單、數量、總人口皆正確

  - 0.5：多數正確但有少量錯誤或遺漏

  - 0.0：篩選邏輯明顯錯誤

  ### 評分項 2：呈現與排序（權重 25%）

  - 1.0：排序正確、表格清楚、數量與總和明確標示

  - 0.5：大致可讀但排序或標示有瑕疵

  - 0.0：雜亂或缺漏

  ### 評分項 3：完整度（權重 15%）

  - 1.0：五項全做

  - 0.5：遺漏一兩項

  - 0.0：多數未做'
reference_solution: "助手應讀取 tw_cities.csv 並得出（已由程式從 fixture 驗算）：\n1. 六都 ≥ 2,000,000：新北市、臺中市、高雄市、臺北市、桃園市（共\
  \ 5 個；臺南市約 186 萬\n   未達門檻被排除）；總人口約 14,427,922。\n2. 南部 ≥ 1,000,000：高雄市、臺南市。\n3. 高雄市（約 2,738,041）人口多於臺北市（約\
  \ 2,494,813）。\n4. 中型（500,000–1,000,000）：屏東縣、新竹縣、苗栗縣、雲林縣（共 4 個）。\n5. 北部：共 7 個縣市（新北、臺北、桃園、新竹縣、新竹市、宜蘭、基隆），總人口約\n\
  \   10,690,039；前 5 名：新北市、臺北市、桃園市、新竹縣、新竹市。"
