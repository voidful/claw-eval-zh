prompt:
  text: "請分析位於 `syslog.log` 的 Linux syslog，產出一份所有驗證失敗的完整摘要。此日誌\n含有來自多個服務的 PAM 驗證事件。\n\n你的報告應包含：\n\n1.\
    \ **驗證失敗總數（Total Auth Failures）**：統計跨所有服務的所有驗證失敗條目\n2. **依服務分類的失敗（Failures by Service）**：依服務（sshd、ftpd、login、su\
    \ 等）拆解失敗\n3. **依來源分類的失敗（Failures by Source）**：產生最多失敗的前 10 個來源主機/IP\n4. **被鎖定的使用者（Targeted Users）**：哪些使用者帳號在失敗的驗證嘗試中被鎖定？\n\
    5. **時間性分布（Temporal Distribution）**：多數驗證失敗發生在何時？是否有突增（spike）？\n6. **FTP 與 SSH 分析（FTP vs SSH Analysis）**：比較\
    \ FTP 與 SSH 的驗證攻擊型態 — 是否為\n   相同來源同時攻擊兩者？\n7. **建議（Recommendations）**：依失敗型態，提出具體的安全改進建議\n\n請將報告寫入\
    \ `auth_failures_report.md`，以結構良好的 markdown 文件呈現。"
