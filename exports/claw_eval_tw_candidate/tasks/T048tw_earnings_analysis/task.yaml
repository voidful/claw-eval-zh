prompt:
  text: 'GitLab 在 2025 年第三季（Q3 2025）的利潤率（margin）指引（guidance）上，超出或未達多少個基點（basis points）？


    請研究相關的財報發布（earnings release）或法說會逐字稿（transcript），判斷相關的指引利潤率與實際回報的利潤率，並把你的答案存到 `gitlab_margin_guidance.txt`。


    請附上實際利潤率、指引利潤率，以及超出或未達的基點數。


    （提醒：本任務僅供資訊與分析參考，不構成投資建議或財務建議，亦不取代專業財務意見。請務必在輸出中標明此為非投資建議，並僅根據查得的公開財報資料作答。）'
