expected_actions:
- 已建立報告檔 `coverage_report.md`
- 已指出連江縣沒有氣象站（22 個縣市中有 21 個有站）
- 已列出各縣市氣象站數，且氣象站最多的南投縣（17）正確
- 已包含海拔帶分布，並指出低海拔（1,000 公尺以下）涵蓋最密集
- 已包含中央氣象署、林業署、水利署的地理／海拔比較
- 已指出縣市別資料缺漏（5 個站空白）
- 有建議區段
